body:
  text: 卷一卒中暴厥卒中惡死或先病或平居寢臥奄忽而死皆是中惡急取蔥心黃刺入鼻孔中男左女右入七八寸鼻目血出即蘇亦治自縊垂死又法用蔥刺入耳中五寸以鼻中血出即活也如無血出則不可治矣相傳此扁鵲祕方也崔氏纂要又法斷豬尾取血並縛豚枕之即活此乃長桑君授扁鵲者也肘後方又法銅器或瓦器盛熱湯隔衣尉其腹上冷即易立愈又方搗女青末一錢安咽中以水或酒送下立活也南嶽魏夫人內傳卒然忤死不能言用雞冠血和珍珠丸小豆大納三四丸口中效外以竹筒吹其下部極則易人氣通即活也肘後方卒死不寤半夏末吹鼻中即活並治五絶急病南嶽紫靈魏元君方也臥忽不寤勿以火照但痛齧其踵及拇趾甲際而多唾其面以井底泥塗其目令人垂頭入井中呼其姓名便蘇也一方用蠡實根一握杵爛以水絞汁稍稍灌之外臺祕要卒中惡死吐利不止不知是何病不拘大人小兒馬糞一丸絞汁灌之乾者水煮汁亦可肘後方卒中五尸用豬脂一雞子大苦酒一升煮沸灌之肘後方卒中五尸其狀腹痛脹急不得氣息上衝心胸旁攻兩脅或塊壘湧起或牽引腰膝此乃身中尸鬼接引為害取屋上四角茅入銅器中以三赤帛覆腹著器布上燒茅令熱隨痛追逐跖下癢即瘥也肘後方中惡鬼氣卒死者以樟木燒煙薰之待蘇乃用藥此物辛烈香竄能去濕氣辟邪惡故也時珍方治中忤惡鬼氣卒倒不知人逆冷口鼻出清血或胸脅腹內絞急切痛如鬼擊之狀不可按摩或吐血衄血用久垢汗衫燒灰百沸湯或酒服二錢男用女女用男時珍方一方菖蒲根搗汁含之立止肘後方尸厥卒死不知人者燒尸場土二三錢擂細湯泡灌之即活如無以灶心土代之何氏方又用白馬前腳夜目二枚白馬尾十四莖合燒以苦酒丸如小豆大白湯灌下二丸須臾再服即蘇肘後方卒中尸遁其狀腹脹急衝心或塊起或牽腰脊者是服鹽湯取吐孫真人方尸厥不省脈動如故灶突墨一彈丸大水和飲仍針百會足大趾中指趾甲側千金方中惡中忤中惡鬼氣其證或暮夜登廁或出郊外驀然倒地厥冷握拳口鼻出清血須臾不救似乎尸厥但腹不鳴心腹暖爾勿移動令人圍繞燒火打鼓或燒蘇合香安息香麝香之類候醒再移動用犀角五錢麝香硃砂各二錢五分為末每水調二錢服即效華他方一方用伏龍肝末一雞子大水服取吐千金方客忤中惡多於道間門外得之令人心腹絞痛脹滿氣衝心胸不即治殺人搗墨水和服又方用真丹方寸匕蜜三合和灌之並肘後方中惡不醒令人尿其面上即蘇肘後方中忤邪惡韭根一把烏梅十四個吳茱萸炒半升水一斗煮之仍以病人櫛納入煮三沸櫛浮者生沉者死煮至三升分三服金匱要略又鷹屎白燒灰酒服方寸匕主邪惡勿令本人知蘇恭又艾子和乾薑等分為末蜜丸梧子大空心每服三丸以飯三五匙壓之日再服治百惡氣其鬼神速走出田野之人與此甚相宜也中惡心痛或連腰臍鹽如雞子大青布裹燒赤納酒中頓服當吐惡物愈甄權藥性論鬼擊中惡鹽和水服更以冷水噀之即醒救急方鬼擊卒死者用烏骨雞血塗心下亦效鬼傳方中風暗風卒倒不省人事細辛末吹入鼻中危氏得效方中風不省牙關緊急者藜蘆一兩去苗頭濃煎防風湯浴過焙乾切炒微褐色為末每服半錢小兒減半溫水調灌以吐風涎為效未吐再服亦治風癇簡要濟衆方中風口噤目瞑無門下藥者開關散用天南星為末入白龍腦等分五月五日午時合之每用中指點末揩齒三二十遍揩大牙左右其口自開又名破棺散經驗方中風痰厥僵仆牙關緊閉者取白梅肉揩擦牙齦涎出即開亦治驚癇喉痹時珍方中風痰厥及癲癇驚風痰涎上壅牙關緊急上視搐搦並宜碧霞丹主之烏頭尖附子尖蠍稍各七十個石緑研九度飛過十兩為末麵糊丸芡子大每用一丸薄荷汁半盞化下更服溫酒半合須臾吐出痰涎為妙小兒驚癇加白殭蠶等分和劑局方中風口噤不語心煩恍惚手足不隨或腹中痛滿或時絶而復蘇伏龍肝末五升水八升攪澄清灌之千金方中風口噤竹瀝薑汁等分日日飲之千金方又荊瀝氣平味甘化痰去風為妙藥千金翼云凡患風人多熱嘗宜竹瀝荊瀝薑汁各五合和勻熱服以瘥為度氣虛不能食者用竹瀝氣實能食者用荊瀝又荊芥穗為末酒服二錢立愈名荊芥散此方出曾公談録前後用之甚驗其子嘗病此已革服立定真再生丹也又荊芥同雄黃等分為末豆淋酒服二錢治舌本強名正舌散衛生寶鑑中風不省涎潮口噤語言不出軃曳得病之日便進此藥可使風退氣和不致廢人柏葉一握去枝蔥白一握連根研如泥無灰酒一升煎二十沸溫服如不飲酒水煎分作四五服方進他藥楊氏家藏方中風口噤舌本縮者用芥菜子一升研入醋二升煎一升敷頷頰下效聖惠方中風不能言柳太后嘗病此脈沉而口噤胤宗曰既不能下藥宜湯氣蒸之藥入腠理周時可瘥乃造黃耆防風湯數斛置於床下氣如煙霧其夕便得語宗奭方又烏龜尿點少許於舌下神妙壽域方痰涎潮盛卒中不語及一切風癱用石緑二兩研細水化去石慢火熬干取辰日辰時辰位上修合再研入麝香一分糯米粉糊和丸彈子大陰乾卒中者每丸作二服薄荷酒研下餘風硃砂酒化下吐出青碧涎瀉下惡物大效名碧霞散中風不語喉中如曳鋸口吐涎沫取藜蘆一分天南星一個去浮皮於臍上剜一坑納入陳醋二橡斗四面火逼黃色研為末生面丸小豆大每服三丸溫溫酒下經驗方中風不語舌根強硬三年陳醬五合人乳汁五合相合研以生布絞汁隨時少少與服良久當語聖惠方救急稀涎散治卒中涎湧皂角末一兩生礬末半兩膩粉半兩水調一二錢過咽即吐涎用礬者分膈下涎也效不能盡述宗奭方陳師古亦用治痰厥四肢不收氣閉膈塞但無膩粉中風失音並一切風疰以殭蠶七枚為末酒服日華方又生梨搗汁一盞飲之日再服食療本草治風癱冷痹用醇酒三升拌蠶砂五斗甑蒸於暖室中鋪油單上令患風冷氣痹及近感癱風人就以患處一邊臥砂上厚蓋取汗若虛人須防大熱昏悶令露頭面若未痊愈間日再作風病癱緩手足軃曳口角喎斜語言謇澀步履不正宜神驗烏龍丹主之川烏頭去皮臍五靈脂各五兩為末入龍腦麝香五分滴水為丸如彈子大每服一丸先以生薑汁研化暖酒調服一日二服至五七丸便覺手可抬足移得步十丸可以梳頭也梅師方二方宜量病人虛實寒熱用之治中風身直不得屈伸反復及口僻眼斜刮枳樹皮一升酒三升漬一宿每溫服五合酒盡再作蘇頌方骨軟風疾腰膝疼行步不得遍身搔癢用何首烏大而有花紋者同牛膝各一斤以好酒浸七宿曝乾木臼杵末棗肉和丸梧子大每服三五十丸空心酒下經驗方中風攣縮夜合枝柏枝槐枝桑枝石榴枝各五兩並生銼糯米五升黑豆五升羌活二兩防風五錢細曲七斤半先以水五斗煎五枝取二斗五升浸米豆蒸熟入曲與防風羌活如常釀酒法封三七日壓汁每飲五合勿過醉致吐常令有酒氣也奇效良方半身不遂蠶砂二石以二袋盛之蒸熟更互尉患處仍以羊肚粳米煮粥日食一枚十日即止手足不遂商州有人病手足不遂不履地者數十年良醫殫技不能療所親置之道旁以求救者遇一新羅僧見之告曰此疾一藥可治但不知此土有否因為之入山求索果得乃威靈仙也使服之數日能步履蘇頌方偏風不遂皮膚不仁宜服仙靈脾酒仙靈脾一斤細銼生絹袋盛於不津器中用無灰酒二斗浸之重封春夏三日秋冬五日後每日暖飲常令醺然不得大醉酒盡再合無不效驗合時切忌雞犬婦人見聖惠方老人中風口目瞤動煩悶不安牛蒡根切一升去皮曬乾杵為面白米四合淘淨和作餺飥豉汁中煮加蔥椒五味空心食之恆服極效壽親養老書一切偏風口眼喎斜用青荊芥一斤青薄荷一斤同入砂盆內研爛生絹絞汁於瓷器中煎成膏漉去滓三分之一將二分日乾為末以膏和丸梧子大每服三十丸白湯下早暮各一服忌動風物經驗方又萆麻子仁搗膏左貼右右貼左即正又婦人良方用萆麻子仁七七粒研作餅右喎安在左手心左喎安在右手心卻以銅盂盛熱水坐藥上冷即換五六次即正也又生烏頭青礬各等分為末每用一字嗅入鼻內取涕吐涎立效無比名通關散篋中祕寶方又鱔魚同麝香少許左喎塗右右喎塗左正即洗去時珍方中風口喎以葦筒長五寸一頭刺入耳內四面以面蜜封不透風一頭以艾灸之七壯患右灸左患左灸右勝金方又方乳香薰之以順其血脈證治要訣風壅氣滯手背腳膝痛大麥醋糟炒熱布裹尉之三兩換當愈中風凡手及十指麻木皆是濕痰死血用橘紅一斤逆流水五碗煮爛去渣再煮至一碗頓服取吐乃吐痰聖藥也不吐加瓜蒂末摘玄方祛風益顏真乳香二斤白蜜三斤瓷器合煎如餳每日一服二匙奇效良方石楠葉為療風邪丸散之要兼能令腎強豨蘞丸豨蘞草一名火杴草生於沃壤間帶豬苓氣者是採葉洗淨不拘多少九蒸九曝每蒸用酒蜜灑之蒸一飯頃日乾為末煉蜜丸桐子大每服百丸空心溫酒米飲任下濟生方一方每豨蘞一斤加四物料各半兩川烏一錢半羌活防風各二錢中氣中氣不省閉目不語如中風惡狀南木香為末冬瓜子煎湯灌下三錢痰盛者加竹瀝薑汁氣厥狂躁吐血不止驚顫直視至深夜投戶而出如是兩夕遍用方藥不瘳夜夢觀音授一方如法治服其病果愈方用益智子仁一兩生硃砂二錢青橘皮五錢麝香一錢研為細末每服一錢空心燈心湯下夷堅志五絶卒自縊死梁上塵如豆大各納一筒中四人同時極力吹兩耳及鼻中即活外臺祕要又以藍汁灌之千金方自縊垂死心下猶溫者勿斷繩刺雞冠血滴口中以安心神或云男用雌女用雄肘後方一用雞血塗喉下千金方又皂莢末吹鼻中又用蔥心刺耳鼻中有血出即醒外臺方救溺水死以大凳臥之後足放高用鹽擦臍中待水自流出切勿倒提出水救急方又用灶中灰一石埋之從頭至足惟露七孔良久即蘇凡蠅溺水死試以灰埋之少頃即便活甚驗蓋灰性暖而能拔水也時珍方溺水暴死一宿者尚可活熱鴨血灌之即活更用數人以竹筒吹氣入肛門猶易醒時珍方又紙裹皂莢末納下部須臾出水即活外臺祕要墮水凍死只有微氣者勿以火灸用布袋盛熱灰放在心頭冷即換待眼開以溫酒與之普濟方魘寐卒死鍋底墨水灌二錢並吹鼻醫説一方用灶心土調灌並吹鼻千金方卒魘不寤以青牛蹄或馬蹄臨人頭上即活肘後方又取瓦甑覆人面疾打破之藏器又方用犀角為枕令人不魘魘死尸厥尸厥之病卒死脈猶動聽其耳目中如微語聲股間暖者是也魘死之病臥忽不寤勿以火照但痛齧其踵及足拇趾甲際唾其面即醒仍以菖蒲末吹鼻中桂末納舌下並以菖蒲根汁灌之肘後方或急取梁上塵納鼻中亦效瑣碎録中暑夏月人在途中昏悶熱死急移陰處就掬道上熱土擁臍上作窩令人溺滿暖氣透臍即醒乃服地漿蒜水等藥此法出自張仲景實救急之良方也蓋臍乃命蒂暑暍傷氣溫臍所以接其元氣之意或用大蒜及道上熱土同研爛以新汲水和取汁灌之即醒亦神仙救人方也中暍卒死井水和麵一大抄服之中暑不醒皂角一兩燒存性甘草一兩微炒為末溫水調一錢灌之淡寮中暑發昏小青葉井水浸去泥控干入砂糖擂汁急灌之壽域方一切傷暑和劑局方香薷飲治暑月臥濕地當風或生冷不節真邪相干便致吐利或發熱頭痛或心腹痛或轉筋或乾嘔或四肢逆冷或煩悶欲死並主治之用藿香一斤厚朴薑汁炙白扁豆微炒各半斤銼散每服五錢水二盞酒半盞煎一盞水中沉冷連進二服立效活人書去扁豆入黃連四兩薑汁同炒黃色用伏暑傷冷二氣交錯中脘痞結或泄或嘔或霍亂厥逆硫黃硝石等分研末石器炒成沙再研糯米糊丸梧子大每服四十丸新井水下名二氣丹濟生方暑月吐瀉滑石炒二兩藿香二錢半丁香五分為末每服一二錢浙米泔調服名玉液散經驗方又陳倉米二升麥芽四兩同蒸熟焙研為末水丸梧子大每服百丸白湯送下伏暑發熱作渴嘔惡及赤白痢消渴腸風酒毒泄瀉諸病並宜酒煮黃連丸主之川黃連一斤切以好酒二升半煮乾焙研糊丸梧子大每服五十丸熟水下日三服和劑局方伏暑水泄滑石火煅過一兩硫黃四錢為末麵糊丸緑豆大每用淡薑湯隨大小服名白龍丸普濟方救急方用二味等分為末每米飲服一錢即止注夏虛病枸杞子五味子研細滾水泡封三日代茶飲效適生方夏月困乏無力常服五味子以補五臟之氣與人參黃耆麥門冬少加生黃柏煎湯服之使人精神頓加兩足筋力湧出也蓋五味子之酸輔人參能瀉丙火而補庚金收斂耗散之氣千金方夏月熱煩不止搗小薊汁半升服立瘥孟詵方消暑止渴百藥煎臘茶等分為末烏梅肉搗和丸芡子大每含一丸名水瓢丸事林廣記中濕暑濕癱瘓四肢不能動自然銅燒紅酒浸一夜川烏頭泡五靈脂蒼朮酒浸各一兩當歸二錢酒浸為末酒糊丸梧子大每服七丸酒下覺四肢麻木即止積德堂方虛人有火未宜輕用中濕骨痛白朮一兩酒三盞煎一盞頓服不飲酒以水煎之三因良方濕氣作痛白朮切片煎汁熬膏白湯點服集簡方傷飲食治酒食糯米諸傷大麥法曲研末酒服立愈千金方一切食停氣滿膨脹用紅杏仁三百粒巴豆二十粒同炒色變去豆不用研杏仁為末橘皮湯調下楊氏家藏方過食脯臘筋痛悶絶漿水煮粥入少鷹屎和食孫真人方食狗不消心下堅脹口乾發熱妄語杏仁一升泡去皮尖水三升煎沸去渣取汁分三服下肉為度梅師方鯗魚炙食能消瓜成水治暴下痢及卒腹脹消宿食開寶食瓜過傷瓜皮煎湯解之諸瓜皆同事林廣記中酒成病豉蔥白各半升水二升煮一升頓服千金方酒醉不醒生葛汁飲二升便愈千金方又用水中螺蚌蔥豉煮食飲汁即解肘後方飲酒過度欲至穿腸者用驢蹄硬處削下水煮濃汁冷飲之經驗方消酒葛花同小豆花乾末酒服令人飲酒不醉弘景方斷酒鷹毛水煮汁飲即不思酒千金方又蠐螬研末酒服永不飲千金方虛勞虛損積勞凡男女因積虛或大病後虛損沉困痠疼盜汗少氣喘惙或小腹拘急心悸胃弱多臥少起漸至瘦削若年深五臟氣竭則難治也用烏雌雞一頭治如食法以生地黃一升切飴糖一升納腹內縛定銅錫器貯於鍋內隔湯蒸五升米熟取出食肉飲汁勿用鹽一月一作神效姚僧垣方虛勞瘵疾烏鴉一隻絞死去毛腸入人參片花椒各五錢縫合水煮熟食以湯下鴉骨參椒焙研棗肉丸服便民食療骨虛勞極面腫垢黑脊痛不能久立血氣衰憊發落齒枯甚則喜唾用鹿角二兩牛膝酒浸焙一兩半為末煉蜜丸梧子大每服五十丸空心鹽酒下濟生方勞氣欲絶麥門冬一兩甘草炙二兩粳米半合棗二枚竹葉十五片水二升煎一升分三服南陽活人書又治虛勞客熱只用麥門冬煎湯頻飲本草衍義五勞七傷陽虛無力用羊腎一對去脂切肉蓯蓉一兩酒浸一夕去皮和作羹下蔥鹽五味食一方治陽氣衰敗腰腳疼痛五勞七傷用羊腎三對羊肉半斤蔥白一莖枸杞葉一斤同五味煮成汁下米作粥食之正要方陽氣虛損簡便方用菟絲子熟地黃等分為末酒糊丸梧子大每服五十丸氣虛人參湯下氣逆沉香湯下經驗方用菟絲子酒浸十日水淘杜仲焙研蜜炙一兩以薯蕷末酒煮糊丸梧子大每空心酒下五十丸心氣虛損豬腰子一枚水二碗煮至一碗半切碎入人參當歸各半兩煮至八分吃腰子以汁送下未盡者同滓作丸服百一選方精血耗涸耳聾口渴腰痛白濁上燥下寒不受峻補者鹿茸酒蒸當歸酒浸各一兩焙為末烏梅肉煮膏搗丸梧子大每米飲服五十丸濟生方久病虛羸不生肌肉水氣在脅下不能飲食四肢煩熱者用羊胃一枚切白米一升水二斗煮九升分九服日三不過三劑愈張文仲方老人臟腑虛損羸瘦陽氣乏弱雀兒五隻如常治粟米一合蔥白三莖先炒雀熟入酒一合煮少時入水二盞下蔥米作粥食食治方脫陽虛證四肢厥冷不省人事或小腹緊痛冷汗氣喘炒鹽尉臍下氣海取暖救急方房後困倦人參七錢陳皮一錢水一盞半煎八分食前溫服日再服千金不傳趙永庵方虛勞寒熱肢體倦疼不拘男婦八九月青蒿成熟時採之去枝梗以童便浸三日曬乾為末每服二錢烏梅一個煎湯下靈苑方又用青蒿細銼水童便各半同煎煉成膏至可丸如梧子大每空心臨臥以溫酒下二十丸斗門方治勞瘦急勞煩熱身體痠疼用秦艽柴胡各一兩甘草五錢為末每服三錢白湯調下聖惠方虛勞發熱用上黨人參銀州柴胡各三錢大棗一枚生薑三片水一盅半煎七分食遠溫服日再服以愈為度奇效良方又淡寮方以二味等分為末每用二錢薑棗同水煎服陰虛火動熱蒸如燎服藥無益者非小便不能除丹溪方勞熱如燎地骨皮二兩柴胡一兩為末每服二錢麥冬湯下聖濟總録虛勞口乾用羊脂一雞子大淳酒半斤棗七枚漬七日食立愈千金方上盛下虛心火炎爍腎水枯涸不能交濟而成渴證白茯苓一斤黃連一斤為末熬天花粉作糊丸梧子大每溫湯下五十丸德生堂經驗方肝勞生蟲眼中赤脈吳茱萸根為末一兩半粳米半合雞子白三個化臘一兩半和丸小豆大每米湯下三十丸當取蟲下補益勞傷精敗面黑肉蓯蓉四兩水煮令爛薄細切精羊肉一斤分為四度下五味以米煮粥空心食藥性論補虛益弱用烏雄雞一隻治淨五味煮極爛食生即反損人或五味淹炙食亦良孟詵方定心補腎養血返精丸破故紙炒二兩白茯苓一兩為末沒藥五錢以無灰酒浸高一指煮化和末丸梧子大每服三十丸白湯下昔有人服此至老不衰蓋故紙補腎茯苓補心沒藥養血三者既壯自然身安朱氏集驗方治脾腎虧損行滯氣壯元陽用九香蟲一兩半生半焙車前子微炒陳橘皮各四錢白朮焙五錢杜仲酥炙八錢上為末煉蜜丸梧子大每服一錢五分以鹽白湯或鹽酒服早晚各一服久久益人此方妙在蟲年老陽氣衰絶兼傷於濕常服其功甚效用破故紙十兩淨擇去皮洗過曝搗篩令細胡桃瓤二十兩湯浸去皮細研如泥更以好蜜和令如飴糖瓷器盛之旦旦以暖酒二合調藥一匙服之便以飯壓如不飲酒人以暖熟水調之彌久則延年益氣悅心明目補添筋骨但禁蕓薹羊血余無所忌治勞瘵八月朔取露水點膏肓穴謂之天灸時珍方明月丹治勞瘵追蟲用兔屎四十九粒硇砂如兔屎大四十九粒為末生蜜丸梧子大月望前以水浸甘草一夜五更初取汁送下七丸有蟲下急鉗入油鍋內煎殺三日不下再服蘇沈良方天靈蓋散追取勞蟲天靈蓋二指大以檀香煎湯洗過酥炙一氣咒七遍云雷公神電母聖逢傳尸便須臾定急急如律令尖檳榔五枚阿魏二分麝香三分辰砂一分安息香三分甘遂三分為末每服三錢用童便四升入銀石器內以蔥白薤白各二七莖青蒿二握桃枝甘草各五寸長二莖柳枝桑枝酸榴枝各七寸長二莖同煎至一升分作二次五更初調服前藥一服蟲不下約人行十里又進一服天明再進取下蟲物名狀不一急擒入油鐺煎之其蟲嘴青赤黃色可治黑白色難治然亦可斷傳染之患凡修合先須齋戒於遠處靜室勿令病人聞藥氣及雞犬貓畜孝子婦人一切觸穢之物見之蟲下後以白粥補之數日後夢人哭泣相別是其驗也上清紫庭仙方勞瘵失血田龜煮取肉和蔥椒醬油煮食補陰降火治虛勞失血咯血咳嗽寒熱纍用經驗便民食療骨蒸鬼氣童子小便五大斗澄清青蒿五斗八九月揀帶子者最好細搓相和納大釜中以猛火煎取三大斗去滓溉釜令淨再以微火煎可二大斗入豬膽一枚同煎一大斗半去火待冷以瓷器盛之每欲服時取甘草二三兩炙熟為末以蒿汁和搗千杵為丸空腹粥飲下二十丸漸增至三十丸止崔元亮海上方又治虛勞盜汗煩熱口乾用青蒿一斤取汁熬膏入人參麥門冬二味各一兩熬至可丸丸如梧子大每服二十丸食後名青蒿煎聖濟總録虛損骨蒸用天靈蓋如梳大炙黃以水五升煮取二升分三服起死神方也千金方骨蒸勞傷豬脊髓一條豬膽汁一枚童便一盞柴胡黃連前胡烏梅各一錢韭白七根同煎七分溫服不過三服其效如神瑞竹堂方骨蒸勞瘦用鰻鱺二斤治淨酒二盞煮熟入鹽醋食之聖惠方骨蒸煩熱青蒿一握豬膽汁一枚杏仁四十個去皮尖炒童子小便一大盞煎五分空心溫服十便良方又三歲童便五升煎取一升以蜜三匙和之每服二碗半日更服此後常取自己小便服之輕者二十日重者五十日瘥二十日後當有蟲如蚰蜒在身常出十步內聞病人小便臭瘥也孟詵必效方骨蒸不睡心煩用酸棗仁一兩水二鍾研絞取汁下粳米二合煮粥候熟下地黃汁一合再煮勻食聖惠方骨蒸勞熱久嗽用石膏紋如束針者一斤粉甘草一兩細研如面日以水調三四服言其無毒有大益乃養命上藥不可忽其賤而疑其寒外臺祕要傳尸勞疰尸疰鬼注其病變動乃自三十六種至九十九種使人寒熱淋瀝恍惚默默不的知所苦纍年積月以至於死復傳親人宜急治之用桑樹白皮曝乾燒灰二石著甑中蒸透以釜中湯三四斗淋之又淋凡三度極濃澄清止取二斗以漬赤小豆二斗一宿曝乾復漬灰汁盡乃止以豆蒸熟或羊肉或鹿肉作羹進此豆飯初食一升至二升取飽微者三四斗愈極者七八斗愈病去時體中自覺疼癢淫淫若病根不盡再為之極神效方也肘後方尸疰傳染挾諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒熱沉沉默默不知病之所苦而無處不惡積月纍年淹滯至死死後傳人乃至滅門覺有此候用獺肝一具陰乾為末水服方寸匕日三以瘥為度五種尸疰飛尸者遊走皮膚洞穿五臟每發刺痛變動不常也遁尸者附骨入肉攻鑿血脈每發不可見死尸聞哀哭便作也風尸者淫躍四末不知痛之所在每發恍惚得風雪便作也沉尸者纏結臟腑沖引心脅每發絞切遇寒冷便作也尸注者舉身沉重精神錯雜常覺昏廢每節氣至則大作也並是身中尸鬼引接外邪宜用忍冬莖葉銼數斛煮取濃汁煎稠每服雞子大許溫酒化下一日二三服肘後方五種遁尸其狀腹脹氣急衝心或壘塊踴起或牽腰脊以雞卵白七枚頓吞之良千金方傳尸癆瘵豬腰子一對童子小便二盞無灰酒一盞新瓷瓶盛之泥封炭火溫養自戌至子時止待五更初溫熱取開飲酒食腰子病篤者只一月效平日瘦怯者亦可用之蓋以血養血絶勝金石草木藥也經驗方治風疰尸疰鬼疰毒氣在皮中淫濯如針刺著心腹痛移走無常處及鼠瘻惡瘡野貍頭骨燒灰服別録鬼氣疰痛癥結敗芒箔酒煮服之亦可燒末酒下彌久著煙者佳此藥能散惡血陳藏器方五尸疰痛腹痛脹急不得喘息上攻心胸旁攻兩脅痛或瘰塊踴起用商陸根熬以囊盛更互尉之取效肘後方燒香治癆瘵用玄參一斤甘松六兩為末煉蜜一斤和勻入瓶中封閉地中埋窨十日取出更用灰末六兩煉蜜六兩同和入瓶更窨五日取出燒之常令聞香疾自愈經驗方傳尸勞疰最殺勞蟲用真川椒紅色者去子及合口以黃草紙二重隔之炒出汗取放地上以砂盆蓋定以火灰密遮四旁約一時許為細末去殼以老酒浸白糕和丸梧子大每服四十丸食前鹽湯下服至一斤其疾自愈此藥兼治諸痹用肉桂煎湯下腰痛用茴香湯下腎冷用鹽湯下昔有人病此遇異人授是方服至二斤吐出一蟲如蛇而安遂名神授丸三因方三木節散治風勞面色青白肢節沉重膂間痛或寒或熱或燥或嗔思食不能食被蟲侵蝕證狀多端天靈蓋酥炙研二兩牛黃人中白焙各半兩麝香二錢為末另以樟木瘤節皂莢木瘤節槐木瘤節各為末五兩每取三錢水一鍾煎半鍾去滓調前末一錢五更頓服取下蟲物為妙聖惠方骨蒸傳尸用羊肉一拳大煮熟皂莢一尺炙以無灰酒一升銅鐺內煮三五沸去滓入黑錫一兩令病人先啜肉汁乃服皂莢酒一合當吐蟲如馬尾為效外臺祕要追勞取蟲用啄木禽一隻入籠飢一晝夜將硃砂四兩精豬肉四兩二味和勻與食使盡以鹽泥固濟此禽煅一夜五更取出勿打破連泥埋入土中二尺次日取出破開入銀石器內研末以無灰酒入麝香少許作一服須謹候安排待蟲出速鉗入油過煎之後服局方嘉禾散一劑經驗方五尸癆疾殺蟲漆葉曝乾研末日用酒服一錢匕斬三尸法常以庚辰日去手爪甲午日去足爪每年七月十六日將爪甲燒灰和水服之三尸九蟲皆滅名曰斬三尸太上玄科一云甲寅日三尸遊兩手剪去手爪甲甲午日三尸遊兩足剪去足爪甲發熱三焦積熱玄參黃連大黃各一兩為末煉蜜丸梧子大每服三四十丸白湯下小兒丸粟米大丹溪方血虛發熱凡肌熱躁熱困渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無力此血虛之候也得於飢困勞役證象白虎但脈不長實為異耳若誤服白虎湯即死宜此主之當歸身酒洗二錢綿黃耆蜜炙一兩作一服水二鍾煎一鍾空心溫服日再服蘭室祕藏心經實熱用黃連七錢水一盞半煎一盞食遠溫服小兒減之名瀉心湯和劑局方解人心中大熱舊屋瓦煎湯服甄權方脾勞發熱有蟲在脾中為病令人好嘔取東行茱萸根大者一尺大椿子八升橘皮二兩三物㕮咀以酒一斗浸一宿微火薄暖之絞去滓平旦空腹服一升取蟲下或死或半爛或下黃汁凡作藥時切忌言語刪繁方肺熱如火燎煩躁引飲而晝盛者氣分熱也宜一味黃芩湯以瀉肺經氣分之火用片芩一兩水二鍾煎一鍾頓服次日身熱盡退而痰嗽皆愈時珍方膈上煩熱多渴滑石二兩搗水三大盞煎二盞去滓入粳米煮粥食聖惠方上氣發熱因奔趁走馬後飲冷水所致者竹葉三斤橘皮三兩水一斗煎五升細服三日一劑肘後方消毒解熱生犀角尖磨濃汁頻飲之錢氏小兒方
