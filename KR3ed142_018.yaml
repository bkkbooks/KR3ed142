body:
  text: 卷十八外科手足皴裂手足皸裂五倍子末同牛骨髓填納縫中即安也醫方大成又椒四合以水煮之去渣漬之半日頃出令燥須臾再浸候乾塗豬羊腦髓極妙勝金方又豬脂著熱酒中洗之千金方又生白果嚼爛夜夜塗之又白芨末口嚼塗之勿犯水濟急方治手足皸裂出血以酒化豬腦洗並塗之時珍冬月皸裂牛鼻繩末和五倍子末填入薄紙貼之急救方尸腳拆裂無冬夏者雞屎煮湯漬半日取瘥乃止千金方嵌甲作痛不能行履者濃煎陳皮湯浸良久甲肉自離輕手剪去以虎骨末敷之即安醫林集要割甲成瘡連年不愈川烏頭尖黃柏等分為末洗了貼之以愈為度古今録驗腳趾縫爛至見筋者用生桐油抹上干即愈經驗方腳丫濕爛茶葉嚼爛敷之有效攝生方一方荊芥葉搗敷又用蚌蛤粉干搽之壽域方腳縫搔癢成瘡有竅出血不止尿桶箍年久者佳燒灰敷之時珍足趾肉刺無食子三枚肥皂莢一挺燒存性為末醋和敷之立效奇效方又刺破以新酒酢和羊腦塗之一合愈古今録驗又先以湯浸刮去一層用黑木耳貼之自消爛不痛近效方又莨菪根擂汁塗之又腳生肉刺裩系若根謂繫於裩帶上也雷公炮製論序腳肚生瘡初起如粟大搔之不已成片包腳相交黃水出癢不可忍久成痼疾用百藥煎末唾搽逐瘡四圍塗之自外入內先以貫衆湯煎洗之日一次醫林集要又用酸石榴皮煎湯冷定日日掃之取愈乃止醫學正宗雞眼作痛剝去皮以燖雞湯洗之簡便方雞眼作痛作瘡地骨皮同紅花研細敷之次日愈閨閣事宜腳趾雞眼先挑破取黑白蝨各一枚置於上縛之數用自愈便民圖纂雞眼割破出血以血見愁草搗敷之遠行腳趼成泡者水調生面塗之一夜即平海上方行路足腫被石墊傷者草鞋浸尿缸內半日以磚一塊燒紅置鞋於上將足踏之令熱氣入皮里即消救急方凍瘡治凍瘡臘月雀腦塗或用燒灰油調塗之亦可孟詵又取鴨腦塗良時珍又茄根煮湯浸良丹溪方耳足凍瘡橄欖核燒研油調塗之乾坤生意凍耳成瘡白蘞黃枸等分為末生油調搽談野翁方凍瘡皸裂桐油一碗發一握熬化瓶收每以溫水洗令軟敷之即安救急方又甘草煎湯洗之次以黃連黃柏黃芩末入輕粉麻油調敷談野翁方又附子去皮為末以水面調塗之良談野翁試驗方凍瘡裂痛乳汁調黃柏末塗之儒門事親凍指欲墮馬糞煮水漬半日即愈千金方凍瘡趾爛鵝掌上黃皮燒研搽若腳趾縫濕爛焙研油調塗之風水及馬汗入瘡瘡傷風水青布燒煙於器中以器口熏瘡得惡汁出則痛癢瘥藏器本草瘡傷風傷水作腫鯉魚目燒灰敷之汁出即愈藏器瘡傷風水腫痛取蔥青葉和乾薑黃柏等分煮湯浸洗立愈食療瘡傷風水痛劇用馬屎燒煙燻令汁出愈千金方凡瘡為海水咸物所傷及風吹裂痛不可忍用蜜半斤水酒三十斤防風當歸羌活荊芥各二兩為末煎湯浴之一夕即愈使琉球録瘡傷風水痛劇欲死牛屎燒煙燻令汁出即愈外臺祕要風入瘡口腫痛劉寄奴為末摻之即愈聖惠方刺傷中水腫痛煮韭熱拓之千金方抓瘡傷水腫痛難忍者以耳垢封之一夕水出盡而愈鄭師甫云余常病此一丐傳此方瘡傷水濕胡粉炭灰等分脂和塗孔上水即出也千金方驢馬汗毒所傷瘡痛白礬飛過黃丹炒紫等分貼之王氏博濟方馬氣入瘡或馬毛入瘡皆腫痛煩熱入腹則殺人多飲醇酒至醉即愈妙肘後方又以冷水浸之頻易水仍飲好酒立瘥千金方馬汗入瘡干冬瓜燒研洗淨敷之又用皮陰乾為末塗亦妙兼主折傷損痛李時珍方又雞毛燒灰酒服方寸匕集驗方馬汗入瘡毒攻心欲死者燒粟干灰淋汁浸洗出白沫乃毒氣也跌撲損傷折傷接骨楊拱摘要方用土鱉焙存性為末每服二三錢接骨神效一方生者擂汁酒服袖珍方用土鱉六錢隔紙砂鍋內焙乾自然銅二兩用火煅醋淬七次為末每服二錢溫酒調下病在上食後在下食前神效董炳集驗方用土鱉陰乾一個臨時旋研入藥乳香沒藥龍骨自然銅火煅醋淬各等分麝香少許為末每服三分入土鱉末以酒調下須先整定骨乃服藥不則接挫也此祕方兼可服以代杖又無名異甜瓜子各一兩乳香沒藥各一錢為末每服五錢熱酒調服小兒三錢服畢以黃米粥塗紙上摻左顧牡蠣末裹之竹篦夾住多能鄙事又燒過童子骨一兩乳香二錢喜紅絹一方燒灰為末熱酒調服先以桐木片扎定立效醫林集要又魚鷹取骨燒存性以古銅錢一個煅紅醋淬七次為末等分酒服一錢不可過多在下空心在上食後服極有效驗須先夾定縛乃服此唐藺道人方又接骨木半兩乳香半錢芍藥當歸芎藭自然銅各一兩為末化黃蠟四兩投藥攪勻衆手丸如芡子大若止傷損酒化一丸若碎折筋骨先用此敷貼乃服衛生易簡方又酒調白芨末二錢服其功不減自然銅古銖錢也永類方跌撲損傷骨碎折筋斷痛不可忍此藥極能理傷續斷纍用纍驗用路頭牆角下往來人便溺處久碎瓦片一塊洗淨火煅米醋淬五次黃色為度刀刮細末每服三錢好酒調下在上食前在下食後不可以輕易而賤之誠神方也邵真人經驗方又急取雄雞一隻刺血量患人酒量或一碗或半碗和飲痛立止神驗青囊方又死童子骨煅過香瓜子仁炒乾為末好酒下止痛極速扶壽精方墜跌打擊內傷神效方水蛭麝香各一兩銼碎燒令煙出為末酒服一錢當下蓄血未止再服甚效如神古今録驗又麻黃燒灰頭髮灰各一兩乳香五錢為末每服三錢溫酒下立效王仲勉經驗方又干冬瓜皮一兩真牛皮膠一兩銼入鍋內炒存性研末每服五錢好酒熱服仍飲一甌厚蓋取微汗其痛即止一宿如初極效摘玄方又重陽日收老茄子百枚去蒂四破切之硝石十二兩搗碎以不津器先鋪茄子一重乃下硝石一重如此間鋪令盡以紙數層密封安置淨處上下以新磚承覆勿犯地氣至正月後取出去紙兩重日中曝之逐日如此至二三月度茄已爛開瓶傾出濾去滓別入新器中以薄綿蓋頭又曝至成膏乃可用每以酒調半匙空腹飲之日再惡血散則痛止而愈矣若膏久乾硬即以飯飲化動用之亦治發背惡瘡用上膏以酒服半匙更以膏塗瘡四圍覺冷如水瘡干便瘥其有根在膚腠者亦可內消圖經本草又半兩錢五個火煅醋淬四十九次甜瓜子五錢珍珠五錢研末每服一字好酒調隨上下食前後服青囊方傷損內痛兵杖所加木石所迮血在胸背脅下刺痛用青竹茹亂髮各一團炭火炙焦為末酒一升煮三沸服之三服愈千金方打撲傷痛羊角灰以砂糖水拌瓦焙焦為末每熱酒下二錢仍搽痛處簡便方打撲傷腫熟麻油和酒服之以火燒熱地臥之覺即痛腫俱消趙葵行管雜録打傷腫痛無名異為末酒服趕下四肢之末血皆散矣集驗方折傷瘀血在腹劉寄奴骨碎補延胡索各一兩水二升煎七合入酒及童子便各一合燉溫服之千金方又用白馬蹄燒煙盡研末酒服方寸匕日三夜一血化為水也劉涓子鬼遺方又虻蟲二十枚熬過牡丹皮一兩為末酒服方寸匕血化為水也若久宿血在骨節中者二味等分備急方治從高墜下木石壓傷及一切傷損瘀凝積痛不可忍並以此藥推陳致新大黃酒蒸一兩杏仁去皮三七粒細研酒一碗煎六分雞鳴時服至曉取下瘀血即愈名雞鳴散和濟方治跌壓瘀血在內脹滿大黃當歸等分炒研每服四錢溫酒服取下惡物愈蹉跌損傷血瘀骨痛鹿角末酒服方寸匕日三千金方墜落車馬筋骨痛不止延胡索末豆淋酒服二錢日二服聖惠方諸傷瘀血不散五六月收野苧葉紫蘇葉擂爛敷金瘡上即時血止如瘀血在腹內順流水絞汁服即通血皆化水以生豬血試之可驗也秋冬用干葉煎服亦可打傷瘀血攻心者人尿煎服一升日一服蘇恭本草墜傷撲損瘀血在內煩悶者蒲黃末空心溫酒服三錢塞上方打撲損傷惡血攻心悶亂疼痛作嘔者以乾荷葉五片燒存性為末每服二錢童子熱尿一錢食前下日二三服利下惡物其效如神聖惠方折傷墮墜瘀血在腹氣短大豆五升水一斗煎汁二升頓服劇者不過三作千金方從高墜下損瘀血在腹刺痛取舊蒲席久臥者燒灰酒服二錢或以蒲黃當歸大黃赤芍藥朴硝煎湯調服血當下甄權從高落下瘀血搶心面青氣短欲死胡粉一錢和水服即安肘後方又取杏枝一握水一升煮減半入酒三合和勻分服大效蘇頌跌撲損傷瘀血凝滯心腹脹痛大小便不通欲死用紅蛭石灰炒黃半兩大黃牽牛頭末各二兩為末每服二錢熱酒調下當下惡血以盡為度名奪命散濟生方損傷血出痛不可忍用籬上婆婆針袋兒擂水服渣罨瘡口立效時珍磕撲青腫老黃茄極大者切片如一指厚新瓦焙研為末欲臥時溫酒調下服二錢匕一辰消盡無痕跡也勝金傷損不食凡打撲傷損三五日水食不入口者用生豬肉二大錢打爛溫水洗去血水再擂爛以陰陽湯打和以半錢用雞毛送入咽內卻以陰陽湯灌下之其食蟲聞香竇開瘀血而上胸中自然解此乃損血凝聚心間蟲食血飽他物蟲不來探故也謂之騙通之法邵氏閃挫腰痛西瓜青皮陰乾為末鹽酒調服三錢攝生衆妙方閃肭脫臼青黑腫痛用黍米粉鐵漿粉各半斤蔥一斤同炒存性研末以醋調服三次後水調入少醋貼之陰雨發損痛海燕煮汁服取汗即解時珍打撲損傷骨碎及筋傷爛用生地黃熬膏裹之以竹簡編夾急縛勿令轉動一日一夕可十易之則瘥許元公嘗過橋墜馬右臂臼脫左右急挼入臼中昏迷不知痛苦急取此藥封腫處中夜方蘇達旦痛止痛處已白日日換貼其瘀腫移至肩背乃以藥下去黑血三升而愈肘後方折傷接骨大蝦蟆生研如泥劈竹裹縛其骨自痊備急方又牛蹄甲一個乳香沒藥各一錢為末入甲內燒灰以黃米粉糊和成膏敷之祕韞續斷絶筋骨生蟹去殼同黃搗爛微炒納入瘡中筋即連也藏器又生搗牡鼠敷之三日一易別録腦破骨折蜜和蔥白搗勻厚封立效肘後方顛撲傷損紫蘇搗敷之瘡口自合談野翁試驗方一切從高墜下及木石所迮落馬撲車瘀血凝滯氣絶欲死者用淨土五升蒸熱以故布重裹作二包更互尉之勿大熱恐破肉取痛止則已神效千金方又用糯稻稈燒灰以新熟酒連糟入鹽和淋取汁淋痛處立瘥劉禹錫傳信方跌磕傷損黃牛屎炒熟封之裹定即效簡便方打撲傷損用緑豆粉新銚炒紫新汲水調敷以杉木皮縛定其效如神淡寮方跌撲傷損扭閃出骨竅等證蠶砂四兩炒黃緑豆粉四兩炒黃枯礬二兩四錢為末醋調敷之絹包縛定換三四次即愈忌産婦近之邵真人經驗良方打撲血聚皮不破者用蘿蔔或葉搗封之邵氏方折傷止痛白礬末一匙泡湯一碗帕蘸乘熱尉傷處少時痛止然後排整筋骨點藥靈苑方折傷筋骨瘀血疼痛鼠屎燒末豬脂和敷急裹不過半日痛止梅師方又水獺一個肢解入罐內固濟待乾煅存性為末以黃米煮粥攤患處摻獺末於粥上布裹之立止疼痛經驗後方一切損傷止血生肌令無瘢痕用鹽藏楊梅和核杵如泥做成挺子以竹筒收之凡遇破傷研末敷之神效經驗筋骨傷破以熱白馬屎敷之無瘢千金方墜馬拗損桑根白皮五斤為末一斤煎膏敷之便止以後亦無宿血終不發動經驗方踠折傷筋骨痛不可忍者用生地黃一斤藏瓜姜糟一斤生薑四兩都炒熱布裹罨傷處冷即易之曾有人傷折醫令捕一生攝龜將剝取肉研塗之夜夢龜傳此方用而得愈時珍折傷閃肭杜牛膝搗罨之衛生易簡方閃拗手足生薑蔥白搗爛和麵炒熱罨之易簡方墜損腸出新汲井水冷噴其身面則腸自入也嘉祐方脅破腸出以香油抹手送入煎人參枸杞子溫淋之吃羊腎粥十日即愈危氏方打撲瘀痕水調半夏末塗之一宿即沒也永類鈐方破傷血出何首烏末敷之即止神效筆峰雜興方破損血出不止以陳紫蘇葉蘸所出血挼爛敷之血不作膿且愈後無瘢甚妙也永類鈐方杖撲傷損淤血淋漓者隨即嚼爛三七罨之即止青腫者即消散若受杖時先服一二錢則血不衝心杖後尤宜服之産後服亦良時珍方炙瘡附滅瘢灸瘡腫痛灶中黃土末煮汁淋之千金方灸瘡血出一人灸火至五壯血出不止如尿手冷欲絶以酒炒黃芩二錢為末酒服即止李樓怪症奇方又用死蜣螂燒研豬脂和塗千金方灸瘡不斂瓦松陰乾為末先以槐枝蔥白湯洗後摻之立效濟生祕覽又芙蓉花研末敷之奇效灸後火氣入內兩股生瘡汁水淋漓者用薄荷煎汁頻塗立愈張杲醫說身面瘢痕禹餘糧半夏等分為末雞子黃和敷先以布拭赤勿見風日三十日十年者滅聖濟録身上瘢痕黃礬末燒令汁盡胡粉炒黃各八分細研以臘月豬脂和研如泥以生布揩令赤乃塗藥五度取鷹糞白燕窠中草燒灰等分和人乳塗之其瘢自滅肉平如故集驗方瘢痕凸起熱瓦頻尉之千金方滅諸瘢痕大鼠一枚以臘豬脂四兩煎至銷盡濾淨日塗三五次先以布拭亦避風普濟方又冬青葉燒灰入面膏治疸瘃滅瘢痕殊效蘇頌金瘡一切金瘡及刀斧傷白殭蠶炒黃研末敷之立愈斗門方又五倍子降真香等分炒研末敷之皮肉自痊名啄合山拔萃方又五月五日以牡鼠同石灰搗收敷之神效時珍方又以天鵝絨毛貼之立愈汪穎方又搗絡石敷之立瘥蘇恭方刀斧折傷白藥子乾末敷之能止血除痛馬志方金瘡折損苧麻葉甚散血五月五日收取和石灰搗作團曬乾收貯遇有金瘡折傷者研末敷之即時血止且易痂也時珍方金瘡出血白芍藥一兩熬黃為末酒或米飲服二錢漸加之仍以末敷瘡上即止良驗廣利方又韭汁和風化石灰日乾每用為末敷之效瀕湖集簡方又五月五日採金櫻子葉同桑葉苧葉等分陰乾研末敷之血止口合名軍中一捻金時珍又旋覆花葉搗敷立止大明方又雲母粉敷之絶妙事林廣記又柳絮封之即止外臺祕要又磁石末敷之止痛斷血千金方又車前葉搗敷之千金方又榴花半斤石灰一升搗和陰乾每用少許敷之立止崔元亮海上方金瘡止血釣樟木根皮刮屑敷之甚驗別録又用晚蠶蛾炒為末敷之即止並生肌神效勝金方金瘡出血不可以藥速合則內潰傷肉只以黃丹滑石等分為末敷之集玄方金瘡出血不止以嫩紫蘇桑葉同搗貼之永類鈐方又血見愁草即地錦草研爛塗之危氏得效方又小薊苗搗爛塗之孟詵食療本草金瘡腫痛薔薇根燒灰每日白湯服方寸匕一日三服抱朴子方又生牛膝搗敷立止梅師方金瘡杖瘡作痛赤龍鱗即古松皮煅存性研末搽之最止痛永類鈐方金瘡磕損折傷血出疼痛不止者用蔥白砂糖等分研封之痛立止無痕瘢也金瘡出血不止成內漏用蝙蝠二枚燒末水服方寸匕當下水而血消也鬼遺方金瘡內漏雄黃半豆大納之仍以小便服五錢血皆化為水肘後方又牡丹皮為末水服三指撮立尿出血也千金方金瘡瘀血在腹者大蔥白二十枚麻子三升杵碎水九升煮一升半頓服當吐出膿血而愈未盡再服千金方金瘡困頓蚯蚓屎末水服方寸匕日三服千金方金瘡傷重被驚以女人中衣舊者炙襠尉之李筌太白經注金瘡出血悶絶蒲黃半兩熱酒灌下危氏方金瘡悶絶不識人琥珀研粉童子小便調一錢三服瘥鬼遺方被斫斷筋旋葛根搗汁瀝瘡中仍以滓敷之日三易半月則斷筋便續外臺祕要金瘡腸出納入以磁石滑石各三兩為末米飲服方寸匕日再劉涓子鬼遺方又以幹人屎末抹入桑白皮線縫合熱雞血塗之生生編又用小麥五升水九升煮取四升綿濾取汁待極冷令病人臥席上含汁噀之腸漸入噀其背並勿令病人知及多人見旁人語即腸不入也又須抬席四角輕搖使腸自入十日中但略食羹物慎勿驚動即殺人劉涓子鬼遺方金瘡接指凡指斷及刀斧傷用真蘇木末敷之外以蠶繭包縛完固數日如故攝生方針瘡出血不止用人糞燒研敷之千金方金瘡癰腫及竹木簽刺等毒用糯米三升於端午前四十九日以冷水浸之一日兩換水輕淘勿令攪碎至端午日取出陰乾絹袋盛掛通風處每用旋取炒黑為末冷水調如膏藥隨瘡大小裹定瘡口外以布包定勿動直候瘡瘥若金瘡犯生水作膿腫甚者急裹一二日夕即不作膿腫也若癰疽瘡初發才覺焮腫急貼之一夜便消亦治喉痹痄腮用前膏貼項下及腫處一夜便消干即換之常令濕為妙靈苑方下蠶室創口流血不合以所割勢搗粉酒服不數日愈時珍方金瘡犯內血出不止取所交婦人中衣帶三寸燒末水服千金方金瘡中風自己小便日洗二三次不妨入水聖惠方金瘡中風角弓反張取蒜一升去心無灰酒四升煮極爛並滓服之須臾得汗即瘥外臺祕要金創中風痙強欲死生葛根四大兩以水三升煮取一升去滓分服口噤者灌之若干者搗末調三指撮仍以此及竹瀝多服取效貞元廣利方金瘡不合燒象皮灰和油敷之時珍方刀瘡傷濕潰爛不生肌寒水石煅一兩黃丹二錢為末洗敷甚者加龍骨一錢孩兒茶一錢積德堂方跌撲傷瘡夏枯草口嚼爛罯上即愈衛生易簡又用青蒿搗封之血止則愈又用青蒿麻葉石灰等分五月五日搗和曬乾臨時為末搽之肘後方治針刺入肉以烏鴉翅三五枚炙焦研末醋調敷之數次即出甚效時珍方又萆麻子去殼研爛先以帛襯傷處敷之頻看若見刺出即拔去恐藥緊弩出好肉或加白梅肉同研尤好衛生易簡方杖瘡臨杖預服無名異末臨時溫服三五錢則杖不甚痛亦不甚傷談野翁試效方杖瘡焮腫六月六日取黃瓜入瓷瓶中水浸之每以水掃於瘡上立效集效方杖瘡青腫用濕綿紙鋪傷處以燒過酒糟搗爛厚鋪紙上良久痛處如蟻行熱氣上升即散簡便又豆腐切片貼之頻易一法以燒酒煮貼之色紅即易不紅乃已拔萃打杖腫痛鳳仙花葉搗如泥塗腫破處干則又上一夜血散即愈冬月收取乾者研末水和塗之葉廷器通變要法又雄黃二分密陀僧一分研末水調敷之極效救急方又新石灰麻油調搽甚妙集簡方又未毛鼠同桑椹子入麻油中浸釀臨時取塗甚效西湖志又緑豆粉炒研以雞子白和塗之妙生生編杖瘡未破干黃土末童尿入雞子清調塗刷上干即隨以熱水洗去復刷復洗數十次以紫轉紅為度仍刷兩胯以防血攻陰也攝生方杖瘡已破雞子黃熬油搽之甚效唐寶經驗方杖瘡血出豬血一升石灰七升和劑燒灰再以水和丸又燒凡三次為末敷之效外臺祕要治杖瘡爵床搗汁塗之立瘥蘇恭方夾棍傷出水不止煅蚌灰研敷之自記箭頭入肉刀箭金瘡茅花罯之止血並痛又香白芷嚼爛塗之集簡方卒被毒箭麻仁數升杵汁飲肘後方又雄黃末敷之沸汁出愈外臺祕要解藥箭毒研山獺骨少許敷之立消時珍方箭鏃入肉用天水牛取一角者小瓶盛之入硇砂一錢同水數滴在內待自然化水取滴傷處即出也又象牙刮末水和敷之即出也箭頭不出萬聖神應丹端午前一日不語尋取莨菪科根本枝葉花實全好者道云先生你卻在這裡道罷用柴灰自東南起圍了以木椑子掘取根下周圍土次日日未出時依前不語用钁頭取出洗淨勿令雞犬婦人見於淨室中以石臼搗如泥丸彈子大黃丹為衣以紙袋封懸高處陰乾遇有箭頭不出者先以象牙末貼瘡口後用緋帛袋盛此藥放臍中綿兜肚繫了當便出也張子和儒門事親方又集異記云有河朔健將為飛矢中目拔矢而鏃留中鉗之不動痛困俟死忽夢胡僧令以米汁注之必愈廣詢無悟者一日忽逢丐食僧肖所夢者叩之云但以寒食餳點之如法施用頓覺清涼盡減苦楚至夜瘡癢用力一鉗而出旬日而瘥時珍方箭鏃入腹或肉中有聚血以婦人月經衣燒灰服方寸匕千金方箭鏃入骨不可移者楊氏家藏方用巴豆微炒同蜣螂搗塗斯須痛定必微癢忍之待極癢乃撼動拔之立出此方傳於夏侯鄆云凡諸瘡皆可療拔後以黃連貫衆湯洗拭敷生肌散竹木刺入肉竹木刺入肉多年燻肉切片包裹之即出急救方又干羊屎燒灰豬脂和塗不覺自出亦治箭鏃入肉千金方刺入肉中者白梅嚼敷之即出孟詵方又以雞尾毛二七枚和男子乳封之當出孟詵方惡刺傷人莨菪根水煮汁漬之冷即易神方也千金方竹木刺入肉不出者鹿角燒灰水和塗上立出久者不過一夕千金方竹木針刺在肉中不出疼痛以王不留行為末熟水服方寸匕兼以根敷之刺即出梅師方刺入肉中百理不瘥松脂流出如乳頭香者敷上以帛裹三五日當有根出不痛不癢不覺自安兵部手集竹木入肉針撥不盡者以人齒垢封之即不爛也通變要法刺傷手足犯露水腫痛多殺人以桑枝三條煻火炮熱斷之以頭尉瘡上令熱冷即易之盡二條則瘡自爛仍取韭白或薤白敷上急以帛裹之有腫更作千金方湯火傷湯火灼傷用瓶盛麻油以箸就樹夾取黃葵花收入瓶內勿犯人手密封收之遇有傷者以油塗之甚妙經驗方又用蕎麥麵炒黃研末水和敷之如神奇效方又莊浪大黃生研蜜調塗之不惟止痛又且滅瘢此乃金山寺神人所傳夷堅志又用景德鎮瓷器打碎埋灶內炭火鋪上一夜取出去毒為末入黃丹少許敷之立愈活幼口議又饅頭皮燒存性研末敷之立愈肘後方又銀硃研細菜油調敷二次愈多能鄙事又絲瓜葉焙研入辰粉一錢調搽之生者搗敷一日即好也海上名方又虎骨炙黃焦研敷神效易簡方又柏葉生搗塗之系定三二日止痛滅瘢圖經本草又皂礬和涼水澆之其疼即止腫亦消經驗方又劉寄奴搗末先以糯米漿雞翎掃上後乃摻末並不痛亦無痕大驗凡湯火傷先以鹽末摻之護肉不壞後乃摻藥為妙本事方又蛇莓汁敷之痛即止時珍方又熟雞子黃一個取黃炒取油入膩粉十文攪勻掃上三五日永無瘢痕集驗又豬膽汁調黃柏末塗之外臺祕要又經霜桑葉燒存性為末油調敷之三日愈醫學正傳又油調芙蓉葉末敷之有奇效奇效方湯火傷瘡焮赤疼痛毒腐成膿用此拔毒止疼痛斂瘡口用麻油四兩當歸一兩煎焦去滓入黃蠟一兩攪化放冷攤帛貼之神效醫林集要又老杉樹皮燒存性研敷之或入雞子清調敷或用香油調一二日愈時珍方油傷火灼痛不可忍石膏燒末敷之良梅師方火燒瘡用菰根燒灰和雞子白塗效易簡方火燒悶絶不省人事者新尿燉服二三升良千金方熱油灼痛以白蜜塗之諸骨鯁骨鯁及竹木刺入咽喉不拘大人小兒日久或入臟腑痛刺黃瘦甚者服之皆出臘月收鱖魚膽懸北檐下令乾每用一皂子煎酒溫呷得吐則鯁隨涎出未吐再服以吐為度酒隨量飲無不出者蠡鯇鯽膽皆可勝金方諸骨哽咽狗涎頻灌自下仇遠稗史治骨鯁不下蓬砂一塊含化咽汁脫然而失此軟堅之徵也夷堅志又食薤白即下又栗子內薄皮燒存性研末吹入咽中即下咽喉物哽金鳳花根嚼爛噙咽骨自下雞骨尤效即以溫水漱口免損齒也亦治誤吞銅鐵危氏得效方咽喉骨哽豬牙皂角二條切碎生絹袋盛滿縫好線縛頂中立消簡便方又五月五日午時韭畦中面東勿語取蚯蚓泥藏之每用少許擦喉外其骨自消名六一泥獸骨鯁咽虎骨為末水服方寸匕外臺方雞魚骨哽貫衆縮砂甘草等分為粗末綿包少許含之咽汁久則隨痰自出只貫衆一味濃煎連服亦妙普濟方又用苧麻根搗汁以匙挑灌之立效醫方大成又用野苧麻根搗碎丸如龍眼大魚骨魚湯下雞骨雞湯下談野翁試驗方雞鵝骨哽赤莖威靈仙五錢井華水煎服即軟如綿吞下也甚效雞骨哽咽五倍子末摻入喉中即化下魚骨哽咽不能出用飴糖丸雞子黃大吞之不下再吞肘後方又鸕鷀嗉吞之最效又翅羽燒灰水服亦妙太平御覽又鯉脊三十六鱗焙研涼水服之其刺自跳出神效筆峰雜興骨刺入肉象牙刮末以水煮白梅肉調塗自軟簡要濟衆誤吞金銀銅錢等物不化者濃煎縮砂湯飲之即下危氏得效方誤吞金銀銅鐵在腹燒白炭紅急為末煎湯呷之甚者刮末三錢井水調服未效再服時珍方誤吞銅鐵不下南燭根燒研熱水調服一錢即下聖惠方誤吞鐵石骨刺不下危急者王不留行黃柏各等分為末湯浸蒸餅丸彈子大青黛為衣線穿掛風處用一丸冷水化灌之百一選方誤吞錢叉及竹木取飴糖一斤漸漸食盡便出外臺祕要誤吞叉環取薤白曝萎煮熟切食一大束叉即隨出葛洪誤吞珠錢哽在咽者銅弩牙燒赤納水中冷飲汁立愈聖惠方誤吞銅錢羊脛骨燒灰以煮稀粥食神效亦治吞金銀器物談野翁方又荸薺研汁細細呷之自然消化成水百一選方又艾蒿一把水五升煎一升頓服便下錢利公篋中方又多食胡桃自化出也胡桃與銅錢共食即成粉可證矣李樓方誤吞釘針多食豬羊脂久則自出肘後方一女子誤吞針諸人不能治一人教令煮蠶豆同韭菜食之針自大便出此亦可驗其性之利臟腑也積善堂方誤吞竹木稱錘燒紅淬酒飲之集玄方又燒故鐵鋸令赤漬酒熱飲藏器方誤吞稻芒白餳頻食良簡便方桃李哽咽狗骨煮湯摩頸上子母祕録誤吞水蛭以蒸餅半個和狗涎吃之連食二三其物自散德生堂方誤吞水蛭成積脹痛黃瘦飲浸藍水取下則愈時珍方食葅吞蛭蛭啖臟血臟痛黃瘦飲熱羊血一二升次早化豬脂一升飲之蛭自下也肘後方誤吞馬蝗入腹酒和田中泥一二升服當利出時珍方誤吞馬蝗得疾數月消瘦每日飲食入咽如萬蟲鑽攻且癢且痛皆以為勞瘵投藥罔效一醫令旦起勿食遣詣十里外取行路黃土至以溫酒二升攪之投藥百粒飲之覺痛幾不堪及登溷下馬蝗千餘宛轉其半已困死病人亦憊甚調理三日乃安究其所乃夏月燥渴飲澗水一杯似有物入咽遂得此病醫曰蟲入人臟勢必孳生飢則聚咂精血飽則散處臟腑苟知殺之而不能掃取終無益也是以請先枵腹誘之蟲久不得土味又喜酒故乘飢畢集一洗而空夷堅志誤吞蜈蚣刺豬羊血灌之即吐出三元延壽書諸蟲獸螫傷人咬傷瘡龜板骨鱉肚骨各一片燒研油調搽之葉氏摘玄人咬手指瓶盛熱尿浸一夜即愈通變要法人咬瘡潰爛攝龜甲燒末敷之時珍人咬指爛久欲脫者鱉甲灰敷之葉氏摘玄方虎狼傷瘡月經衣燒末酒服方寸匕日三陳藏器方虎犬傷人礬末納入裹之止痛尤妙肘後方虎爪傷人先吃清油一碗仍以油淋洗瘡口馬咬成瘡益母草切細和醋炒塗之孫真人方馬咬踏瘡腫痛作熱鼠屎二七枚故馬鞘五寸和燒研末豬脂調敷之梅師方治馬撲損痛夜明砂以三枚投熱酒一升取清服立止數服便瘥傳信方蛇毒溪毒沙蝨射工等所傷口噤眼黑手足強直毒攻腹內成塊逡巡不救蒼耳嫩苗一握取汁和酒溫灌之以滓厚敷傷處勝金方又白礬甘草等分為末冷水調服二錢瑞竹堂方蛇虺咬傷青苧麻嫩頭搗汁和酒等分服三盞以渣敷之毒從竅中出以渣棄水中即不發看傷處有竅是雄蛇無竅是雌蛇以針挑開傷處成竅敷藥摘玄方又青木香不拘多少煎水服效不可述袖珍方又取半邊蓮搗汁飲以滓圍塗之壽域方又葵根搗塗之古今録驗毒蛇咬傷先以小便洗去惡血次以牙垽封而護之甚妙且不腫痛醫方摘要又以竹筒合瘡上熔蠟灌之效徐玉方又獨莖狼牙根或葉搗爛臘豬脂和塗之立瘥崔氏方又人屎厚封之即消千金方蝮傷昏死一臂如股遍身皮脹黃黑色以新汲水調香白芷末頻灌之覺臍中搰搰然黃水自口出腥穢逆人良久消縮如故或云以麥門冬湯調尤妙仍以末搽之夷堅志又五靈脂一兩雄黃半兩同為末酒調灌二錢神效蛇傷潰爛百藥不愈以新汲水洗淨腐敗見白筋挹干用白芷末入膽礬麝香少許摻之惡水湧出日日洗摻一月平復夷堅志療蛇咬瘡豬槽水浸之效藏器方又攝龜尾佩之闢蛇蛇咬則刮末敷之便愈抱朴子蛇咬毒入腹取兩刃於水中相摩飲其汁藏器方蛇傷手腫用新剝羊肚一個帶糞割一口將手入浸即時痛止腫消集要方蛇入七孔割母豬尾血滴入即出也千金方蛇入人口因熱取涼臥地下有蛇入口不得出者用刀破蛇尾納椒二三粒裹定須臾即自退出也聖惠方蛇繞不解熱湯淋之即脫千金方蛇咬牙入肉中痛不可堪蝦蟆肝搗敷之立出肘後方蛇骨刺入毒痛鐵精粉豆許刺入瘡內肘後方蛇咬蠍螫燒刀矛頭令赤置白礬於上汁出熱滴之立瘥神驗劉禹錫傳信方蛇蟲螫傷人耳垢蚯蚓屎和塗出盡黃水立愈壽域方蟲蛇獸毒及蠱毒生明礬明雄黃等分於五月端午日研末黃蠟和丸梧子大每服七丸念藥王菩薩七遍熟水送下東坡良方蛇虺蜈蚣咬傷蜘蛛搗爛敷之甚妙直指方蛇蠍蜈蚣毒蟲傷以五靈脂末塗之立愈金匱鉤玄蠍蠆螫傷蠍有雌雄雄者痛在一處以井底泥封之干則易雌者痛牽諸處以瓦溝下泥封之若無雨以新汲水從屋上淋下取泥肘後方又端午日午時收壁虎一枚以雞膽開一竅盛之陰乾每以一星敷上即止神效青囊方又溫湯漬之數易至旦愈華他方蜈蚣螫傷取灰莧菜擦之即止又菜子油傾地上油摻之即好勿令四眼人見陸氏積德堂方又蚯蚓泥敷之效集效方又麻履底炙熱揩之即安外臺祕要又畫地作王字內取土摻之即愈集簡方又雞冠血塗之錢相公篋中方又嚼香附塗之立效袖珍方又嚼胡椒封之即不痛多能鄙事百蟲咬傷以燈火熏之出水妙濟急方治蜂螫用芋梗嚼破以汁塗有驗又薄荷葉挼貼之外臺祕要又野莧挼擦之又嚼青蒿封之即安肘後方蜂螫腫痛蜂房為末豬膏和敷或煎水洗千金方蜂蟻叮螫反手取地上土敷之或取醋調千金方蜘蛛咬瘡遍身皆有以青蔥葉一枚去尖頭將蚯蚓入葉內緊捏兩頭勿令泄氣頻搖動即化為水以點咬處甚效談氏小兒方又油麻研爛敷之亦治諸蟲咬傷經驗後方蜘蛛咬毒縛定咬處勿使毒行以貝母末酒服半兩至醉良久酒化為水自瘡口出水盡乃塞瘡口甚妙亦治蛇蠍咬傷直指方蜘蛛傷頻治不愈者搗蘿藦葉封二三度能爛絲毒即化作膿也時珍方蜘蛛咬毒腹大如妊遍身生絲啖羊乳旋愈傳信方斑蜘蛛咬頭上一宿咬處有二道赤色細如箸繞項上從胸前下至心經兩宿頭面腫疼大如數升碗肚漸腫幾不救取大藍汁一碗加麝香雄黃點於咬處兩日悉平作小瘡而愈花蜘蛛咬人與毒蛇無異用蒼耳搗汁一盞服仍以滓敷之摘玄方天蛇毒瘡似癩非癩天蛇乃草間花蜘蛛也人被其螫為露水所濡乃成此疾以秦皮煮汁一斗飲之即瘥宗奭壁鏡毒人必死白礬塗之太平廣記蝸牛咬人毒行遍身者蓼子煎水浸之立愈不可近陰令弱也陳藏器本草方蚯蚓咬人形如大風眉須皆落惟以石灰水浸之良以鹽湯浸並飲一盞亦愈經驗方螻蛄咬人醋和石灰塗之聖惠方蚯蚓呵腫令婦人以吹火筒吹其腫處即消時珍蠼螋溺人影令發瘡如熱痱而大若繞腰周匝不可療惟扁豆葉敷之即瘥孫真人云豫曾得此瘡經五日治不愈有人教畫地作蠼螋形以刀剜取腹中土用唾和塗之再塗即愈蠼螋尿瘡狀如茱萸中央白膿惡寒壯熱磨犀角汁塗之千金方蠼螋尿瘡烏雞翅毛燒灰油調敷之蟲畏雞故也瑣碎録又磨刀垽敷之有效亦可塗瘰癧結核藏器又酢和胡粉塗之千金方鼠咬成瘡貓毛燒灰入麝香少許唾和封之貓須亦可救急方貓咬成瘡雄鼠屎燒灰油和敷之壽域方又取薄荷汁塗之有效李時珍方狐尿刺瘡以蒲公英白汁塗之即愈蘇頌方狐尿刺人腫痛用熱蠟著瘡並煙燻之令汗出即愈肘後狐尿刺瘡痛甚者熱白馬尿漬之千金方木蛭毒瘡南方多雨有物曰木蛭大類鼻涕生於古木之上聞人氣則閃閃而動人過其下墮人體間即立成瘡久則遍體惟以硃砂麝香塗之即愈張杲醫說中沙蝨毒沙蝨在水中人澡浴則著人身鑽入皮里初得皮上正赤如小豆黍粟摩之痛如刺三日寒熱發瘡毒若入骨殺人嶺南多此即以茅葉刮去以苦菜汁塗之佳肘後方射工溪毒獨蒜切三分厚貼上灸之令蒜氣射入即瘥梅師方治瘋犬咬傷即用蝦蟆後足搗爛水調服之先於頂心拔去血發三兩根則小便內見沫也袖珍方又取本犬腦敷之後不復發肘後方又紫荊皮末砂糖調塗留口退腫口中仍嚼咽杏仁去毒仙傳外科又頭垢蝟皮等分燒灰水服一盞口噤者灌之又用斑蝥七枚以糯米炒黃去米為末酒一盞煎半盞空心溫服取下小肉狗三四十枚為盡如數少數日再服七次無狗形永不再發也纍試纍驗衛生易簡方又大斑蝥三七枚去頭翅足用糯米大一勺略炒過去斑蝥別以七枚如前炒色變復去之別以七枚如前至青煙為度去蝥只以米為粉用冷水入清油少許空心調服須臾再進一服以小便利下毒物為度如不利再進利後肚疼急用冷水調青靛服之以解其毒否則有傷黃連水亦可解之但不宜服一切熱物也醫方大成又雄黃五錢麝香二錢為末酒下作二服救急良方又以蚯蚓泥敷出犬毛神效蘇恭方瘋犬咬傷腫痛人參置桑柴炭上燒存性以碗覆定少頃為末摻之立瘥經驗方惡犬咬傷洗淨毒以熱牛屎封之即時痛止千金方又左盤龍即人屎也厚封之數日即愈藺氏經驗方又虎骨刮末水服方寸匕並敷之小品方又萆麻子五十粒去殼以井花水研膏先以鹽水咬痛處乃貼此膏袖珍方犬咬血出以水洗至血止綿裹之千金方狗咬傷瘡爛嚼杏仁塗之寇氏衍義狗咬傷瘡重發者用蔓菁根搗汁服之佳肘後方犬咬瘡重發者以頭垢少許納瘡中用熱牛屎封之
