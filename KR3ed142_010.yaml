body:
  text: 卷十眼目一切目疾雀目赤目青盲內外障翳風眼用此覺目中涼冷為驗楊梅青即空青洗淨胡黃連洗淨各二錢半槐芽日未出時勿語採之入青竹筒內垂於天月二德方候乾勿見雞犬為末一錢半共和勻入龍腦一字密收每臥時漱口仰頭吹一字入兩鼻內便睡隔夜更用聖濟録一切眼疾及生翳膜久不愈者用苘實以柳木作磑磨去殼每十兩可得四兩非此法不能去殼也用豬肝薄切滾藥慢炙熟為末醋和丸如梧子大每服三十丸白湯下一方以苘實納袋中蒸熟曝為末蜜丸溫水下聖濟總録治目暗不見物冷淚浸淫不止及青盲天行目暗等疾取西國草一名畢楞伽一名覆盆子葉曝乾搗極細以薄綿裹之用飲男乳汁浸如人行八九里久用點目中即仰臥不過三四日視物如少年忌酒面油物海上方內外目障目昏生翳遠視似有黑花及內障不見物用雀兒十個去翅足嘴連腸胃骨肉研爛磁石煅醋淬七次水飛神麯炒青鹽肉蓯蓉酒浸炙各一兩菟絲子酒浸三日曬三兩為末以酒二升少入煉蜜同雀鹽研膏和丸梧子大每溫酒下二十丸日二服聖惠方治眼風癢或生翳或赤眥一切皆主之宣州黃連末蕤仁去皮研膏等分和勻取無蟲干棗二枚割下頭去核以二物填滿卻以割下頭合定用少薄綿裹之大茶碗盛於銀器中文武火煎取一雞子大以綿濾罐收點眼萬萬不失前後試驗數十人皆應治一切遠年障翳胬肉赤腫疼痛用魚子活水中生下者半兩以硫黃水溫溫洗淨石決明草決明青葙子穀精草枸杞子黃連炙甘草枳實麩炒牡蠣粉蛇蛻燒灰白芷龍骨黃柏各一兩白附子炮白蒺藜炒黃芩炒羌活各半兩虎睛一隻切作七片文武火炙乾每一料用一片上通為末名決明散每服三錢五更時茶服午夜再服赤白翳膜七日減去胬肉赤腫痛不可忍者三五日見效忌豬魚酒面辛辣色欲凡遇惱怒酒色風熱即疼者是活眼尚可醫治如不疼是死眼不必醫也總録又籠蒻燒灰淋汁洗之久自效經驗方又冬青葉入朴硝研爛貼之海上方也普濟方又真爐甘石半升用黃連四兩銼豆大銀石器內水二碗煮二伏時去黃連為末入片腦二錢半研勻罐收每點少許頻用取效一方爐甘石煅一錢盆硝一錢為末熱湯泡洗治目中百病並卒癢痛乳汁浸黃連頻點眥中外臺祕要三十年失明用蒺藜七月七日收陰乾搗散食後水服方寸匕日二服名補肝散外臺祕要又方積年失明決明子二升為末每食粥飲服方寸匕病後失明羊膽點之日二次肘後方赤目失明內外障翳太陰玄精石陰陽火煅石決明各一兩蕤仁黃連各二兩羊子肝七個竹刀切曬為末粟米飯丸梧子大每臥時茶服二十丸服至七日烙頂心以助藥力一月見效集驗方十年青盲取白犬生子目未開時乳頻頻點之狗子目開即瘥藏器青盲不見雄鼠膽鯉魚膽各二枚和勻滴之立效又夜明砂糯米炒黃一兩柏葉炙一兩為末牛膽汁和丸梧子大每夜臥時竹葉湯下二十丸至五更米飲下二十丸瘥乃止聖惠方青盲內障白羊子肝一具黃連一兩熟地黃二兩同搗丸梧子大食遠茶服七十丸日三服傳信方又春初取黃荊嫩頭九蒸九暴半斤用烏骨雞一隻以米飼五日安淨板上飼以大麻子二三日收糞干入瓶內熬黃和荊頭為末煉蜜丸梧子大每服十五丸至二十丸陳米飲下日二服聖濟又風赤生翳及墜眼日久瞳損失明地黃花曬黑豆花曬槐花曬各一兩為末豬肝一具同以水二斗煮至上有凝脂掠盡瓶收每點少許三四次愈聖惠方青盲眼障但瞳子不壞者十得九愈用蔓菁子六升蒸之氣遍合甑取下以釜中熱湯淋之曝乾還淋如是三遍即收為末食後清酒服方寸匕日再服亦治虛勞目暗崔元亮海上方病後青盲日近者可治仙靈脾一兩淡豆豉一百粒水一碗半煎一碗頓服即瘳百一選方酒毒目盲一人形實好飲熱酒忽病目盲而脈澀此熱酒所傷胃氣汙濁血死其中而然以蘇木煎湯調人參末一錢服次日鼻及兩掌皆黑紫此滯血行矣再以四物湯加蘇木桃仁紅花陳皮調人參末服數日而愈丹溪纂要青盲雀目決明一升地膚子五兩為末米飲丸梧子大每米飲下二三十丸普濟方又用石決明一兩燒過存性外用蒼朮三兩去皮為末每服三錢以豬肝批開入藥末在內扎定砂罐煮熟以氣薰目待冷食肝飲汁龍木論治青盲鯉魚腦髓和膽等分頻點目眥時珍方洗青盲眼正月八二月八三月六四月四五月五六月二七月七八月二十九月十二十月十七十一月二十六十二月三十日每遇上件神日用桑柴灰一合煎湯沃之於瓷器中澄取極清稍熱洗之如冷即重湯燉溫不住手洗久久視物如鷹鶻也一法以桑灰童子小便和作丸每用一丸泡湯澄洗龍木論又新斫青桑葉陰乾逐月按日就地上燒存性每以一合於瓷器內煎減二分傾出澄清溫熱洗目至百度屢試有驗正月初八二月初八三月初六四月初四五月初六六月初二七月初七八月二十九月十二十月十三十一月初二十二月三十日昔有患此二十年用是法洗二年如舊普濟方肝虛雀目黃蠟不拘多少熔汁取出入蛤粉相和得所每用刀子切下二錢以豬肝二兩批開摻在內麻繩扎定水一碗同入銚子內煮熟取出乘熱蒸服至溫並肝食之日二以平安為度其效如神集驗方雀目夜盲遇夜不能視物用建昌軍螺兒蚌粉三錢為末水飛過雄豬肝一葉披開納粉扎定以第二泔煮七分熟仍別以蚌粉蘸食以汁送下一日一作與夜明砂同功直指方雀目夜昏百治不效石膏末每服一錢豬肝一片薄批摻藥在上纏定砂瓶煮熟切食之一日一服明目方目暗昏花爐甘石火煅童尿淬七次代赭石火煅淬七次黃丹水飛各四錢為末白沙蜜半斤以銅鐺煉去白沫更添清水五六碗熬沸下藥文武火熬至一碗滴水不散以夾紙濾入瓷器收之並點日用衛生易簡方眼目昏暗每旦含黃柏一片吐津洗之終身行之永無目疾普濟方又柴胡六銖決明子十八銖治篩人乳汁和敷目上久久夜見五色千金方眼熱昏暗營實枸杞子地膚子各一兩為末每服一錢溫酒下聖惠方眼目昏花雙弄丸用甘菊花一斤紅椒去目六兩為末用新地黃汁和丸梧子大每服五十丸臨臥茶清下瑞竹堂方肝虛目暗茫茫不見珍珠末一兩白蜜二合鯉魚膽二枚和合銅器煎至一半新綿濾過瓶盛頓點取瘥亦治青盲不見聖惠方肝虛目暗迎風流淚用臘月牯牛膽盛黑豆懸風處取出每夜吞三七粒久久自明龍木論虛勞眼暗久服可夜讀書三月三日採蕪菁花陰乾為末每服二錢空心井華水下慎微勞傷肝氣目暗方用螢火二七枚納大鯉魚膽中陰乾百日為末每點少許極妙一方用白犬膽聖惠方治肝腎俱虛眼昏黑花或生障翳迎風有淚久服補肝腎增目力車前子熟地黃酒蒸三兩菟絲子酒浸五兩為末煉蜜丸梧子大每溫酒下三十丸日二服名駐景丸和劑局方一方治久患內障車前子乾地黃麥門冬等分為末蜜丸梧子大服之纍試有驗聖惠方目昏難視楮桃荊芥穗各五百枚為末煉蜜和彈子大食後嚼一丸薄荷湯下日三服易簡方腎經虛損眼目昏花或云翳遮睛甘州枸杞子一斤好酒潤透分作四份四兩用蜀椒一兩炒四兩用小茴香一兩炒四兩用芝麻一兩炒四兩用川楝肉一兩炒揀出枸杞加熟地黃白朮白茯苓各一兩為末煉蜜丸日服瑞竹堂方治眼昏棗樹皮同老桑樹皮並取北向者等分燒研每用一合併水煎取清洗目一月三洗昏者復明切忌葷酒房事時珍方補腎明目生苄熟苄各二兩川椒紅一兩為末蜜丸梧子大每空心鹽湯下三十丸普濟方又蕪菁子淘過一斤黃精二斤同和九蒸九曬為末每空心米飲服二錢日再服又方蔓菁子二升決明子一升和勻以酒五升煮乾曝為末每服二錢溫水調下日二並聖惠方眼暗補中蔥子半升為末每取一匙煎湯一升半去滓入米煮粥食之亦可為末蜜丸梧子大食後米湯服二十丸日三服食醫心鏡明目方兔肝和決明子作丸服扁鵲明目使發不落法十月上巳日取槐子去皮納牛膽中陰乾百日初服一枚再服二枚日加一枚至十日又從一枚起終而復始令人可夜讀書延年益氣力變黑髮大良鶴腦和天雄蔥實服之令人目明夜能書字抱朴子常服明目使人洞視臟腑用蕪菁子三升以苦酒三升煮熟日乾研篩末以井華水服方寸匕日三無所忌抱朴子云服盡一斗能夜視見物千金方明目堅齒去翳大利老眼海鹽以百沸湯泡散清汁於銀石器內熬取雪白鹽花新瓦器盛每早揩牙漱水以大指甲點水洗目閉坐良久乃洗面名洞視千里法極神妙永類鈐方洗目令明柏葉上露菖蒲上露並旦旦洗之時珍方又柘木煎湯按日溫洗自寅至亥乃止無不效者正月初二二月初二三月不洗四月初五五月十五六月十一七月初七八月初二九月初二十月十九十一月不洗十二月十四日徐神翁方也海上方滴眼令明伏翼血及膽血滴目令人不睡夜中見物又鷹睛和乳汁研之日三注眼中見碧霄中物忌烟熏藥性又鸚鵒目睛和乳汁研滴目中令人目明能見霄外物藏器又青魚目睛汁注目中能夜視開寶目生障翳穀精草防風等分為末米飲下服之甚驗明目又生辰砂一塊日日擦之自退普濟方又魚膽丸用青魚膽鯉魚膽青羊膽牛膽各半兩熊膽二錢半麝香少許石決明一兩為末糊丸梧子大每空心茶下十丸龍木論又用細料白瓷鍾一個大火煅過研末絹篩加雄黃二分為末早晚各點少許不可多用用牛角簪撥出翳膜為妙若紅用人退末點四角即愈孫夫人集效方又牙硝十兩湯泡汁厚紙濾過瓦器熬干置地上一夜入飛炒黃丹一兩麝香半分再羅過入片腦錢許入罐密收每日點少許甚效如神濟急仙方又白龍散只用硝置懷中百二日入少腦研粉張三丰方又楮白皮曝乾作一繩子如叉股大燒灰細研每點少許日三五次瘥乃止崔氏方又三月收谷木軟葉曬乾為末入麝香少許每以黍米大注眥其翳自落聖惠方又刀刮爪甲細末和乳點之集簡方又書中白魚末注少許於翳上日二外臺祕要目生頑翳珍珠一兩地榆二兩水二大碗煮乾取珍珠以醋浸五日熱水淘去醋氣研細末用每點少許以愈為度內外障翳夜明砂末批入豬肝內煮食飲汁效直指方目花翳痛貝子一兩燒研如面入龍腦少許點之若有息肉加珍珠末等分千金方眼昏內障磁朱丸治神水寬大漸散昏如霧露中行漸睹空花物成二體久則光不收及內障神水淡緑淡白色者真磁石火煅醋淬七次二兩硃砂一兩神麯生用三兩為末更以神麯末一兩煮糊加蜜丸梧子大每服二十丸空心飯湯下服後俯視不見仰視微見星月此其效也亦治心火乘金水衰反制之病久病纍發者服之永不更作倪微德厚機啓微集治目熱生赤白膜以雄雀屎和人乳點上自爛肘後方肝熱生翳楮實子研細食後蜜湯服一錢日再服直指方赤翳攀睛照水丹治眼翳惟厚者有效及赤翳攀睛貫瞳仁用海螵蛸一錢辰砂半錢乳細水飛澄取以黃蠟少許化和成劑收之臥時火上旋丸黍米大揉入眥中睡至天明溫水洗下未退更用一次即效海上方內障目翳或如偃月或如棗花用象膽半兩鯉魚膽七枚熊膽一分牛膽半兩麝香一分石決明末一兩為末糊丸緑豆大每茶下十丸日二聖濟方病後生翳白菊花蟬蛻等分為散每用二三錢入蜜少許水煎服大人小兒皆宜屢驗救急方目中障翳赤腫多眵淚密蒙花黃柏根各一兩為末水丸梧子大每臥時湯服十丸至十五丸聖濟録赤眼內障有人患眼食蟹遂成內障五年忽夢一僧以藥水洗之令服羊肝丸求其方用洗淨夜明砂當歸蟬蛻木賊去節各一兩為末黑羊肝四兩水煮爛和丸梧子大食後熟水下五十丸如法服之遂復明也類說赤目障翳熊膽丸每以膽少許化開入冰片一二片銅器點之絶奇或淚癢加生薑粉些須齊東野語又用黃連切片井水熬濃去滓待成膏入大青魚膽和就入片腦少許瓶收密封每日點之甚妙易簡方肝虛目翳凡氣虛血虛眼白俱赤夜如雞啄生浮翳者用海蚌殼燒過成灰木賊焙各等分為末每服三錢用薑棗同水煎和渣通口服每日服二次經驗方赤白目翳聖惠治傷寒熱毒攻眼生赤白翳用烏賊魚骨一兩去皮為末入龍腦少許點之日三治諸目翳用烏賊骨五靈脂等分為細末熟豬肝切片蘸食日二治目中膚翳取風病烏驢腸肚內蟲三七枚曝乾入石膽五分同研瓷盒收勿令見風每日點三五次其翳自消聖惠方目中浮翳遮睛白鹽生研少許頻點屢效小兒亦宜直指目中微翳車前葉枸杞葉等分手中揉汁出以桑葉兩重裹之懸陰處一夜破桑葉取點不過三五度十便良方眼生花翳澀痛難開景天搗汁日點三五次聖惠方目翳重者取豬膽皮曝乾作兩股繩如箸大燒灰出火毒點之不過三五度瘥外臺祕要撥雲去翳用豬胰子一枚五錢蕤仁五分青鹽一錢共搗千下令如泥每點少許取下膜翳為效孫氏集效方又蕤仁一兩去油入白蓬砂一錢麝香二分研勻收之去翳妙不可言闢瘴明目七物升麻丸升麻犀角黃芩朴硝梔子大黃各二兩豉二升微熬同搗末蜜丸梧子大覺四肢大熱大便難即服三十丸取微利為度若四肢小熱只食後服二十丸非但闢瘴甚能明目王方鹿嶺南方點眼去翳莕絲草根一錢半搗爛即葉如馬蹄開黃花者川楝子十五個膽礬七分石決明五錢皂莢一兩海螵蛸二錢各為末同莕根以水一鍾浸二宿去滓一日點數次七日見效也孫氏集效方搐鼻去翳碧雲散治目赤腫脹羞明昏暗隱澀疼痛眵淚風眼鼻塞頭痛腦酸外翳扳睛諸病鵝不食草曬乾二錢青黛川芎各一錢為細末噙水一口每以末許㗜入鼻內淚出為度一方去青黛倪氏啓微集塞耳治翳詩云赤眼之餘翳忽生草中鵝不食為名塞於鼻內頻頻換三日之間復舊明集要方眼生黑花年久不可治者炒椒目炒蒼朮各一兩為末醋糊丸桐子大每服二十丸醋湯下本事方每夜目珠連眉稜骨疼頭半邊腫痛用黃連膏點之反甚諸藥不效以夏枯草二兩香附二兩甘草四錢為末每服一錢半清茶調服下咽則疼減半至四五服良愈也時珍方眼目熱痛淚出不止菥蓂子即大薺子搗篩為末臥時銅箸點少許入目當有熱淚及惡物出甚佳亦治眼中胬肉夜夜點之崔元亮海上方肝虛睛痛冷淚羞明補肝散用香附子一兩夏枯草半兩為末每服一錢茶清下簡易方目痛纍年或三四十年生海螺取汁洗之或入黃連末在內取汁點之陳藏器方目生胬肉或癢或痛漸覆瞳仁用杏仁去皮二錢半膩粉半錢研勻綿裹箸頭點之聖濟總録胬肉攀睛赤脈貫瞳雀屎和首生男子乳點即消神效蘇恭方胬肉攀睛青萍少許研爛入片腦少許貼眼上效危氏得效赤目胬肉日夜痛者取好梨一顆搗絞汁以綿裹黃連片一錢浸汁仰臥點之圖經本草目生胬肉及珠管真丹貝母等分為末點注日三四度肘後方眼中息肉驢脂白鹽等分和勻注兩目眥頭日三次一月瘥赤眼腫痛有數種皆肝熱血凝也用消風熱藥服之夜用鹽收豆腐片貼之酸漿者勿用證治要訣又決明子炒研茶調敷兩太陽穴干則易之一夜即愈亦治頭風熱痛醫方摘玄又桑灰二兩黃連半兩為末每以一錢泡湯澄清洗之聖濟總録又自己小便乘熱抹洗即閉目少頃此以真氣退去邪熱也普濟方又甘草水磨明礬敷眼胞上效或用枯礬頻擦眉心集簡方又燒酒洗有效時珍方又以鯉魚膽五枚黃連末半兩和勻入蜂蜜少許瓶盛安飯上蒸熟每用貼目眥日五七度亦治飛血赤脈火眼赤痛五月取老黃瓜一條上開小孔去瓤入芒硝令滿懸陰處待硝透出刮下留點眼甚效壽域神方又豬膽一個銅錢三文同置盞內蒸乾取膽丸粟米大安眼中聖惠方火眼赤爛緊閉目以熱湯沃之湯冷即止頻沃取安妙在閉目或加薄荷防風荊芥煎湯沃之亦妙趙原陽濟急方風熱赤眼用冬青葉五斗搗汁浸新磚數片五日掘坑架磚於內蓋之日久生霜刮下入腦子少許點之濟急仙方又地膚子焙一升生地黃半升取汁和作餅曬乾研末每服三錢空心酒下聖惠方風赤眼痛張三峰真人碧雲膏臘月取羯羊膽十餘枚以蜜裝滿紙套籠住懸檐下待霜出掃下點之神效也又黃丹蜂蜜調點太陽穴立效明目經驗方暴赤眼痛宣黃連銼以雞子清浸置地下一夜次早濾過雞羽蘸滴目內又方苦竹兩頭留節一頭開小孔入黃連片在內油紙封浸井中一夜次早服竹節內水加冰片少許外洗之海上方用黃連冬青葉煎湯洗之選奇方用黃連乾薑杏仁等分為末綿包浸湯閉目乘熱淋洗之又薺菜根杵汁滴之聖惠方又以管吹良薑末入鼻取嚏或彈出鼻血即散談野翁試驗方天行赤目暴腫地骨皮三斤水三斗煮三升去滓入鹽一兩取二升頻頻洗點謝道人天竺經時行火眼患人每日於井上視井旋匝三遍能瀉火氣集玄方患赤目用秦皮煎水澄清洗極效甄權方目痛磣澀不得瞑用青布炙熱不時尉之仍蒸大豆作枕聖惠方赤眼作痛芙蓉葉末水和貼太陽穴名清涼膏飛鴻集又車前草自然汁調朴硝末臥時塗眼胞上次早洗去小兒目痛車前草汁和竹瀝點之聖濟總録又鴨膽點赤目初起效時珍方赤眼澀痛桑葉為末紙卷燒煙燻鼻取效普濟方又萎蕤赤芍藥當歸黃連等分煎湯熏洗衛生家寶方眼暴腫痛秦皮黃連各一兩苦竹葉半升水二升半煮取八合食後溫服外臺祕要注目止痛用珍珠黃連末納入田螺內良久取汁注目中痛自止弘景方睡起目赤腫起良久如常者血熱也臥則歸於肝故熱則目赤腫良久血散故如常也用生地黃汁浸粳米半升曬乾三浸三曬每夜以米煮粥食一盞數日即愈有人病此用之得效醫余目疾赤腫爐甘石火煅尿淬風化硝等分為末新水化一粟點之宣明方赤眼腫閉土朱二分石膏一分為末新汲水調敷眼頭尾及太陽穴直指方男婦赤眼十分重者以山漆根磨汁塗四圍甚妙集簡方暴赤眼痛磣澀者嫩楮枝去葉放地火燒以碗覆之一日取灰泡湯澄清溫洗聖惠方治目中膚赤熱痛取蛔蟲大者洗淨斷之令汁滴目中三十年膚赤亦瘥藏器方赤目眥痛不得開者肝經實熱所致或生障翳用苦竹瀝五合黃連二分綿裹浸一宿頻點之令熱淚出梅師方肝熱赤目用大田螺七枚洗淨新汲水養去泥穢換水一升浸洗取起於淨器中著少鹽花於甲內承取自然汁點目逐個用了放去之藥性論血風赤眼女人多患之用烏賊魚骨二錢銅緑一錢為末每用一錢熱湯泡洗楊氏家藏方飛血赤目熱痛干藍葉切二升車前草半兩淡竹葉三握水四升煎二升去滓溫洗冷即再暖以瘥為度聖濟總録風熱赤眼以淅二泔睡時冷調洗肝散菊花散之類服之戴元禮方眼赤澀癢犬膽汁注目中效聖惠方暴得赤眼生翳用藍香子即本草羅勒子也洗曬每納一粒入翳內閉目少頃連膜而出一方為末點之赤脈貫瞳玄參為末以米泔煮豬肝日日蘸食之濟急仙方風眼腫痛雞子白皮枸杞白皮等分為末吹鼻中一日三次聖濟總録風熱目暗澀痛車前子宣州黃連各一兩為末食後溫酒服一錢日二服效聖惠方治風毒攻眼腫癢澀痛不可忍者或上下瞼赤爛或浮翳瘀肉侵睛五倍子一兩蔓荊子一兩半為末取二錢水二鍾銅石器內煎汁去滓乘熱洗留滓再煎用大能明目去澀博濟積熱眼澀三月三日或五月五日採青蒿花或子陰乾為末每井華水空心服二錢久服明目可夜看書名青金散十便良方眼目昏澀蒼朮半斤米泔浸七日去皮切焙木賊各二兩為末每服一錢茶酒任下聖惠方目澀好眠取鼠一目燒研和魚膏點入目眥兼以紅囊盛兩枚佩之羞明怕日用石決明黃菊花甘草各一錢水煎冷服明目集驗方目中淚出鹽點目中冷水洗數次瘥範汪方目中出淚或出膿用馬齒莧子人莧子各半兩為末綿裹銅器中蒸熟尉大眥頭膿水出處每尉以五十度為率久久自絶聖惠方淚出不止黃連浸濃汁漬拭之肘後方肝虛下淚枸杞子二升絹袋盛浸一斗酒中密封三七日飲之龍木論眼熱流淚五倍子蔓荊子煎湯洗後用雄雞膽點之摘玄風眼下淚取臘月不落桑葉煎湯日日溫洗或入芒硝集簡方迎風目淚乃心腎虛熱也用生玳瑁羚羊角各一兩石燕子一雙為末每服一錢薄荷湯下日一服眼流冷淚木耳燒存性一兩木賊一兩為末每服二錢以清泔煎服聖惠方疳眼冷淚烏賊魚骨牡蠣等分為末糊丸皂子大每用一丸同豬肝一具米泔煮熟食經驗方治爛弦風赤眼流淚不可近光及一切暴赤目疾用羯羊膽一枚入蜂蜜於內蒸之候乾研為膏每含少許並點之一日淚止二日腫消三日痛定蓋羊食百草蜂採百花故有二百花草膏之名夷堅志爛弦風眼黃連十文槐花輕粉少許為末男兒乳汁和之飯上蒸過帛裹尉眼上三四次即效屢試有驗仁存方又膩粉末口津和點大眥日二三四次聖惠方又明淨皮硝一盞水二碗煎化露一夜濾淨澄清朝夕洗目三日其紅即消雖半世者亦愈也楊誠經驗方又以真麻油浸蠶砂二三宿研細以篦子塗患處不問新舊隔宿即愈陳氏經驗方又膽礬三錢燒研泡湯日洗明目經驗方又集靈方用五倍子煅存性為末入飛過黃丹少許敷之日三上甚良普濟方用五倍子研末敷之名拜堂散又銅青水調塗碗底以艾熏干刮下塗爛處衛生易簡方洗爛弦風眼山礬葉三十片同老薑三片浸水蒸熱熏洗時珍方又五味子蔓荊子煎湯頻洗之談野翁種子方又五倍子銅青白蟺土等分為末熱湯泡開閉目淋洗冷再熱洗之眼弦不可入湯濟急方眼弦赤爛用蕤仁四十九個去皮胡粉煅如金色一雞子大研勻入酥一杏仁許龍腦三豆許研勻油紙裹收每以麻子許塗大小眥上頻用取效近效方又方用蕤仁杏仁各一兩去皮研勻入膩粉少許為丸每用熱湯化洗經驗良方又薄荷以生薑汁浸一宿曬乾為末每用一錢沸湯泡洗明目經驗方爛弦疳眼其中有蟲用覆盆葉咀嚼取汁入筒中以皂紗矇眼滴汁浸上下弦轉盼間蟲從紗上出而愈治人多驗夷堅志倒睫拳毛因風入脾經致使風癢不住手擦日久赤爛拳毛入內將木鱉子仁捶爛以絲帛包作條左患塞右鼻右患塞左鼻其毛自分上下次服蟬蛻藥為妙集效方拳毛倒睫以臘月蟄蠅乾研為末以鼻頻嗅之即愈時珍又蝟刺棗針白芷青黛等分為末隨左右目㗜鼻中口含冷水瑞竹堂方又凡赤眼患此者翻轉目瞼以狗尾草一二莖蘸水戛去惡血甚良飛絲入目磨濃墨點之即出千金方又石菖蒲捶碎左目塞右鼻右目塞左鼻百發百中得效方又青芥菜汁點之如神摘玄方又蔓菁菜揉爛帕包滴汁三兩點即出也普濟方雜物入目豬脂煮取水面如油者仰臥去枕點鼻中不過數度與物俱出聖惠方雜物眯目不出用東牆上馬齒莧燒灰研細點少許眥頭即出也聖惠方雜物及稻麥芒入目白蘘荷根取心搗汁滴入目中立出普濟方麥芒入目大麥煮汁洗之即出孫真人方又以新布覆目中將蠐螬從布上摩之芒著布上出也千金塵芒入目大藕洗搗綿絞滴目中立出普濟方沙塵入目取生蜣螂一枚以其背於眼上影之自出肘後損目破睛牛口涎日點二次避風黑睛破者亦瘥肘後方目為物傷羊膽二枚雞膽三枚鯉魚膽二枚和勻日日點之聖惠方物傷睛突輕者瞼胞腫痛重者目睛突出但目絲未斷者即納入急搗生地黃綿裹敷之仍以避風膏藥護其四邊聖濟總録患眼痛多見鬼物乃邪氣入肝也覓死人枕煮服之仍埋枕於故處立愈物傷睛陷胬肉突出地膚洗去土二兩搗絞汁每點少許冬月以乾者煮濃汁聖惠方眼生偷針布針一個對井睨視已而折為兩段投井中勿令人見耳三十年耳聾酒三升漬牡荊子一升七日去滓任性飲之千金方多年老聾勝金透關散用活鼠一枚系定熱湯浸死破喉取膽真紅色者是也用川烏頭一個泡去皮華陰細辛二錢膽礬半錢為末以膽和勻再焙乾研細入麝香半字用鵝翎管吹入耳中口含茶水日二次十日見效永除根本家寶方多年耳聾重者用三兩度初起者一上便效用驢前腳脛骨打破向日中瀝出髓以瓷盒盛收每用綿點少許入耳內側臥候藥行其髓不可多用以白色者為上黃色者不堪又方驢髓以針砂一合水二合浸十日取清水少許和髓攪勻滴少許入耳中外以方新磚半個燒赤淬醋鋪磁石末一兩在磚上枕之至晚如此三度即通並普濟方年久耳聾用煉成雞肪五兩桂心十八銖野葛六銖同以文火煎三沸去滓每用棗許以葦筒炙熔傾入耳中如此十日耵聹自出長寸許也烏雄雞者良千金翼又驢生脂和生椒搗熟綿裹塞耳孟詵諸般耳聾細辛末熔黃蠟丸鼠屎大綿裹一丸塞之一二次即愈須戒怒氣名聰耳丸經驗方又用淘鵝油半匙磁石一小豆麝香少許和勻以綿裹成挺之塞耳中口含生鐵少許用三五次即有效青囊方又每日取吊脂點入半杏仁許便瘥蘇頌治耳鳴耳聾一二十年者有柘根酒用柘根二十斤菖蒲五斗各以水一石煮取汁五斗故鐵二十斤煅赤以水五斗浸取清合水一石五斗用米二石面二斗如常釀成酒用真磁石三斤為末浸酒中三宿日夜飲之取一醉而眠聞人聲乃止聖惠方耳卒聾閉協鐵石半錢入病耳內鐵砂末入不病耳內自然通透直指方又蚯蚓入鹽安蔥內化水點之立效勝金方又甘遂半寸綿裹插入兩耳內口中嚼甘草少許自然通也永類鈐方又菖蒲根一寸巴豆一粒去心同搗作七丸綿裹一丸塞耳日一換肘後方經驗方只用巴豆一粒綿裹針刺孔通氣塞之取效又竹筒盛鯉魚腦於飯上蒸過注入耳中千金方又方用鯽魚腦竹筒中蒸過滴之聖惠方又杏仁去皮拍碎分作三份以綿裹之著鹽如小豆許以器盛於飯上蒸熟令病人側臥以一裹捻油滴耳中良久又以一裹滴之取效外臺又萆麻子一百個去殼與大棗十五枚入小兒乳汁和丸作挺每以綿裹一枚塞之覺耳中熱為度一日一易二十日瘥千金方又香附子瓦炒研末蘿蔔子煎湯早夜各服二錢忌鐵器易簡方又硫黃雄黃等分研末綿裹塞耳數日即聞人語也千金方又蚯蚓川芎各兩半為末每服二錢麥門冬湯下服後低頭伏睡一夜一服三夜立效聖濟總録耳聾不聽雞矢白炒半升烏豆炒一升以無灰酒二升乘熱投入服取汗耳中如聞鼓鼙勿訝外臺腎虛耳聾用磁石木通菖蒲等分袋盛漬酒日飲腎虛耳聾十年者二服可愈小蠍四十九個生薑如蠍大四十九片同炒姜干為度研末溫酒服之至一二更時更進一服至醉不妨次日耳中如笙簧聲即效杜壬方又用鹿腎一對去脂膜切以豉汁入粳米二合煮粥食亦可作羹聖惠方又烏雄雞一隻治淨以無灰酒三升煮熟乘熱食三五隻效又真磁石一豆大穿山甲燒存性研一字新綿塞耳內口含生鐵一塊覺耳中如風雨聲即通濟生方腎熱耳聾燒鐵投酒中飲之仍以磁石塞耳日易夜去之千金方塞耳治聾螻蛄五錢川山甲炮五錢麝香少許為末蔥汁和丸塞之外用㗜鼻即通普濟方又綿裹烏稍蛇膏豆許塞之神效時珍出聖惠滴耳治聾蝸牛膏用蝸牛一兩石膽鍾乳粉各二錢半為末瓷器盛之火煅赤研末入冰片一字每以油調一字滴入耳中無不愈者聖惠方又苟印膏滴耳中治聾令左右耳徹藏器熏耳治聾蠶蛻紙作捻麝香二錢入筆筒燒煙燻之三次即開耳卒鳴聾及腎虛耳內如風水鐘鼓聲用川山甲一大片以蛤粉炒赤蠍梢七個麝香少許為末以麻油化蠟丸作挺子綿裹塞之攝生方治腎氣虛耳鳴用巴豆菖蒲同椒目研細松脂黃蠟熔和為挺納耳中抽之亦治卒聾或如耳中打鐘磬之聲日一易神驗甄權方耳卒烘烘瓜蔞根削尖以臘豬脂煎三沸取塞耳三日即愈肘後方耳中常鳴生地黃截塞耳中日數易之或煨熟尤妙肘後風病耳鳴鹽五升蒸熱以耳枕之冷復易之亦治耳卒疼痛肘後方耳鳴耳癢如流水及風聲不治成聾用生烏頭掘得乘濕削如棗核大塞之日易二次不三日即愈千金方耳卒腫痛牛蒡根切絞汁二升銀鍋內熬膏塗之聖濟總録耳中卒痛磨刀鐵漿滴入即愈活人心鏡又木香末以蔥黃染鵝脂蘸末深納入耳中聖濟録耳忽大痛如有蟲在內奔走或血水流出或干痛不可忍者蛇蛻皮燒存性研鵝翎吹之立愈楊拱醫方摘要耳忽作痛或紅腫內脹將經霜青箬露在外將朽者燒存性為末敷入耳中其疼即止楊起簡便方耳卒熱腫木鱉子仁一兩赤小豆大黃各半兩為末每以少許生油調塗之聖惠方又生商陸削尖納入日再易聖濟録耳腫風毒出血取柳蠹糞化水取清汁調白礬末少許滴之肘後方耳腮聾腫及喉下諸腫用蝸牛同面研敷之耳中有物如棗核大痛不可動者以火酒滴入抑之半時即可鉗出李樓奇方底耳疼痛桑螵蛸一個燒存性麝香一字研末每用半字摻入神效有濃先洗淨經驗方又蠍梢七枚去毒焙入麝香半錢為末挑少許入耳中日夜三四次以愈為度楊氏家藏方底耳腫痛汁水不絶輕粉一錢麝香一分為末摻之簡便耳中耵聹乾結不出用白蚯蚓入蔥葉中化為水滴耳令滿不過數度即易挑出五般聤耳出膿血水人牙燒存性麝香少許為末吹之名佛牙散普濟方耳中出血龍骨末吹入之三因方又蒲黃炒黑研末摻入簡便方聖惠方亦治聤耳出膿聤耳出膿穿山甲燒存性入麝香少許吹之日三水乾即愈鮑氏小兒方又用狗膽一枚枯礬一錢調勻綿裹塞耳內三四次即瘥奇效良方又用五倍子末吹之普濟方又用五倍子焙乾一兩全蠍燒存性三錢為末摻耳中經驗方又麻子一合干胭脂一分研勻作挺子綿裹塞之聖惠方又蟬蛻五錢燒存性麝香五分炒研為末綿裹塞之追出惡物效海上方又海螵蛸半錢麝香一字為末以綿杖繳淨吹入耳中淡寮又楠木燒研以綿杖繳入聖惠方又生地龍釜上墨生豬脂等分研蔥汁和勻作挺子綿裹塞之聖惠方治聤耳出膿疼痛及耳生耵聹鵓鳩屎同夜明砂末等分吹之時珍方耳出臭膿用竹蛙蟲末胭脂丕子等分麝香少許為末吹之朱氏集驗治聤耳金絲荷葉搗汁滴之時珍方耳疳出膿用天鵝油調草烏末入龍腦少許和敷立效通玄論又用抱出雞卵殼炒黃為末油調灌之疼即止杏林摘要聤耳出汁陳皮燒研一錢麝香少許為末日摻名立效散又爐甘石礬石各二錢胭脂半錢麝香少許為末繳淨吹之普濟方又茶蛀屑研末日日繳淨摻之時珍出聖惠又香附末以綿杖送入蔡邦度知府常用有效經驗良方又益母草絞汁滴之聖惠方聤耳流水或膿血取柑子嫩頭七個水入數滴杵取汁滴之即愈耳疳出汁青黛黃柏末干搽談野翁方又雞子黃炒油塗之神妙談野翁方聤耳有蟲鯉魚腸同酢搗爛帛裹塞之時珍方水入耳內作膿疼痛如聖散用箭稈內蛀末一錢膩粉一錢麝香半分為末以綿杖繳盡送藥入耳以綿塞定有惡物流出甚者三度即愈普濟方又薄荷汁滴入立效外臺祕要耳內濕瘡蛇床子黃連各一錢輕粉一字為末吹之全幼心鑑漏耳諸瘡治耳內外惡瘡及頭瘡肥瘡瘑瘡黃馬散用黃柏半兩干馬齒莧一兩為末敷之聖惠方耳瘡腫痛五倍子末冷水調塗濕則乾摻之海上方月蝕耳瘡望夜取兔屎納蝦蟆腹中同燒末敷之肘後方又寡婦床頭塵土和油塗之藏器方耳後月蝕燒蚯蚓糞豬脂和敷子母祕録耳生爛瘡棗子去核包青礬煅研香油調敷之摘玄方兩耳凍瘡生薑汁熬膏塗之暇日記耳瘑疣目黑雌雞膽汁塗之日三聖惠方百蟲入耳蟬頭燒研綿裹塞之立出時珍方又雞冠血滴入即出勝金方又萵苣搗汁滴入自出也千金方韭汁灌之即出藏器方以兩刀於耳門上摩敲作聲自出又川椒研末醋浸灌之自出危氏方又膽礬末和醋灌之即出千金方又方雄黃燒捻熏之自出十便良方又以紙塞耳鼻留蟲入之耳不塞閉口不言少頃蟲當出也集玄方又方用生油調銅青滴入衛生方又方桃葉挼熟塞之或搗汁滴之或作枕枕之一夕自出梅師方飛蟲入耳石斛數條去根如筒子一邊紝入耳中四畔以蠟封閉用火燒石斛盡則止熏右耳則蟲從左出未出更作聖濟方惡蟲入耳香油和稻稈灰汁滴入之聖濟總録蟻入耳內鯪鯉甲燒研水調灌入即出肘後方馬蝗入耳取田中泥一盆枕耳邊聞氣自出時珍方蚰蜒入耳牛乳少少滴入即出若入腹者飲一二升即化為水聖惠方又羊乳灌之即化成水孟詵方又用麻油作煎餅枕臥須臾自出李元淳尚書在河陽日蚰蜒入耳無計可為腦悶有聲至以頭擊門柱奏狀危困因發御醫療之不驗忽有人獻此方乃愈劉禹錫傳信方本草圖經又地龍為末入蔥內化水點入則蚰蜒亦化為水聖惠方蜈蚣入耳炙豬肪掩耳自出亦治蟲蟻入耳梅師方治蠅入耳害人皂莢蠹蟲研爛同鱔魚血點之危氏方蚤蝨入耳菖蒲末炒熱袋盛枕之即愈聖濟録耳中有物不出用弓弩弦長三寸打散一頭塗好膠注著耳中徐徐黏引出聖惠方
