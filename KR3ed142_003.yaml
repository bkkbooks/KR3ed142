body:
  text: 卷三癥瘕治遠年虛實積聚癥塊用海馬雌雄各一枚木香二兩大黃炒白牽牛炒各二兩巴豆四十九粒青皮二兩童子小便浸軟包巴豆扎定入小便內再浸七日取出麩炒黃色去豆不用取皮同眾藥為末每服二錢水一盞煎三五沸臨臥溫服聖濟錄腹中痃癖諸塊雀屎和乾薑桂心艾葉為丸服之能令消爛藏器方腹中癖積黃牛肉一斤恆山三錢同煮熟食肉飲汁癖自消甚效筆峰雜興痃癖氣塊草三稜京三稜石三稜青橘皮陳橘皮木香各半兩肉豆蔻檳榔各一兩硇砂二錢為末糊丸梧子大每薑湯服三十丸奇效方老小痃癖往來疼痛香附南星等分為末薑汁糊丸梧子大每薑湯下二三十丸聖惠方昔有患痃癖者夢人教每日食大蒜三顆初服遂至瞑眩吐逆下部如火後有人教取數片合皮截卻兩頭吞之名曰內炙果獲大效也治心下堅大如盤水飲所作用枳實七枚術三兩水一斗煎三升分三服腹中軟即消也仲景痃癖鼓脹烏牛尿一升微火煎如稠飴空心服棗許當鳴轉病出隔日更服之千金翼方療癖取車下李仁湯潤去皮及並仁者與乾麵相拌搗如餅若干入水少許作麵餅大小一如病人掌為二並微炙使黃勿令至熟空腹食一餅當快利如不利更食一餅或飲熱茶湯以利為度利不止以醋飯止之利後當虛若病未盡一二日量力更進一服以病盡為良不得食酪及牛馬肉等累試神驗但須量病輕重以意加減小兒亦可用又瓦壟子能消塊散痰積蓋咸走血而軟堅故也時珍腹滿癖堅如石積年不損者用白楊木東枝去粗皮避風細銼五升熬黃以酒五升淋訖用絹袋盛滓還酒中密封再宿每服一合日二服外臺方痃癖不瘥脅下硬如石京三稜一兩炮川大黃一兩為末醋熬成膏每日空心姜橘皮湯下一匙以利下為度聖惠方又生商陸根汁一升杏仁一兩浸去皮搗如泥以商陸汁絞杏仁泥火煎如餳每服棗許空腹熱酒服以利下惡物為度聖惠方小腹冷癖有形如卵上下走痛不可忍者用葫蘆巴八錢茴香六錢巴戟去心川烏頭炮去皮各二錢楝實去核四錢吳茱萸五錢並炒為末酒糊丸梧子大每服十五丸小兒五丸鹽湯下和劑局方涎積癥塊續隨子三十枚膩粉二錢青黛炒一錢研勻糯米飯丸芡子大每服一丸打破以大棗一枚燒熟去皮核同嚼冷茶送下半夜後取下積聚惡物為效聖濟總錄癥瘕腹脹用三稜莪荗以酒煨煎服之下一黑物如魚而愈也證治要訣心腹宿癥及卒得癥硃砂研細搜飯以雄雞一隻餓二日以飯飼之收糞曝燥為末溫酒服方寸匕日三服服盡更作愈乃止外臺秘要卒暴癥疾腹中有如石刺痛晝夜啼呼不治百日死用牛膝二斤以酒一斗漬之密封於灰火中溫令味出每服五合至一斤隨量飲肘後方卒暴癥塊堅如石作痛欲死取蒴藋根一小束洗淨細劈以酒二升漬三宿溫服五合至一升日三服若欲速用於熱灰中溫出藥味服之此方無毒神驗藥盡再作之古今錄驗又取虎杖根勿令影臨水上可得石余洗干搗末稌米五升炊飯納入攪之好酒五斗漬之封候藥消飯浮可飲一升半勿食鮭魚及鹽但取一斗乾者薄酒漬飲從少起日三服亦佳癥當下也此方治癥大勝諸藥外臺秘要又用煅灶灰有效古方二車丸中用之別錄方又多取商陸根搗汁或蒸之以布藉腹上安藥勿覆冷即易晝夜勿息千金方治老婦血瘕男子痃癖悶痞取柘奴刺和三稜草馬鞭草作煎如稠糖病在心食後在臍空心服當下惡物藏器又血瘕用鱉甲琥珀大黃等分作散酒服二錢少時惡血即下若婦人小腸中血下盡即休服也甄權方破血瘕痛越砥即羊肝石燒赤投酒飲藏器方婦人狐瘕因月水來或悲或驚或逢疾風暴雨被濕致成狐瘕精神恍惚令人月水不通胸脅腰背痛引陰中小便難嗜食欲嘔如有孕狀其瘕手足成形者殺人未成者可治用新鼠一枚以新絮裹之黃泥固住入地坎中桑薪燒其上一日夜取出去絮入桂心末六銖為末每酒服方寸匕不過二服當自下素女經腹中鱉瘕平時嗜酒血入於酒則為酒鱉平時多氣血凝於氣則為氣鱉虛勞痼冷敗血雜痰則為血鱉搖頭掉尾如蟲之行上侵人咽下舔人肛或附脅背或隱胸腹大則如鱉小則如錢治法惟用蕪荑炒煎服之兼用暖胃益血理中之類乃可殺之若徒事雷丸錫灰之類無益也直指方又用生硫黃末老酒調下常服之直指方鱉瘕疼痛陳拱病此隱隱見皮內痛不可忍醫曰可以鮮蝦作羹食之久久痛止明年又作再如前治而愈遂絕根本類編方又藍葉一升搗以水三升絞汁服一升日二次千金方又胡粉黍米淋汁溫服大效易簡方魚肉成瘕並治諸毒用狗糞五升燒末綿裹於五升酒中浸二宿取清日三服瘕即便出也外臺秘要又馬鞭草搗汁飲一升即消千金方腹內蛇瘕誤食菜中蛇精成蛇瘕或食蛇肉成瘕腹內常飢食物即吐以赤足蜈蚣一條炙研末酒服易簡方又春夏二時蛟龍帶精入芹菜中人食之則病癥痛不可忍治以硬糖日服二三升當吐出如蜥蜴狀唐醫周顧治此用雄黃朴硝煮服下之一方用寒食餳每服五合日三服吐出蛟龍有兩頭可驗吐蛔者勿用金匱要略雞瘕李道念病已五年丞相楮澄診之曰非冷非熱當是食白瀹雞子過多也取蒜一升煮食吐出一物涎裹視之乃雞雛翅足俱全澄曰未盡也更吐之吐二十枚而愈米瘕嗜米有好吃米久則成瘕不得米則吐出清水得米即止米不消化久亦斃人用白米五合雞屎一升同炒焦為末水一升頓服少時吐出瘕如研米汁或白沫淡水乃愈也千金方嗜茶成癖有人病此一方士令以新鞋盛茶令滿任意食盡再盛一鞋如此三度自不吃也男用女鞋女用男鞋用之果愈也集簡方病發癥者食發成癥心腹作痛咽間如有蟲行欲得飲油者是也用油一升入香澤煎之盛置病人頭邊令氣入口鼻勿與飲之疲極眠睡蟲當從口出急以石灰粉手捉取抽盡即是發也初出如不流水中濃菜形外臺方又雄黃半兩為末水調服之蟲自出夏子益奇方又用豬脂二升酒三升煮三沸服日三次發癥腰痛牽心發則氣絕以油灌之吐物如發引之長三尺頭已成蛇能動搖懸之滴盡惟一發耳此徐文伯治宋明帝宮人方齧蝨成癥山野人好齧蝨在腹生長為蝨癥用敗梳敗篦各一枚各破作兩分以一分燒研以一分用水五升煮取一升調服即下出千金方痰飲治痰為百病惟水瀉胎前產後不可服用大黃酒浸蒸切曬八兩生黃芩八兩沉香半兩青礞石二兩以焰硝二兩同入砂罐固濟煅紅研末二兩上各取末以水和丸梧子大常服一二十丸小病五六十丸緩病七八十丸急病一百二十丸溫水吞下即臥勿動候藥逐上焦痰滯次日先下糟粕次下痰涎未下再服王隱君歲合四十餘斤愈痰數萬也名滾痰丸養生主論痰迷心竅壽星丸治心膽被驚神不守舍或痰迷心竅恍惚健忘妄言妄見天南星一斤先掘土坑一尺以炭火三十斤燒赤入酒五升滲干乃安南星在內盆覆定以灰塞之勿令走氣次日取出為末琥珀一兩硃砂二兩為末生薑汁打麵糊為丸梧子大每服三十丸至五十丸煎人參石菖蒲湯下一日三服和劑局方風痰頭暈目眩嘔逆煩懣飲食不下面色青黃脈弦者用生半夏生天南星寒水石煅各一兩天麻半兩雄黃二錢為末小麥面三兩水和成餅水煮浮起漉出搗丸梧子大名玉壺丸每服五十丸薑湯下極效亦治風痰咳嗽二便不通風痰頭痛摘要方風痰注痛躑躅花天南星並生時同搗作餅甑上蒸四五遍以稀葛囊盛之臨時取焙為末蒸餅丸梧子大每服三丸溫酒下腰腳骨痛空心服手臂痛食後服大良續傳信方風濕痰病流注作痛令本人坐密室中左用滾水一盆右用炭火一盆前置一桌書一冊先將無油新巴豆四十九粒研如泥紙壓去油分作三餅如病在左令病人將右手仰置書上安藥於掌心以碗安藥上傾熱水入碗內水涼即換良久汗出立見神效病在右安左掌心一云隨左右安之經驗方壯人風痰及中風中氣初起用南星四錢木香一錢水一二盞生薑十四片煎六分溫服易簡方老小風痰膽礬末大人用一錢小兒用一字溫醋湯調下立吐出涎便醒談氏小兒方治上膈風熱痰實用桔梗蘆生研末白湯調服一二錢探吐時珍方宣吐風痰用連殼蝦半斤入蔥薑醬煮汁先吃蝦後吃汁緊束肚腹以翎探引取吐又法揀上色精好石綠研篩水飛再研如風痰眩悶取二三錢同生龍腦三四豆許研勻以生薄荷汁合酒溫調服之偃臥須臾涎自口角流出乃愈不嘔吐其功速於他藥蘇頌頑痰不化石青一兩石綠半兩並水飛為末曲糊丸綠豆大每服十丸溫水下吐去痰一二碗不損人瑞竹堂方胸中痰飲傷寒熱病瘧疾須吐者並以鹽湯吐之外臺秘要五飲酒癖一留飲水停心下二癖飲水在兩脅下三痰飲水在胃中四溢飲水在五臟間五流飲水在腸間皆由飲食胃寒或飲茶過多致此用白朮一斤乾薑炮桂心各半斤為末蜜丸梧子大每服二三十丸和劑局方支飲苦冒用澤瀉五兩白朮二兩水二升煮一升分二服仲景方一方用水二升煮二物取一升又以水一升煮澤瀉取五合二汁分再服病甚欲眩者服之必瘥深師方停痰宿飲風氣上攻胸膈不利香附皂莢水浸半夏各一兩白礬末半兩薑汁麵糊丸梧子大每服三四十丸薑湯隨時下仁存方痰飲吐水無時節者其冷飲過度遂令脾胃氣弱不能消化飲食入胃皆變成冷水反吐不停赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲自任稍加至三匕服盡一斤則終身不吐痰水又不下痢補五臟令人肥健有人痰飲服諸藥不效用此遂愈千金翼方飲澼嘔酸許叔微患飲澼三十年始因少年夜坐寫文左向伏几時以飲食多墜左邊中夜必飲酒數杯又向左臥壯時不覺三五年後覺酒止從左下有聲脅痛食減嘈雜飲酒半杯即止十數日必嘔酸水數升暑月止右邊有汗左邊絕無遍訪名醫及海上方間或中病止得月餘復作其補如天雄附子礬石輩利如牽牛甘遂大戟備嘗之矣自揣必有澼囊如水之有科臼不盈科不行但清者可行而濁者停滯無路以決之故積至五七日必嘔而去脾土惡濕而水則流濕莫若燥脾以去濕崇土以填科臼乃悉屏諸藥只以蒼朮一斤去皮切片為末油麻半兩水二錢研濾汁大棗五十枚煮去皮核搗和丸梧子大每日空腹溫服五十丸增至一二百丸忌桃李雀肉服三月而疾除自此常服不嘔不痛胸膈寬利飲啖如故暑月汗亦周身燈下能書細字皆術之功也初服時必覺微燥以山梔子末沸湯點服解之久服亦自不燥矣胸中痰癖頭痛不欲食礬石一兩水二升煮一升納蜜半合頻服須臾大吐未吐飲少熱湯引之外臺秘要痰氣結胸不問陰陽虛實妙過陷胸瀉心等藥用銀硃半兩明礬一兩同煨以熨斗盛火瓦盞盛藥熔化急刮搓丸每服一錢真茶入薑汁少許服之心上隱隱有聲結胸自散不動臟腑不傷真氣明礬化痰銀硃破積故也名鶴頂丹活幼全書胸中痰結不散皂莢三十挺去皮切水五升浸一夜挼取汁慢熬至可丸丸如梧子大每食後鹽漿水下十丸又方用半夏醋煮過以皂莢膏和勻入明礬少許以柿餅搗膏丸如彈子大噙之名釣痰膏聖惠方又密陀僧一兩醋水各一盞煎乾為末每服二錢以酒水各一小盞煎一盞溫服少頃當吐出痰涎為妙聖惠方痰血結胸用五靈脂水飛半夏湯炮等分為末薑汁浸蒸餅丸梧子大每飲下二十丸名紫芝丸百一選方上焦痰熱藕汁梨汁各半盞和服簡便方陰虛火動有痰不堪用燥劑者天門冬一斤水浸洗去心取肉十二兩石臼搗爛五味子水洗去核取肉四兩曬乾不見火共搗丸梧子大每服二十丸茶下日三服簡便方中焦痰涎利咽清頭目進飲食半夏泡七次四兩枯礬一兩為末薑汁打糊或煮棗肉為丸梧子大每薑湯下十五丸寒痰加丁香五錢熱痰加寒水石煅四兩名玉液丸和劑局方食積痰火瀉肺火胃火白石膏火煅出火毒半斤為末醋糊丸梧子大每服四五十丸白湯下丹溪方又貓兒刺葉煮飲治痰火甚效兼能散風毒治惡瘡自記暖胃除痰快氣進食肉豆蔻二個半夏薑汁炒五錢木香二錢半為末蒸餅丸芥子大每食後津液下五丸十丸普濟方開胃化痰令思飲食不拘大人小兒人參焙二兩半夏薑汁浸焙五錢為末飛羅面作糊丸綠豆大食後薑湯下三五十丸日三服聖惠方加陳橘皮五錢經驗方化痰降氣止咳解鬱消食除脹有奇效用貝母去心一兩薑製厚朴半兩蜜丸梧子大每白湯下五十丸華峰方清氣化痰三仙丸治中脘氣滯痰涎煩悶頭目不清生南星去皮半夏各五兩並湯泡七次為末自然薑汁和作餅鋪竹篩內以楮葉包覆待生黃成曲曬乾每用二兩入香附末一兩糊丸梧子大每薑湯下四十丸食後服百一選方又百藥煎細茶各一兩荊芥穗五錢海螵蛸一錢蜜丸芡子大每服噙一丸妙筆峰雜興風痰虛痰在胸膈使人癲狂痰在經絡四肢及皮裡膜外非竹瀝薑汁不達不行大抵因風火燥熱而有痰者宜之若寒濕胃虛腸滑之人服之則反傷腸胃咳嗽痰飲咳嗽用真蚌粉新瓦炒紅入青黛少許用淡齏水滴麻油數點調服二錢此宋徽宗時內醫官李進藥治寵妃病痰嗽終夕不寐面浮如盤並用三服即夕嗽止得睡比曉面消賜金帛萬緡者也又用曹州葶藶子一兩紙襯炒令黑知母一兩貝母一兩為末棗肉半兩砂糖一兩半和丸彈子大每以新綿裹一丸含之咽津甚者不過三丸名含奇丸篋中方痰喘咳嗽長皂莢三條去皮子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十粒用薑汁製杏仁麻油制巴豆蜜製半夏一處火炙黃色為末每用一字安手心臨臥以薑汁調之吃下神效選奇方又五味子白礬等分為末每服三錢以生豬肺炙熟蘸末細嚼白湯下漢陽一人病此百藥不效於岳陽遇道人傳服病遂不發普濟方又桔梗一兩半為末用童子小便半升煎四合去滓溫服濟眾方痰喘咳嗽不能睡臥好末茶一兩白殭蠶一兩為末放碗內蓋定傾沸湯一小盞臨臥再添湯點服又治酒後咳嗽白殭蠶焙研末每茶服一錢瑞竹堂方哮喘痰嗽用白果二十一個炒黃麻黃三錢蘇子二錢款冬花法制半夏桑白皮蜜炙各二錢杏仁去皮尖黃芩微炒各一錢半甘草一錢水三鍾煎二鍾隨時分作二服不用姜攝生方又苧根煅存性為末生豆腐蘸三五錢食即效未愈可以肥豬肉二三片蘸食甚妙醫學正傳咳嗽上氣用合州乾薑炮皂莢炮去皮子及蛀者桂心紫色者去皮並搗篩等分煉白蜜和搗三千杵丸梧子大每飲服三丸嗽發即服日三五服禁食蔥面油膩其效如神凡人患嗽多進冷藥獨此方用熱未必肯服然累試多效傳信方又蕎麥粉四兩茶末二錢生蜜二兩水一碗順手攪千下飲之良久下氣不止即愈儒門事親咳嗽有痰熟瓜蔞十個明礬二兩搗和餅陰乾研末糊丸梧子大每薑湯下五七十丸醫方摘要乾咳無痰熟瓜蔞搗爛絞汁入蜜等分加明礬一錢熬膏頻含咽汁簡便方老小咳嗽玄胡索一兩枯礬二錢半為末每服二錢軟餳一塊和含之仁存堂方咳嗽失聲白果仁四兩白茯苓桑白皮各二兩烏豆半升沙蜜半斤煮熟日乾為末以乳汁半碗拌濕九蒸九曬丸如綠豆大每服三五十丸白湯下神效余居士方咳嗽寒熱旦夕加重少喜多嗔面色不潤忽進忽退積漸少食脈弦緊者杏仁半斤去皮尖童子小便浸七日漉出溫水淘洗砂盆內研如泥以小便三升煎如膏每服一錢熟水下婦人室女服之尤妙千金方定嗽化痰百藥煎片黃芩橘紅甘草各等分共為細末蒸餅丸綠豆大時時乾嚥數丸佳瀕湖醫案又用明礬末醋糊丸梧子大每睡時茶下二三十丸定西侯方又方用明礬半生半燒山梔子炒黑等分為末薑汁糊為丸如上服摘要方又以胡桃肉三顆生薑三片臥時嚼服即飲湯兩三呷又再嚼桃姜如前數即靜臥必愈洪邁方清痰利膈治痰嗽用肥大瓜蔞洗取子切焙半夏四十九個湯洗十次捶焙等分為末用洗瓜蔞水並瓤同熬成膏和丸梧子大每薑湯下三五十丸良楊文蔚方斂肺劫嗽百藥煎訶黎勒荊芥穗等分為末薑汁入蜜和丸芡子大時時噙之丹溪心法肺氣咳嗽豬胰一具苦酒煮食不過二服肘後方肺燥咳嗽用松子仁一兩胡桃仁二兩研膏和熟蜜半兩收之每服二錢食後沸湯點服外臺方肺熱咳嗽沙參半兩水煎服之易簡方上焦熱痰咳嗽制過半夏一兩片黃芩末二錢薑汁打糊丸梧子大每服七十丸淡薑湯食後服袖珍肺熱嗽有痰製半夏瓜蔞仁各一兩為末薑汁打糊丸梧子大每服二三十丸白湯下或以瓜蔞瓤煮熟丸濟生方治肺氣熱盛咳嗽而喘面腫身熱桑白皮炒一兩地骨皮焙一兩甘草炒五錢每服一二錢入粳米百粒水煎食後溫服桑白皮地骨皮皆能瀉火從小便去甘草瀉火而緩中粳米清肺而養血此乃瀉肺諸方之準繩也名瀉白散錢乙方肺臟壅熱煩悶咳嗽煮新百合四兩蜜和蒸軟時時含一片吞津聖惠方肺熱痰咳胸膈塞滿用瓜蔞仁貝母各一兩薑汁打麵糊丸梧子大每五十丸食後薑湯下濟生方熱咳咽痛燈籠草為末白湯服名清心丸仍以醋調敷喉外丹溪方療肺虛咳嗽以豬肺一具竹刀切片麻油炒熟同粥食又治肺虛嗽血煮蘸薏苡仁末食之要訣又立效丸治肺虛膈熱咳嗽氣急煩滿咽乾燥渴欲飲冷水體倦肌瘦發熱減食喉音嘶不出黃臘熔濾令淨漿水煮過八兩再化作一百二十丸以蛤粉四兩為衣養藥每服一丸胡桃半個細嚼溫水下即臥閉口不語日二普濟方酒痰咳嗽用此救肺瓜蔞仁青黛等分研末薑汁蜜丸芡子大每噙一丸丹溪心法痰嗽帶血青州大柿餅飯上蒸熟批開每用一枚摻真青黛一錢臥時食之薄荷湯下丹溪方心虛嗽血沉香末一錢半夏七枚入豬心中以小便濕紙包煨熟去半夏食之證治要訣冷氣咳嗽結脹者乾薑末熱酒調服半錢或餳糖丸噙姚僧坦方一切勞嗽胸膈痞滿用鵝管石雄黃佛耳草款冬花等分為末每用一錢安香爐上焚之以筒吸菸入喉中一日二次名焚香透膈散宣明方久勞咳嗽吐臭痰者尋水邊蛇吞青蛙未咽者連蛇打死黃泥固濟煅研空心酒服一二錢至效忌生冷五七日永不發也秘韞凡老人苦於痰氣喘嗽胸滿懶食不可妄投燥利之藥反耗真氣用三子養親湯治之隨試隨效蓋白芥子主痰下氣寬中紫蘇子主氣定喘止嗽蘿蔔子主食開痞降氣各微炒研破看所主為君每劑不過三四錢用生絹袋盛入煮湯飲之勿煎太過則味苦辣若大便素實者入蜜一匙冬月加姜一片尤良醫通老人喘嗽氣促睡臥不得服此立定胡桃肉去皮杏仁去皮尖生薑各一兩研膏入煉蜜少許和丸彈子大每臥時嚼一丸薑湯下普濟方咳嗽不止生薑五兩餳半升火煎熟食盡愈必效方又南向柔桑條一束每條寸折納鍋中以水五碗煎至一碗盛瓦器中渴即飲之服一月而愈養疴漫筆又馬勃為末蜜丸梧子大每服二十丸白湯下即愈普濟方又用五味子五錢甘草一錢半五倍子風化硝各二錢為末干噙丹溪方又紫菀款冬花各一兩百部半兩搗羅為末每服三錢姜三片烏梅一個煎湯調下日二服甚佳圖經本草又烏梅肉微炒罌粟殼去筋膜蜜炒等分為末每服二錢睡時蜜湯調下千金方又故茅屋上塵年久著煙火者和石黃款冬花婦人月經衣帶為末水和塗茅上待乾入竹筒中燒煙吸咽無不瘥也陳藏器本草痰咳不止瓜蔞仁一兩文蛤七分為末以薑汁澄濃腳丸彈子大噙之摘玄方久嗽經年阿膠炒人參各二兩為末每用三錢豉湯一盞入蔥白少許煎服日三次聖濟總錄熱咳不止用濃茶湯一鍾蜜一鍾大熟瓜蔞一個去皮將瓤入茶蜜湯洗去子以碗盛於飯上蒸至飯熟取出時時挑三四匙咽之摘玄方積年咳嗽牙呷作聲用鱟魚殼半兩貝母煨一兩桔梗一分牙皂一分去皮酥炙為末煉蜜丸彈子大每含一丸咽汁服三丸即吐出惡涎而瘥聖惠方久咳氣急雞卵白衣同麻黃紫菀服立效別錄肺熱久嗽一婦人患此身如火炙肌瘦將成勞以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半如常治訖為末蜜丸櫻桃大食後夜臥各含化一丸未終劑而愈矣衍義方氣嗽日久生訶黎勒一枚含之咽汁瘥後口爽不知食味卻煎檳榔湯一碗服立便有味經驗方又蘇頌方痰嗽咽喉不利含訶子三枚殊勝經年氣嗽橘皮神麯生薑焙乾等分為末蒸餅和丸梧子大每服三五十丸食後夜臥各一服有人患此服之兼舊患膀胱氣皆愈也衍義方久嗽上氣十年二十年諸藥不效用蝙蝠除翅足燒焦研末米飲服之百一選方咳嗽上氣積年垂死用莨菪子炒熟羊肺切曝等分為末以七月七日醋拌每夜服二方寸匕粥飲下隔日一服千金方二十年嗽豬胰三具大棗百枚酒五升漬之秋冬七日春夏五日絞去滓七日服盡忌鹽三十年嗽百部根二十斤搗取汁煎如飲服方寸匕日三服深師加蜜二斤外臺加飴一斤千金方久嗽唾血白前桔梗桑白皮三兩炒甘草一兩炙水六升煮一升分三服忌豬肉菘菜外臺秘要冷痰咳嗽療久咳薰法每旦取款冬花如雞子許少蜜拌花使潤納一升鐵鍋中又用一瓦碗鑽一孔孔內安一小筆管以面泥縫勿令漏氣鐺下著炭火少時煙從筒出以口含吸咽之如胸中少悶須舉頭即將指頭按住筒口勿使漏至煙盡乃止如是五日一為之待至六日飽食羊肉餺飥一頓永瘥崔知悌方久嗽暴嗽用葉子雌黃一兩研以紙筋泥固濟小盒子一個令乾盛藥水調赤石脂封口更以泥封待乾架在地上炭火十斤簇煅候火消三分之一去火候冷取出當如鏡面光明紅色缽內細研蒸餅丸粟米大每服三丸五丸甘草水服服後睡良久名金粟丸勝金方久遠咳嗽晝夜無時用佛耳草五十文款冬花二百文熟地黃二兩焙研末每用二錢於爐中燒之以筒吸菸嚥下有涎吐去不過兩服愈名三奇散經驗方治痰嗽涎喘不問年深日遠用經霜蓖麻葉經霜桑葉御米殼蜜炒各一兩為末蜜丸彈子大每服一丸白湯下日一服名無憂丸卒得咳嗽用好梨去核搗汁一碗入椒四十粒煎一沸去滓納黑餳一大兩消訖細細含咽立定海上方又方用梨一顆刺五十孔每孔納椒一粒麵裹灰火煨熟停冷去椒食之又方去核納酥蜜麵裹燒熟冷食又方搗汁一升入酥蜜各一兩地黃汁一升煎成含咽凡治嗽須喘急定時冷食之若熱時反傷肺令嗽更劇不可救也卒得咳嗽有痰芫花一升水三升煮汁一升以棗十四枚煮汁干日食五枚必愈肘後方張文仲備急方用芫花一兩炒水一升煮四沸去滓入白糖半斤每服棗許勿食酸鹹物卒嗽不止用白蜆殼搗為細末以熟米飲調每服一錢日三服甚效亦治痰喘嗽急救奇方骨蒸咳嗽用團魚一個柴胡前胡貝母知母杏仁各五錢同煮待熟去骨甲裙再煮食肉飲汁將藥焙研為末仍以骨甲裙煮汁和丸梧子大每空心黃耆湯下三十丸日二服服盡仍以參耆藥調之奇效方久嗽肺痿作燥用羊肺一具洗淨以杏仁柿霜真豆粉真酥各一兩白蜜二兩和勻灌肺中白水煮食之葛可久方肺痿骨蒸煉羊脂煉羊髓各五兩煎沸下煉蜜及生地黃汁各五合生薑汁一合不住手攪微火熬成膏每日空心溫酒調服一匙或入粥食飲膳正要肺痿骨蒸不能食者蘆根麥門冬地骨皮生薑各十兩橘皮茯苓各五兩水二斗煮八升去滓分五服取汗乃瘥外臺方咳嗽肺痿大人小兒咳逆短氣胸中吸吸咳出涕吐嗽出臭膿用淡竹瀝一合服之日三五次以愈為度兵部手集肺痿吐涎沫頭眩小便數而不咳者肺中冷也甘草乾薑湯溫之甘草炙四兩乾薑炮二兩水三升煮一升五合分服金匱要略肺痿咳血蘿蔔和羊肉或鯽魚煮熟頻食普濟方肺痿咳嗽吐涎沫心中溫溫咽燥而不渴生天門冬搗汁一斗酒一斗飴一升紫菀四合銅器煎至可丸杏仁大每服一丸日三服肘後方肺癰久嗽不愈肺積虛熱成癰咳出膿血曉夕不止喉中氣塞胸膈咽痛用蛤蚧阿膠鹿角膠生犀角羚羊角各二錢半用河水三升銀石器內文火熬至半升濾汁時時仰臥細呷日一服肺癰非魚腥草不治日用甜白酒漿燉熟食此物生臭熟則不臭即蕺菜也自記肺癰綠橘葉洗搗絞汁一盞服之吐出膿血即愈經驗良方肺癰咳唾膿血腥臭不問膿成未成用柘黃一兩研末同百草霜二錢糊丸梧子大米飲下三十丸效甚捷時珍方肺癰咳唾心胸甲錯者以淳苦酒煮薏苡仁令濃微溫頓服肺有血當吐出愈範汪方肺癰唾濁心胸甲錯取夜合皮一掌大水三升煮取一半分二服獨行方肺痿咳血不止用瓜蔞二十個連瓤焙烏梅肉五十個焙杏仁去皮尖炒二十一個為末每用一捻以豬肺一片切薄摻末入內炙熟冷嚼咽之日三服聖濟總錄喘痰喘氣急瓜蔞二個明礬一棗大同燒存性研末以熟蘿蔔蘸食藥盡病除普濟方又生山藥搗爛半碗入甘蔗汁半碗和勻燉熟飲之立止簡便方又梨剜空納小黑豆令滿留蓋合住扎定糠火煨熟搗作餅每日食之至效摘玄方又蘿蔔子炒皂莢燒存性等分為末薑汁和煉蜜丸梧子大每服五七十丸白湯下簡便方上氣喘急故錦一寸燒灰茶服神效普濟方久患肺氣喘息至效甚者不過二劑永瘥杏仁去皮尖一兩童子小便浸一日一換夏月三四換滿半月取出焙乾研細每服一棗大薄荷一葉蜜一雞子大水一鍾煎七分食後溫服忌腥物勝金方治七情鬱結上氣喘急用四磨湯者降中兼升瀉中帶補也其方以人參烏藥沉香檳榔各磨汁七分合煎細細嚥之濟生方肺壅喘急不得臥葶藶炒黃搗末蜜丸彈子大每用大棗二十枚水三升煎取二升乃入葶藶一丸更煎取一升頓服亦主支飲不得息名葶藶大棗瀉肺湯玉函方肺熱氣喘生茅根一握㕮咀水二盞煎一盞食後溫服甚者三服止名如神湯聖惠方肺虛喘急連綿不息生鍾乳粉光明者五錢蠟三兩化和飯甑內蒸熟研丸梧子大每溫水下一丸聖濟錄陽虛氣喘自汗盜汗氣短頭暈人參五錢熟附子一兩分作四貼每貼以生薑十片流水兩盞煎一盞食遠溫服濟生方寒痰氣喘青橘皮一片展開入剛子一個麻扎定火上燒存性研末薑汁和酒一鍾呷服醫說寒痰齁喘野園荽研汁和酒服即住集簡方定喘化痰用豬蹄甲四十九個洗淨每甲納半夏白礬各一字罐盛固濟煅赤為末入麝香一錢匕每用糯米飲下半錢經驗方痰齁發喘貓頭骨燒灰酒服三錢便止醫學正傳齁喘痰促遇厚味即發者蘿蔔子淘淨蒸熟曬研薑汁浸蒸餅為丸綠豆大每服三十丸以口津嚥下日三服名清金丸醫學集成年深哮喘雞子略敲損浸尿缸中三四日煮食能去風痰醫學集成嘔吐痰飲嘔吐每食飽或陰晴節變卒發頭疼背寒嘔吐酸汁即數日伏枕不食服藥罔效用吳茱萸湯泡七次茯苓等分為末煉蜜丸梧子大每熱水下五十丸遂不再作集驗方停痰宿飲喘咳嘔逆全不入食威靈仙焙半夏薑汁浸焙為末用皂角水熬膏丸綠豆大每服七丸至十丸薑湯下一日三服一月為驗忌茶麵痰壅嘔逆心胸滿悶不下飲食厚朴一兩薑汁炙黃為末非時米湯調下二錢匕聖惠方吐逆不止不拘男女連日粥飲湯藥不能下者五靈脂治淨為末狗膽汁和丸彈子大每服一丸煎生薑酒磨化猛口熱吞不得漱口急將溫粥少許壓之經驗方本事方同此治遠年近日反胃嘔逆不止麻仁杵熬水研取汁著少鹽吃立效外臺秘要又用北黃丹四兩米醋半升煎乾炭火三秤就銚內煅紅冷定為末粟米飯丸梧子大每服七丸醋湯下名碧霞丹集驗方嘔吐不止服玉壺丸不效用藍汁入口即定時珍方上氣嘔吐芥子末蜜丸梧子大井花水寅時下七丸申時再服亦治臍下絞痛千金方治天行嘔吐不止兔頭骨連皮毛燒存性米飲服方寸匕以瘥為度必效方卒噎不止香蘇濃煮頓服三升良千金方食入即吐用人參一兩半夏一兩五錢生薑十片水一斗一勺揚二百四十遍取三升入白米三合煮一升半分服金匱方食後喜嘔鹿角燒末二兩人參一兩為末薑湯服方寸匕日三肘後方胃熱吐食清膈散用蟬蛻五十個去泥滑石一兩為末每服二錢水一盞入蜜調服家寶方乾嘔不息葛根搗汁服一升瘥肘後方治忽然噁心嘔清水逡巡即瘥含高良薑成塊者咽津若口臭者同草豆蔻為末煎飲蘇頌口吐清水干蘄艾煎湯啜之奇方胃虛噁心或嘔吐有痰人參一兩水二盞煎一盞入竹瀝一杯薑汁三匙食遠溫服以知為度老人尤宜簡便方胃寒嘔惡不能腐熟水穀食即嘔吐人參丁香藿香各二錢半橘皮五錢生薑三片水二盞煎一盞溫服拔萃方嘔噦不止厥逆者蘆根三斤切水煮濃汁頻飲二升必效若以童子小便煮服不過三升愈肘後方中酒嘔逆赤小豆煮汁時時飲之食鑑本草口渴吐酒橘穰上筋膜炒熟煎湯甚效大明方人忽噁心多嚼白豆蔻最佳肘後方嘔吐痰水白檳榔一顆烘熱橘皮二錢半炙為末水一盞煎半盞溫服千金方
