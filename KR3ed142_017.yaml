body:
  text: 卷十七外科惡瘡一切惡瘡蟾酥一錢白麵二錢硃砂少許井華水調成小錠子如麥大每用一錠井華水服如瘡勢緊急五七錠蔥湯服亦可汗出即愈諸瘡腫毒牛蒡根三莖洗煮爛搗汁入米煮粥食一碗甚良普濟方惡瘡毒腫迎春花陰乾研末酒服三錢出汗便愈易簡方又方地松搗汁日服三四次外臺祕要火赫毒瘡患此急防毒氣入腹枸杞葉搗汁服立瘥肘後方肺熱生瘡遍身皆是用苦參末粟米飯丸梧子大每服五十丸空心米飲下御藥院方肺毒風瘡狀如大風用好桑葉淨洗蒸熟一宿日乾為末水調二錢匕服名緑雲散經驗方遍身生瘡陰囊兩腳尤甚者草烏一兩鹽一兩水化浸一夜炒赤為末豬腰子一具去膜煨熟竹刀切搗醋糊丸緑豆大每服三十丸空心鹽湯下身上有小熱瘡年久不愈者但多食野鴨即瘥孟詵惡瘡癰腫軟癤未潰者以酒煮茅針服一孔一針二孔二針瘡氣嘔吐緑豆粉三錢干胭脂半錢研勻新汲水調下一服立止普濟方癩風蟲瘡干蝦蟆一兩炙長肥皂一條去皮子蘸酒再炙為末以竹管引入羊腸內系定以麩鋪甑內置藥麩上蒸熟入麝香半錢去麩同搗為丸如梧子大每溫酒服二十一丸直指方惡瘡癩疾但是惡疾遍體面目有瘡者皆可服之用白艾蒿十束如升大煮取汁以曲及米一如釀酒法候熟稍稍飲之梅師方惡疾風瘡狼毒秦艽等分為末每服方寸匕溫酒下日一二服千金方一切風瘡頑癬疥癩年久不愈者不過二三服必愈用黑火柴頭魚一個即烏鱧也去腸肚以蒼耳葉填滿外以蒼耳安鍋底置魚於上少少著水慢火煨熟去骨皮淡食勿入鹽醬功效甚大醫林集要項邊馬刀屬少陽經用連翹二斤瞿麥一斤大黃三兩甘草半兩每用一兩以水一碗半煎七分食後熱服十餘日後灸臨泣穴二七壯六十日決效對口惡瘡野苦蕒擂汁一鍾入薑汁一匙和酒服以渣敷一二次即愈唐瑤經驗方又貓頭骨燒存性研每服三五錢酒下吳球便民食療又熱雞血頻塗之取散皆效方對口毒瘡已潰出膿取韭地蚯蚓搗細涼水調敷日換三四次扶壽精方癰疽惡瘡楊梅諸瘡水銀一兩硃砂雄黃各二錢半白礬緑礬各二錢半碾勻罐盛燈盞蓋定鹽泥固濟文武火煉升罐口收每以三錢入乳香沒藥各五分灑太乙膏上貼之絶效名五寶霜毒瘡腫痛號叫臥眠不得取獨頭蒜兩顆搗爛麻油和厚敷瘡上干即易之屢用救人無不神效曾有患肩上瘡連心痛悶又有患腦癰久不瘥用此並愈癘瘡遍身以浮萍濃煮汁浴半日多效此方甚奇蘇頌惡瘡似癩十年者地黃葉搗爛日塗鹽湯先洗千金方腳肚風瘡如癩桐油人乳等分掃之數次即愈集簡方人面惡瘡多生膊上狀如人面有口能食食多則膊內肉脹起或不食則一臂痹焉歷試諸藥無效惟貝母為末以小葦筒毀其口灌之數日成痂遂愈江左商人患此驗過李時珍記附骨壞瘡久不瘥膿汁不已或骨從瘡孔中出用大蝦蟆一個亂頭髮一雞子大豬油四兩煎枯去滓待凝如膏先以桑根皮烏頭煎湯洗拭乾煅龍骨末摻四邊以前膏貼之錦囊祕覽頭瘡生蛆頭皮內時有蛆出以刀切破擠絲瓜葉汁擦之蛆出盡絶根小山怪症方貓眼睛瘡身面生瘡似貓兒眼有光彩無膿但痛癢不常飲食減少名曰寒瘡多吃雞魚蔥韭自愈夏氏奇方𤸔瘡如眼上高下深顆顆纍垂如瞽眼其中帶青頭上各露一舌毒孔透里者是也用生井蛙皮燒存性為末蜜水調敷之直指方瘡似蜂窠愈而復發胡粉硃砂等分為末蜜和塗之聖濟蛇纏瘡毒水缸底蚯蚓一條連泥搗敷即愈又雄黃末醋調敷之普濟方又方用鏡面草入鹽杵爛敷之妙一切惡瘡用白膠香瀝青各一兩以麻油黃蠟各二錢半同熔化入冷水中扯千遍攤貼之名水沉金絲膏儒門事親又燕窠內外泥糞研細油調搽一加黃柏末瑞竹堂方又巴豆三十粒麻油煎黑去豆以油調硫黃輕粉末頻塗取效普濟方又水銀黃連胡粉熬黃各一兩研勻敷之干則以唾調肘後又紫花地丁日乾以罐盛燒煙對瘡熏之出黃水取盡愈衛生易簡方又用鰻魚骨炙為末入諸色膏藥中貼之外以紙護之經驗方一雲母粉敷之千金方無名惡瘡梁上倒掛塵二條韭地蚯蚓泥少許生蜜和捻作餅如錢大陰乾用蜜水調頻敷之楊起簡便方卒得惡瘡人不識者牛膝根搗敷之千金方又柳葉或皮煮汁入鹽頻洗之亦治面上惡瘡肘後惡瘡不愈左纏藤即忍冬藤一把搗爛入雄黃五分水二升瓦罐煎之以紙封七重穿一孔待氣出以瘡對孔熏之三時久大出黃水後用生肌藥取效選奇方又狗頭骨灰同黃丹末等分敷之壽域方惡瘡久不瘥煎三家洗碗水令沸入鹽洗之不過三五度藏器方多年惡瘡天茄葉貼之或為末貼救急良方又蒲公英搗爛貼救急方多年惡瘡或痛癢生釁用馬糞並齒同研爛敷上不過數次瘥兵部手集多年惡瘡百方不瘥或焮痛不已者並搗爛馬齒莧敷上不過三二遍便瘥李絳兵部手集惡瘡癬癩十年不瘥者苦瓠一枚煮汁搽之日三度肘後又蟾蜍燒灰敷一切有蟲惡癢滋胤瘡效藥性惡瘡有蟲久不愈者以柏枝節燒瀝取油敷之三五次無不愈亦治牛馬疥陳承本草別說積年惡瘡反花瘡漏瘡不瘥者牛蒡根搗和臘月豬脂日日封之瘡久不瘥積年痛癢難堪者馬齒莧搗爛封之煎稠敷亦可千金方諸惡瘡腫胻瘡潰爛久者以水煮女貞葉乘熱貼之頻頻換易米醋煮亦可口舌生瘡舌腫脹出搗女貞葉汁含浸吐涎時珍諸般毒瘡切蒜蘸門臼塵擦手足心至出汗即消時珍方一切諸瘡五倍子黃柏等分為末敷之普濟方蛇皮惡瘡鐵漿頻塗之談野翁方諸般瘡毒臁瘡金瘡湯火等瘡用黃蠟一兩香油三兩黃丹半兩同化開螟冷瓶收攤貼王仲勉經驗方瘡腫初起澤蘭搗封之良集簡方諸瘡腫痛杏仁去皮研濾取膏入輕粉麻油調搽神效不拘大人小兒鮑氏方諸瘡腫痛不可忍者葵花根去黑皮搗爛入井華水調稠貼之普濟方又用家鴨糞同雞子清調敷即消聖惠方惡瘡疼痛楓香膩粉等分為末漿水洗淨貼之壽親養老書惡瘡痂癢作痛以扁豆搗封痂落即愈肘後方又方以扁竹搗封痂落即瘥積年諸瘡蜘蛛膜貼之數易千金方日久頑瘡不收者銀硃一錢千年地下石灰五分松香五錢香油一兩為末化攤紙上貼之應急良方頑瘡瘻瘡膿水淋漓斂諸瘡口用古墓中石灰棺下者尤佳時珍方熱毒濕瘡有人遍身生瘡痛而不癢手足尤甚黏著衣被曉夕不得睡有人教以菖蒲三斗日乾為末布席上臥之仍以衣被覆之既不黏衣又復得睡不五七日其瘡如失後以治人應手神驗衍義本草走皮濕瘡滿頰滿項浸淫濕爛延及兩耳癢而出水發歇不定田野名悲羊瘡用凌霄花並葉煎湯日日洗之楊仁齊直指方風熱毒瘡臍下腹上下連二陰遍生濕瘡他處並無癢而痛大小便澀出黃汁食亦減身面微腫醫作惡瘡治熱痛甚問其人嗜酒食喜魚蟹發風等物急令以馬齒莧四兩杵爛入青黛一兩再研勻塗之即時熱減痛癢皆去仍以八正散日三服之分散客熱藥干即上如此二日減三分之一五日減三分之二二十日愈此蓋中下焦蓄風熱毒氣也若不出當作腸癰內痔仍須禁酒色發風物不禁後必重患內痔宗奭方頭瘡熱瘡風濕諸毒五倍子白芷等分研末摻之膿水即干如干者以清油調塗易簡方治風邪客於肌中渾身搔癢致瘡疥及脾肺風毒攻衝生瘡乾溼日久不瘥用剪刀草七兩不見火輕粉一錢為末摻之乾者麻油調搽名滑肌散和劑局方捲毛毒瘡生頭中初生如蒲桃痛甚黃柏一兩乳香二錢半為末槐花煎水調作餅貼於瘡口普濟方天柱毒瘡生脊大椎上大如錢赤色出水驢蹄二片胡粉熬一分麝香少許為末醋和塗之干則摻之聖惠方玉枕生瘡生枕骨上如癰破後如箸頭用原蠶蛾炒石葦等分為末干貼取瘥聖濟總録面上毒瘡初起者急尋水蜒蚰一二條用醬少許共搗塗紙上貼之即退紙上留一小孔出氣此乃凌漢章祕傳極效方也談野翁試驗面上惡瘡五色者鹽湯浸帛拓瘡上五六度即瘥藥性論香瓣瘡生面上耳邊浸淫出水久不愈用羖羊須荊芥干棗肉各二錢燒存性入輕粉半錢每洗拭清油調搽二三次必愈亦治口吻瘡繞指毒瘡生手足指上以活田螺一枚生用搗碎縛之即瘥多能鄙事火帶瘡繞腰生者採剪春羅花或葉搗爛蜜調塗之為末亦可證治要訣魚臍瘡腫黑狀狹而長一因風毒蘊結二因氣血凝滯三因誤食人汗而生用臘豬頭燒灰雞卵白調敷日數易即愈名醫録窩瘡鯽魚批片貼之或同桃葉搗敷殺其蟲時珍卒得窩瘡常時生兩腳間用白犬血塗之立愈肘後方瘡中生蛆緑礬末摻貼即化為水摘玄方月蝕疳瘡虎頭骨二兩搗碎豬脂一斤熬膏塗之神效方月蝕瘡繞耳根以雞膽日三塗之孟詵又以救月杖燒為灰油和敷之藏器乃治䘌神藥金腮瘡蝕初生如米豆久則穿蝕用雞內金焙鬱金等分為末鹽漿漱了貼之忌米食聖濟總録黃水瘡芋苗曬乾燒存性研搽邵真人經驗方黃水膿瘡官粉煅黃松香各三錢黃丹一錢飛礬二錢為末香油二兩熬膏敷之邵真人方一方槿樹子燒存性豬骨髓調塗之時珍濕毒脛瘡野園荽夏月採取曬收為末每以五錢汞粉五分桐油調作隔紙膏周圍縫定以茶洗淨縛上膏藥黃水出五六日愈此吳竹卿方也簡便方有人患腳瘡冬月頓然無事夏月臭爛痛不可言此因行草間惹蛇交遺瀝瘡中有蛇兒冬伏夏出故也以生蝦蟆搗敷之日三即換凡三日一小蛇自瘡中出以鐵箝取之其病遂愈蘇頌方琅琊女子右股病瘡癢而不痛愈而復作華他取稻糠色犬一隻繫馬走五十里乃斷頭向癢處合之須臾一蛇在皮中動以鉤引出長三尺許七日而愈此亦怪證取狗之血腥以引其蟲耳華他別傳婦人足瘡經年不愈名裙風瘡用男子頭垢桐油調作隔紙膏貼之簡便方女人趾瘡甲內惡肉突出不愈蜈蚣一條焙研敷之外以南星末醋和敷四圍醫方摘要足瘡生蟲南方地卑濕人多患足瘡歲久生蟲如蛭乃風毒攻注而然用牛或羊或豬肚去糞不洗研如泥看瘡大小入煅過泥礬半兩以上研勻塗帛上貼之須臾癢入心徐徐連帛取下火上炙之蟲出如絲髮馬尾千萬或青白赤黑以湯洗之三日一次不過數次蟲盡瘡愈南宮從岣嶁神書瘡中惡肉寒食麵二兩巴豆五分水和作餅燒末摻之仙傳外科諸瘡惡肉胬肉用烏梅肉燒存性研敷一夜立盡聖惠方瘡瘍刺骨草血竭即地錦草搗罨之自出本草權度露雨觸瘡凡秋露春雨著草人素有瘡及破傷者觸犯之瘡頓不癢痛若中風及毒水身必反張似角弓之狀急以鹽豉和麵作碗子於瘡上灸百壯出惡水數升乃知痛癢而瘥也藏器瘡犯惡露甚者殺人薤白搗爛以帛裹煨熱去帛敷之冷即易換亦可搗作餅以艾灸之熱氣入瘡水出即瘥也梅師方冷露瘡爛藿香葉細茶等分燒灰油調塗葉上貼之應驗下部蟲䘌梅葉桃葉一斤杵爛蒸及熱納小器中隔布坐蒸之蟲盡死也外臺臀生濕瘡日以新磚坐之能去濕氣集玄方坐板瘡疥生芝麻嚼敷之筆峰雜興又絲瓜皮焙乾為末燒酒調搽之攝生衆妙方岐毒初起芭蕉葉尉斗內燒存性入輕粉麻油調塗一日三上或消或破皆無痕也仁齊直指方漆瘡作癢油調貫衆末塗之千金方反花瘡反花瘡毒初生惡肉如米粒破之血出肉隨生反出於外用鵓鴿屎三兩炒黃為末溫漿水洗後敷之聖惠方反花惡瘡肉出如飯粒根深膿潰柳枝葉三斤水五升煎汁二升熬如餳日三塗之聖惠方反花惡瘡惡肉反出如花藜蘆末豬脂和敷日三五上聖濟總録又鯽魚一個去腸以羯羊屎填滿燒存性先以米泔洗過搽之人馬反花瘡刮取鬼屎生陰濕地如菜亦如地錢黃白色和油塗之藏器方赤白癜風紫白癜風桑枝十斤益母草三斤水五斗慢煮至五斤去滓再煎成膏每臥時溫酒調服半合以愈為度聖惠方又烏蛇肉炙六兩枳殼麩炒牛膝天麻各三兩熟地黃四兩白蒺藜五加皮防風桂心各二兩銼片以絹袋盛無灰酒二斗中浸之密封七日每溫服一小盞忌雞鵝魚肉發物聖惠方又豬胰一具酒浸一時飯上蒸熟食不過十具壽域方治癜風用茄蒂蘸硫附末摻之取其散血也白癜用白茄蒂紫癜用紫茄蒂亦各從其類耳時珍方白癜風疾白蒺藜子六兩生搗為末每湯服二錢日二服一月絶根服至半月白處見紅點神效孫真人食忌又貓兒刺枝葉燒灰瀝汁或煎膏塗藏器又韭葉上露旦旦塗之時珍白癜駁風桑柴炭灰二斗甑內蒸之取釜內熱湯洗不過五六度瘥聖惠方白駁風生頭面上浸淫漸長似癬者刮令燥痛炙鰻鱺魚油熱搽之不過三度即瘥集驗方鼻面紫風乃風熱上攻陽明經絡亦治刺癮疹舶上硫黃白礬枯等分為末每以黃丹少許以津液和塗之一月見效宣明方汗斑癜風羊蹄根二兩獨科掃帚頭一兩枯礬五錢輕粉一錢生薑半兩同杵如泥以湯澡浴用手抓患處起粗皮以皮包藥著力擦之暖臥取汗即愈乃鹽山劉氏方比用硫黃者更妙藺氏經驗方又端午日收紫背浮萍曬乾每以四兩煎水浴並以萍擦之或入漢防己二錢亦可袖珍方鵝掌風病蘄艾真者四五兩水四五碗煮五六滾入大口瓶內盛之用麻布二層縛之將手心放瓶上熏之如冷再熱如神陸氏積德堂方又方鴿屎白雄雞屎炒研煎水日洗白遊風腫螺螄肉入鹽少許搗泥貼之神效葉氏摘玄方白癜風癬用小麥攤石上燒鐵物壓出油搽之甚效醫學正傳輕粉硫黃黃丹官粉各三錢共為細末夏月熏出汗時以鮮王瓜蘸藥末搽之神效不論赤白癜風癮疹遍身風疹胸頸臍腹及近隱皆然多涎痰夜不得睡用苦參末一兩皂角二兩水一升揉濾取汁石器熬成膏和末丸梧子大每服三十丸食後溫水服次日便愈寇氏衍義風熱癮疹浮萍蒸過焙乾牛蒡子酒煮曬乾炒各一兩為末每薄荷湯服一二錢日二次古今録驗風疹遍身百計不愈煅雲母粉清水調服二錢良千金方皮膚風疹枳實醋浸火炙尉之即消外臺祕要風瘙癮疹赤小豆荊芥穗等分為末雞子清調塗之又方鏽鐵磨水塗之集簡方治赤疹用蛇銜草搗極爛敷之即瘥蘇頌方風疹作癢枳殼三兩麩炒為末每服二錢水一碗煎六分去滓溫服仍以汁塗經驗方風氣瘙癢用大薄荷蟬蛻等分為末每溫酒調服一錢永類鈐方風瘙癮疹身癢不止用蒼耳莖葉子等分為末每服二錢豆淋酒調下聖惠方風疹瘙癢不能忍者赤土研末空心溫酒服一錢御藥院方風瘙癮疹作癢成瘡用蠶砂炒一升水五斗煮取一斗二升去砂洗浴避風聖惠方治癮疹癢楮枝莖葉煮湯洗浴別録風瘙癮疹心下迷悶巴豆五十粒去皮水七升煮二升以帛染拭之隨手愈千金方癮疹風瘡疼痛白殭蠶焙研酒服一錢立瘥聖惠方疥一切瘡疥荊芥末以地黃自然汁熬膏和丸梧子大每三十五丸茶酒任下普濟方人疥馬疥馬鞭草不犯鐵器搗自然汁半盞飲盡十日內愈神效集驗方一食白鴿肉立愈疥瘡瘙癢油核桃一枚雄黃一錢艾葉杵熟一錢搗勻綿包夜臥裹陰囊立效勿洗集簡方乾溼蟲疥狼毒不拘多少搗爛以豬油調搽患處方睡勿以被矇頭恐藥氣傷面經驗方又山豆根末臘豬脂調塗備急又豬脂煎芫花塗之肘後方又楝根皮皂角去皮子等分為末豬脂調塗奇疾方積年久瘡豬肚內放皂角煮熟去皂角食之袖珍方疥癬滿身不可治者何首烏艾葉等分水煎濃湯洗浴甚能解痛生肌肉王袞博濟方風疽瘡疥凡腳腨及曲䐐中癢搔則黃水出是也以青竹筒三尺著大豆一升在內以馬屎糠火燒熏以器兩頭取汁搽之先以泔清和鹽洗之不過三度極效千金方濕瘑疥瘡胡燕窠大者用托子處土為末以淡鹽湯洗拭乾敷之日一上小品方癬癬瘡作癢雀兒草即酸母草擦之數次愈永類方癬瘡有蟲川槿皮煎入肥皂浸水頻頻擦之或以槿皮浸汁磨雄黃尤妙簡便又清晨採露水絲瓜葉七斤逐片擦七下如神忌雞魚發物攝生衆妙癬久不瘥用羊蹄根搗三錢入川百藥煎二錢白梅肉擂勻以井華水一盞濾汁澄清天明空心服之不宜食熱物其渣抓破擦之三次即愈永類方又用羊蹄根杵絞汁入輕粉少許和入膏塗之三五次即愈簡要濟衆方風癬疙瘩梓葉木棉子羯羊屎鼠屎等分入瓶中合定燒取汁塗之試效録驗方頭上瘡癬蜂房研末臘豬脂和塗之效聖惠方頭耳諸瘡眉癬燕窩瘡並用肥皂煅存性一錢枯礬一分研勻香油調塗之摘玄身面惡癬紫背龍芽草即蛇含入生礬研敷二三次斷根直指方煉眉瘡癬小兒面湮瘡又名煉銀瘡乃母受胎時食酸辣等物所致用百藥煎五錢生白礬二錢為末油調搽之外科精義患癬初在頸項間後延上左耳遂成濕瘡浸淫用斑蝥狗膽桃根諸藥徒令蜇蠚其瘡轉甚偶於楚州賣藥人教用蘆薈一兩炙甘草五錢研末先以溫漿水洗癬拭淨敷之立干便瘥真神奇也劉禹錫傳信方牛皮血癬煙膠三錢寒水石三錢白礬二錢花椒一錢半為末臘豬脂調搽積德堂方牛皮風癬生驢皮一塊以朴硝醃過燒灰油調敷之名一掃光李樓奇方又舊皮鞋底燒灰入輕粉少許麻油調抹亦治小兒頭瘡直指方牛皮頑癬雌黃末入輕粉和豬膏敷之直指方荷錢癬瘡巴豆仁三個連油杵泥以生絹包擦日一二次三日全好經驗方兩腳癬瘡白犬血塗之立瘥奇效方積年乾癬生茄擦之黃水出每逢陰雨即癢用狼毒末塗之聖惠方又東壁土摩乾溼二癬極效蘇恭方楊梅瘡癬汞粉大楓子肉等分為末塗之即愈嶺南衛方又輕粉一錢杏仁四十二個去皮洗瘡試干搽之不過三次即愈干則以鵝膽汁調摘玄方浸淫瘡凡卒得毒氣攻身或腫痛或赤癢上下周匝煩毒欲死此浸淫毒瘡生鯽魚切片和鹽搗貼頻易之聖惠方浸淫惡瘡有汁多發於心下不早治周身則殺人熬秫米令黃黑杵末敷之肘後方又用胡燕窠中土研末水和敷葛氏方又以雞冠血塗之日四五度肘後方浸淫諸瘡豬牙車骨年久者椎破燒令脂出乘熱塗之普濟方浸淫癬瘡洗淨以雀屎醬瓣和研塗之千金翼天疱瘡天疱濕瘡絲瓜汁調辰粉頻搽之又蓮蓬殼燒存性研末井泥調塗神效海上方痱子痱子瘙癢干壁土末敷之隨手愈普濟方暑月痱瘡及腋下赤腫冬霜和蚌粉敷之立瘥臘雪亦良陳承便毒便毒不拘已成未成隨即消散斑蝥三個去翅足炒滑石三錢同研分作三服空心白湯下日一服毒從小便出如痛以車前木通澤瀉豬苓煎飲名破毒飲甚效東垣又雞子一個開孔入紅娘子六個紙包煨熟去紅娘子食雞子以酒下小便淋瀝出膿血即愈陸氏積德堂方又端午日午時取樹上青胡桃筐內陰乾臨時全燒為末黃酒服少行一二次有膿自大便出無膿即消二三服平無青者用干胡桃七個燒研酒服不過三服見效經驗方以上二方須加全蠍乃佳又方用胡桃三枚夾銅錢一個食之即愈治露𤷍即羊核便毒也用石首膠一兩燒存性研末酒服外以石菖蒲生研罨之效便毒初發黃瓜蔞一個黃連五錢水煎連服效永類方又水膠熔化塗之即散直指方又鯽魚一枚山藥五錢同搗敷之即消醫林集要又用南五倍子炒黃研末入百草霜等分以臘醋調塗於患處一日一夜即消杏林摘要便毒腫痛貫衆酒服二錢良多能鄙事便毒腫痛已大而軟者用魚鰾膠熱湯或醋煮軟乘熱研爛貼之直指方臁瘡臁脛生瘡人乳桐油等分和勻以鵝翎掃塗神效摘玄方又雄雞肫內皮洗淨貼之一日一易十日愈小山奇方裡外臁瘡羊屎燒存性研末入輕粉摻之集效方又燒過人骨碎者為末摻之壽域神方臁瘡熱瘡黃柏一兩輕粉三錢豬膽汁調搽之或只用蜜炙黃柏一味臁瘡頑瘡銅緑七分研黃蠟一兩化熬以厚紙拖過表裡別以紙隔貼之出水妙亦治楊梅瘡及蟲咬筆峰雜興血風臁瘡船上舊油灰將泥作釜煅過研末入輕粉少許苦茶洗淨敷之忌食發物邵真人經驗方又官粉四兩調入碗內以蘄州艾葉燒煙燻干入乳香少許同研香油調作隔紙膏反覆貼之集效方一方官粉炒過桐油調作隔紙膏貼之簡便方遠近臁瘡黃丹飛炒黃柏酒浸七日焙各一兩輕粉半兩研細以苦茶洗淨輕粉填滿次用黃丹護之外以蘖末攤膏貼之勿揭動一七效集效方臁脛爛瘡以齏汁洗拭刮虎骨末敷之便民圖纂又牛蹄甲燒灰桐油和敷海上方又海上方詩云左腳草鞋將棒挑水中洗淨火中燒細研為末加輕粉洗以鹽湯敷即消又陳艾五錢雄黃二錢青布卷作大炷點火熏之熱水流數次愈筆峰雜興又端午日午時採翻白草洗收每用一握煎湯盆盛圍住熏洗極效劉松石保壽堂方臁瘡久爛灶內黃土年久者研細入黃柏黃丹赤石脂輕粉末等分清油調入油絹中貼之勿動數日愈縱癢忍之良濟急良方腳脛爛瘡臭穢不可近用蜒蚰十條瓦焙研末油調敷之立效救急方臁瘡不合以齏汁溫洗拭乾用蔥汁調輕粉敷之又輕粉五分黃蠟一兩以粉摻紙上以黃蠟鋪之縛在瘡上黃水出即愈永類方又蔥鹽湯洗淨拭乾以馬屁勃末敷之即愈仇遠裨史蛀腳臁瘡干馬齒莧研末蜜調敷上一宿其蟲自出神效海上方腳上臭瘡熟雞子黃黃蠟一錢煎油塗之鶴膝風鶴膝風攣紫荊皮二錢老酒煎服日一次直指方鶴膝風病酒醅糟四兩肥皂一個去子芒硝一兩五味子一兩沙糖一兩薑汁半碗研勻日日塗之加入燒酒尤妙膝風疼痛菊花陳艾葉作護膝久則自除也吳旻扶壽方代指天蛇代指腫痛乃五臟熱注而然刺熱湯中七度刺冷水中三度即以羊膽塗之立愈外臺祕要又以唾和白硇砂搜面作碗子盛唾令滿著硇末少許以指浸之一日即瘥千金方又地榆煮汁漬之半日愈又以黃蠟松膠相和火炙籠指即瘥千金翼方又烏梅核仁搗爛和醋浸之肘後方指頭腫毒痛甚者烏梅肉和鮮魚搗封之妙李樓奇方手足髮指毒痛不可忍用壁間泥蜂窠為末入乳香少許研勻以醋調塗干即以醋潤之奇效方天蛇頭瘡生手指頭上用蜈蚣一條燒煙熏一二次即愈或為末豬膽汁調塗之奇效方又用水蛇一條去頭尾取中截如手指長剖去骨肉勿令病者見以蛇皮包手指自然束緊以紙外裹之頓覺遍身皆涼其病即愈數日後解視手指有一溝如小繩在皮內宛然有一小蛇頭目俱全也經驗方天蛇頭指痛臭甚者黑豆生研末入繭內籠之濟急方瘰癧男女瘰癧經驗方用牡蠣煅研末四兩玄參末二兩麵糊丸梧子大每服三十丸酒下日三服服盡除根初虞世云瘰癧不拘已破未破用牡蠣四兩甘草一兩為末每食後用臘茶湯調服一錢其效如神瘰癧結核或破未破以新薄荷二斤取汁皂莢十挺水浸去皮搗取汁同於銀石器內熬膏入連翹末半兩連白青皮陳皮黑牽牛半生半炒各一兩皂莢仁一兩半同搗和丸梧子大每服三十丸煎連翹湯下濟生方瘰癧馬刀不問已潰未潰或日久成漏用夏枯草六兩水二鍾煎七分食遠溫服虛甚者則煎汁熬膏服並塗患處兼以十全大補湯加香附貝母遠志尤善此物生血乃治瘰癧之聖藥也其草易得其功甚多薛己外科瘰癧結核或破或不破下至胸前者皆治之用何首烏洗淨日日生嚼並取葉搗塗之數服即止其藥久服延年黑髮用之神效斗門方瘰癧未破用月季花頭二錢沉香五錢芫花炒三錢碎銼入大鯽魚腹中就以魚腸封固酒水各一鍾煮熟食之即愈魚須安糞水內遊死者方效此方活人多矣談野翁試驗方又野菊花根搗爛煎酒服以渣敷之自消不消亦自破也瑞竹堂經驗方內消瘰癧不拘大人小兒用斑蝥一兩去翅足以米一升同炒米焦去米不用入薄荷四兩為末烏雞子清丸如緑豆大空心臘茶下三丸加至五丸卻每日減一丸減至一丸後每日五丸以消為度經驗方又水紅花子不拘多少一半微炒一半生用同研末食後好酒調服二錢日三服已破者亦治久則效效則止寇宗奭本草衍義又連翹芝麻等分為末時時服之簡便方項上瘰癧白殭蠶為末水服五分日三服十日瘥外臺祕要瘰癧初起用壁虎一枚焙研每日服半分酒服青囊又服海藻黃連散及海藻酒可消肘後方盤蛇瘰癧圍接項上海藻蕎麥麵炒過白殭蠶炒去絲等分為末白梅湯浸取肉減半和丸緑豆大每服六七十丸食後臨臥米飲下日五服其毒當從大便泄去若與淡菜連服尤好淡菜生於海藻上亦治此也忌豆腐雞羊酒面阮氏方瘰癧腫痛久不痊用貓頭蹄骨並塗酥炙黃為散每日空心米飲下一錢匕聖惠方瘰癧經年木鱉仁一個去油研以雞子白和入瓶內安甑中蒸熟食後食之每日一服半月效又瘰癧非胡桐淚不能除元素又肥皂莢乃治瘰癧要藥而本草及附方俱不載可見本草亦不能盡也自記瘰癧發背疔瘡諸腫紫花地丁根去粗皮同白蒺藜為末油和塗神效乾坤祕韞瘰癧惡瘡及軟癤用白膠香一兩瓦器熔化去滓以萆麻子六十四個去殼研膏熔膠投之攪勻入油半匙頭至點水中試軟硬添減膠油得所以緋帛量瘡大小攤貼一膏可治三五癤也儒門事親瘰癧瘻瘡楸煎神方秋分前後早晚令人持袋摘楸葉納袋稱取十五斤以水一石淨釜中煎取三斗又換鍋煎取七八升又換鍋煎取二升乃納不津器中用時先取麻油半合蠟一分酥一栗子許同消化又取杏仁七粒生薑少許同研米粉二錢同入膏中攪勻先塗瘡上經二日來乃拭卻即以篦子勻塗楸煎滿瘡上仍以軟帛裹之旦日一拭更上新藥不過五六上已破者即便生肌未破者即內消瘥後須將養半年採藥及煎時禁孝子婦人僧道雞犬見之篋中方瘰癧鼠瘻白牛屎白馬屎白羊屎白雞屎白豬屎各一升於石上燒灰漏蘆末二兩以豬膏一升煎亂髮一兩同熬五六沸塗之神驗千金五白散治鼠瘻有核膿血用熱牛屎封之日三肘後方又以石菖蒲生研罨之微破以貓兒連皮毛燒灰用香油調敷內服白蘞末酒下多多為上仍以生白蘞搗爛入酒少許敷之效證治要訣瘰癧結核鉛三兩鐵器炒取黑灰醋和塗上故帛貼之頻換去惡汁如此半月不痛不破內消為水而愈傳信方男婦瘰癧貓兒睛眼草一二捆井水二桶五月五日午時鍋內熬至一桶去滓澄清再熬至一碗瓶收每以椒蔥槐枝湯洗瘡淨乃搽此膏數次愈頸項瘰癧用帶殼螻蛄七枚生取肉入丁香七粒於殼內燒過與肉同研用紙花貼之救急方瘰癧初作未破作寒熱草烏頭半兩木鱉子二個以米醋磨細入搗爛蔥頭蚯蚓糞少許調勻敷上以紙條貼令通氣孔妙醫林正宗瘰癧未穿靛花馬齒莧同搗日日塗敷取效簡便方瘰癧已破羊屎燒五錢杏仁燒五錢研末豬骨髓調搽海上方又蝸牛燒研輕粉少許用豬骨髓調敷危氏又貍頭燒灰頻敷之千金方瘰癧潰爛冷飯糰切片或為末水煎服或入粥內食之須多食為妙江西所出色白者良忌鐵器發物積德堂方又臘貓屎以陰陽瓦合鹽泥固濟煅過研末油調搽之儒門事親又用黃顙魚破開入萆麻子二十粒扎定安廁坑中冬三日春秋一日夏半日取出洗淨黃泥固濟煅存性研香油調敷普濟方瘰癧潰爛流串者用荊芥根下段煎湯溫洗良久著瘡破紫黑處以針刺去血再洗三四次用韭地上蚯蚓一把五更時收取炭火上燒紅為末每一匙入乳香沒藥輕粉各半錢穿山甲九片炙為末油調敷之如神此武進朱守所傳有驗方保命集活法機要載此方相同但敷藥用樟腦雄黃等分為末麻油調搽瘰癧汁出不止用鴨脂調半夏末敷之永類鈐方癧破經年膿水不絶用百年茅屋廚中壁土為末入輕粉調敷半月即干愈永類方多年瘰癧用蝙蝠一枚貓頭一個俱撒上黑豆燒至骨化為末摻之干即油調敷內服連翹湯集效方上部瘡頭面諸瘡以醋湯洗淨百草霜入膩粉少許生油調塗立愈證類本草臘梨頭瘡不拘大人小兒用獨核肥皂莢去核填入沙糖入巴豆二枚扎定鹽泥包煅存性入檳榔輕粉五七分研勻香油調搽先以灰汁洗過溫水再洗拭乾乃搽一宿見效普濟方梅花禿癬用清油一碗以小竹子燒火入內煎沸瀝豬膽汁一個和勻剃頭擦之二三日即愈勿令日曬普濟方白禿頭瘡破紅朱漆器剝取紅燒灰油調敷之救急方又用貫衆白芷為末油調塗之聖惠方又獐耳細辛其味辛辣為末以槿木煎油調搽活幼全書又雄黃豬膽汁和敷之聖濟録又羊肉如作脯法炙香熱拓上不過數次瘥肘後方頭瘡白屑或惟有赤痕萆麻子仁四十九粒白果膠棗各三枚瓦松三錢肥皂一個搗為丸洗面用之良扶壽方白禿蟲瘡藜蘆末豬油調塗之肘後方雞屎白禿甜瓜蔓連蒂不拘多少以水浸一夜砂鍋熬苦汁去滓如湯盛收每剃去痂疕洗淨以膏一盞加半夏末二錢薑汁一匙狗膽汁一枚和勻塗之不過三上忌食動風之物儒門事親腦風面瘡白炭燒紅投沸湯中溫洗之取效百一方諸癤癰腫瘡癤小青葉生搗敷之甚效蘇頌頭癤腫毒懷香根研末麻脂調塗七日腐落時珍癩頭軟癤及諸熱瘡五倍子七個研末香油四兩熬至一半布絞去滓搽之三四遍即可勿以水洗之普濟方頭上軟癤用抱出雞卵殼燒存性研末入輕粉少許清油調敷危氏方又蝦蟆剝皮貼之收毒即愈活幼全書軟癤頻作露蜂房二枚燒存性以巴豆二十一粒煎清油二三沸去豆用油調敷甚效唐氏得效方軟癤不愈爛船底油石灰研末油調敷之胡氏方些小癰癤發熱時即用粉草節曬乾為末熱酒服一二錢連進數服痛熱皆止外科精要鬢邊生癤貓頸上毛豬頸上毛各一把鼠屎一粒燒研油調敷之壽域方熱癤腫毒蕓薹子狗頭骨等分為末醋和敷之千金方暑月生癤黃楊木葉搗爛塗之時珍癤子初起葛蔓燒灰水調敷之即消千金方癤毒已破益母草搗敷甚妙斗門方預免瘡癤凡小兒每年六月六日照年歲吞肥皂莢子可免瘡癤之患大人亦可吞七枚或二十一枚吳旻扶壽方結核治人皮肌頭面上生瘤及結核大者如拳小者如栗或軟或硬不疼不癢宜用此藥不可輒用針灸生天南星大者一枚研爛滴好醋五七點如無生者以乾者為末醋調先用針刺患處令氣透乃貼之覺癢則頻貼取效濟生方惡核腫結小蒜吳茱萸等分搗敷即散肘後方痰核紅腫寒熱狀如瘰癧石灰火煅為末以白果肉同搗貼之蜜調亦可活人心統人生痰核如指大紅腫者以煤赭為末菜子油調搽其腫即消時珍頭核腦痹頭枕後生痰核正者為腦側者為痹用輕虛白浮石燒存性為末入輕粉少許麻油調掃塗之勿用手按即漲或加焙乾黃牛糞尤好亦治頭𤷍直指方頦下結核大蜘蛛不計多少好酒浸過同研爛澄去滓臨臥時服之最效醫林集要項後結核或赤腫硬痛以生山藥一挺去皮萆麻子二個同研貼之如神救急方癭氣項下癭氣用小麥一升醋一升漬之曬乾為末以海藻洗研末三兩和勻每以酒服方寸匕日三小品又用海藻一斤絹袋盛之以清酒二斤浸之春夏二日秋冬三日每服二合日三酒盡再作其滓曝乾為末每服方寸匕日三服不過兩劑即瘥範汪方又苔脯能消項癭曾有僧患此每食輒用苔作脯數月全愈乃知海物皆能除是疾也夷堅志又用水涯露出柳根三十斤水一斛煮取五升以糯米三升如常釀酒日飲範汪方又秫米三斗炊熟取圓葉白楊皮十兩勿令見風切水五升煮取二升漬曲末五兩如常釀酒每旦一鍾日再服崔氏方又用羊靨七枚陰乾海藻乾薑各一兩桂心昆布逆流水邊柳須各一兩為末蜜丸芡子大每含一丸咽津千金方又針砂入水缸中浸之飲食皆用此水十日一換砂半年自消散直指方又自然銅貯水甕中逐日飲食皆用此水其癭自消直指方又鼠黏子根一升水三升煮取一升半分三服或為末蜜丸常服之救急方又豬靨焙四十九枚真硃砂罐煅四十九粒沉香二錢橘紅四錢為末臨臥冷酒徐徐服二錢五服見效重者一料愈以除日合之忌酸鹹油膩澀氣之物醫林集要癭氣初起海藻一兩黃連一兩為末時時舔咽先斷一切厚味丹溪項下卒腫其囊漸大欲成癭者昆布海藻等分為末蜜丸杏仁大時時含之咽汁外臺祕要癭氣結核癗癗腫硬以昆布一兩洗去咸曬乾為散每以一錢綿裹好醋中浸過含之咽汁味盡再易之聖惠方療生癭疾一二年者以萬州黃藥子半斤須緊重者為上如輕虛即是他州者力慢須用加倍取無灰酒一斗投藥入中固濟瓶口以糠火燒一伏時待酒冷乃開時時飲一杯不令絶酒氣經三五日後常把鏡自照覺消即停飲不爾便令人項細也千金方瘻一切瘻瘡霜後收苦瓠花曝研末敷之時珍方諸瘻不愈鯪鯉甲二七枚燒灰豬脂調敷千金方一切冷瘻人吐蛔蟲燒灰先以甘草湯洗淨塗之無不瘥者慎口味千金方治鼠瘻蟻瘻有細孔如針者取蛇吞鼠以臘月豬脂煎焦去滓塗之千金方鼠瘻核痛未成膿以柏葉搗塗熬鹽尉之氣下即消姚僧坦集驗方鼠瘻已潰雞卵一枚米下蒸半日取黃熬令黑先拭瘡令乾以藥納孔中三度即愈千金方鼠瘻已破出膿血者白蘚皮煮汁服一升當吐若鼠子也肘後方鼠瘻潰爛鼠一枚亂髮一雞子大以三歲臘豬脂煎令消盡一半塗之一半酒服葛氏方又新鼠屎一百粒收密器中五六十日杵碎敷效千金方肉丁身上生肉丁胡麻花擦之即愈時珍方胬肉人身有胬肉可聽人家釘棺時斧聲便下手速擦二七遍以後自得消平藏器方瘤疣瘤初起柳絲上花蜘蛛網絲纏之久則自消簡便方又用稻上花蜘蛛十餘安桃枝上待絲垂下取東邊者捻為線系之七日一換自消落也總微論消瘤用獐肉或鹿肉剖如厚脯炙熱拓之可四炙四易出膿便愈不除再以新肉用之外臺祕要身麵粉瘤舊皮鞋底洗淨煮爛成凍子常食之瘤自餿如豆腐極臭直指方腋下瘤用長柄苦葫蘆燒存性研末搽之以消為度有老嫗右腋生瘤漸長至尺許其狀如瓠久而潰爛一方士教以此法用之遂出水消盡而愈瀕湖集簡方疣痣面靨疣痣水調礦灰一盞好糯米全者半插灰中半在灰外經宿米色變如水精先以針微撥動點少許於上經半日汁出剔去藥不得著水二日而愈也集玄方疣痣瘤贅石灰一兩用桑灰淋汁熬成膏刺破貼之普濟疣痣黑子巴豆一錢石灰炒過人言一錢糯米五分炒研點之怪症方又斑蝥三個人言少許以糯米五錢炒黃去米入蒜一個搗爛研點之身面黑痣藜蘆灰五兩水一大碗淋汁銅器重湯煮成黑膏以針微刺破點之不過三次效聖惠方血痣潰血有人舊生一痣偶抓破血出一線七日不止欲死用五靈脂末摻上即止也楊洪醫方選要身面疣目苦酒漬石灰六七日取汁頻滴之自落千金方又以豬脂揩之令血出少許神驗不可加千金方又七月七日以大豆拭疣上三過使本人種豆於南向屋東頭第二溜中豆生葉以熱湯沃殺即愈又牛口涎頻塗之自落千金方又蠟紙卷硫黃末少許點淬之有聲自去普濟方又盜酸酒醉洗而咒之曰疣痣不知羞酸酒酻洗頭急急如律令咒七遍自愈外臺手足疣目鹽敷上以舌舔之不過三度瘥肘後方雀卵面斑鸕鷀骨燒灰研入白芷末豬脂和夜塗旦洗摘玄方雀卵斑䵟櫻桃枝同紫萍牙皂白梅肉研和日用洗面時珍方粉滓面䵟杏花桃花各一升東流水浸七日洗面二七遍極妙聖濟總録又白石脂六兩白蘞十二兩為末雞子白和夜塗旦洗聖濟面瘡粉刺菟絲子苗絞汁塗之不過三上肘後方婦人面瘡名粉花瘡以定粉五錢菜子油調泥碗內用艾一二團燒煙燻之候煙盡覆地上一夜取出調搽永無瘢痕亦易生肉談野翁試驗方
