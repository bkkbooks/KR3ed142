body:
  text: 卷十六外科癰疽治消渴愈後預防發癰疽先宜服此用忍冬藤根莖花葉皆可不拘多少入瓶內以無灰好酒浸以粳火煨一宿取出曬乾入甘草少許研為細末以浸藥酒打麵糊丸梧子大每服五十丸至百丸湯酒任下名忍冬丸此藥不特治癰疽大能止渴亦治五痔諸瘻外科精要凡消渴而後發癰疽或先癰疽而後發渴並宜服此治渴補虛安和臟腑若常服終身可免癰疽之疾用綿黃耆箭簳者去蘆六兩一半生用一半以鹽水潤濕飯上蒸三四次焙銼粉甘草一兩一半生用一半炙黃為末每服二錢白湯點服早晨日午各一服亦可煎服名黃耆六一湯外科精要又用嫩桑條細切一升熬香煎飲亦無禁忌久服終身不患偏風蘇頌治癰疽發背腸癰奶癰無名腫毒焮痛實熱狀類傷寒不問老幼虛實服之托裡未成者內消已成者即潰忍冬葉黃耆各五兩當歸一兩甘草八錢為細末每服二錢酒一盞半煎一盞隨病上下日再服以滓敷之和劑局方治一切癰疽發背癤毒惡候浸大有死血陰毒在中則不痛敷服即痛有憂怒積氣內攻則痛不可忍敷服即不痛或蘊熱在內熱逼人手不可近敷服即清涼或氣虛冷潰而不斂敷服即斂若七情內郁不問虛實寒熱治之皆愈用遠志不拘多少米泔浸洗捶去心為末每服三錢溫酒一盞調澄少頃飲其清以滓敷患處名遠志酒三因方治癰疽發背不問發在何處發眉發頤或頭或項或背或腰或脅或乳或手足皆有奇效鄉落之間僻陋之所貧乏之人藥材難得但虔心服之俟其疽破仍以神異膏貼之其效甚妙用忍冬藤生取一把以葉入砂盆研爛入生楂子酒少許稀調得所塗於四圍中留一口泄氣其藤只用五兩木槌槌損不可犯鐵大甘草篩生用一兩同入砂瓶內以水二碗文武火慢煎至一碗入無灰好酒一大碗再煎十數沸去滓分為三服一日一夜吃盡病重者一日二劑服至大小腸通利則力到無不愈矣如無生者只用乾者然力終不及生者效速名忍冬酒外科精要凡有疽疾一日至三日之內宜連進十餘服方免變症使毒氣出外服之稍遲毒氣內攻漸生嘔吐或鼻生瘡菌不食即危矣四五日後亦宜間服之用真緑豆粉一兩乳香半兩燈心同碾和勻以生甘草濃煎湯調下一錢時時呷之若毒氣衝心有嘔逆之證大宜服此名內托護心散又名乳香萬全丸蓋緑豆壓熱下氣消腫解毒乳香消諸癰腫毒服至一兩則香徹瘡孔中真聖藥也李嗣立外科一切癰疽惡毒將發預期服之能消腫逐毒使毒不內攻功效不可具述用大橫紋粉草二斤槌碎河水浸一宿揉取濃汁再以密絹濾過銀石器內慢火熬成膏以瓷罐收之每服一二匙無灰酒或白湯下曾服丹藥者亦解之或微利無妨名國老膏外科精要又甘草三兩微炙切以酒一斗同浸瓶中用黑鉛一斤熔成汁投酒中取出如此九度令病者飲酒至醉寢後即愈也經驗方又以麻油一斤銀石器煎二十沸和醇醋二碗分五次一日服盡使毒內消直指方癰疽腫毒一切惡瘡豨蘞草端午採者一兩乳香一兩白礬燒半兩為末每服二錢熱酒調下毒重者連進三服得汗妙乾坤祕韞諸般癰腫新掘天門冬三五兩洗淨砂盆擂細以好酒濾汁頓服未效再服必愈醫學正傳癰疽惡瘡紫花地丁連根同蒼耳葉等分搗爛酒一鍾攪汁服楊誠經驗方癰疽瘡瘍皆因氣滯血凝而致宜服藥引氣通血最忌臭穢不潔觸之毒必引蔓香附子最能進食寬氣名獨聖散用香附子去毛以生薑汁淹一宿焙乾研為細末無時以白湯服二錢如瘡初作以此代茶瘡潰後亦宜服之或只以局方小烏沉湯少用甘草愈後服至半年尤妙陳自明外科精要癰疽腫毒初起取薜荔莖葉即木蓮一握研汁和酒溫服利下惡物去其根本又用木蓮四十九個揩去毛研細酒解開溫服功與忍冬不相上下一云用薜荔葉乾末酒服亦效俱外科精要背疽初發用黃明牛皮膠四兩酒一碗重湯燉化隨意飲盡不能飲者滾白湯飲之服此毒不內攻不傳惡症阮氏經驗方又方加穿山甲四片同燒存性研末酒調服極效唐氏經驗方一切癰疽及腸癰奶癰赤腫未破或已破而膿血不散發熱疼痛能食者並宜排膿托裡散用地蜈蚣赤芍藥當歸甘草等分為末每服二錢溫酒送下和劑局方癰疽焮痛用絡石莖葉一兩洗曬勿見火皂莢刺一兩新瓦焙黃甘草節半兩大瓜蔞一個取仁炒香乳香沒藥各三錢每服二錢水一盞酒半盞慢火煎至一盞溫服絡木者無用名止痛靈寶散外科精要一切癰疽及打撲傷損未破疼痛者以生地黃杵如泥攤在上摻木香末於中又攤地黃泥一重貼之不過三五度即內消也王袞博濟方一切癰疽發背無名腫毒年少氣壯者用黑牽牛白牽牛各一合布包槌碎以好醋一碗熬至八分露一夜次日五更溫服以大便出膿血為妙名濟世散張三峰仙方癰疽疔腫惡瘡及黃疸慈菰連根同蒼耳草等分搗爛以好酒一鍾濾汁溫服或干之為末每酒服三錢乾坤生意癰疽寒顫乳香半兩熟水研服顫發於脾乳香能入脾故也仁齋直指方惡毒癰腫或連陰卵髀間疼痛攣急牽入小腹不可忍一宿即殺人者用茴香葉搗汁一升服之日三四服其滓以貼腫上冬月用根此是外國神方起死回生神驗腹內生瘍在腸臟不可藥治者取皂角刺不拘多少好酒一碗煎至七分溫服其膿血悉從小便中出極效不飲酒者水煎亦可藺氏經驗方癰疽惡毒番降末楓乳香等分為丸熏之去惡氣甚妙集簡方癰疽發背一切腫毒蕎麥麵硫黃各二兩為末井華水和作餅曬收每用一餅磨水敷之痛則令不痛不痛則令痛即愈直指方治一切癰腫發背無名腫毒初發焮熱未破者取效如神用隔年陳小粉愈久者愈佳以鍋炒之初如餳久炒則干成黃黑色冷定研末陳米醋調成糊熬如黑漆瓷罐收之名烏龍膏用時攤紙上剪孔貼之即如冰冷疼痛即止少頃覺癢干亦不能動久則腫青自消藥力亦盡而脫落甚妙藥易而功大濟生者宜收藏之積善堂方癰疽發背初起者用獖豬腰子一雙同飛面搗如泥塗之即愈癰疽初起乾薑一兩炒紫色研末醋調敷四圍留頭自愈諸症辨疑癰腫初起芫花末和膏塗之千金方癰腫未成用此拔毒水調牡蠣粉塗之干更上姚僧垣集驗方癰疽發背無名腫毒貼之如神紫花地丁草三伏時收搗以白麵和成餅鹽醋浸一宿貼之昔有一尼發背夢得此方數日而痊孫天仁集驗方癰腫未成膿牛耳垢封之即散時珍方治一切癰疽發背流注諸腫毒冷熱不明者紫荊皮炒三兩獨活去節炒三兩赤芍藥炒二兩生白朮一兩木蠟炒一兩共為末用蔥湯調熱敷之名沖和膏血得熱則行蔥能散氣也瘡不甚熱者酒調之痛甚者加乳香筋不伸者亦加乳香大抵癰疽流注皆是氣血凝滯所成遇溫則散遇涼則凝此方溫平紫荊皮乃木之精破血消腫獨活乃土之精止風動血引拔骨中毒去皮間濕氣芍藥乃火之精生血止痛木蠟乃水之精消腫散血同獨活能破石腫堅硬白芷乃金之精去風生肌止痛蓋血生則不死動則流通肌生則不爛痛止則不焮風去則血自散氣破則硬可消毒自除五者交治病安有不愈者乎仙傳方一切癰腫未潰用幹人糞末麝香各半錢碾勻以豆大津調貼頭外以醋面作錢護之膿潰去藥寇宗奭衍義鐵箍散治一切癰疽發背乳癰惡瘡不拘已成未成已穿未穿並用芙蓉葉或根皮或花或生研或乾研末以蜜調塗於腫處四圍中間留頭干則頻換初起者即覺清涼痛止腫消已成者即膿聚毒出已穿者膿出易斂妙不可言或加生赤小豆末尤妙癰疽瘡腫已潰未潰皆可用鹽白梅燒存性為末入輕粉少許香油調塗四圍王氏簡易方治一切癰疽赤腫不拘善惡水調赤小豆末塗之無不愈者但其性黏干則難揭入苧根末即不黏此法尤佳時珍小品方同無苧根末癰疽腫毒重陽前取芙蓉葉研末端午日取蒼耳草燒存性研末等分蜜水調塗四圍其毒自不走散名鐵井闌簡便方又黃蜀葵花用鹽摻收瓷器中密封經年不壞每用敷之自平自潰無花用根葉亦可直指方諸般癰腫黃明膠一兩水半升化開入黃丹一兩煮勻以翎掃上瘡口如未成者塗其四圍自消本事方癰疽發背榆根白皮切清水洗搗爛和香油敷之留頭出氣燥則以苦茶頻潤不黏更換新者將愈以桑葉嚼爛隨大小貼之口合乃止神效癰疽結熱芭蕉根搗爛敷腫處去熱毒別録癰腫焮熱作痛大黃末醋調塗之燥即易不過數易即退甚驗神方也肘後方癰疽腮腫取朱槿葉或花同芙蓉葉牛蒡葉白蜜研膏敷之即散時珍癰疽便閉紫草瓜蔞實等分新水煎服又用生甘草二錢半井水煎服能疏導惡物俱直指方癰瘡大痛壁虎焙乾研末油調敷之即止醫學摘要治癰腫無頭蠶繭燒灰酒服次日即破時珍又牛蒡子吞一枚即出𦯶麻子亦佳蘇恭方癰腫無頭三日後取葵子一百粒水吞之當日開也孟詵方又白瓷器研末敷可代針時珍方又蜀葵子為末水調敷之經驗後方陰疽不發頭凹沉黯不疼無熱服內補散不起用人牙煅過穿山甲炙各一分為末分作兩服用當歸麻黃煎酒下外以薑汁和麵敷之又川烏頭硫黃人牙煅過為末酒服亦效仁齋直指方諸般癰腫拔毒止痛荷葉中心蒂如錢不拘多少煎湯淋洗拭乾以飛過寒水石同臘豬脂塗之本事方又龍葵莖葉搗敷經驗方癰疽有膿不潰箔經繩燒研和臘豬脂敷四畔即潰不須針灸時珍又苦酒和雀屎如小豆大敷瘡頭上即穿也肘後方決癰代針白雞翅下兩邊第一毛燒灰水服即破外臺祕要癰膿不出人乳汁和麵敷之比曉膿盡出不可近手千金癰疽拔膿癰疽不破或破而腫硬無膿斑蝥為末以蒜搗膏和水一豆許貼之少頃膿出即去藥直指方癰疽惡瘡膿血不止地骨皮不拘多少洗淨刮去粗皮取細白穰以粗皮同骨煎湯洗令膿血盡以細穰貼之立效有一朝士腹脅間病疽經歲或以地骨皮煎湯淋洗出血一二升家人懼欲止之病者曰疽似少快更淋之用五升許血漸淡乃止以細穰貼之次日結痂愈唐慎微本草癰疽不合破蒲席燒灰臘月豬脂和納孔中千金方又牛屎燒末用雞子白和封干即易之神驗也千金月令癰疽不斂不拘發背一切瘡用鱉甲燒存性碾摻甚妙李樓怪症奇方又經霜黃桑葉為末敷之直指方潰癰作癢以鹽摩其四圍即止外科精義癰疽惡肉白炭灰白荻灰等分煎膏塗之蝕盡惡肉以生肉膏貼之亦去黑子此藥只可留十日久則不效肘後內癰未成取伏雞屎水和服即瘥千金方又石蟹搗敷久疽瘡無不瘥者藏器腸癰未成馬牙燒灰雞子白和服之千金方腸胃生癰有敗血腥穢殊甚臍腹冷痛用此排膿下血單葉紅蜀葵根白芷各一兩白枯礬白芍藥各五錢為末黃蠟熔化為丸梧子大每空心米飲下二十丸待膿血出盡服十宣散補之坦仙皆效方腸內生癰雄雞頂上毛並屎燒末空心酒服千金方腸癰已成小腹腫痛小便似淋或大便艱澀下膿用甜瓜子一合當歸炒一兩蛇殼一條㕮咀每用四錢水一盞半煎一盞食前服利下惡物為妙聖惠腸癰內痛大棗連核燒存性百藥煎等分為末每服一錢溫酒服日一取效直指方腸癰外敷死人冢上土作泥塗之良千金方腸癰腹痛其狀兩耳輪甲錯腹痛或繞臍有瘡如粟下膿血用馬蹄灰和雞子白塗即拔毒氣出千金方治小腸癰鱔魚頭燒灰酒服有效醫學集成腹癰有膿薏苡仁附子敗醬湯用薏苡仁十分附子二分敗醬五分搗為末每以方寸匕水二升煎一升頓服小便當下即愈張仲景金匱玉函肺癰以白酒漿燉魚腥草熟食之愈不妨多食自傳祕方陰下懸癰生於穀道前陰器後初發如松子大漸如蓮子數十日後赤腫如桃李成膿即破破則難愈也用橫紋甘草一兩四寸截斷以溪澗長流水一碗河水井水不用以文武火慢慢蘸水炙之自早至午令水盡為度劈開視之中心水潤乃止細銼用無灰好酒二小碗煎至一碗溫服次日再服便可保無虞此藥不能急消過二十日方得消盡必未破時用粉甘草一斤作一劑乃能服盡立消李迅方下部懸癰擇人神不在日空心用井華水調百藥煎末一碗服之微利後卻用秋葫蘆一名苦不老生在架上而苦者切片置瘡上灸二七壯蕭端式病此連年一灸遂愈永類鈐方坐馬癰紡車弦燒灰敷之時珍便癰腫痛貝母白芷等分為末酒調服或酒煎服以滓貼之永類鈐方便癰膿血白膠香一兩為末入麝香輕粉少許摻之袖珍外腎癰瘡抱出雞卵殼黃連輕粉等分為細末用煉過香油調塗醫林正宗手足甲疽雄黃蛇皮等分為末以泔洗淨割去甲入肉處敷之一頃痛定神效近效方甲疽潰痛胬肉裹趾甲膿血不瘥者用牡蠣頭厚處生研為末每二錢紅花煎酒調下日三服仍用敷之取效勝金方治甲疽生於腳趾邊腫爛用䕡茹三兩黃耆二兩苦酒浸一宿以豬脂五合煎取膏三合日三塗之即消孟詵方甲疽腫痛石膽一兩燒煙盡研末敷之不過四五度瘥梅師方甲疽延爛或因割甲傷肌或因甲長侵肉遂成瘡腫黃水浸淫相染五趾俱爛漸上腳跌泡漿四邊起如火燒瘡日夜怪憎醫不能療緑礬石五兩燒至汁盡研末色如黃丹收之每以鹽湯洗拭用末厚敷之以軟帛緩裹當日即汁斷瘡干每日一遍鹽湯洗耀有膿處使淨敷其痂干處不須近但有急痛者塗酥少許令潤五日即覺上痂起依前洗敷十日痂漸漸剝盡軟處或更生白膿泡即擦破敷之自然瘥也外臺祕要甲疽胬肉膿血疼痛不愈用乳香為末膽礬燒研等分敷之內消即愈靈苑方甲疽瘡膿生足趾甲邊赤肉突出時時舉發者黃耆二兩䕡茹一兩醋浸一宿以豬脂五合微火上煎取三合絞去滓以封瘡口上日三度其內自消外臺祕要婦人甲疽婦人趾甲內生瘡惡肉突出久不愈名臭田螺用皂礬日曬夜露每以一兩煎湯浸洗仍以礬末一兩加雄黃二錢硫黃一錢乳香沒藥各一錢研勻搽之醫方摘要積年骨疽一捏一汁出者熬飴糖勃瘡上仍破生鯉魚㩉之頃時括視蟲出更洗敷藥蟲盡則愈肘後又鼠皮生剝貼附骨疽瘡即追膿出時珍方附骨疽漏蜣螂七枚同大棗搗敷劉涓子方胻疽青爛生於腨脛間惡水淋漓經年瘡冷敗為深疽青黑好肉虛腫百藥不瘥或瘥而復發先以藥餌去惡肉後用獖豬屎散甚效以豬屎燒研為末納瘡孔令滿白汁出吮去更敷有惡肉再蝕去乃敷以平為期有驗千金方癢疽內固黃耆人參各一兩為末入真龍腦一錢用生藕汁和丸緑豆大每服二十丸溫水下日日服本事方異疽似癰而小有異膿如小豆汁今日去明日滿用蕓薹搗熟布袋盛於熱灰中煨熟更互尉之不過兩三度無葉用乾者千金方酒毒生疽一婦人嗜酒胸生一疽脈緊而澀用酒炒人參酒炒大黃等分為末薑湯服一錢得唾汗出而愈丹溪醫案腦上癰癤石灰入飯內搗爛合之李樓奇方疽瘡有蟲生麻油滓貼之綿裹當有蟲出千金方石癰石癰諸癰赤小豆五合納苦酒中五宿炒研以苦酒和塗即消加瓜蔞根等分石癰堅硬如石不作膿莨宕子為末醋和敷瘡根即拔出千金方又用蛇蛻皮貼之經宿便愈聖濟總録又用橡子一枚以醋於青石上磨汁塗之干即易不過十度即平千金方又生商陸根搗擦之燥即易取軟為度亦治濕漏諸癤張文仲方又梁上塵灰葵根英灰等分用醋和敷之千金方瘭疽瘭疽惡毒肉中忽生一黤子大如豆粟或如梅李或赤或黑或白或青其靨有核核有深根應心能爛筋骨毒入臟腑即殺人但飲葵根汁可折其熱毒姚僧坦集驗方手足瘭疽此瘭喜著手足肩背纍纍如赤豆剝之汁出用蕓薹葉煮汁服一升並食干熟菜數頃少與鹽醬冬月用子研水服千金方又生人發灰米湯服二錢外以生人發灰三分皂角刺灰二分白芨一分為末乾摻或以豬膽汁調直指方又大鯽魚長三四寸者亂髮灰一雞子大豬脂一升同煎膏塗之千金方又以溫醋米泔洗淨用胡燕窠土和百日男兒屎敷之千金瘭疽著手足肩背纍纍如米起色白刮之汁出愈而復發虎屎白者以馬尿和之曬乾燒灰粉之千金方瘭疽毒瘡喜著十指狀如代指根深至肌能壞筋骨毒氣入臟殺人宜燒鐵烙之或灸百壯日飲犀角汁取瘥千金方瘭疽徹骨癢狗屎燒灰塗瘡勿令病者知藏器多骨疽骨疽不愈愈而復發骨從孔中出宜瘡上灸之以烏雌雞一隻去肉取骨炒成炭以三家甑蔽三家砧木刮屑各一兩皆燒存性和導瘡中碎骨當出盡而愈千金方又蕪菁子搗敷之用帛裹定日一易之千金方骨疽不合掘地作坑口小里大深三尺以乾雞屎二升同艾及荊葉搗碎入坑內燒令煙出以疽口就熏用衣擁之勿令泄氣半日當有蟲出甚效千金方多骨瘡不時出細骨乃母受胎未及一月與六親骨肉交合感其精氣故有多骨之名用密陀僧末桐油調勻攤之即愈壽域方疔瘡疔腫癰疽及一切無名腫毒用野菊花莖葉蒼耳草各一握共搗入酒一碗絞汁服以滓敷之取汗即愈或六月六日採蒼耳葉九月九日採野菊花為末每酒服三錢亦可衛生易簡方孫氏集效方只用野菊花連莖搗爛酒煎熱服取汗以滓敷即愈疔瘡發背草烏頭去皮為末用蔥白連須和搗丸豌豆大以雄黃為衣每服一丸先將蔥一根細嚼以熱酒送下或有噁心嘔三四口用冷水一口止之即臥以被厚蓋汗出為度亦治頭風乾坤祕韞疔瘡腫毒端午採豨蘞草日乾為末每服半兩熱酒調下汗出即愈極有效驗集簡方又小薊四兩乳香一兩明礬五錢為末酒服二錢出汗為度普濟方疔腫初起王不留行子為末蟾酥丸黍米大每服一丸酒下汗出即愈集簡方又白芷一錢生薑一兩擂酒一盞溫服取汗即散袖珍方疔瘡入腹牡豬屎和水絞汁服三合立瘥聖惠方疔瘡發汗千年石灰炒十分舊黑傘紙燒灰一分各為末和勻每用一小匙先以齏水些少傾入香油些少同末攪勻沸湯一盞調下厚被蓋之一時大汗出也醫方捷徑疔腫瘡毒已篤者用土蜂房一個蛇退一條黃泥固濟煅存性為末每服一錢空心好酒下少頃腹中大痛痛止其瘡已化為黃水矣輕者一服立效甚者不過二服普濟方一切疔腫危困者用蒼耳根葉搗和小兒尿絞汁冷服一升日二服拔根出邵真人方蒼耳根三兩半烏梅肉五個連須蔥三根酒二鍾煎一鍾熱服取汗疔瘡垂死甘菊花一握搗汁一升入口即活此神驗方也冬月採根肘後方赤疔瘡用狗寶八分蟾酥二錢龍腦二錢麝香一錢為末好酒和丸麻子大每服三丸以生蔥三根同嚼細用熱蔥酒送下暖臥汗出為度後服流氣追毒藥貼拔毒膏取愈通玄論一切疔腫及無名腫毒惡瘡劉松石經驗方用蒼耳草梗中蟲一條白梅肉三四分同搗如泥貼之立愈聖濟總録用麻蟲即蒼耳草內蟲炒黃色白殭蠶茶各等分為末蜜調塗之又用蒼耳節內蟲四十九條槌碎入人言少許槌成塊刺瘡令破敷之少頃以手撮出根即愈疔腫惡毒取蒼耳蠹蟲燒存性研末油調塗之即效或以麻油浸死收貯每用一二枚搗敷即時毒散大有神效時珍又艾蒿一擔燒灰於竹筒中淋取汁以一二合和石灰如糊先以針刺瘡至痛乃點藥三遍其根自拔孫真人千金方疔腫初起多年土內鏽釘須露天者良火煅醋淬刮下鏽末不論遍次煅取收之每用少許人乳和挑破敷之仍炒研二錢以齏水煎滾待冷調服普濟方又用蜣螂心在腹下取之其肉稍白是也貼瘡半日許再易血盡根出即愈劉禹錫患疔毒困極試用輒效一夕百苦皆已又蟾酥加鐵鏽桑滷當門子可拔疔根更入牛黃冰片愈妙兼消一切腫毒自傳祕方又用門白灰一撮羅細以獨蒜或新蒜薹染灰擦瘡口候瘡自然出少汗再擦少頃即消散也雖發背癰腫亦可擦之又用八角兒楊柳上者陰乾去殼四枚如冬月無此取其窠代之蟾酥半錢巴豆仁一個粉霜雄黃麝香少許先以八角兒研如泥入熔化黃蠟少許同衆藥末和作膏子密收每以針刺瘡頭破出血用榆條送膏子麥粒大入瘡中以雀糞二個放瘡口瘡回即止不必再用也名透骨膏忌冷水如針破無血系是著骨疔即男左女右中指甲末刺出血糊藥若又無血即刺足大拇趾血糊藥如都無血必難醫也又糞下土蟬蛻全蠍等分搗作錢大餅香油煎滾溫貼瘡上以津敷瘡四圍疔自出也疔瘡毒腫不破則毒入腹青囊雜纂用蟬蛻炒為末蜜水調服一錢外以津和塗之醫方大成用蟬蛻殭蠶等分為末醋調塗瘡四圍候根出拔去再塗又用雄黃蟾酥各五分為末蔥蜜搗丸小米大以針刺破頂插入甚妙積善堂方又白馬齒燒灰先以針刺破乃封之用濕面圍腫處醋洗去之根出大驗肘後方又用生蜜與隔年蔥研膏先刺破塗之如人行五里許則疔出後以熱醋湯洗去濟急仙方又生人腦即耳垢也鹽泥等分研勻以蒲公英汁和作小餅封之大有效聖惠方又牡狗屎五月五日燒灰塗敷數易之亦治馬鞍瘡神效聖惠方又用蟾酥以白麵黃丹搜作劑每丸麥粒大以指爬動瘡上插入重者挑破納之仍以水澄膏貼之危氏方疔腫初起刮破以熱屎尖敷之干即易不過十五遍即根出立瘥千金方疔毒腫痛白薑石末和雞子清敷之干即易疔自出神驗亦治乳癰腫大崔氏方又魚腥草搗爛敷之痛一二時不可去草痛後一二日即愈陸氏積善堂方疔腫毒瘡黑色焮腫者乃服丹石毒也赤色者肉面毒也用龍葵根一握洗切乳香末黃連三兩杏仁六十枚和搗作餅厚如三錢依瘡大小敷之覺癢即換去癢不可忍切忽搔動候炊久瘡中似石榴子戢戢然乃去藥時時以甘草湯溫洗洗後以蠟貼之終身不得食羊肉如無龍葵以蔓菁根代之聖濟總録疔毒疽瘡凡手指及諸處有瘡起發癢身熱惡寒或麻木此極毒之瘡也急用針刺破擠去惡血候血盡口噙涼水吮之水溫再換吮至痛癢皆住即愈保壽堂方疔腫有根用大針刺作孔削蔓菁根如針大染鐵生衣刺入孔中再以蔓菁根鐵生衣等分搗塗於上有膿出即易須臾根出立瘥忌油膩生冷五辛黏滑陳臭肘後方赤根疔瘡馬牙齒搗末臘豬脂和敷根即出也燒灰亦可千金方疔腫拔根斑螫一枚捻破以針劃瘡上作米字形樣封之即出根也外臺祕要又用白殭蠶為末封之拔根極效別録又取戶邊蜘蛛杵爛醋和先挑四畔血出根稍露敷之干即易一日夜根拔出大有神效千金方疔毒惡腫生烏頭切片醋熬成膏攤貼次日根出又兩頭尖一兩巴豆四個搗貼疔自拔出普濟方又磁石末酢和封之拔根立出外臺祕要又用荔枝肉白梅各三兩搗作餅子貼於瘡上根即出濟生治疔瘡發背惡瘡用海馬炙黃一對穿山甲黃土炒硃砂水銀各一錢雄黃三錢龍腦麝香各少許為末入水銀研不見星每以少許點之一日一點毒自出也祕傳外科疔腫乳癰地黃搗敷之熱即易性涼消腫無不效梅師方疔瘡中風腫痛用驢屎炒尉瘡上五十遍極效普濟方魚臍疔瘡似新火針瘡四邊赤中央黑可刺之若不大痛即殺人也用臘月鮑魚頭灰發灰等分以雞溏糞和塗之千金方又瞿麥燒灰和油敷之甚佳崔氏方又寒食餳塗之良乾者燒灰千金方魚睛疔瘡枯礬末寒食麵糊調貼消腫無膿崔氏方疔腫魚臍外臺用蛇殼雞子大水四升煮三四沸服汁立瘥直指治魚臍瘡出水四畔浮漿用蛇蛻燒存性研雞子清和敷諸腫一切腫毒發背乳癰便毒惡瘡初起者並用五葉藤或根一握生薑一塊搗爛入好酒一碗絞汁熱服取汗以渣敷之即散一用大蒜代薑亦可壽域神方一切腫毒不問已潰未潰或初起發熱用金銀花連莖葉自然汁半碗煎八分服之以滓敷上敗毒托裡散氣和血其功獨勝積善堂方腫毒初起敗龜版一枚燒研酒服四錢小山方又穿山甲能行瘀血通經絡消癰腫排膿血自方瘀血不散變成癰腫生菴䕡蒿搗汁一升服之廣和方瘡腫無頭皂角刺燒灰酒服三錢嚼葵子三五粒其處如針刺為效儒門事親頭面忽腫熱毒風氣內攻或連手足赤腫觸著痛者牛蒡子根一名蝙蝠刺洗淨研爛酒煎成膏以熱酒服一二匙仍用絹攤貼腫處腫消痛減斗門方手足腫痛欲斷取蚯蚓三升以水五升絞汁二升半服之肘後方一切腫疾紅花熟搗取汁服不過三服便瘥外臺祕要一切腫毒及傷寒遺毒發於目之前後及項下腫硬用見腫消草生白芨生白蘞土大黃生大薊根野苧麻根搗成餅入芒硝一錢和貼留頭干即易之若加金線重樓及山慈菰尤妙傷寒蘊要一切腫毒赤遊風皆用芭蕉根搗爛塗之肘後方一切腫毒松香八兩銅青二錢萆麻仁五錢同搗作膏攤貼甚效李樓奇方又用野葡萄根曬研為末水調塗之即消也名赤龍散儒門事親方又蚡鼠壤土和醋敷之極效藏器方諸瘡腫毒鯽魚一斤者去腸柏葉填滿紙裹泥包煅存性入輕粉二錢為末麻油調搽普濟方熱毒瘡腫生茄子一枚割去蒂並內穰二分似罐子形合於瘡上即消也如已出膿再用取瘥聖濟總録癰腫熱毒家芥子末同柏葉搗塗無不愈者大驗得山芥更妙千金翼方風熱腫毒蕓薹苗葉根蔓菁根各三兩為末以雞子清和貼之即消無蔓菁即以商陸代之甚效也近效方一切毒腫不問硬軟取椒葉十重敷腫上舊帛裹之日三易之當重重有毒氣為水流在葉上冬月取干葉鹽水浸軟或取根皮搗爛敷之皆效止痛消腫食膿血勝於衆藥範汪東陽方一切腫毒初起用緑豆粉炒黃色豬牙皂角一兩為末用米醋調塗之皮破者油調之經驗方又麻油煎蔥黑色趁熱通手旋塗自消百一選方又帶泥山藥萆麻子糯米等分水浸研敷之即散也普濟方背上忽腫如盤不識名者取水中白石子一二碗燒熱投水中頻洗之立瘥蘇頌方暴發紅腫痛不可忍者臘糟糟之談野翁試驗方腫毒熱痛醋調白芷末敷之衛生易簡方又用大雄鼠一枚清油一斤煎焦滴水不散濾再煎下炒紫黃丹五兩柳枝不住手攪勻滴水成珠下黃蠟一兩熬帶黑色成膏瓷瓶收之出火毒每用攤貼去痛而涼名靈鼠膏經驗方腫毒焮痛陳藏器本草用醋和土蜂窠塗之直指方加川烏頭等分云未結則散已結則破也一切腫毒痛不可忍萆麻子仁搗敷即止也肘後方無名癰腫疼痛不止山漆磨米醋調塗即散已破者研末干塗集簡方諸瘡腫硬針頭散用蟾酥麝香各一錢研勻乳汁調和入罐中待乾每用少許津調敷之外以膏護住毒氣自出不能為害也保命集癰癤腫硬無頭不變色者米粉四兩蔥白一兩同炒黑研末醋調貼一伏時又換以消為度名烏金散外科精義腫毒不破膽礬雀屎各少許點之直指方蝕爛癰腫及疣贅瘤痣柞櫟木灰四斗桑柴灰四斗石灰一斗五升以沸湯調濕甑中蒸一日取釜中沸湯七斗合甑一淋之取汁再熬至一升投亂頭髮一雞子大消盡又剪五色採投入消盡瓶盛密收每以少許點破之煎時勿令雞犬婦人小兒見之普濟方毒攻手足腫痛欲斷蒼耳搗汁漬之並以渣敷之立效春用心冬用子千金翼方熱毒攻肢手足腫痛欲脫以水煮馬屎汁漬之外臺祕要手足心風氣毒腫鹽椒末等分酢和敷之立瘥肘後方熱毒攻手腫痛欲脫豬膏和羊屎塗之外臺祕要手指腫痛漿水入少鹽熱漬之冷即易之孫真人方手指腫毒惡瘡消毒止痛鏡面草搗爛敷之壽域神方穿掌腫毒新桑葉研爛罨之即愈通玄論手搔瘡腫作膿用鍋臍墨研細清油調搽簡便方腳腿紅腫熱如火炙俗名赤遊風用鐵鏽水塗解之聖濟治遊腫瓷甌中白灰醋磨敷之藏器毒熱足腫作痛欲脫者苦參煮酒漬之姚僧坦集驗方腳跟腫痛不能著地用黃牛屎入鹽炒熱罨之王永輔惠濟方夏月趾腫不能行走者九月收茄根懸簷下逐日煎湯洗之簡便方腫毒尿閉因腫毒未潰小便不通用蔥切入麻油煎至黑色去蔥取油時塗腫處即通普濟方一人因開甑熱氣蒸麵即浮腫眼閉一醫以意取久用炊布為末敷隨消蓋此物受湯上之氣多故用此引出湯毒亦猶鹽水取鹹味以類相感也發背發背初起疑似者便以秦艽牛乳煎服得快利三五行即愈崔元亮海上方發背癰疽諸毒初覺壯熱煩渴者用癩狗寶一兩臘月黑狗膽臘月鯉魚膽各一枚蟾酥二錢蜈蚣炙七條硇砂乳香沒藥輕粉雄黃烏金石各一錢粉霜三錢麝香一分同為末用首生男兒乳一合黃蠟三錢熬膏和丸緑豆大每服一丸或三丸以白丁香七枚研調新汲水送下暖臥汗出為度不過三服立效後食白粥補之濟生發背癰疽初起甘草一大兩水炙搗碎水一大升浸之器上橫一小刀子露一宿平明以物攪令沫出去沫服之但是瘡腫發背皆有效蘇頌圖經治發背癰疽不問淺深大小利去病根則免傳變用車螯即昌蛾紫背光厚者以鹽泥固濟煅赤出火毒一兩生甘草末二錢半輕粉五分為末每服四錢用瓜蔞一個酒二碗煎一碗調服五更轉下惡物為度未下再服甚者不過二服名車螯轉毒散外科精義凡人中熱毒眼花頭暈口乾舌苦心驚背熱四肢麻木覺有紅暈在背後者取槐花子一大抄鐵勺炒褐色以好酒一碗澆之乘熱飲酒一汗即愈如未退再炒一服極效縱成膿者亦無不愈劉松石保壽堂方治諸般發背癰腫用干柞木葉乾荷葉中心蒂干萱草根甘草節地榆各四兩細銼每用半兩水二碗煎一碗早晚各一服已成者其膿血自漸乾涸未成者其毒自消散也忌一切飲食毒物本事普救方發背疔瘡豨蘞草五葉草即五爪龍野紅花即小薊大蒜等分擂爛入熱酒一碗絞汁服得汗立效乾坤生意發背癰毒痛不可忍馬鞭草搗汁飲之以滓敷患處集簡發背初生一切癰疽皆治單用紫荊皮為末酒調箍住自然撮小不開內服柞木飲子乃救貧良劑也仙傳外科發背初起用雞肫黃皮不落水者陰乾臨時溫水潤開貼之隨乾者潤不過三五個即消楊氏經驗方發背癰疽大如盤臭腐不可近桐葉醋蒸貼上退熱止痛漸漸生肉收口極驗祕方也醫林正宗發背初起惡寒嗇嗇或已生瘡腫癮疹硝石三兩暖水一升泡化青布摺三重溫拓赤處熱即換頻易取瘥外臺發背腫毒未成者用活蟾一個系放瘡上半日蟾必昏憒置水中救其命再易一個如前法其蟾必踉蹌再易一個其蟾如舊則毒散矣纍驗極效若勢重者以活蟾一個或兩三個破開連肚乘熱合瘡上不久必臭不可聞再易二三次即愈慎勿以物微見輕也醫林集要又用甘草三大兩生搗篩末大麥曲九兩和勻取好酥少許入內下沸水搜如餅狀方圓大於瘡一分熱敷腫上以細片及故紙隔令通風冷則換之已成者膿水自出未成者腫便內消仍當吃黃耆粥為妙海上方李北海言此方乃神授極奇祕發背諸惡瘡取糞坑泥陰乾為末新水調敷其痛立止時珍發背癰疽成瘡者蘇頌圖經用龍葵一兩為末麝香一分研勻塗之甚善袖珍方用蝦蟆一個同老鴉眼睛草莖葉搗爛敷之即散神效又用雄雞冠血滴疽上血盡再換不過五六雞痛止毒散數日自愈保壽堂方發背癰疽一切腫毒用胡燕窠土鼠坌土榆白皮瓜蔞根等分為末以女人月經衣水洗取汁和敷腫上干即易之潰者封其四圍五日瘥千金方收斂癰疽貓頭一個煅研雞子十個煮熟去白以黃出油入白蠟少許調灰敷之外以膏護住神效醫方摘要癰疽發背初作及經十日以上腫赤焮熱日夜疼痛百藥不效者用孵雞子一枚新狗屎如雞子大攪勻微火熬令稀稠得所捻作餅子於腫頭上貼之以帛包抹時時看視覺餅熱即易勿令轉動及歇手經一宿定如日多者三日貼之一日一易至瘥乃止此方穢惡不可施之於貴人一切諸方皆不能及但可備擇而已千金方治一切發背癰疽無頭惡瘡腫毒疔痛一切風癢臁瘡杖瘡牙疼喉痹五月五日採蒼耳草根數擔洗淨曬萎細銼以大鍋五口如水煮爛以篩濾去粗滓布絹再濾復入淨鍋武火煎滾文火熬稠攪成膏以新罐貯封每以敷貼即愈名萬應膏牙疼即敷牙上喉痹敷舌上或噙化二三次即效每日用酒服一匙極有效集簡方發背惡瘡諸癰疽好光粉二兩真麻油三兩慢火熬以柳枝急攪至滴水成珠入白膠末少許入器水浸兩日油紙攤貼名神應膏治發背瘡甚效取麥飯石碎棋子炭火燒赤投米醋中浸之如此十次研末篩細入乳鉢內用數人更研五七日要細膩如面四兩鹿角一具要生取連腦骨者其自脫者不堪用每二三寸截之炭火燒令煙盡即上為末研細二兩白蘞生研末二兩用三年醋入銀石器內煎令魚目沸旋旋入藥在內竹杖子不住攪熬一二時久稀稠得所傾在盆內待冷以紙蓋收勿令塵入用時以鵝翎拂膏於腫上四圍赤處盡塗之中留錢大泄氣如未有膿即內消已作頭即撮小已潰者用時先以豬蹄湯洗去膿血故帛挹干乃用藥其瘡切忌手觸動嫩肉仍不可以口氣吹風及腋氣月經有孕人見之合藥亦忌此等初時一日一洗一換十日後二日一換此藥要極細方有效若不細塗之即極痛也發背癰疽不起發或瘀肉不腐潰及陰瘡瘰癧流注臁瘡頑瘡惡瘡久不愈者用桑木灸法未潰則拔毒止痛已潰則補接陽氣亦取桑通關節去風寒火性暢達出郁毒之氣其法以干桑木劈成細片扎作小把燃火吹息灸患處每次灸片時以瘀肉腐動為度內服補托藥誠良方也發背髮乳豬脂切片冷水浸貼日易四五十片甚妙救急發背初起未成及諸熱腫以濕紙拓上先干處是頭著艾灸之不論壯數痛者灸至不痛不痛者灸至痛乃止其毒即散不散亦免內攻神方也袁絳兵部手集背瘡灸法凡覺背上腫硬疼痛用濕紙貼尋瘡頭用大蒜十顆淡豆豉半合乳香一錢細研隨瘡頭大小用竹片作圈圍定填藥於內二分厚著艾灸之痛灸至癢癢灸至痛以百壯為率與蒜錢灸法同功外科精要又凡背腫取獨蒜橫截一分安腫頭上炷艾如梧子大灸蒜百壯不覺漸消多灸為善勿令大熱若覺痛即孳起蒜蒜焦更換新者勿令損皮肉但是發背及癰疽惡瘡腫核初起有異皆可灸之不計壯數惟要痛者灸至不痛不痛者灸至痛而止疣贅之類灸至亦便成痂自脫其效如神發背已潰用雞肫黃皮同綿絮焙末搽之即愈發背潰爛陳蘆葉為末以蔥椒湯洗淨敷之神效乾坤祕韞又黃黑牛糞多年者曬乾為末入百草霜勻細摻之談野翁方發背欲死芭蕉根搗爛塗之肘後方又伏龍肝末酒調厚敷之干即易平乃止千金方又冬瓜截去頭合瘡上瓜爛截去更合之瓜未盡瘡已小斂矣乃用膏貼之肘後方又宗奭云凡發背及一切癰疽者削冬瓜一大塊置瘡上熱則易之分散熱毒氣甚良丹毒五色丹毒俗名遊腫犯者多死不可輕視以榆樹白皮末雞子白和塗之千金方又取人中黃糞清飲二合並塗之良千金方又苧根煎濃汁日三浴之外臺祕要又蒲席燒灰和雞子白塗之良千金方遊風丹腫蕓薹葉搗敷即消千金方一切熱毒丹腫腮痛雞子白和赤小豆末塗神效小品方火丹赤腫遍身者羚羊角燒灰雞子清和塗之神效外臺又大黃磨水頻刷之急救方熱毒丹瘡千金方用慎火草搗汁拭之日夜一二十遍一方入苦酒搗泥塗之又思邈曰凡天下極冷無過藻草但有患熱毒腫並丹毒者取渠中藻菜切搗敷之厚三分干即易其效無比老小火丹黃芩末水調塗之梅師方赤黑丹疥或癢或燥不急治遍身即死白瓷末豬脂和塗之聖濟録又煎青羊脂摩之數次愈集驗方丹從臍起檳榔末醋調敷之身面卒得赤斑或瘭子腫起不治殺人羖羊角燒灰雞子清和塗之甚妙肘後方火焰丹腫老鴉眼睛草葉入醋細研敷之能消赤腫蘇頌圖經本草火焰丹毒水調芒硝末塗之梅師方又方銀硃調雞子清塗之李樓怪症方火焰丹毒從頭起者生蔥汁塗之纏蛇丹毒馬藺草擂醋搽之濟急方身面丹腫如蛇狀者以雨滴階上苔痕水花塗頭上即愈危氏得效方赤瘤丹毒無名異末蔥汁調塗立消簡便方發丹如瘤生綿羊腦同朴硝研塗之瑞竹堂方治足脛以上火丹鏡面草搗汁服兼敷時珍方火灶丹毒從兩腳起如火燒五加皮根葉燒灰五兩取煅鐵家槽中水和塗之楊氏産乳丹石毒發發熱者不得食熱物不用火為使但著厚衣暖臥取油一匙含咽戒怒二七日也枕中記云服丹石人先宜以麻油一升薤白三升切納油中微火煎黑去滓合酒每服三合百日氣血充盛也火毒生瘡凡人冬月向火大氣入內兩股生瘡膿水淋漓用黃柏末摻之立愈張杲醫説楊梅瘡治楊梅瘡不犯輕粉病深者月餘淺者半月即愈服輕粉藥筋骨攣痛癱瘓不能動履者服之亦效用土茯苓一兩薏苡仁金銀花防風木瓜木通白蘚皮各五分皂莢子四分氣虛加人參七分血虛加當歸七分水二大碗煎飲一口三服搜風解毒妙不可言惟忌飲茶及羊牛雞鵝魚肉燒酒法面房勞蓋祕方也時珍方楊梅瘡筋骨痛椰殼燒存性臨時炒熱以滾酒泡服二三錢暖覆取汗其痛即止神驗時珍楊梅瘡痘小如指頂遍身者先服敗毒散後用此解皮膚風熱不過十服愈用瓜蔞皮為末每服三錢燒酒下日三服集簡方治廣瘡結毒木瓜一味末之日五服白湯吞三錢自方筋骨毒痛因患楊梅瘡服輕粉藥成者野薔薇根白皮洗三斤水酒十斤煮一炷香每日任飲以愈為度鄧筆峰方一方用刺薔薇根三錢五加皮木瓜當歸茯苓各二錢以酒二盞煎一盞日服一次輕粉毒痛年久不愈者威靈仙三斤水酒十瓶封煮一炷香出火毒逐日飲之以愈為度集簡方解輕粉毒近有好淫之人多病楊梅毒瘡藥用輕粉愈而復發久則肢體拘攣變為癰漏延綿歲月竟致廢篤惟銼土茯苓三兩或加皂莢牽牛各一錢水六碗煎三碗分三服不數劑多瘥蓋此疾始由毒氣干於陽明而發加以輕粉燥烈久而水衰肝挾相火來凌脾土土屬濕主肌肉濕熱鬱蓄於肌腠故發為癰腫甚則拘攣內經所謂濕氣害人皮肉筋骨是也土茯苓甘淡而平能去脾濕濕去則營衛從而筋脈柔肌肉實而拘攣癰漏愈矣中輕粉毒齒縫出血臭腫貫衆黃連各半兩煎水入冰片少許時時漱之陸氏積德堂方楊梅惡瘡馬鞭草煎湯先熏後洗氣到便爽痛腫隨減陳嘉謨本草蒙筌又銀硃官香等分為末以紙卷作捻點燈置桶中以鼻吸煙一日一作七日愈一方銀硃二錢孩兒茶一錢龍挂香一錢皂角子一錢為末如上法用又方銀硃輕粉各一錢黃蠟清油各一兩化開和收以油紙攤貼瘡痂自脫也又雄黃一錢半杏仁三十粒去皮輕粉一錢為末洗淨以雄豬膽汁調上二三日即愈積德堂方楊梅瘡年久破爛坑陷者用銀硃水粉線香各三錢乳香沒藥各五分片腦二分為末以紙卷作捻浸油點燈照瘡日三次七日見效須先服通聖散數貼臨時口含椒茶以防毒氣入於齒也男女下疳母豬糞黃泥包煅存性為末以米泔洗淨搽立效簡便方又用孩兒茶末米泔洗淨敷之神效或加胡黃連等分外科又孩兒茶一錢珍珠一分片腦半分為末敷之纂奇方又孩兒茶一錢輕粉一分片腦一字為末搽之唐氏方又爐甘石火煅醋淬五次一兩孩兒茶三錢為末油調敷立愈邵真人方又破絲網燒存性孩兒茶各五分研末以濃茶洗淨擪之三五次效忌生酒房事發物集簡方又橄欖燒存性研末油調敷之或加孩兒茶等分乾坤生意又方五倍子花椒去子炒各一錢細辛焙三分為末先以蔥湯洗淨搽之一二日即生肉也杏林摘要又駝絨燒灰水澄過入炒黃丹等分為末搽之即效經驗方又雞卵殼炒研油調敷之杏林摘要蛀干陰瘡以桐油傘紙燒灰出火毒一夜敷之便結痂袖珍又鯽魚膽取汁塗疳瘡陰蝕瘡殺蟲止痛點喉中並治骨鯁竹刺不出時珍陰頭疳蝕雞內金不落水拭淨新瓦焙脆出火毒為細末先以米泔水洗瘡乃搽之亦治口疳經驗方疳瘡成漏膿水不止用羊羔兒骨鹽泥固濟煅過研末五錢入麝香雄黃末各一錢填瘡口三日外必合總微論下疳濕瘡蠶繭盛頭垢再以一繭合定煅紅出火毒研搽楊氏方又發灰一錢棗核七個燒研洗貼心鑑妒精下疳大訶子燒灰入麝香少許先以米泔水洗後搽之或以荊芥黃柏甘草馬鞭草蔥白煎湯洗亦可夷堅志身面疳瘡出黃水者葵根燒灰和豬脂塗之食療本草久漏瘡瘡久成漏忍冬草浸酒日日常飲之元禮要訣下部漏瘡苦參煎湯日日洗之直指方漏瘡腫痛柳根紅須煎水日洗又方用楊柳條罐內燒煙燻之出水即效摘玄方又豬膽七個綿胭脂十個洗水和勻搽七次即可救急方漏瘡膿血白乳香二錢牡蠣粉一錢為末雪糕丸麻子大每薑湯服三十丸直指方漏瘡水溢乃腎虛也牽牛末二錢半入切開豬腎中竹葉包定煨熟空心溫酒送下借腎入腎一縱一橫兩得其便惡水即泄不復淋瀝直指方漏瘡惡穢大腹皮煎湯洗之直指方漏瘡不合童尿制爐甘石牡蠣粉外塞之內服滋補藥諸瘻不合先以疳清溫洗拭淨取葵菜微火烘暖貼之不過二三日藥引膿盡即肉生也忌豬魚蒜房事必效方九漏有蟲幹人屎干牛屎隔綿貼之蟲聞其氣即出若癢則易之蟲盡乃止千金方骨攣癰漏服輕粉致傷脾胃氣血筋骨疼痛久而潰爛成癰連年纍月至於終身成廢疾者土萆薢一兩有熱加芩連氣虛加四君子湯血虛加四物湯水煎代茶月餘即安外科發揮潰癰不合老鼠一枚燒末敷之千金方諸瘡久潰絲瓜根熬水掃之大涼即愈應驗方瘡口不斂生肌肉止疼痛去惡水寒水石燒赤研二兩黃丹半兩為末摻之名紅玉散和劑局方又五倍子焙研末以蠟醋腳調塗四圍效諸瘡不合白膠香輕粉各二錢豬脂和塗直指方又秦艽為末摻之直指方斂瘡生肌黃柏末麵糊調塗效宣明方又水紅花根煎湯淋洗仍以其葉曬乾研末敷瘡上每一次談野翁試驗方長肌肉白蠟與合歡皮同入長肌肉膏中用之神驗蓋白蠟屬金稟受收斂堅強之氣為外科要藥震亨又仙人杖乃長肉之祕藥蘸麻油於空室中燒之取滴下油塗癰疽已潰長肉瘡中朽骨久疽久漏中有朽骨以烏骨雞脛骨實以砒石鹽泥固濟煅紅出毒以骨研末飯丸粟米大每以白紙捻送一粒入竅中以拔毒膏藥封之其骨自出醫學正傳
