body:
  text: 卷十四幼科初生初生解毒小兒初生未可便與硃砂蜜只以甘草一指節長炙碎以水二合煮取一合以綿染點兒口中約一蜆殼當吐出胸中惡汁此後待兒飢渴更與之令兒智慧無病出痘稀少王璆選方又小兒初生嚼生芝麻綿包與兒咂之其毒自下又用橄欖一個燒研硃砂五分和勻嚼生芝麻一口吐唾和藥絹包如棗核大安兒口中待咂一個時頃方可與乳此藥取下腸胃穢毒令兒少疾及出痘稀少也集效方又小兒初生未出聲時以黃連煎汁灌一匙令終身不出斑已出聲者灌之斑雖發亦輕此祖方也更用黃連煎湯浴兒使不生瘡及丹毒王海藏又初生小兒十三日以本身剪下臍帶燒灰用乳汁調服可免痘患或入硃砂少許保幼大全兔血丸初生兒服之終身不出痘毒或出亦稀少臘月八日取生兔一隻刺血和蕎麥麵少加雄黃四五分候乾丸如綠豆大以乳汁送下二三丸遍身發出紅點是其徵驗也但兒長成常以兔肉啖之尤妙保壽堂方小兒初生浴湯中入鹽少許拭乾以膩粉少許摩其身既不畏風又散諸氣全幼心鑑又益母草五兩煎水浴之不生瘡疥簡要方又豬膽入湯浴之不生瘡疥姚和眾方又七月八月或三伏日或中秋日剪葫蘆須如環子腳者陰乾於除夜煎湯浴小兒則可免出痘經驗方小兒初生無膚色赤因受胎未得土氣也取車輦土碾敷之三日後生膚時珍方初生無皮色赤但有紅筋乃受胎未足也用早白米粉撲之肌膚自生聖濟方生下胎疾小兒胎熱黑豆二錢甘草一錢入燈心七寸淡竹葉一片水煎全幼心鑑嬰兒胎熱火瘡用雞子五枚煮熟去白取黃亂髮如雞子大相和於鐵銚中炭火熬之初甚干少頃即發黑乃有液出旋取置碗中以液盡為度取塗瘡上即以苦參末粉之頃在武陵生子蓐內便有熱瘡塗諸藥無益而日益劇蔓延半身晝夜號啼不乳不睡因閱本草得此方用之果神效也劉禹錫傳信方初生胎熱或身體黃者以真牛黃一豆大入蜜調膏乳汁化開時時滴兒口中形色不實者勿多服錢氏方又初生先以豬乳乳之出月可免驚癇痘疹之患張煥小兒血眼自初生艱難血瘀眥睚遂濺滲其睛不見瞳仁輕則上胞赤腫重則弦爛用杏仁二枚去皮尖嚼乳汁三五匙入膩粉少許蒸熟絹包頻點重者加黃連朴硝最良全幼心鑑小兒胎赤眼用小兒吐出蛔蟲二條瓷盒盛之紙封埋濕地五日取出化為水瓷碗收每日以銅箸點之普濟方又燈心蘸雞膽點甚良時珍又初生時以韭汁少許灌之即吐出惡水惡血永無諸疾四聲本草初生目閉由胎中受熱也以熊膽少許蒸水洗之一日七八次如三日不開服四物湯加甘草天花粉全幼心鑑嬰兒目澀月內目閉不開或腫澀羞明或出血者名慢肝風用甘草一截以豬膽汁炙為末每用米泔調少許灌之幼幼新書小兒胎驚琥珀防風各一錢硃砂半錢為末豬乳調一字入口中最妙直指方又蠍一枚薄荷葉包炙為末入硃砂麝香少許麥門冬煎湯調一字效湯氏寶書小兒驚啼黃芩人參等分為末每服一字水飲下普濟方小兒驚熱夜臥多啼硃砂半兩牛黃一分為末每用一字犀角磨水調下普濟方又初生小兒驚風欲死硃砂磨新汲水塗五心最驗斗門方小兒驚啼發歇不定用臘月縛豬繩燒灰水服少許藏器百日發驚蚱蟬去翅足炙三分赤芍藥三分黃芩二分水二盞煎一盞溫服聖惠方小兒胎癇琥珀硃砂各少許全蠍一枚為末麥門冬湯調服一字直指方小兒胎寒腹痛汗出用衣中白魚二七枚絹包於兒腹上迴轉摩之以愈為度聖惠方小兒胎寒好啼晝夜不止因此成癇當歸末一小豆大以乳汁灌之日夜三四度肘後方小兒躽啼面青腹強是忤客氣新馬糞一團絞汁灌之聖濟總錄大頭風小兒驚風並用大蒜七個先燒紅地以蒜逐個於地上磨成膏卻以殭蠶一兩去頭足安蒜上碗覆一夜勿令泄氣只取蠶研末每用㗜鼻口內含水有效普濟方小兒舌膜初生兒有白皮裹舌根可以指甲刮破令血出用燒礬末半綠豆許敷之若不摘去其兒必啞至寶方初生不啼取冷水灌之外以蔥白莖細鞭之即啼全幼心鑑小兒口噤三聖散用干蜘蛛一枚去足竹瀝浸一宿炙焦蠍稍七個膩粉少許為末每用一字乳汁調時時灌入口中直指治小兒十日內口噤不能吮乳蜘蛛一枚去足炙焦研末入豬乳一合和勻分作三服徐徐灌之神效無比聖惠方又豬乳灌之甚良楊士瀛又牛黃為末以淡竹瀝化一字灌之更以豬乳滴之外臺方小兒口噤面赤者屬心白者屬肺用雞矢白如棗大綿裹以水一合煮分二服一方酒研服之千金方小兒口噤用雀屎水丸麻子大飲下二丸即愈千金方小兒百日內噤風口中有物如蝸牛或如黃頭白蟲者薄豬肪擦之即消聖惠方小兒口緊不能開合飲食不治即死蛇蛻燒灰拭淨敷之千金方初生吐乳不止人乳二合蘧蒢篾少許鹽二粟大同煎沸入牛黃米許與服鬼遺方撮口臍風乃胎熱也用蝸牛五枚去殼研汁塗口取效乃止又方用蝸牛十枚去殼研爛入蒔蘿末半分研勻塗之取效甚良又用天漿子有蟲者一枚直殭蠶炒一枚膩粉少許研勻以薄荷自然汁調灌之名白龍膏取下毒物神效聖惠方又壁魚兒研末每以少許塗乳令兒吮之聖惠方初生斷臍後傷風濕唇青口撮出白沫不乳用全蠍廿一個無灰酒塗炙為末入麝香少許每用金銀煎湯調半字服之全幼心鑑又用壁虎後半截焙為末男用女乳女用男乳調勻入稀雞矢少許摻舌根及牙關仍以手蘸摩兒取汗出甚效筆峰雜興小兒初生以綿裹臍帶離臍五六寸扎定咬斷以鵝翎筒送藥一二分入臍大孔輕輕揉散以艾柱灸臍頭三壯結住勿打動候其自落永無臍風之患萬不失一臍硬者用之軟者無病不必用也其法用陰乾棗貓兒研末三個珍珠四十九粒捶碎炒黃丹五分白枯礬蛤粉血竭各五錢研勻如上法用臍有三孔一大二小也時珍方臍風出汁螻蛄甘草等分並炙為末敷之總錄又小兒斷臍即用清油調發灰敷之不可傷水臍濕不幹亦敷之小兒臍腫荊芥煎湯洗淨以煨蔥刮薄出火毒貼之即消海上方兒臍腫出汁白石脂末熬溫撲之日三度勿揭動獨行方臍風濕腫久不瘥者蜂房燒末敷之效子母秘錄小兒臍腫出汗不止白礬燒灰敷之聖惠方小兒臍濕不早治成臍風或腫赤或出水用當歸胡粉等分為末試之最驗或加麝香少許若愈後因尿入復作再敷即愈聖惠方全幼心鑑同但加落下臍帶燒研一錢無胡粉小兒臍瘡蠐螬研末敷之不過數次效千金方小兒初生大小便不通用真香油一兩皮硝少許同煎滾冷定徐徐灌入口中嚥下即通經驗方襁褓小兒大小便不通並驚熱痰實欲得溏動者大黃浸酒炒郁李仁去皮研各一錢滑石末一兩搗和丸黍米大二歲小兒三丸量人加減錢乙方初生便閉甘草枳殼煨各一錢半水半盞煎服全幼心鑑初生不尿人乳四合蔥白一寸煎滾分作四服即利劉涓子鬼遺方初生尿澀不通車前搗汁入蜜少許灌之全幼心鑑小兒初生七八日大小便血出乃熱傳心肺不可服涼藥只以生地黃汁五七匙酒半匙蜜半匙和服之全幼心鑑驚搐附客忤小兒驚風白殭蠶蠍稍等分天雄尖附子尖各一錢微炮為末每服一字或半錢以薑湯調灌之甚效寇氏衍義小兒客忤剪驢膊上旋毛一彈子以乳汁煎飲外臺又用全蠍一個以薄荷四葉裹定火上炙焦同研為末分四服白湯下亦治大人風涎即上方作一服經驗方小兒客忤卒中者燒母衣帶三寸併發灰少許乳汁灌之外臺秘要又生半夏一錢皂角半錢為末吹少許入鼻取嚏驚散又牛鼻津水和少許灌之外臺方小兒客忤因見生人所致取來人囟上發十莖斷兒衣帶少許合燒研末和乳飲兒即愈千金方治驚風十不失一其詩云一半硃砂一半雪其功只在青蒿節任教死去也還魂服時須用生人血用青蒿蠹和硃砂汞粉各五分同研丸粟粒大一歲一丸乳汁服保嬰集小兒客忤面青驚痛銅照子鼻燒赤少酒淬過與兒飲聖惠方小兒積熱毛焦睡語欲發驚者牛黃六分硃砂五錢同研以犀角磨汁調服一錢總微論又牛膽釀南星末陰乾有奇功蘇頌方小兒客忤口不能言細辛末桂心末等分以少許納口中驚風不醒白烏骨雄雞血抹唇上即醒醫學集成客忤夜啼用本家廚下燒殘火柴頭一個削平焦處向上硃砂書云撥火杖撥火杖天上五雷公差來作神將捉住夜啼鬼打殺不要放急急如律令書畢勿令人知安立床前腳下男左女右岣嶁神書急慢驚風奪命散治痰涎壅塞咽喉命在須臾服此墜下風痰乃治驚利痰之聖藥也真礞石一兩焰硝一兩同煅過為末每服半錢或一錢急驚痰熱者薄荷自然汁入生蜜調下慢驚脾虛者木香湯入熟蜜調下亦或雪糕丸綠豆大每服三丸嬰孩寶鑑急慢驚風口角喎斜搐搦痰盛用天漿子房去皮生用三枚乾蠍生用七枚硃砂一錢研勻飯丸粟米大每服二丸荊芥湯送下聖惠方一加殭蠶炒研為末每以麻黃湯調服一字蘇頌方中惡客忤項強欲死衣魚十枚研敷乳上吮之入咽立愈或以二枚塗母手中掩兒臍得吐下愈外仍以摩項強處小兒驚忤暴驚卒死中惡用蜀漆二錢炒左顧牡蠣一錢二分漿水煎服當吐痰而愈名千金湯阮氏方小兒驚竄兩眼看地不上者皂角燒灰以童尿浸刮屎柴竹用火烘乾為末貼在囟門便蘇王氏小兒方小兒諸驚仰向後者燈火淬其囟門兩肩臍之上下眼翻不下者淬其臍之上下不省人事者淬其手足心心之上下手拳不開口往上者淬其頂心兩手心撮口出白沫者淬其口上下手足心驚風秘訣又麝香少許乳汁塗兒口中取效醋調亦可廣利方小兒卒驚似有痛處不知疾狀用雄雞冠血少許滴口中妙談氏方小兒急驚用生蚯蚓一條研爛入五福化毒丹一丸同研以薄荷湯少許化下累試有驗普濟方又遠年白田螺殼燒灰入麝香少許水調灌之普濟方急驚涎潮壯熱悶亂鐵粉二錢硃砂一錢為末每服一字薄荷湯調下楊氏家藏急驚昏迷不省人事石綠四兩輕粉一錢為末薄荷汁入酒調一字服取吐全嬰方小兒急驚肺脹喘滿胸高氣急脅縮鼻脹悶亂咳嗽煩渴痰潮聲嘎俗名馬脾風不速治死在旦夕白牽牛黑牽牛半生半炒大黃煨檳榔各取末一錢每用五分蜜湯調下痰多加輕粉一字名牛黃奪命散全幼心鑑小兒慢驚及天吊夜啼用蝙蝠一枚去腸翅炙黃焦人中白乾蠍焙麝香各一分為末煉蜜丸綠豆大每服乳汁下三丸名返魂丹聖惠方小兒慢驚搐搦涎壅厥逆生川烏頭去皮臍一兩全蠍十個去尾分作三服水一盞姜七片煎服湯氏嬰孩寶鑑慢驚瘛瘲定魄安魂益氣用血竭半兩乳香二錢半同搗成劑火炙熔丸梧子大每服一丸薄荷煎湯化下夏月用人參湯御藥院方慢脾驚風白附子半兩天南星半兩黑附子一錢並炮去皮為末每服二錢生薑五片水煎服亦治大人風虛止吐化痰楊氏家藏又人參冬瓜仁各半兩南星一兩漿水煮過為末每用一錢水半盞煎三分溫服本事方慢脾驚風利痰奇效用開元通寶錢背後上下有兩月痕者其色淡黃黑頗小以一個放鐵匙上炭火燒四圍上下各出珠子取出候冷傾入盞中作一服以南木香湯送下或人參湯亦可錢雖利痰非胃家所好須以木香佐之直指方小兒久病或吐瀉後生驚轉成慢脾用蠍稍二兩為末以石榴二枚剜空用無灰酒調末填入蓋定坐文武火上時時攪動熬膏取出放冷每服一字金銀薄荷湯調下本事方治吐利後昏睡生風癇慢脾症全蠍白朮麻黃去節等分為末二歲以下一字三歲以上半錢薄荷湯下脾虛而成慢驚者用益黃理中之藥必傷人命當於心經中以甘溫補土之源更於脾土中以甘寒瀉火以酸涼補金使金旺火衰風木自平矣今立黃耆湯瀉火補金益土為神治之法用炙黃耆二錢人參一錢炙甘草五分白芍五分水一大盞煎半盞溫服東垣方小兒瀉後眼上竄三日不乳目黃如金氣將絕此慢肝驚風也宜治肝用水飛代赭石末每服半錢冬瓜仁煎湯調下愈好古方馬脾風病小兒風熱喘促悶亂不安謂之馬脾風甘遂面包煮一錢半辰砂水飛二錢半輕粉一角為末每服一字漿水少許滴油一小點抄藥在上沉下去漿灌之名無價散全幼心鑑烏沙驚風小兒驚風遍身都烏者急推向下將黃土一碗搗末入久醋一鍾炒熱包定熨之引下至足刺破為妙小兒秘訣小兒驚熱鉤藤一兩硝石半兩甘草炙一分為末每溫水服半錢日三服名延齡散聖濟錄又牛黃一杏仁大竹瀝薑汁各一合和勻與服總微論又天竺黃二錢雄黃牽牛末各一錢研勻麵糊丸粟米大每服五丸薄荷湯下錢乙方小兒驚熱心肺積熱夜臥多驚鉛霜牛黃各半分鐵粉一分研勻每服一字竹瀝調下聖濟總錄小兒因驚吐逆作搐痰涎壅塞手足掣瘲眼睛斜視枳殼去穰麩炒淡豆豉等分為末每服一字甚者半錢急驚薄荷自然汁下慢驚荊芥湯入酒三五點下日三服陳文中方二氣砂升降陰陽既濟水火為扶危救急之神藥治久患反胃及一切吐逆小兒驚吐其效如神用水銀一兩硫黃六銖細研炒作青砂頭後入水火既濟爐抽之如束針紋者成就也按胡演丹藥秘訣云升靈砂法用新鍋安逍遙爐上蜜揩鍋底文火下燒入硫黃二兩熔化投水銀半斤以鐵匙急攪作青砂頭如有焰起噴醋解之待永不見星取出細研盛入水火鼎內鹽泥固濟下以自然火升之乾水十二盞為度取出如束針紋者成矣此丹最能鎮墜主上盛下虛痰涎壅盛頭旋吐逆殺精魅惡鬼氣時珍方小兒驚啼啼而不哭煩也哭而不啼躁也用蟬蛻二七枚去翅足為末入硃砂末一字蜜調與吮之活幼口議驚後瞳斜小兒驚後瞳仁不正者人參阿膠糯米炒成珠各一錢水一盞煎七分溫服日再服愈乃止直指方嬰孩驚風后失音不能言肥兒丸蕪荑神麯麥芽黃連各炒一錢為末豬膽汁打糊丸黍米大每服十丸木通湯下黃連能去心竅惡血全幼心鑑小兒驚邪安息香一豆許燒之自除奇效良方小兒截驚以芭蕉汁薄荷汁煎勻塗頭項留囟門塗四肢留手足心勿塗甚效筆峰雜興小兒驚癇雁喉下白毛療小兒癇有效又自落翎毛小兒佩之闢驚癇日華子小兒驚癇一百二十種用荊芥穗二兩白礬半生半枯一兩為末糊丸黍米大硃砂為衣每薑湯下二十丸日二服醫學集成驚癇發熱干藍凝水石等分為末水調敷頭上聖惠方又用丹參雷丸各半兩豬膏二兩同煎七上七下濾去滓盛之每以摩兒身上日三次千金方癇附風痰小兒諸癇雄黃硃砂等分為末每服一錢豬心血入齏水調下直指方小兒癇疾用衣中白魚七枚竹茹一握酒一升煎二合溫服之外臺秘要小兒風癇取蠍五枚以一大石榴割頭剜空納蠍於中以頭蓋之紙筋和黃泥封裹微火炙乾漸加火煅赤候冷去泥取中焦黑者細研乳汁調半錢灌之便定兒稍大以防風湯調服篋中方小兒風癇瘛瘲用人參蛤粉辰砂等分為末以猳豬心和血丸綠豆大每服五十丸金銀湯下一日二服大有神效氣虛者是要藥衛生寶鑑又飛鴟頭三枚即鷂鉛丹一斤為末蜜丸梧子大每酒服三丸日三次千金方治風熱驚癇瘛瘲紫石英白石英寒水石石膏乾薑大黃龍齒牡蠣甘草滑石等分㕮咀水一升煎去三分食後溫服無不效者名風引湯金匱方驚癇中風壯熱掣瘲吐舌出沫用豬卵一雙切細當歸二分以淳酒三升煮一升分服普濟方小兒驚癇不知人嚼舌仰目者犀角濃磨水服之立效為末亦可廣利方癲癇瘛瘲眼暗嚼舌雌黃黃丹炒各一兩為末入麝香少許以牛乳汁半升熬成膏和杵千下丸麻子大每溫水服三五丸直指方小兒羊癇羖羊角燒存性以酒服少許普濟方又白羊屎中豆日日服之良總微論小兒羊癇寒熱三月三日取羊齒可治別錄小兒蟲癇胃寒蟲上諸症危惡與癇相似用白蕪荑乾漆燒存性等分為末米飲調服一字至一錢杜壬方卒得癇疾鉤藤甘草炙各二錢水五合煎二合每服棗許日五夜二度聖惠方小兒驚癇用入蟄蝙蝠一個入成塊硃砂三錢在腹內以新瓦合煅存性為末候冷空心分四服兒小分五服白湯下醫學集成又青黛量兒大小水研服之亦治疳熱夜啼生生編又五月五日取豬齒燒灰服別錄小兒驚癇發熱取月候血和青黛水調服一錢入口即瘥量兒加減聖惠方小兒驚癇掣瘲用虎睛水調灌之良經驗方久年驚癇守宮膏用守宮一個剪去四足連血研爛入珍珠麝香龍腦硃砂各一字研勻以薄荷湯調服仍先或吐或下去痰涎而後用此大有神效奇效方小兒癇後喑不能言以天南星濕紙包煨為末雄豬膽汁調服二字全幼心鑑小兒癇病瘥後血氣上虛熱在皮膚身面俱腫萎蕤葵子龍膽茯苓前胡等分為末每服一錢水煎服聖濟總錄附風痰一切風痰白殭蠶七個直者細研薑汁調灌之勝金方小兒風痰熱毒壅滯涼心壓驚抱龍丸用牛膽南星一兩入金錢薄荷十片丹砂一錢半龍腦麝香各二字研末煉蜜丸芡子大每服一丸竹葉湯化下小兒風痰壅閉語音不出氣促喘悶手足動搖訶子半生半炮去核大腹皮等分水煎服名二聖散全幼心鑑小兒痓風頭及四肢皆往後以鴨涎滴之海上方天釣小兒天釣蕓薹子生烏頭去皮尖各二錢為末每用一錢水調塗頂上名塗頂散聖濟總錄天釣驚風翻眼向上用乾蠍全者一個瓦炒好硃砂三綠豆大為末飯丸桐子大外以硃砂少許為衣同酒化下一丸頓愈聖惠方天釣目睛上視用壁魚兒乾者十個濕者五個用乳汁和研灌之聖惠方小兒天釣頭目仰視痰塞內熱川金牛兒即蟬蛻以漿水煮一日曬乾為末每用一字冷水調下衛生易簡方天釣驚風發歇不定鵲屎炒研半錢入牛黃麝香各半錢炒蠍五枚為末每服半錢新汲水下時珍方小兒盤腸內釣腹痛用乳香沒藥木香等分水煎服之阮氏小兒方又用蔥湯洗兒腹仍以炒蔥搗貼臍上良久尿出痛止嬰孩寶鑑又以莪荗半兩用阿魏一錢化水浸一日夜焙研每服一字紫蘇湯下保幼大全小兒盤腸內釣腹痛不止用阿魏為末大蒜半瓣炮熟研爛和丸麻子大每艾湯服五丸總微論小兒內釣多啼銀硃半錢乳香煨蒜各一錢為末研丸黍米大半歲五丸薄荷湯下心鑑小兒盤腸氣痛延胡索茴香等分炒研空心米飲量兒大小與服衛生方又用蘿蔔子炒黃研末乳香湯服半錢直指方又山梔子仁半兩草烏頭少許同炒過去草烏入白芷一錢為末每服半錢茴香蔥白酒下普濟方痘瘡預解痘毒多者令少少者令不出每用鶴卵一枚煮與小兒食之活幼全書又用白水牛蝨一歲一枚和米粉作餅與兒空腹食之即下惡糞終身可免痘瘡談埜翁方一方用白牛蝨四十九枚焙綠豆四十九粒硃砂四分九釐研末煉蜜丸小豆大以綠豆湯下又用白鴿卵一對入竹筒封置廁中半月取出以卵白和辰砂三錢丸綠豆大每服三十丸三豆飲下毒從大小便出也潛江方又方每除夜煮白鴿汁飼兒仍以毛煎湯浴則出痘稀少又用雞卵一枚活地龍一條入卵內飯上蒸熟去地龍與兒食每歲立春日食一枚終身不出痘也保和方又用頭生雞卵一枚童便浸七日水煮食之永不出痘連食七枚俱頭生者佳李氏方又用頭生雞子三五枚浸廁坑內五七日取出煮熟與食數日再日一枚永不出痘李捷方消解痘毒紫草一錢陳皮五分蔥白三寸新汲水煎服直指方陰陽二血丸治小兒痘瘡未出者稀已出者減用兔血鹿血各以青紙盛置灰上曬乾乳香沒藥各一兩雄黃黃連各五錢硃砂麝香一錢為末煉蜜丸綠豆大每服十丸空心酒下兒小者減之集效方浴兒免痘除夕黃昏時用大烏魚一尾小者二三尾煮湯浴兒遍身七竅俱到不可嫌腥以清水洗去也若不信但留一手或一足不洗遇出痘時則未洗處偏多也此方乃異人所傳不可輕異醫方摘要又十二月取兔頭煎湯浴小兒涼熱去毒令出痘稀飲膳正要又五六月取絲瓜蔓上卷鬚陰乾至正月初一日子時用二兩半煎湯父母只令一人知溫浴小兒身面上下以去胎毒永不出痘縱出亦少也體仁彙編時行暄暖恐發痘瘡用生麻油一小盞水一盞旋旋傾下油內柳枝攪稠如蜜每服二三蜆殼大人二合臥時服之三五度大便快利瘡自不生矣此扁鵲油劑法也又用生玳瑁生犀角各磨汁一合和勻溫服半合日三服最良未發內消已發稀少靈苑方扁鵲三豆飲治天行痘瘡預服此飲疏解熱毒縱出亦少用綠豆赤小豆黑大豆各一升甘草節二兩以水八升煮極熟任意食豆飲汁七日乃止時行瘡疹正發服此則可無患茜根煎汁入少酒飲之奇效良方嬰童痘疹三四日隱隱將出未出色赤便閉者紫草二兩銼以百沸湯一盞泡封勿泄氣待溫時服半合則瘡雖出亦輕大便利者勿用煎服亦可經驗方小兒發熱不拘風寒飲食時行痘疹並宜用之以蔥涎入香油內手指蘸油摩擦小兒五心頭面項背諸處最能解毒涼肌直指方小兒將痘發熱失表忽作腹痛及膨脹努氣乾霍亂由毒氣與胃氣相搏欲出不得出也以商陸根和蔥白搗敷臍上斑止痘出方免無虞摘玄方痘瘡稠密不拘大人小兒生犀於澀器中新汲水磨濃汁冷飲服之錢乙方痘瘡稠密盛則變黑者用生獖豬血一橡斗冰片半分溫酒和服潘氏云一女病發熱腰痛手足厥逆日加昏悶形證極惡疑是痘候時暑月急取屠家敗血倍用龍腦和服得睡須臾一身瘡出而安若非此方則橫夭矣痘疹煩熱人中白或老糞缸中白垢洗淨研末每白湯或酒服二錢痘疹便覽金汁亦佳痘瘡煩渴粉甘草炙瓜蔞根等分水煎服之甘草能通血脈發痘瘡也直指方癍痘煩喘小便不利者用鱉甲二兩燈心一把水一升煎六合分二服凡患此小便有血者中壞也黑厭無膿者十死不治龐安時痘瘡狂躁心煩氣喘妄語或見鬼神瘡色赤未透者用龍腦一錢細研旋以豬心血丸芡子大每服一丸紫草湯下少時心神便定得睡瘡發又方用豬獖第二番血清半杯酒半杯和勻入龍腦一分溫服良久利下瘀血一二行瘡即紅活此治痘瘡黑黶候惡醫所不治者百發百中總微論痘瘡狂亂循衣摸床大熱引飲用益元散加硃砂二錢冰片三分麝香一分每燈草湯下二三服王氏方癍痘厥逆癍痘服涼藥多手足厥冷脈微用乾薑炮二錢半粉甘草炙一錢半水二鍾煎一鍾服龐安常痘瘡不出紅花子紫草茸各半兩蟬蛻二錢半水酒鍾半煎減半量大小加減服龐安常又食葡萄酒甚效蘇頌又荔枝肉浸酒飲並食之忌生冷痘疹論瘡疹不快板藍根一兩甘草一錢每服半錢或一錢取雄雞冠血二三點同溫酒少許調下錢氏方又胡荽二兩切以酒二大碗煎沸沃之以物蓋定勿令泄氣候冷去滓微微含噴從項背至足令遍勿噀頭面經驗又干山楂為末湯點服之立出紅活得效方又桑蠍能發痘自記又乳香研細豬心血和丸芡實大溫水化服一丸聞人規痘疹論又老絲瓜近蒂三寸連皮燒存性入硃砂研末蜜水服直指又以水煎蟬脫汁服甚良宗奭時珍云蠶脫為痘疹家要藥治目中翳障及疳瘡小兒痘瘡時出不快壯實狂躁咽膈壅塞腫痛大便秘塞不利若大便利者勿服牛蒡子炒一錢二分荊芥穗二分甘草節四分水一杯同煎至七分溫服已出亦可名必勝散和劑局方痘瘡便秘四五日用肥豬膘一塊水煮熟切如豆子大與食自然臟腑滋潤痂疕易落無損於兒陳文中方咽喉痘疹牛蒡子二錢桔梗一錢半粉甘草節七分水煎服痘疹要訣防痘入目白芥子末水調塗足心引毒歸下令瘡疹不入目全幼心鑑集簡方用胭脂取汁點之痘風瘡症羊屎燒灰清油調敷之全幼心鑑痘瘡脹痛白芍藥為末酒服半錢匕痘疹方灌漿痘瘡灌漿時內虛泄瀉每亞芙蓉五釐加炒蓮肉末五分米飲調下神應自傳秘方癢塌痘瘡作癢蟬蛻三七枚炙甘草炙一錢水煎服之心鑑又方房中宜燒茶煙恆熏之痘疹作癢難忍抓成瘡及疱欲落不落百花膏用上等石蜜不拘多少湯和時時以翎刷之其瘡易落自無瘢痕全幼心鑑痘風瘡癢有蟲蓼子為末蜜和雞子白同塗蟲出不作痕藥性論陷伏痘瘡倒陷臘月取人中白火煅為末溫水服三錢陷者自出儒門事親又十二月取老鴉左翅辰日燒灰用獖豬血和丸芡子大每服一丸以獖豬尾血同溫水化服當出也聞人規論又干胭脂三錢胡桃燒存性一個研末用胡荽煎酒服一錢再服取效救急方癍痘倒陷毒氣壅遏於裡則為便血昏睡不醒其證甚惡用抱出雞子殼去膜新瓦焙研每服半錢熱湯調下嬰兒以酒調抹唇舌上並塗風池胸背神效倒靨痘瘡已出復為風寒外襲竅閉血凝其點不長變為黑色此為倒靨必身痛四肢微厥但溫肌散邪則熱氣復行而癍自出也紫背荷葉散治之荷葉能升發陽氣散瘀血留好血殭蠶能解結滯之氣故也二件等分為末用胡荽湯酒調下半錢此藥易得而活人甚多勝於龍腦人牙也證治要訣痘瘡倒靨色黑唇口冰冷危證也用狗蠅七枚擂細和醅酒少許調服移時即紅潤海上方痘瘡方出風寒外襲或變黑或青紫此倒靨也宜溫肌發散使熱氣復行而癍自出用人齒脫落者不拘多少瓦罐固濟煅過出火毒研末出不快而黑靨者獖豬血調下一錢因服涼藥血澀倒靨者入麝香溫酒服之其效如神錢氏小兒方一方用人牙貓牙豬牙犬牙等分火煅研末蜜水調服一字名無價散又濕生蟲為末酒服一字即起痘疹方又鄭州麻黃去節半兩以蜜一匙同炒良久以水半升煎數沸去沫再煎去三分之一去滓乘熱服之避風其瘡復出也一法用無灰酒煎其效更速寇氏衍義又以橄欖核磨汁服時珍方又用白狗或黑狗一隻喂以生粟米候下屎取未化米為末入麝香少許新汲水服二錢保幼大全又用雄雀糞入麝香少許米飲服一錢保幼大全黑陷癍痘倒陷變黑毒入心欲死龐安常論云癍痘始有白疱忽搐入腹漸作紫黑色無膿日夜叫亂者鬱金一枚甘草二錢半水半碗煮乾去甘草切片焙研為末入真腦子炒半錢每用一錢以生豬血五七滴新汲水調下不過二服甚者毒氣從手足心出如癰狀乃五死一生之候也李時珍痘瘡黑陷乃心熱血凝也用生玳瑁生犀角同磨汁一合入豬心血少許紫草湯五匙和勻溫服聞人規論又穿山甲蛤粉炒為末每服五分入麝香少許溫酒服即發紅色如神直指方痘黶發搐黑陷者用桃膠煎湯飲之或水熬成膏酒化服之大效總微論痘瘡乾黑危困者用棠梂子為末紫草煎酒調服一錢痘瘡黑陷腹脹危篤者用人糞貓糞豬糞犬糞等分臘月初旬收埋高燥黃土坑內至臘八日取出砂罐盛之鹽泥固濟炭火煅令煙盡為度取出為末入麝香少許研勻瓷器密封收之一歲一字二歲半錢三歲一錢蜜水調下須臾瘡起此乃以毒攻毒用火化者從治之義也名四靈無價散此為劫劑百祥丸治癍瘡變黑大便秘結用大戟一兩棗三枚水一碗同煮曝乾去大戟以棗肉焙丸服從少至多以利為度百祥膏治痘瘡歸腎紫黑干陷不發者宜下之不黑者慎勿下紅芽大戟不以多少陰乾漿水煮極軟去骨日乾復納原汁盡焙為末水丸粟米大每服二十丸研赤脂麻湯下亦治嗽而吐青綠水者潔古活法機要搽敷黑陷牛黃二粒硃砂一分研末蜜浸胭脂取汁調搽一日一上王氏方又用竹園荽草煎酒敷其身即發起直指方收靨附潰爛不收痘瘡不收象牙屑銅銚炒黃紅色為末服八分或一錢白水下王氏方又牆上白螺螄殼洗淨煅研摻之醫方摘要痘瘡潰爛以臘月黃牛屎燒取白灰敷之或臥之即易痂疕而無瘢痕王綸白龍散又用蕎麥粉頻頻敷之痘疹方痘瘡疳蝕膿水不絕用出了蠶蛾繭以生白礬末填滿煅枯為末擦之甚效陳文中方落痂痘不落痂砂糖調新汲水一杯服之白湯調亦可日二服劉提點方痘痂不落滅瘢方用羊𩩅骨髓煉一兩輕粉一錢和成膏塗之陳文中方痘疔小兒痘疔雄黃一錢紫草三錢為末胭脂汁調先以銀簪挑破搽之極效集簡方四聖丹治小兒痘中有疔或紫黑而大或黑壞而臭或中有黑線此症十死八九惟此方點之最妙用豌豆四十九粒燒存性頭髮灰三分真珠十四粒炒研為末以油胭脂同杵成膏先以銀簪挑破疔去惡血以少許點之即時變紅活色朱都御史方蛆痘痘爛生蛆嫩柳葉鋪席上臥之蛆盡出而愈也李樓奇方痘後餘毒附麻疹小兒痘後生癰燒雞尾毛灰和水敷之時珍方痘後癰毒初起以三豆膏治之神效綠豆赤小豆黑大豆等分為末醋調時時掃塗即消醫學正傳又生蜆浸水洗痘癰無瘢痕時珍痘瘡瘢痕或凸或凹韶粉一兩輕粉一錠和研豬脂調敷陳文中方又方羊胰二具羊乳一升甘草末二兩和勻塗之明旦以豬蹄湯洗去千金方痘瘡赤瘢雞子一枚酒醅浸七日白殭蠶二七枚和勻揩赤塗之甚效聖惠方癍痘入目生翳障用白菊花穀精草綠豆皮等分為末每用一錢以乾柿餅一枚粟米泔一盞同煮候泔盡食柿日食三枚名通神散近者五七日遠者半月見效直指又用兔屎日乾為末每服一錢茶下即安普濟方又輕粉黃丹等分為末左目吹右耳右目吹左耳即退王氏痘疹方又水煮螺螄常食佳濟急仙方痘瘡入目羞明生翳蓽澄茄末吹少許入鼻中三五次效飛鴻集癍痘生翳一切目疾以木賊擦取爪甲末同硃砂末等分研勻以露水搜丸芥子大每以一粒點入目內聖惠方癍痘生翳半年以上者一月取效一年者不治用豬懸蹄二兩瓦瓶固濟煅蟬蛻殼一兩羚羊角一分為末每歲一字三歲以上三錢溫水調服一日三錢錢氏小兒方小兒痘後障翳用蛇蛻一條洗焙天花粉等分為末以羊肝破開夾藥縛定米泔水煮食齊東埜語又直往山中東西地上不許回顧尋兔屎二七粒以雌雄檳榔各一個同磨不落地井水調服百無一失其效如神經驗方痘後目翳取覆盆子根洗搗澄粉日乾蜜和少許點於翳丁上日二三次自散百日內治之久即難療活幼口議又水銀一錢虢丹五錢研作六丸坩鍋糊定火煅一日取出薄綿裹之左翳塞右耳右翳塞左耳自然墜下危氏方痘後目翳隱澀淚出久而不退用穀精草為末以豬肺或豬肝蘸食一方加蛤粉等分同入豬肝內煮熟日食之鴻飛集加石決明火煅與穀精草等分癍瘡入目浮萍陰乾為末以生羊肝半個同水半盞煮熟搗爛絞汁調末服甚者不過一服已傷者十服見效危氏方痘疹入目紫貝一個即蚜螺也生研細末用羊肝切片摻上扎定米泔煮熟盛露一夜空心嚼食之嬰童百問又方馬屁勃蛇皮各五錢皂角子十四個為末入罐內鹽泥固濟燒存性研每溫酒服一錢集效方痘瘡入目豬蹄爪甲燒灰浸湯濾淨洗之甚妙普濟方又方雞子殼燒研入片腦少許點之鴻飛集附麻疹小兒癍疹發灰飲服三錢子母秘錄治疹瘡不得出檉木葉陰乾為末新汲水調服神驗本經不載失之矣自記
