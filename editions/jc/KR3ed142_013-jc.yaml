body:
  text: 卷十三女科產難治難產預服用枳殼四兩甘草二兩為末每服一錢白湯點服名瘦胎飲自五月後一日一服至臨月不惟易產仍無胎中惡病也婦人難產乃兒枕破與敗血裹其子也逐其敗血即順矣用鹽豉一兩以舊青布裹了燒赤乳細入麝香一錢為末取秤錘燒紅淬酒調服一大盞名勝金散郭稽中方婦人難產經日不生雲母粉半兩溫酒調服入口即產不順者即順萬不失一積德堂方又鹿糞乾溼各三錢研末薑湯服立效經驗方婦人難產數日不出桃仁一個劈開一片書可字一片書出字吞之即生刪繁方治產三五日不下垂死及矮小女子交骨不開者用干龜殼一個酥炙婦人頭髮一握燒灰川芎當歸各一兩每服秤七錢水煎服如人行五里許再一服生胎死胎俱下難產催生鳳仙子二錢研末水服勿近牙外以蓖麻子隨年數搗塗足心集簡方又敗筆頭一枚燒灰研生藕汁一盞調下立產若母虛弱及素有冷疾者溫汁服之勝金方又母丁香三十六粒滴乳香三錢六分同活兔膽和杵千下丸作三十六丸每服一丸好酒化下立驗名如意丹經驗方又郎君子手把之便生極驗本草主治又帶海馬於身甚驗臨時燒末飲服並手握之則易產藏器又兩手各把石燕一枚立效唐本草又冰片研末少許新汲水服立下別錄又牛屎中大豆一枚掰作兩片一書父一書子仍合住水吞之立產昝殷產寶又土蜂兒窠水泡湯飲之取時逢單是男雙是女最驗良方又難產臨時細嚼馬檳榔數枚井華水送下須臾立產再以四枚去殼兩手各握二枚惡水自下也欲斷產者常嚼二枚水下久則子宮冷不能孕矣汪機方又蕓薹子治難產歌云黃金花結粟米實細研酒下十五粒靈丹功效妙如神難產之時能救急治胎臟乾澀難產劇者並進三服良久腹中氣寬胎滑即下也用黃葵花焙研末熟湯調服二錢無花用子半合研末酒淘去滓服之產寶婦人難產及月日未至而產臨時取夫衣帶五寸燒為末酒服之裩帶最佳藏器婦人難產不拘橫生倒產胎死腹中用此屢效用大柞木枝一尺洗淨大甘草五寸並寸折以新汲水三升半同入新砂瓶內以紙三重緊封文武火煎至一升半待腰腹重痛欲坐草時溫飲一小盞便覺下開豁如渴又飲一鍾至三四鍾便生更無諸苦切不可坐草太早及坐婆亂為也名催生柞木飲昝殷產寶又用當歸三兩芎藭一兩為末先以大黑豆炒焦入流水一盞童便一盞煎至一盞分為兩服未效再服婦人良方難產及霍亂身冷轉筋於床下燒廁籌取熱氣徹上亦主中惡鬼氣此物最微其功可錄藏器難產橫生蜂蜜真麻油各半碗煎減半服立下海上方橫生倒產人參末乳香末各一錢丹砂末五分研勻雞子白一枚入生薑自然汁三匙攪勻冷服即母子俱安神效婦人良方婦人逆產以手中指取釜下墨交畫兒足下即順千金方又梁上塵酒服方寸匕子母秘錄又吞火麻子二七枚即止藏器方盤腸生產產時子腸先出產後不收者名盤腸產以半夏末頻㗜鼻中則上也婦人良方盤腸生產腸幹不上者以磨刀水少潤腸煎好磁石一杯溫服自然收上扁鵲方婦人產中腸癢不可忍將鐵線袋密安所臥褥下勿令知之藏器方陰脫玉門不閉子宮脫下蓖麻子仁礬枯等分為末安紙上托入仍以蓖麻子仁十四枚研膏塗頂心即入摘玄方婦人陰脫白及烏頭等分為末絹裹一錢納陰中入三寸腹內熱即止日用一次廣濟方下死胎治子死腹中並雙胎一死一生服之令死者出生生者安神驗方也用蟹爪一升甘草二尺東流水一斗以葦薪煮至二升濾去渣入真阿膠三兩令烊一頓服或分二服若人困不能服者灌入即活千金方子死腹中胞破不生此方累效救人幾萬數也鬼臼不拘多少黃色者去毛為細末不用篩羅只捻之如粉為度每服一錢無灰酒一盞同煎八分通口服立生如神名一字神散婦人良方子死腹中不出硃砂一兩水煮數沸為末酒服立出十全博救方又用三家雞卵各一枚三家鹽各一撮三家水各一升同煮令婦東向飲之千金方又取本婦鞋底炙熱熨腹上下七次即下集玄方又冬葵子為末酒服方寸匕若口噤不開者灌之藥下即蘇千金方又桂末二錢待痛緊時童子小便溫熱調下名觀音救生散亦治難產橫生加麝香少許酒下比之水銀等藥不損人何氏方子死腹中或產經數日不下以瞿麥煮濃汁服之千金方子死腹中母氣欲絕伏龍肝末三錢水調下十全傳救方胎死腹中或母病欲下胎榆白皮煮汁服二升子母秘錄胎死不下月未足者大豆醋煮服三升立便分解未下再服子母秘錄胎死腹中及胞衣不下者取炊蔽戶前燒末水服即下千金方又蟻蛭土炒三升囊盛拓心下自出藏器方妊娠胎死不出及胞衣不下產後諸疾狼狽者刺羊血熱飲一小盞極效聖惠方胞衣不下胞衣不出牛膝八兩冬葵子一合水九升煎三升分三服延年方千金方惟用牛膝一兩煎作一服又水煮弓弩弦飲酒五合或燒灰酒服千金方又以本婦裩覆井上或以所著衣籠灶上千金方又皂角刺燒灰為末每服一錢酒調下熊氏補遺又洗兒湯服一盞勿令知之延年秘錄難產胞衣不出余血搶心脹刺欲死者臘月收兔皮毛燒灰酒服極效蘇恭又蓮蓬殼或荷葉蒂酒煮服之藏器胎衣不下惡血衝心用五靈脂半生半炒研末每服二錢溫酒下產寶胞衣不下困極腹脹則殺人螻蛄一枚水煮二十沸灌入下喉即出也延年方胞衣不出鼻衄及口鼻大衄不止取折弓弦燒灰同枯礬等分吹之即止時珍橫生逆生胞衣不下須臾不救用蛇蛻一具蟬蛻十四個頭髮一握並燒存性分二服酒下仍以小針刺兒足心三七下擦鹽少許即生又鐵斧燒赤淬酒服亦治產後血瘕腰腹痛時珍陰蝕女人陰腫甘菊苗搗爛煎湯先熏後洗得效方婦人陰痛牛膝五兩酒三升取一升半去滓分三服千金婦人陰腫堅痛枳實半斤碎炒帛裹熨之冷即易子母秘錄女人陰癢炙豬肝納入當有蟲出肘後方又小薊葉煮湯日洗三次廣濟方又蛇床子一兩白礬二錢煎湯頻洗集簡方又牆頭爛茅草荊芥牙皂等分煎水頻熏洗之摘玄方婦人陰腫作癢蒜湯洗之效乃止永類鈐方婦人陰腫或生瘡枸杞根煎水頻洗永類鈐方又雄雞肝切片納入引蟲出盡良時珍婦人陰瘡紫葳即凌霄花為末用鯉魚腦或膽調搽摘玄方婦人陰䘌作癢羊肝納入引蟲集簡方一方用牛肝納入亦引蟲時珍女人陰瘡如蟲咬癢痛者生搗桃葉綿裹納之日三四易食療本草一方硫黃末敷之瘥乃止肘後方產門蟲疽痛癢不可忍用杏仁去皮燒存性杵爛綿裹納入陰中取效食療本草婦人陰蝕瘡爛者用狼牙三兩水四升煮取半升以箸纏綿浸湯瀝洗日四五遍金匱玉函方婦人陰吹胃氣下泄陰吹此穀氣之實也用豬膏半斤亂髮雞子大三枚和煎發消藥成矣分再服病從小便中出也張仲景方婦人陰㿗硬如卵狀隨病之左右取穿山甲之左右邊五錢以砂炒焦黃為末每服二錢酒下摘玄方婦人疝痛名小腸氣馬鞭草一兩酒煎滾服以湯浴身取汗甚妙纂要奇方女陰挺出茄根燒存性為末油調在紙上捲筒安入內一日一上乾坤生意又鐵鏽粉一錢龍腦半錢研水調刷產門危氏得效方乳少婦人無乳用母豬蹄四枚水二斗煮一斗入土瓜根通草漏蘆各三兩再煮六升去滓納蔥豉作粥或羹食之或身體微熱有少汗出佳未通再作廣濟方一用水牛鼻作羹食之不過兩日乳下無限氣壯人尤效孟詵方乳汁清少死鼠一頭燒末酒服方寸匕勿令婦知子母秘錄婦人乳少因氣鬱者湧泉散王不留行穿山甲炮龍骨瞿麥穗麥門冬等分為末每服一錢熱酒調下後食豬蹄羹仍以木梳梳乳一日三次衛生寶鑑乳汁不下乃氣脈壅塞也又治經絡凝滯乳內脹痛邪蓄成癰服之自然內消漏蘆二兩半蛇蛻十條炙焦瓜蔞十個燒存性為末每服二錢溫酒調下良久以熱羹湯投之以通為度和劑方又麥門冬去心焙為末每用三錢酒磨犀角約一錢許溫熱調下不過二服便下熊氏補遺又二母散貝母知母牡蠣粉等分為細末每豬蹄湯調服二錢王海藏又白殭蠶末二錢酒服少頃以芝麻茶一盞投之梳頭數十遍乳汁如泉也經驗方又赤小豆煮汁飲之產書又木蓮二個豬前蹄一個爛煮食之並飲汁盡一日即通無子婦人食之亦有乳也集簡方又萵苣子三十枚研細酒服又方萵苣子一合生甘草三錢糯米粳米各半合煮粥頓食之又京三稜三個水二碗煎汁一碗洗奶取汁出為度極妙外臺秘要產後回乳產婦無子食乳乳不消令人發熱惡寒用大麥糵二兩炒為末每服五錢白湯下甚良丹溪又神麯炒研酒服二錢日二即止甚驗時珍方又用男子裹足布勒住經宿即止時珍乳癰婦人乳癰未成者即散已成者即潰痛不可忍者即不疼神驗不可云喻也用真陳橘皮湯浸去白酒面炒微黃為末每服二錢麝香調酒下初發者一服見效名橘香散張氏方乳癰初起雄鼠屎七枚研末溫酒服取汗即散壽域方又白芷貝母各二錢為末溫酒服秘傳外科方直指方只用貝母二錢令人數吮之即愈又大熟瓜蔞一枚熟搗以白酒一斗煮取四升去滓溫服一升日三服子母秘錄又黃明水膠以濃醋化塗之立消楊起簡便方又鹿角磨濃汁塗之並令人嗍去黃水隨手即散乳癰紅腫蒲公英一兩忍冬藤二兩搗爛水二鍾煎一鍾食前服睡覺病即去矣積德堂方又扁竹根如殭蠶者同萱草根為末蜜調敷之神效永類鈐方乳癰腫痛萱草根擂酒服以滓封之時珍方又水楊柳根生擂貼瘡其熱如火再貼遂平永類鈐方乳癰初發腫痛結硬欲破一服即瘥以北來真樺皮燒存性研無灰酒服方寸匕臥覺即瘥也靈苑方乳癰妒乳初起堅紫眾療不瘥柳根皮熟搗火溫帛裹熨之冷更易一宿消肘後方乳癰脹痛乳婦氣脈壅塞乳汁不行及經絡凝滯奶房脹痛留蓄作癰毒者用葵菜子炒香縮砂仁等分為末熱酒服二錢此藥滋氣脈通營衛行津液極驗婦人良方勒乳成癰益母草為末水調塗腫上一宿自瘥生搗亦得聖惠方乳癰腐爛靴內年久樺皮燒灰酒服一錢日一服經驗方乳癰潰爛見內者貓兒腹下毛坩鍋內燒存性入輕粉少許油調封之濟生秘覽婦人吹乳用頭垢內加白芷貝母半夏為丸一面取其末搐鼻取嚏一面以酒吞丸三錢自傳秘方又用豬牙皂角去皮蜜炙為末酒服一錢袖珍方又詩云婦人吹奶法如何皂角燒灰蛤粉和熱酒一杯調八分管教時刻笑呵呵又陳皮一兩甘草一兩水煎服即散又鼠屎七粒紅棗七枚去核包屎燒存性入麝香少許溫酒調服集要方又戶限下土和雄雀糞暖酒服方寸匕藏器方聖惠方只用雀糞又五月五日棕箬燒灰酒服二錢即散累效濟急仙方又用韭地中蚯蚓屎研細篩過米醋調厚敷干則換三次即愈涼水調亦可藺氏經驗方吹奶疼痛蜘蛛一個麵裹燒存性為末酒服即止神效又鹿角屑炒黃為末酒服二錢仍以梳梳之經驗方婦人乳腫馬尿塗之立愈產寶方乳瘡腫痛用芝麻炒焦研末以燈窩油調塗即安集玄方婦人乳岩因久積憂鬱乳房內有核如指頭不痛不癢五七年成癰名乳岩不可治也用青皮四錢水一盞半煎一盞徐徐服之日一服或用酒服丹溪方此方還該加貝母橘葉連翹自然銅等藥然體弱人亦須酌量施治乳頭裂破胭脂蛤粉為末敷之危氏得效方又秋月冷茄子裂開者陰乾燒存性研末水調塗補遺方產後諸疾益母膏治產婦諸疾及折傷內損有瘀血每天陰則痛神方也三月採益母草連根葉莖花淨洗於箔上攤曝水乾以竹刀切長五寸勿用鐵刀置於大鍋中以水浸過二三寸煎煮候草爛水減三之二漉去草取汁約五六斗入盆中澄半日以綿濾去濁滓以清汁入釜中慢火煎取一斗如稀餳狀瓷瓶封收每取暖酒和服日再服或和羹粥亦可如遠行即更煉至可丸收之服至七日則疼漸平復也產婦惡露不盡及血暈一二服便瘥其藥無忌又能治風益心力外臺秘要產後百病地黃酒用地黃汁漬曲二升淨秫米二斗令如常法釀之至熟封七日取清常服令相接忌生冷鮓蒜雞豬肉一切毒物未產先一月釀成夏月不可造千金產後諸病凡產後穢汙不盡腹滿及產後血暈心頭硬或寒熱不禁或心悶手足煩熱氣力欲絕諸病並用延胡索炒研酒服二錢甚效聖惠方產後諸疾血暈心悶煩熱厭厭氣欲絕心頭硬乍寒乍熱續斷皮一握水三升煎二升分三服如人行一里再服無所忌此藥救產後垂死子母秘錄古方有炒紫豆湯破血去風除氣防熱產後兩日尤宜服之用烏豆五升清酒一斗炒豆令煙絕投酒中待酒紫赤色去豆量性服之可日夜三盞神驗中風口噤加雞屎白二升和炒投之亦治月經不斷蘇頌新產補虛以烏雌雞一隻治淨和五味炒香投二升酒中封一宿取飲令人肥白又和烏麻油二升熬香入酒中極效孟詵婦人臨產勿令驚擾惟宜摒除雜人令安靜自產產後更爛壯煮壯雞取汁作粳米粥與食自然無恙乃和氣之效也蓋壯雞汁性滑而濡不食其肉恐難消也產後悶亂血氣上衝口乾腹痛梅師方用生藕汁三升飲之龐安時用藕汁生地黃汁童子小便等分煎服產後因怒氣發熱迷悶者用荊芥穗以新瓦半炒半生為末童子小便服一二錢若角弓反張以豆淋酒下或銼散童尿煎服極妙蓋荊芥乃產後要藥而角弓反張乃婦人急候得此症者十存一二而已戴元禮要訣產後血悶清酒一升和生地黃汁煎服梅師方產後煩熱內虛短氣用甘竹茹一升人參茯苓甘草各二兩黃芩二兩水六升煎二升分服日三服名甘竹茹湯婦人良方產後煩熱逆氣用苦竹根切一斗五升煮取七升去滓入小麥二升大棗二十枚煮三四沸入甘草一兩麥門冬一升再煎至二升每服五合婦人良方產後煩悶蒲黃方寸匕東流水服極良產寶方產後煩懣不食者白犬骨燒灰研水服方寸匕千金翼產後煩悶汗出不識人用羚羊角燒末東流水服方寸匕未愈再服千金一方加芍藥枳實等分炒研末湯服產後煩躁禹餘糧一枚狀如酸𦾰者入地埋一半緊築炭灰一斤煅之濕土罨一宿打破去外面石取裡面細者研水淘五七度日乾再研萬遍用甘草湯服二錢一服立效經驗方產後寒熱心悶極脹百病羖羊角燒末酒服方寸匕秘錄產後血攻或下血不止心悶面青身冷欲絕者新羊血一盞飲之三兩服妙梅師方產後血亂奔入四肢以狗頭骨灰酒服二錢甚效經驗方產後發狂四物湯加青黛末煎服摘玄方產後血暈人參一兩紫蘇半兩以童尿酒水三合煎服醫方摘要又鹿角一段燒存性出火毒為末酒調灌下即醒摘要方又蘇方木三兩水五升煎取二升分服又蕓薹子生地黃等分為末每服三錢生薑七片酒水各半鍾童便半鍾煎七分溫服即蘇海上方又韭菜切安瓶中沃以熱醋令氣入鼻中即醒丹溪心法又鰾膠燒存性酒和童子小便調服三五錢良事林廣記又漆器燒煙熏之即蘇又殺諸蟲時珍產後血眩風虛精神昏冒荊芥穗一兩三錢桃仁五錢去皮尖為末水服三錢若喘加杏仁去皮尖炒甘草各三錢保命集產後血暈惡物衝心四肢冰冷唇青腹脹昏迷紅藥子一兩頭紅花一錢水二鍾婦人油釵二隻同煎一鍾服大小便俱利血自下也禹講師經驗方產後血暈五心煩熱氣力欲絕及寒熱不禁以接骨木破如算子一握用水一升煎取半升分服或小便頻數惡血不止服之即瘥此木煮之三次其力一般乃起死妙方也產書產後血暈築心眼倒風縮欲死者取干荊芥穗搗篩末每用二錢匕童子小便一小盞調勻熱服立效口噤者挑齒口閉者灌鼻中皆效圖經本草產後血暈心悶氣絕紅花一兩為末分作二服酒二盞煎一盞連服如口噤者擀口灌之或入小便尤妙子母秘錄又以丈夫小便研濃墨一升服子母秘錄產後暈絕半夏末冷水和丸大豆大納鼻中即愈此扁鵲法也產後血暈不知人事用五靈脂二兩半生半炒為末每服一錢白水調下如口噤干開灌之入喉即愈圖經本草產後血暈身痙直口目向上牽急不知人取雞子一枚去殼分清以荊芥末二錢調服即安甚效捷烏雞子尤善宗奭方傷寒產後血暈欲死用荷葉紅花薑黃等分炒研末童子小便調服二錢龐安常方婦人惡血攻聚上面多怒牡丹皮半兩乾漆燒煙盡半兩水二鍾煎一鍾服諸症辨疑婦人產後大虛心腹絞痛厥逆用羊肉一斤當歸芍藥甘草各七錢半用水一斗煮肉取七升入諸藥煮二升服胡洽方產後心痛雞子煮酒食即安備急方產後心痛惡血不盡也荷葉炒香為末每服方寸匕沸湯或童子小便調下或燒灰或煎汁皆可亦治胎衣不下救急方治產後惡露不下血結衝心刺痛或經水將來遇冒寒踏冷其血必往來心腹間刺痛不可忍謂之血母並治產後心腹諸疾產後三日不可無此用蕓薹子炒當歸桂心赤芍藥等分為末每酒服二錢趕下惡物楊氏產乳產後血氣攻心痛惡物不下用灶中心土研末酒服二錢泄出惡物立效救急方產後心痛血氣上衝欲死鬱金燒存性為末二錢米醋一呷調灌即蘇袖珍方產後腹痛五靈脂香附桃仁等分研末醋糊丸服一百丸或用五靈脂末神麯糊丸白朮陳皮湯下丹溪方又方戶限下土熱酒服一錢藏器產後腹痛如絞當歸頭尾末五錢白蜜一合水一鍾煎一鍾分二服未效再服婦人良方產後腹痛血不盡者鹿角燒研豉汁服方寸匕日二秘錄又麻黃去節為末酒服方寸匕一日二三服血下盡即止子母秘錄產後腹痛血不下者以酒煮蟹食之日華產後血閉桃仁二十枚去皮尖藕一塊水煎服之經驗方又取雞子白一枚入醋一半攪服藏器產後瘀血馬料黑豆炒令焦黑及熱投酒中漸漸飲之產婦滯血腹痛鯉魚鱗燒灰酒服亦治血氣痛蘇頌產婦腹痛有乾血用䗪蟲二十枚去足桃仁二十枚大黃二兩為末煉蜜杵和分為四丸每以一丸酒一升煮取二合溫服當下血也名大黃䗪蟲丸張仲景方產後血脹腹痛引脅當歸二錢乾薑炮五分為末每服三錢水一盞煎八分入鹽醋少許熱服婦人良方產後血疼欲死者槐雞半兩為末酒濃煎飲立愈婦人良方又新麻布能逐瘀血婦人血閉腹痛產後血痛以數重包白鹽一合煅研溫酒服之時珍產後兒枕刺痛黑白散用烏金石燒酒淬七次寒水石煅為末等分每用粥飲服一錢即止未止再服潔古保命集產後兒枕痛惡露不盡山楂煎汁入砂糖服之立效丹溪婦人兒枕痛及血崩腹痛消積用蟹殼燒研酒服時珍兒枕血瘕蒲黃三錢米飲服產寶方產後血痛有塊用薑黃桂心等分為末酒服方寸匕血下盡即愈咎殷產寶產後血痛有塊並經脈行後腹痛不調黑神散用熟地黃一斤陳生薑半斤同炒乾為末每服二錢溫酒調下婦人良方產後血瘕痛桂末酒服方寸匕取效肘後方又取鐵秤錘燒赤淬酒熱飲又治男子疝痛開寶產後腹痛欲死因感寒起者陳蘄艾二斤焙乾搗鋪臍上以絹覆住熨斗熨之待口中艾氣出則痛自止矣經驗產後腰痛乃血氣流入腰腿痛不可轉者敗醬當歸各八分芎藭芍藥桂心各六分水二升煮八合分二服忌蔥廣濟方產後腹中癢箭笴及鏃密安所臥席下勿令婦知藏器產後血多山漆研末米湯服一錢集簡方產後亡血過多心腹徹痛者用貫眾狀如刺蝟者一個全用不銼只揉去毛及花萼以好醋蘸濕慢火炙令香熟候冷為末米飲空心每服二錢甚效兼治赤白帶下年深諸藥不能療者婦人良方產後血崩蓮蓬殼五個香附二兩各燒存性為末每服二錢米飲下日二婦人良方產後下血炙桑根白皮煮水飲之肘後方產後下血羸瘦迨死蒲黃二兩水二升煎八合頓服產寶產後瀉血不止干艾葉半兩炙熟老生薑半兩濃煎湯一服立效孟詵產後尿血用牛膝水煎頻服熊氏補遺產後虛汗黃耆當歸各一兩麻黃根二兩每服一兩煎湯服又馬齒莧研汁三合服如無以乾者煮汁婦人良方產後諸虛發熱自汗人參當歸等分為末用豬腰子一個去膜切小片以水三升糯米半合蔥白二莖煮米熟取汁一鍾入藥煎至八分食前溫服永類方產後自汗壯熱氣短腰腳痛不可轉當歸三錢黃耆合芍藥酒炒各二錢生薑五片水一鍾半煎七分溫服和劑局方產後自汗不止鬱金末臥時調塗於乳上集簡方產後盜汗牡蠣粉麥麩炒黃等分每服一錢用豬肉汁調下經驗方產後口渴苦薏生研末米飲服二錢立愈亦止霍亂大明產後口乾舌縮用雞子一枚打破水一盞攪服經驗方產後血渴不煩者新石灰一兩黃丹半錢渴時漿水調服一錢名桃花散活法機要產後因怒哭傷肝嘔青綠水用韭菜一斤取汁入薑汁少許和飲遂愈摘玄方產後呃逆白豆蔻丁香各半兩研細桃仁湯服一錢少頃再服乾坤生意產後咳逆嘔吐心忡目運用石蓮子兩半白茯苓一兩丁香五錢為末每米飲服二錢良方補遺產後咳逆三五日不止欲死者取壁蟢窠三五個煎汁呷之良時珍產後氣逆青陳皮為末蔥白童子小便煎二服經驗後方產後鼻衄荊芥焙研末童子小便服二錢婦人良方產後氣喘胡桃肉人參各二錢水一鍾煎七分頓服產後氣喘面黑乃血入肺竅危證也用蘇木二兩水兩碗煮一碗入人參末一兩服隨時加減神效不可言胡氏產後血沖心胸喘滿命在須臾用血竭沒藥各一錢研細童便和酒調服醫林集要產後水腫血虛浮腫澤蘭防己等分為末每服二錢醋湯下備急方產後青腫乃血水積也乾漆大麥芽等分為末新瓦罐中相間鋪滿鹽泥固濟煅赤放冷研末每服一二錢熱酒下但是產後諸疾皆可服婦人經驗方產後腹脹不通轉氣急坐臥不安以麥糵一合為末和酒服良久通轉神驗李絳手集產後壯熱頭痛頰赤口乾唇焦煩渴昏悶用松花蒲黃同川芎當歸石膏等分為末每服二錢水二合紅花二捻同煎七分細呷本草衍義產後舌出不收丹砂敷之暗擲盆盎作墮地聲驚之即自收集簡方產後不語人參石菖蒲石蓮肉等分每服五錢水煎服婦人良方產後敗血及邪氣入心如見祟物癲狂用大辰砂一二錢細研飛過用飲兒乳汁三四茶匙調濕以紫項地龍一條入藥滾三滾刮淨去地龍不用入無灰酒一鍾分作三四次服何氏方產後秘塞許學士云產後汗多則大便秘難於用藥惟麻子粥最穩不惟產後可服凡老人諸虛風秘皆得力也用大麻子仁紫蘇子各二合洗淨研細再以水研濾取汁一鍾分二次煮粥啜之本事方又以蔥涎調臘茶末丸百丸茶服自通不可用大黃利藥利者百無一生郭稽中方產後秘塞大小便不通用桃仁葵子滑石檳榔等分為末每空心蔥白湯服二錢即利集驗方產後秘塞五七日不通不宜妄服藥丸宜用大麥芽炒黃為末每服三錢沸湯調下與粥間服婦人良方產後秘塞出血多以人參蘇子仁枳殼麩炒為末煉蜜丸梧子大每服五十丸米飲下濟生方產後虛悶阿膠炒枳殼炒各一兩滑石二錢半為末蜜丸梧子大每服五十丸溫水下未通再服和劑局方產婦尿秘鼠婦七枚熬研末酒服千金方產後尿秘不通者陳皮一兩去白為末每空心溫酒調二錢一服即通婦人良方產後遺尿豬脬豬肚各一個糯米半升入脬內更以脬入肚內同五味煮食醫林集要產後遺尿或尿數桑螵蛸炙半兩龍骨一兩為末每米飲服二錢徐氏胎產方產後遺溺不禁雞屎燒灰酒服方寸匕產寶婦人因生產陰陽易位前陰出糞名曰交腸病取舊幞頭燒灰酒服仍間服五苓散分利之如無幞頭凡舊漆紗帽皆可代之此皆取漆能行敗血之義耳產腸不收用油五斤煉熟盆盛令婦坐盆中飯久先用皂角炙去皮研末吹少許入鼻作嚏立上斗門方又搗蓖麻仁貼其丹田一夜而上時珍方又全蠍炒研末口噙水鼻中㗜之立效衛生寶鑑產後陰脫絹盛蛇床子蒸熱熨之又法蛇床子五兩烏梅十四個煎水日洗五六次並治婦人陰痛千金方又以溫水洗軟用雄鼠屎燒煙熏即入熊氏方又千金用鱉頭五枚燒研井華水服方寸匕日三錄驗加葛根二兩酒服產後諸淋紫荊皮五錢半酒半水煎溫服熊氏補遺產婦脬損小便淋瀝不斷黃絲絹三尺以炭火淋汁煮極爛清水洗淨入黃蠟半兩蜜一兩茅根二錢馬勃末二錢水一升煎一盞空心頓服服時勿作聲作聲即不效名固脬散又方產時傷脬終日不小便只淋瀝不斷用生絲黃絹一尺白牡丹根皮末白及末各一錢水二碗煮至絹爛如餳服之不宜作聲婦人良方惡風入腹久腫及女人新產風入產戶內如馬鞭噓吸短氣咳嗽者用鯉魚長一尺五寸以尿浸一宿平旦以木篦從頭貫至尾文火炙熟去皮空心頓食勿用鹽醋外臺秘要產後陰戶燥熱遂成翻花澤蘭四兩煎湯熏洗二三次更入枯礬煎洗之即安集簡方婦人產後月水往來乍多乍少白狗糞燒灰酒服方寸匕日三服千金方婦人產後中風口噤手足瘛瘲如角弓或產後血暈不省人事四肢強直或心眼倒築吐瀉欲死用荊芥穗子焙為末每服三錢豆淋酒調服或童子小便服之口噤則挑齒灌之齦噤則灌入鼻中其效如神大抵產後太眩則汗出而腠理疏易於中風也許叔微本事方云此藥委有奇效神聖之功一婦人產後睡久及醒則昏昏如醉不省人事醫用此藥及交加散云服後當睡必以左手搔頭用之果然昝殷產寶方云此病多因怒氣傷肝或憂氣內郁或坐草受風而成急宜服此藥也戴原禮證治要訣名獨行散賈似道悅生隨抄呼為再生丹產後中風脅不得轉交加散用生地黃五兩研汁生薑五兩取汁交互相浸一夕次日各炒拌浸汁干仍焙為末每酒服方寸匕濟生方產後搐搦強直者不可便作風中乃風入臟與破傷風同用鰾膠一兩以螺粉炒焦去粉為末分三服煎蟬蛻湯下產寶方產後中風口噤瘛瘲角弓反張黑豆二升半同雞屎白一升炒熟入清酒一升半浸取一升入竹瀝服取汗產寶產後中風不省人事口吐涎沫手足瘛瘲當歸荊芥穗等分為末每服二錢水一盞酒少許童尿少許煎七分灌之下咽即有生意神效聖惠方產後中寒遍身冷直口噤不識人白朮一兩澤瀉一兩生薑五錢水一升煎服至寶方產後腎勞如瘧者體熱用豬腎體冷用犬腎藏器產後下痢大荊芥四五穗於盞內燒存性不得犯油火入麝香少許以沸湯些需調下此藥雖微能愈大病不可忽之深師方又用野雞一隻作餛飩食之食醫心鑑又鱟魚骨及尾燒灰米飲服但須先服生地黃蜜煎等訖然後服此無不斷也藏器產後下痢赤白者用紫莧菜一握切煮汁入粳米三合煮粥食之立瘥也壽親養老方產後下痢赤白裡急後重㽲痛用桃仁焙乾沉香蒲黃炒各等分為末每服二錢食前米飲下婦人良方產後下痢日五十行用桑木里蠹蟲糞炒黃急以水沃之稀調得所服之以瘥為度此獨孤訥祭酒方也必效方產後虛羸黃雌雞一隻去毛背上開破入生百合三枚白粳米半斤縫合入五味汁中煮熟開腹取百合並飯和汁作羹食之並食肉聖惠方產後蓐勞寒熱虛汗肢體疼痛用豬腎一對切細片以鹽酒拌之先用粳米一合蔥椒煮粥鹽醋調和將腰子鋪於盆底以熱粥傾於上蓋之如作盦生粥食之濟生方產後虛羸令人肥白健壯羊脂二斤生地黃汁一斗生薑汁五升白蜜三升煎如飴溫酒服一杯日三小品方產婦面䵟如雀卵色以羊膽豬胰細辛等分煎三沸夜塗旦以漿水洗之錄驗方背腿間一點痛不可忍者芫花根末米醋調敷之如不住以帛束之婦人產後有此尤宜袖珍方婦人雜病四制香附丸治婦人女子經候不調兼諸病大香附子擦去毛一斤分作四份四兩淳酒浸四兩淳醋浸四兩鹽水浸四兩童子小便浸春三秋五夏一冬七日淘洗淨曬乾搗爛微焙為末醋煮麵糊丸梧子大每酒下七十丸瘦人加澤蘭赤茯苓末二兩氣虛加四君子料血虛加四物料瑞竹堂方法生堂方煮附濟陰丸治婦人月經不調久成癥積一切風氣香附子一斤分作四份以童溲鹽水酒醋各浸三日艾葉一斤漿水浸過醋糊和作餅曬乾晚蠶砂半斤炒莪荗四兩酒浸當歸四兩酒浸各焙為末醋糊丸梧子大每服七十丸米飲下日二醋附丸治婦人室女一切經候不調血氣刺痛腹脅膨脹心怔乏力面色萎黃頭暈噁心崩漏帶下便血癥瘕積聚及婦人數墮胎由氣不升降服此尤妙香附子米醋浸半日沙鍋煮乾搗焙石臼為末醋糊為丸醋湯下澹寮方艾附丸治同上香附子一斤熟艾四兩醋煮當歸酒浸二兩為末如上丸服青囊丸亦治婦人諸病用香附略炒一斤烏藥略炮五兩三錢為末水醋煮麵糊為丸隨證用引如頭痛茶下痰氣薑湯下多用酒下妙邵真人方又狗陰卵治婦人十二疾燒灰服蘇恭婦人勞熱心忪地黃煎用生乾地黃熟乾地黃等分為末生薑自然汁入水相和打糊丸梧子大每服三十丸用地黃湯下或酒醋茶湯下亦可日三服覺臟腑虛冷則晨服八味丸地黃性冷壞脾陰虛則發熱地黃補陰血故也婦人良方婦人骨蒸煩熱寢汗口乾引飲氣喘天門冬十兩麥門冬八兩並去心為末以生地黃三斤取汁熬膏和丸梧子大每服五十丸以逍遙散去甘草煎湯下活法機要婦人血勞憔悴困倦喘滿虛煩噏噏少氣發熱多汗口乾舌澀不思飲食名血風勞用五加皮牡丹皮赤芍藥當歸各一兩為末每用一錢水一鍾用青錢一文蘸油入藥煎七分溫服常服能肥婦人名油煎散和劑局方婦人血厥平居無疾苦忽如死人身不動搖目閉口噤或微知人眩冒移時方寤此名血厥亦名鬱冒出汗過多血少陽氣獨上氣塞不行故身如死氣過血還陰陽復通故移時方寤婦人尤多此證用白薇當歸各一兩人參半兩甘草一錢半每服五錢水二鍾煎一鍾溫服本事方血風腦運婦人血風攻腦頭旋悶絕忽死倒地不知人事者用蒼耳草嫩心陰乾為末以酒服一大錢其功甚效此物善通頂風連腦蓋斗門方婦人血氣刺痛用荔枝核燒存性半兩香附子炒一兩為末每服二錢鹽湯米飲任下名蠲痛散婦人良方婦人腹痛內傷㽲刺沒藥末一錢酒服便止圖經本草盲腸氣痛婦人少腹痛禹餘糧為末每米飲服二錢日二服極效衛生易簡方治婦人血刺小腹痛不可忍亦可常服補血虛破氣塊甚效用蕓薹子微炒桂心各一兩高良薑半兩為末醋糊丸梧子大每淡醋湯下五丸靈苑方婦人血氣遊走作痛及腰痛蓬莪荗乾漆二兩為末酒服二錢腰痛核桃酒下普濟方婦人氣盛血衰變生諸證頭運腹滿皆宜抑氣散主之香附子四兩炒茯苓甘草炙各一兩橘紅二兩為末每服二錢沸湯下濟生方婦人五心發熱水仙花同乾荷葉赤芍藥等分為末白湯每服二錢熱自退時珍方因怒病呃一女子性躁味厚暑月因怒而病呃每作則舉身跳動昏冒不知人其形氣俱實乃痰因怒郁氣不得降非吐不可遂以人參蘆半兩逆流水一盞半煎一大盞飲之大吐頑痰數碗大汗昏睡一日而安丹溪方女人頭痛香附子末茶服三錢日三五服經驗良方婦人小便卒不得出者紫菀為末井華水服三撮即通小便血者服五撮立止千金方婦人遺尿桑螵蛸酒炒為末薑湯服二錢亦治妊娠遺尿不禁桑螵蛸十二枚為末分二服米飲下千金方又雄雞翎燒灰酒服方寸匕日三千金翼方交接違禮女人血出不止青布同發燒灰納之僧垣集驗方附祈嗣婦人無子立春日雨水夫婦各飲一杯還房有孕亦取其資始發育萬物之義也藏器令婦不妒取婦人月水布裹蝦蟆於廁前一尺入地五寸埋之張華博物志
