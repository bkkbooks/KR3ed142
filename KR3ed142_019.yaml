服三錢水一鍾半煎八分和滓熱服食前日三次宣明方一切胸膈停痰壅食受寒痞哽及夏月飲水過傷用瓜蒂二錢半熬黃赤小豆二錢半為末每用一錢以香豉一合熱湯七合煮糜去滓和腹少少加之快吐乃止名瓜蒂散仲景方四君子湯治脾胃氣虛不思飲食諸病氣虛者以此為主人參一錢白朮二錢白茯苓一錢炙甘草五分姜三片棗一枚水二鍾煎一鍾食前溫服隨證加減治中湯張仲景治胸痹心中痞堅留氣結胸胸滿脅下逆氣搶心治中湯主之即理中湯人參白朮乾薑甘草各三兩四味以水八升煮三升每服一升日三服隨證加減此方自晉宋以後至唐名醫治心腹痛者無不用之或作湯或蜜丸或為散皆有奇效胡洽居士治霍亂謂之溫中湯陶隱居百一方云霍亂余藥乃或難求而治中方四順湯厚朴湯不可暫缺常須預合自隨也唐石泉公王方慶雲數方不惟霍亂可醫諸病皆療也四順湯用人參甘草乾薑附子炮各二兩水六升煎二升半分四服枳朮湯心下堅大如盤邊如旋杯水飲所作寒氣不足則手足厥逆腹滿脅鳴相逐陽氣不通即水冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分宜此主之白朮一兩枳實七個水五升煮三升分三服胸中軟即散仲景金匱玉函方甘桔湯通治咽喉口舌諸病宋仁宗加荊芥防風連翹遂名如聖湯極言其驗也按王好古醫壘元戎載之頗詳云失音加訶子聲不出加半夏上氣加陳皮涎嗽加知母貝母咳渴加五味子酒毒加葛根少氣加人參嘔加半夏生薑唾膿血加紫菀肺痿加阿膠胸膈不利加枳殼心胸痞滿加枳實目赤加梔子大黃面腫加茯苓膚痛加黃耆發斑加防風荊芥疫毒加鼠黏子大黃不得眠加梔子乾咳嗽乃痰火之邪郁在肺中宜苦梗以開之痢疾腹痛乃肺金之氣鬱在大腸亦宜苦梗開之後用痢藥此藥能開提氣血故氣藥中宜用之治寒勞虛羸及産後心腹疝痛用肥羊肉一斤水一斗煮汁八升入當歸五兩黃耆八兩生薑六兩煮取二升分四服胡洽方無黃耆千金方有芍藥金匱要略治中風傷濕半身不遂口目喎斜膚肉㿏痹骨節疼痛及年久疥癬惡瘡風癩諸證用白花蛇一條取龍頭虎口黑質白花尾有佛指甲目光不陷者為真以酒洗潤透去骨刺取肉四兩羌活二兩當歸身二兩真天麻二兩真秦艽二兩五加皮二兩防風一兩各銼勻以生絹袋盛之入金華酒罈內懸胎安置入糯米生酒醅五壺浸袋箬葉密封安壇於大鍋內水煮一日取起埋陰地七日取出每飲一二杯仍以滓日乾研末酒糊丸梧子大每服五十丸用煮酒吞下切忌見風犯欲及魚羊鵝面發風之物瀕湖方白菊花酒治丈夫婦人久患頭風眩悶頭髮乾落胸中痰壅每發即頭旋眼昏不覺欲倒者是其候也先灸兩風池各二七壯並服此酒及散永瘥其法春末夏初收白菊軟葉陰乾搗末空腹取一方寸匕和無灰酒服之日再服漸加三方寸匕若不飲酒者但和羹粥汁服之亦得秋八月合花收曝乾切取三大斤以生絹袋盛貯三大斗酒中經七日服之日三次常令酒氣相續為佳蘇頌豆淋酒法治産後百病或血熱覺有餘血水氣或中風困篤或背強口噤或但煩熱瘛瘲口渴或身頭皆腫或身癢嘔逆直視或手足頑痹頭旋眼眩此皆虛熱中風也用大豆三升熬熟至微煙出入瓶中以酒五升沃日經一日以上服酒一升溫覆令少汗出身潤即愈口噤者加獨活半斤微微槌破同沃之産後宜常服以防風氣又消結血寇氏衍義倒倉法朱震亨論曰腸胃為積穀之室故謂之倉倒者推陳以致新也胃屬土受物而不能自運七情五味有傷中宮停痰積血互相纏糾發為癱瘓為勞瘵為蠱脹成形成質為窠為臼以生百病而中宮衍和自非丸散所能去也此方出自西域異人其法用黃肥牡牛肉二十斤長流水煮成糜去滓濾取液再熬成琥珀色收之每飲一鍾隨飲至數十鍾寒月溫飲病在上則令吐在下則令利在中則令吐而利在人活變吐利後渴即服其小便一二碗亦可蕩滌余垢睡二日乃食淡粥養半月即精神強健沉疴悉亡也須五年忌牛肉雜治正旦燒鵲巢灰撒門內闢盜時珍闢魘疫病正月元旦面東以齏水吞赤小豆三七枚一年無諸疾又七月立秋日面西以井華水吞赤小豆七枚一秋不犯痢疾澡浴除病正月一日二月二日三月三日四月四日以至十二月十二日皆用枸杞葉煎湯洗澡令人光澤百病不生洞天保生録適他方不服水土刮鞋底下土和水服即止藏器方注車注船凡人登車船煩悶頭痛欲吐者宜用徐長卿石長生車前子車下李根皮各等分搗碎以方囊系半合於衣帶及頭上則免此患肘後方香衣闢汗丁香一兩為末川椒六十粒和之絹袋盛佩絶無汗氣多能鄙事夏衣生黴點梅花煎湯洗之即去甚妙時珍五月五日取河邊木七寸投酒中二遍飲之必能令人飲酒不醉藏器凡人逃走取其發於緯車上逆轉之則迷亂不知所適藏器鰻鱺燒煙燻蚊令化為水熏氈及屋舍竹木斷蛀蟲置骨於衣箱斷諸蠹張鼎新造屋柱下敗蒲扇灰四隅下埋之蚊永不入禁鼠法逐月旦日取神后土泥屋之四角及塞鼠穴一年鼠皆絶跡神後正月起中順行十二辰治牛疫狐頭尾燒灰和水灌之馬患諸病白鳳仙花連根葉熬膏遇馬有病抹其眼四角上即汗出而愈衛生易簡方牛馬急黃黑汗水研胡桐淚三二兩灌之立瘥唐本草桃樹生蟲煮豬頭汁澆之即止種樹書解白酒酸用石決明不拘多少數個以火煉過研為細末將酒蕩熱以決明末攪入酒內蓋住一時取飲之其味即不酸解中諸毒酒食諸毒大豆一升煮汁服得吐即愈廣記中飲食毒雄黃青黛等分為末每服二錢新汲水下鄧筆峰方飲饌中毒未審何物卒急無藥只煎甘草薺苨湯入口便活金匱玉函方食物中毒貝子一枚含之自吐聖惠治漏脯毒面臛毒及射罔在諸肉中有毒並用貝子燒研水調半錢服一切食毒縮砂仁末水服一二錢事林廣記有人好食豆腐中毒醫治不效忽見賣豆腐人言其妻誤以蘿蔔湯入鍋中遂致不成其人心悟乃以蘿蔔湯飲之而瘳郁肉脯毒杵薤汁服二三升葛洪方漏脯中毒犬屎燒末酒服方寸匕肘後菜毒脯毒凡野菜煮脯肉馬肝馬肉毒以頭垢棗核大含之咽汁能起死人或白湯下亦可小品方中馬肝漏脯果菜諸毒豬骨燒灰水服方寸匕日三服時珍解肉脯毒凡肉密器蓋過宿者為郁肉屋漏沾肴者為漏脯皆有毒搗韭汁飲之並治食物中毒張文仲備急方六畜肉毒小豆一升燒研水服三方寸匕神良千金方一方東壁土末水服一錢即安集玄方肘後方治藥毒煩悶欲死者調水三升頓飲食狗肉毒心下堅或腹脹口乾忽發熱妄語蘆根煮汁服亦治中馬肉鯸鮧魚及食蟹毒千金方牛馬肉毒甘草煮濃汁飲一二升或煎酒服取吐或下如渴不可飲水飲之即死千金方又豉汁和人乳頻服之效衛生易簡方牛馬肉毒及肝毒取好土三升煮清一升服即愈肘後食牛馬六畜肉生疔腫欲死者搗烏桕葉自然汁一二碗頓服得大利去毒即愈未利再服冬用根時珍方食牛馬毒殺人者省頭草連根葉煎水服即消唐瑤經驗方中牛肉毒豬齒燒灰水服一錢又治痘瘡倒陷時珍食牛肉作脹解牛肉毒用牛胃中未化草加薑桂鹽醋食之劉恂啖蛇牛肉毒牛啖蛇者毛髮向後其肉殺人但飲人乳汁一升立愈金匱要略中諸毒肉吐血不止痿黃癢者以蔥子一升水煮冷服半升日一夜一血定乃止孟詵方剝馬中毒被骨刺破欲死以馬腸中粟屎搗敷以尿洗之大效絞汁飲之亦可外臺祕要食鴨肉不消成病胸滿面赤不能食者以糯米泔一盞飲之即消時珍食雉中毒吐下不止用生犀角末方寸匕新汲水調服即瘥聖惠方食雞子毒飲醋少許即消廣記食魚中毒煩亂或成癥積魚鱗燒灰水服二錢時珍亦治諸魚骨鯁別録中鱔魚毒食蟹即解董炳驗方黃鱔魚毒食此魚犯荊芥能害人服地漿解之集簡方茭雞炙食解諸魚蝦毒時珍解河豚毒一時倉卒無藥急以清麻油多灌取吐出毒物即愈衛生易簡方食蟹中毒紫蘇煮汁飲二升金匱要略集驗方用干蒜煮汁飲聖惠方用藕汁飲溪毒射工凡中之者知母連根葉搗作散服亦可投水搗絞汁飲一二斗夏月出行多取其屑自隨欲入水先取少許投水上流便無畏兼闢射工亦可煮湯浴之甚佳肘後良方水毒中人一名中溪一名中濕一名水病似射工而無物初得惡寒頭目微疼旦醒暮劇手足逆冷三日則生蟲食下不癢不痛過六七日蟲食五臟注下不禁以小蒜三升煮微熱大熱即無力以浴身若身發赤斑紋者毋以他病治之也肘後方中水毒病手足冷至膝肘即是以浮萍日乾為末飲服方寸匕良姚僧坦集驗方中水毒病初起頭痛惡寒拘急心煩用梨葉一把搗爛以酒一盞攪飲篋中方解水中毒蛇莓根搗末夏月欲入水先以少末投中流更無所畏又闢射工家中以器貯水浴身亦宜投少許肘後方閉口椒毒氣欲絶或出白沫身體冷急煎桂汁服之多飲新汲水一二升梅師方金匱方以地漿飲之又仲景方煮蒜飲之解蜀椒毒雞毛燒煙吸之並水調一錢服之千金方中巴豆毒下利不止黃連乾薑等分為末水服方寸匕肘後方又大豆一升煮汁飲之肘後方解烏頭毒不拘川烏草烏用多年陳壁土泡湯服之冷水亦可通變要法中砒毒心腹絞痛欲吐不吐面青肢冷用楊梅樹皮煎湯二三碗服之即愈易簡方凡水腫及瘡病服輕粉後口瘡齦爛金器煮汁頻頻含漱能殺粉毒以愈為度外臺祕要取輕粉毒出山黑鉛五斤打壺一把納土茯苓半斤乳香三錢入燒酒十五斤封固重湯煮一日夜埋土中出火毒每日早晚任性飲數杯後用瓦盆接小便自有粉出為驗服至筋骨不痛乃止醫方摘要解諸藥毒已死但心頭溫者用緑豆粉調水服衛生易簡方服藥過劑悶亂者飴糖食之千金方又豉汁飲之千金方制殺諸蟲生蕪荑生檳榔各四兩為末蒸餅丸梧子大每服二十丸白湯下本事中沙蝨毒斑蝥二枚一枚末服一枚燒至煙盡研末敷瘡中立瘥肘後方解中蠱毒吐下血如豬肝茜草根蘘荷葉各三分水四升煮二升服即愈自當呼蟲主姓名也小品方解中鳩毒氣欲絶者葛粉三合水三盞調服口噤者灌之聖惠方解蛇蟲毒飲食中得之咽中如有物咽不下吐不出心下熱悶兜鈴一兩煎水服即吐出崔行功纂效方中蜈蚣毒舌脹出口是也雄雞冠血浸舌並咽之青囊雜纂諸中毒惡熱悶欲死者新糞汁水和服或乾者乾末漬汁名破棺湯蘇恭方解中酒毒恐爛五臟茅根汁飲一升千金方酒多致病河西柳曬乾為末每服一錢溫酒調下易簡方燒酒醉死急以新汲水浸其發外以故帛浸濕貼其胸膈仍細細灌之至蘇而已瀕湖集簡方解燒酒毒緑豆粉蕩皮多食之即解中煤炭毒一時暈倒不救殺人急以清水灌之唐瑤經驗方解烏頭附子天雄毒並用防風煎汁飲之並解野菌毒千金方鴨血熱飲解野葛毒已死者入咽即活孟詵又挖開口後灌雞子三枚須臾吐出野葛乃蘇肘後方胡蔓野毒即斷腸草一葉入口百竅流血惟急取鳳凰胎即雞卵抱未成雛者已成者不用研爛和麻油灌之吐出毒物乃生少遲即死嶺南衛生方解莨菪毒升麻煮汁多服之外臺祕要解鉤吻毒面青口噤欲死以蔥涕啖之即解千金方解斑蝥毒玉簪根擂水服之即解趙真人濟急方解五石毒薺苨生搗汁多服之立瘥蘇頌圖經解硫黃毒黑鉛煎湯服即解集簡方硫黃毒發氣悶用羊血熱服一合效聖惠方解砒石毒緑豆粉寒水石等分以藍根汁調服三五錢衛生易簡一方糯稻草燒灰新汲水淋汁濾清調青黛三錢服摘要解砒霜毒地漿調鉛粉服之立解集玄方又錫器於粗石上磨水服之濟急方解砒霜毒煩躁如狂心腹㽲痛四肢厥冷命在須臾黑鉛四兩磨水一碗灌之華他危病方闢山嵐瘴氣山嵐瘴氣生熟大蒜各七片共食之少頃腹鳴或吐血或大便泄即愈攝生方預闢瘴癘桃仁一斤吳茱萸青鹽各四兩同炒熟以新瓶密封一一取出揀取茱鹽將桃仁去皮尖每嚼一二十枚山居尤宜之余居士選奇方闢瘴不染生葛搗汁一小盞服去熱毒氣也聖惠方熱瘴昏迷煩悶飲水不止至危者一服見效生地黃根生薄荷葉等分擂爛取自然汁入麝香少許井華水調下覺心下頓涼勿再服普濟方救荒濟飢辟穀仙方用大豆五斗淘淨蒸三遍去皮用大麻子三斗浸一宿亦蒸三遍令口開取仁各搗為末和搗作團如拳大入甑內蒸從戊至子時止寅時出甑午時曬乾為末干服之以飽為度不得食一切物第一頓得七日不飢第二頓得四十九日不飢第三頓得三百日不飢第四頓得二千四百日不飢更不必服永不飢也不問老少但依法服食令人強壯容貌紅白永不憔悴口渴即研大麻子湯飲之轉更滋潤臟腑若要重吃物用葵子三合研末煎湯冷服取下藥如金色任吃諸物並無所損黃山谷煮豆帖言荒年以黑豆一升挼淨入貫衆一斤銼如骰子大同以水煮用文火斟酌至豆熟取出日乾覆令展盡余汁簸去貫衆每以空心啖豆五七粒能食百草木枝葉有味可飽荒年代糧糯米一斗淘汰百蒸百曝搗末日食一餐以水調之服至三十日止可一年不食肘後方荒年辟穀粳米一升酒三升漬之曝乾又漬取出稍食之可闢三十日足一斗三升辟穀一年肘後方山中辟穀凡避難無人之境取白茅根洗淨咀嚼或石上曬焦搗末水服方寸匕可辟穀不飢肘後方斷谷不飢榆皮檀皮為末日服數合救荒本草
