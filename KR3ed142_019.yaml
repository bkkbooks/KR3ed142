body:
  text: 卷十九奇病離魂異疾凡人自覺本形作兩人並行並臥不辨真假者離魂病也用辰砂人參龍齒赤茯苓各一錢濃煎半盞調水飛過硃砂末一錢臨臥服服久則真者氣爽假者自化矣夏子益奇疾方肉人怪病人頂生瘡五色如櫻桃狀破則自頂分裂連皮剝脫至足名曰肉人常飲牛乳自消夏氏奇方眼見禽蟲飛走諸物乃肝膽之疾青桐子花酸棗仁玄明粉羌活各一兩為末每服二錢水煎和滓日三服良方人睛忽垂至鼻如黑角塞痛不可忍或時時大便血出痛名曰肝脹用羌活煎汁服數杯自愈夏子益眉毛動搖目不能交睫喚之不應但能飲食用蒜三兩杵汁調飲即愈夏子益鼻中毛出盡夜可長一二尺漸漸粗圓如繩痛不可忍摘去復生此因食豬羊血過多致此用生乳香硇砂各一兩為末飯丸梧子大每空心臨臥各服十丸水下自然退落夏子益口內肉球有根如線五寸余如叉股吐出乃能食物捻之則痛徹心者麝香一錢研水服之日三即消脅漏出水不止用烏牛耳垢敷之即瘥足疔怪疾兩足心凸腫上生黑豆瘡硬如疔脛骨生碎孔髓流出身發寒顫惟思飲酒此是肝腎冷熱相吞用炮川烏頭末敷之內服韭子飲效夏氏奇方脈溢怪症有人毛竅節次血出不止皮脹如鼓須臾目鼻口被氣脹合此名脈溢生薑自然汁和水各半盞服即安夏子益氣奔怪病人忽遍身皮底混混如波浪聲癢不可忍抓之血出不能解謂之氣奔以苦杖人參青鹽細辛各一兩作一服水煎細飲盡便愈夏子益血餘怪病手十指節斷壞惟右筋連無節肉蟲出如燈心長數尺遍身緑毛卷名曰血餘以茯苓胡黃連煎湯飲之愈夏氏奇方肉壞怪病凡口鼻出腥臭水以碗盛之狀如鐵色蝦魚走躍捉之即化為水此肉壞也但多食雞饌即愈夏氏奇方血潰怪病凡人目中白珠渾黑視物如常毛髮堅直如鐵條能飲食而不語如醉名曰血潰以五靈脂為末湯服五錢即愈夏子益肉錐怪疾有人手足忽長倒生肉刺如錐痛不可忍者但食葵菜即愈夏子益血壅怪病人遍身忽然肉出如錐既癢且痛不能飲食名血壅不速治必潰膿血以赤皮蔥燒灰淋洗飲豉湯數盞自安夏子益惡肉毒瘡一人年十四腕軟處生物如黃豆大半在肉中紅紫色痛甚諸藥不效一方士以水銀四兩白紙二張揉熟蘸銀擦之三日自落而愈李樓怪症方截腸怪病大腸頭出寸余痛苦干則自落又出名為截腸病若腸盡即不治但初覺截時用器盛芝麻油坐浸之飲大麻子汁數升即愈也夏子益吃飯直出梔子二十個微炒去皮水煎服怪症奇方寒熱怪病寒熱不止數日四肢堅如石擊之侶鐘磬聲日漸瘦惡用茱萸木香等分煎湯飲之愈夏子益發斑怪症有人眼赤鼻張大喘渾身出斑毛髮如銅鐵刀熱毒氣結於下焦也白礬滑石各一兩為末作一服水三碗煎減半不住服盡即安夏子益瘧後怪症口鼻中氣出盤旋不散凝如黑蓋色過十日漸至肩與肉相連堅勝金石無由飲食煎澤瀉湯日飲三盞連服五日愈夏子益臍蟲怪病腹中如鐵石臍中水出旋變作蟲行繞身咂癢難忍撥掃不盡用蒼朮濃煎湯浴之仍以蒼朮末入麝香少許水調服夏子益灸瘡飛蝶因艾火灸後瘡痂退落瘡內鮮肉片子飛出如蝶騰空痛不可忍是血肉俱熱怪病也用朴硝大黃各半兩為末水調下微利即愈夏氏奇方筋肉化蟲有蟲如蟹走於皮下作聲如小兒啼為筋肉之化雄黃雷丸各一兩為末摻豬肉上炙熟吃盡自安夏氏奇方應聲蟲病腹中有物作聲隨人語言用板藍汁一盞分五服效夏子益蝨出怪病臨臥渾身蝨出約至五升隨至血肉俱壞每宿漸多痛癢不可言狀惟吃水臥床晝夜號哭舌尖出血不止身齒俱黑唇動鼻開但飲鹽醋湯十數日即安夏氏奇方女人異疾女人月事退出皆作禽獸之形欲來傷人先將綿塞陰戶乃頓服沒藥末一兩白湯調下即愈危氏方産後乳懸婦人産後兩乳忽長細小如腸垂過小肚痛不可忍危亡須臾名曰乳懸將芎藭當歸各一斤以半斤銼散於瓦器內用水濃煎不拘多少頻服仍以一斤半挫塊於病人桌下燒煙令將口鼻吸烟用盡未愈再作一料仍以萆麻子一粒貼其頂心夏子益一婦人産後用力垂出肉線長三四尺觸之痛引心腹欲絶老薑連皮三斤搗爛入麻油二斤拌勻炒乾先以熟絹五尺折作方結令人輕輕盛起肉線使之屈曲作三團納入産戶乃以絹袋盛姜就近熏之冷則更換熏一日夜縮入大半二日盡入也此乃魏夫人傳方但不可使線斷斷則不可治矣夏子益祟病女人與邪物交通獨言獨笑悲思恍惚者雄黃一兩松脂二兩熔化以虎爪攪之丸如彈子夜燒於籠中令女坐其上以被蒙之露頭在外不過三劑自斷仍以雄黃人參防風五味子等分為末每旦井水服方寸匕取愈肘後方治婦人夢與鬼交者鹿角屑微炒清酒服一撮即出鬼精孟詵方鬼魅獺肝末水服方寸匕日三千金方鬼疰精魅敗箬笠燒灰酒服別録鬼魅傳尸瘟疫魍魎神祟以太歲所在日時當戶燒古廁木熏藏器癲狂邪祟凡狂發欲走或自高貴稱神或悲泣呻吟此為邪祟以蠶紙燒灰酒水任下方寸匕亦治風癲肘後方鬼魘不寤皂莢末刀圭吹之能起死人千金方夜臥禁魘凡臥時以鞋一仰一覆則無魘及惡夢起居雜忌又以赤𦇧一尺枕之即安肘後方闢禳魘鬼以雄黃帶頭上或以棗許系左腋下終身不魘張文仲方鬼擊諸病卒然著人如刀刺狀胸脅腹內切痛不可抑按或吐血鼻血下血一名鬼排以淳酒吹兩鼻內良肘後又以熟艾如雞子大三枚水五升煎二升頓服肘後方又白犬頭取熱血一升飲之百一選方又鼠屎燒末水服方寸匕不省者灌之肘後方鬼打及強鬼排人突中惡者鐵椎柄和桃奴鬼箭等作丸服之藏器中鬼昏厥四肢拳冷口鼻出血用久汙溺衣燒灰每服二錢沸湯下男用女女用男趙原陽真人濟急方鬼擊成病腹中煩滿欲絶雄黃粉酒服一刀圭日三服化血為水也千金方鬼擊身青作痛用金銀花一兩水煎飲之李樓怪病方卒得鬼打取刀鞘二三寸燒末水服腰刀者彌佳藏器鬼擊卒死烏雞冠血瀝口中令咽仍破此雞拓心下冷乃棄之道邊妙肘後方又吹醋少許入鼻中千金方鬼排卒死用烏雄雞血塗心下即蘇風俗通妖魅貓鬼病人不肯言鬼以鹿角屑搗末水服方寸匕即言實也録驗方貓鬼野道病歌哭不自由臘月死貓頭燒灰水服一錢匕日二千金方闢鬼除邪阿魏棗許為末以牛乳或肉汁煎五六沸服之至暮以乳服安息香棗許久者不過十日忌一切菜唐崔行功纂要服食單味丸膏粥雜制服玉方後魏李預得餐玉之法乃採訪藍田掘得若環璧雜器形者大小百餘枚槌作屑日食之經年云有效驗而好酒損志及疾篤謂妻子曰服玉當屏居山林排棄嗜欲而吾好色不絶自致於死非藥之過也尸體必當有異於人勿使速殯令後人知餐服之功時七月中旬長安毒熱停尸四日而體色不變口無穢氣慎微服丹砂法云南方養生治病無過丹砂其法用升麻末三兩研煉過光明砂一兩以蜜丸梧子大每日食後服三丸王方慶嶺南方服胡麻法用上黨胡麻三斗淘淨甑蒸令氣遍日乾以水淘去沫再蒸如此九度以湯脫去皮簸淨炒香為末白蜜或棗膏丸彈子大每溫酒化下一丸日三服忌毒魚狗肉生菜服至百日能除一切痼疾一年身面光澤不飢二年發白返黑三年齒落更生四年水火不能害五年行及奔馬久服長生孫真人云用胡麻三升去黃褐者蒸三十遍微炒香為末入白蜜三升杵三百下丸梧子大每旦服五十丸人過四十以上久服明目洞視腸柔如筋也服雲母法上白雲母二十斤薄劈以露水八斗作湯分半淘洗二次又作二斗作湯納芒硝十斤木器中漬二十日取出絹袋盛懸屋上勿見風日令燥以鹿皮為囊揉之從旦至午篩渣復揉得好粉五斗余者棄之以粉一斗納崖蜜二斤攪糊入竹筒中薄削封口漆固埋北垣南崖下入地六尺覆土春夏四十日秋冬三十日出之當成水若洞洞不消更埋三十日此水能治萬病及勞氣風疼每以溫水一合和服之三服十日小便當變黃二十日腹中寒澼消三十日齲齒更生四十日不畏風寒五十日諸病皆愈顏色日少長生神仙千金方服乳歌仙家酒仙家酒兩個葫蘆盛一斗五行釀出真醍醐不離人間處處有丹田若有乾涸時咽下重樓潤枯朽清晨能飲一升余返老還童天地久接命丹治男婦氣血衰弱痰火上升虛損之證又治中風不語左癱右瘓手足疼痛動履不便飲食少進諸證用人乳二杯香甜白者為佳以好梨汁一杯和勻銀石器內燉滾每日五更一服能消痰補虛生血延壽此乃以人補人其妙無加集簡方服甘菊法用甘菊三月上寅日採苗名曰玉英六月上寅日採葉名曰容成九月上寅日採花名曰金精十二月上寅日採根名曰長生四件並陰乾百日取等分以成日合搗千杵為末每酒服一錢匕或以蜜丸梧子大酒服七丸一日三服百日輕潤一年發白變黑服之二年齒落再生五年八十歲老人變為兒童也服蒺藜法蒺藜子一石七八月熟時收取日乾舂去刺杵為末每服二錢新汲水調下日三服勿令中絶斷谷長生服之一年以後冬不寒夏不熱二年老者復少發白變黑齒落更生服之三年身輕長生神仙祕旨服黃精法黃精細切一石用水二石五斗煮之自旦至暮候冷以手挼碎布袋榨取汁煎之渣干為末同入釜中煎至可丸丸如雞子大每服一丸日三服絶糧輕身除百病渴則飲水臞仙神隱書服菟絲子法取菟絲子實一斗酒一斗浸曝乾再浸又曝令酒盡乃止搗篩每酒服二錢日二服此藥治腰膝去風兼能明目久服令人光澤老變為少十日外飲啖如湯沃雪也抱朴子仙方服豨蘞草法五月五日六月六日九月九日採葉去根莖花實淨洗曝乾入甑中層層灑酒與蜜蒸之又曝如此九過則氣味極香美熬搗篩末蜜丸服之甚益元氣治肝腎風氣四肢麻痹骨間冷腰膝無力者亦能行大腸氣服葈耳法葈耳根苗葉實皆洗濯陰乾燒灰湯淋取濃汁泥連兩灶煉之灰汁耗即旋取傍釜中熱灰湯益之一日夜不絶火乃旋得霜干瓷瓶收之每日早晚酒服二錢補暖去風駐顏尤治皮膚風令人膚革清淨每澡沐入少許尤佳宜州學昌從諫服此十餘年至七八十紅潤輕健皆此藥力也蘇頌良方椒紅丸治元臟傷憊目暗耳聾服此百日覺身輕少睡足有力是其效也服及三年心智爽悟目明倍常面色紅悅髭發光黑用蜀椒去目及合口者炒出汗曝乾搗取紅一斤以生地黃搗自然汁入銅器中煎至一升候稀稠得所和椒末丸梧子大每空心暖酒下三十丸合藥時勿令婦人雞犬見詩云其椒應五行其仁通六義欲知先有功夜見無夢寐四時去煩勞五臟調元氣明目腰不痛身輕心健記別更有異能三年精自祕回老返嬰童康健不思睡九蟲頓消亡三尸自逃避若能久餌之神仙應可冀地仙丹昔有異人赤腳張傳此方於猗氏縣一老人服之壽百餘行走如飛發白反黑齒落更生陽事強健此藥性平常服能除邪熱明目輕身春採枸杞葉名天精草夏採花名長生秋採子名枸杞子冬採根名地骨皮並陰乾用無灰酒浸一夜曬露四十九晝夜取日精月華氣待乾為末煉蜜丸如彈子大每早晚各用一丸細嚼以隔夜百沸湯下此藥採無刺味甜其有刺服之無益金髓煎枸杞子逐日摘紅熟者不拘多少以無灰酒浸之蠟紙封固勿令泄氣兩月足取入砂盆中擂爛濾取汁同浸酒入銀鍋內慢火熬之不住手攪恐黏住不勻候成膏如餳淨瓶密收每早溫酒服二大匙夜臥再服百日身輕氣壯積年不輟可以羽化也經驗治虛損百病發白再黑返老還童用女貞實十月上巳日收陰乾用時以酒浸一日蒸透曬乾一斤四兩旱蓮草五月收陰乾十兩為末桑椹子三月收陰乾十兩為末煉蜜丸梧子大每服七八十丸淡鹽湯下若四月收桑椹子搗汁和藥七月收旱蓮搗汁和藥即不用蜜矣簡便方服楮實法楮實正赤時收取陰乾篩末水服二錢匕益久乃佳抱朴子云楮木實赤者服之老者成少令人徹視見鬼神道士梁須年七十服之更少壯到百四十歲能行及走馬蘇頌服桑葉法以四月桑茂盛時採葉又十月霜後三分二分已落時一分在者名神仙藥即採取與前葉同陰乾搗末丸散任服或煎水代茶飲之能止消渴又霜後煮湯淋洗泄手足去風痹殊勝補虛益氣黃精枸杞子等分搗作餅日乾為末煉蜜丸梧子大每湯下五十丸奇效良方滋陰養血溫補下元三才丸用天門冬去心生地黃各二兩二味用柳甑箅以酒灑之九蒸九曬待乾稱之人參一兩為末蒸棗肉搗和丸梧子大每服三十丸食前溫酒下日三服潔古活法機要七寶美髯丹烏鬚髮壯筋骨固精氣續嗣延年用赤白何首烏各一斤米泔水浸三四日瓷片削去皮用淘淨黑豆二升以砂鍋木甑鋪豆及首烏重重鋪蓋蒸之豆熟取出去豆曝乾換豆再蒸如此九次曝乾為末赤白茯苓各一斤去皮研末以水淘去筋膜及浮者取沉者捻塊以人乳十碗浸勻曬乾研末牛膝八兩去苗浸一日同何首烏第七次蒸之至第九次止曬乾當歸八兩酒浸曬枸杞子八兩酒浸曬菟絲子八兩酒浸生芽研爛曬補骨脂四兩以黑芝麻炒香並忌鐵器石臼為末煉蜜和丸彈子大一百五十九丸每日三丸侵晨溫酒下午時薑湯下臥時鹽湯下其餘並丸梧子大每日空心酒服一百丸久服極驗積善堂方交感丹凡人中年精耗神衰蓋由心血少火不下降腎氣憊水不上升致心腎隔絶營衛不和上則多驚中則塞痞飲食不下下則虛冷遺精愚醫徒知峻補下日豐惟不能生水滋陰而反見衰悴但服此方半年屏去一切暖藥絶嗜欲然後習祕固沂流之術其效不可殫述俞通奉年五十一遇鐵甕城申先生授此服之老猶如少年至八十五乃終也因普示群生同登壽域香附子一斤新水浸一宿石上擦去毛炒黃茯苓去皮木四兩為末煉蜜丸彈子大每服一丸侵早細嚼以降氣湯下降氣湯用香附子如上法半兩茯神二兩炙甘草一兩半為末點沸湯服前藥瑞竹堂經驗方不老丹補脾益腎服之七十亦無白髮茅山蒼朮刮淨米泔浸軟切片四斤一斤酒浸焙一斤醋浸焙一斤鹽四兩炒一斤椒四兩炒赤白何首烏各二斤米泔浸竹刀刮切以黑豆紅棗各五升同蒸至豆爛曝乾地骨皮去骨一斤各取淨末以桑椹汁和成劑鋪盆內汁高三指日曬夜露取日月精華待乾以石臼搗末煉蜜和丸梧子大每空心酒服一百丸王海藏醫壘元戎少陽丹蒼朮米泔浸半日刮皮曬乾為末一斤地骨皮溫水洗淨去心曬研末一斤熟桑椹二十斤入瓷盆內揉爛絹袋壓汁和末如糊傾入盆內日曬夜露採日精月華待乾研末煉蜜和丸赤小豆大每服二十丸無灰酒下日三服一年發變返黑三年面如童子劉松石保壽堂方交加丸升水降火除百病蒼朮刮淨一斤分作四份一份米泔浸炒一份鹽水浸炒一份川椒炒一份破故紙炒黃柏皮刮淨一斤分作四份一份酒浸炒一份童尿浸炒一份小茴香炒一份生用揀去各藥只取朮柏為末煉蜜和丸梧子大每服六十丸空心鹽湯下鄧才筆峰雜興固真丹燥濕養脾助胃固真並可治疝茅山蒼朮一斤分作四份一份青鹽一兩炒一份川椒一兩炒一份川楝子一兩炒一份小茴香破故紙各一兩炒並揀術研末酒煮麵糊丸梧子大每空心米飲下五十丸瑞竹堂方蒼朮膏除風濕健脾胃變白駐顏補虛損大有功效蒼朮新者刮去皮薄切米泔水浸二日一日一換取出以井華水浸過二寸春秋五日夏三日冬七日漉出以生絹袋盛之放在一半原水中揉洗津液出紐干將渣又搗爛袋盛於一半原水中揉至汁盡為度將汁入大砂鍋中慢火熬成膏每一斤入白蜜四兩熬二炷香每膏一斤入水澄白茯苓末半斤攪勻瓶收每服三匙侵早臨臥各一服以溫酒送下忌醋及酸物桃李雀蛤菘菜雞魚等物筆峰雜興經驗方以前二味為末丸服不如作膏為妙補骨脂丸治下元虛敗腳手沉重夜夜盜汗縱欲所致此藥壯筋骨益元氣補骨脂四兩炒香菟絲子四兩酒蒸胡桃肉一兩去皮沉香研二錢半煉蜜丸如梧子大每服二三十丸空心鹽湯溫酒任下自夏至起冬至止日一服此乃唐宣宗時張壽太尉知廣州得方於南番人有詩云三年持節向邊隅人信方知藥力殊奪得春光來在手青蛾休笑白髭鬚和劑方胡桃丸益血補髓強筋骨延年明目悅心潤肌能除百病用胡桃仁四兩搗膏入破故紙杜仲萆薢末各四兩杵勻丸梧子大每空心溫酒鹽湯任下五十丸御藥院方仙茅丸壯筋骨益精神明目黑髭鬚仙茅二斤糯米泔浸五日去赤水夏月浸三日銅刀刮銼陰乾取一斤蒼朮二斤米泔浸五日刮皮焙乾取一斤枸杞子一斤車前子十二兩白茯苓去皮茴香炒柏子仁去殼各八兩生地黃焙熟地黃焙各四兩為末酒煮糊丸如梧子大每服五十丸食前溫酒下日二服聖劑總録強筋補益四聖不老丹明松香一斤以無灰酒砂鍋內桑柴火煮數沸竹枝攪稠乃住火傾入水內結塊復以酒煮九遍其脂如玉不苦不澀乃止為細末用十二兩入白茯苓末半斤黃甘菊花末半斤柏子仁去油取霜半斤煉蜜丸如梧子大每服空心好酒送下七十二丸須擇吉日修合勿令婦人雞犬見之草還丹益元陽補元氣固元精壯元神乃延年續嗣之聖藥也山茱萸酒浸取肉一斤破故紙酒浸焙乾半斤當歸四兩麝香一錢為末煉蜜丸梧子大每服八十一丸臨臥鹽湯下吳旻扶壽方滋陰養生五月五日採五方側柏葉三斤遠志去心二斤白茯苓去皮一斤為末煉蜜和丸梧子大每以仙靈脾酒下三十丸日再服並無所忌勿示非人麋鹿丸補心神安臟腑填骨髓理腰腳能久立聰耳明目發白變黑貌老還少凡麋鹿取當年新角連腦頂者為上看角根有斫痕處亦堪用蛻角根下平者不堪取角五具或四具三具二具一具為一劑去尖一大寸即角長七八寸取勢截斷量把鎊得即於長流水中以竹器盛懸浸十宿如無長流水處即於淨盆中滿著水浸每夜易換軟即將出削去皺皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即干握瀝去舊水置新絹上曝乾擇去惡物粗骨皮及鎊不勻者以無灰美酒於大瓷器中浸經兩宿其藥及酒俱入淨釜中初用武火煮一食久後以文火微煎如蟹目沸以柳木篦徐徐攪不得住手時時添酒以成煎為度煎時皆須平旦下手不得經宿仍看屑如稀膠即以牛乳五升酥一片以次漸下後項藥仍以麋角一條炙令黃為末與諸藥同制之檳榔通草秦艽肉蓯蓉人參菟絲子酒浸兩宿別搗曬乾甘草各一兩上搗為末將膠再煎一食頃似稀稠粥即止火少時投諸藥末相和稠黏堪作丸即以新器盛貯以衆手一時丸如梧子大如黏手著少酥塗手其服餌之法空腹以酒下之初服三十丸日加一丸加至五十丸為度日二服至一百日內忌房室服經一月腹內諸疾自相驅逐有微利勿怪漸後多泄氣能食患氣者加枳實青木香各一兩服至二百日面皺光澤一年齒落更生強記身輕若風日走數百里二年令人肥飽少食七十以上服之卻成後生腸作筋體預見未明四年常飽不食自見仙人三十下服之不輟顏一定而不變修合時須在淨室中勿令陰人雞犬孝子等見婦人服之尤佳如飲酒食麵口乾眼澀內熱者即服三黃丸微利之如此一度發動以後方始調暢也千金方斑龍丸治諸虛用鹿茸酥炙或酒炙亦可鹿角膠炒成珠鹿角霜陽起石煅紅酒淬肉蓯蓉酒浸酸棗仁柏子仁黃耆蜜炙各一兩當歸黑附子炮地黃九蒸九焙各八錢辰硃砂半錢各為末酒糊丸梧子大每空心溫酒下五十丸淡寮方二至丸補虛損生精血去風濕壯筋骨用鹿角鎊細以真酥一兩無灰酒一升慢火炒乾麋角鎊細以真酥二兩米醋一升煮乾慢火炒乾取四兩蒼耳子酒浸一宿焙半斤山藥白茯苓黃耆蜜炙各四兩當歸酒浸焙五兩肉蓯蓉焙酒浸遠志去心人參沉香各二兩五味子一兩通為末酒煮糯米糊丸梧子大每服五十丸溫酒鹽酒任下日二服楊氏家藏方秋石四精丸治思慮色欲過度損傷心氣遺精小便數秋石白茯苓各四兩蓮肉芡實各二兩為末蒸棗肉和丸梧子大每空心鹽湯下三十丸永類鈐方秋石交感丹治白濁遺精秋石一兩白茯苓五錢菟絲子炒五錢為末用百沸湯一盞井華水一盞煮糊丸梧子大每服一百丸鹽湯下鄭氏家傳方人參膏用人參十兩細切以活水二十盞浸透入銀石器內桑柴火緩緩煎取十盞濾汁再以水十盞煎取五盞與前汁合煎成膏瓶收隨病作湯使丹溪云多欲之人腎氣衰憊咳嗽不止用生薑橘皮煎湯化膏服之浦江鄭兄五月患痢又犯房室忽發昏運不知人事手撒目暗身汗如雨喉中痰鳴如曳鋸聲小便遺失脈大無倫此陰虧陽絶之證也豫令急煎大料人參膏仍與灸氣海十八壯右手能動再三壯唇口微動遂與膏服一盞半夜後服三盞眼能動盡三斤方能言而索粥盡五斤而痢止至十斤而全安若作風治則誤矣一人背疽服內托十宣藥已多膿出作嘔發熱六脈沉數有力此潰瘍所忌也遂與大料人參膏入竹瀝飲之參盡一十六斤竹伐百餘竿而安後經旬余值大風拔木瘡起有膿中有紅線一道過肩胛抵右肋豫曰急作參膏以芎歸橘皮作湯入竹瀝薑汁飲之盡三斤而瘡潰調理乃安若癰疽潰後氣血俱虛嘔逆不食變證不一者以參耆歸術等分煎膏服之最妙天門冬膏去積聚風痰補肺療咳嗽失血潤五臟殺三蟲伏尸除瘟疫輕身益氣令人不飢以天門冬流水泡過去皮心搗爛取汁砂鍋文武炭火煮勿令大沸以十斤為率熬至三斤卻入蜜四兩熬至滴水不散瓶盛埋土中一七去火毒每日早晚白湯調服一匙若動大便以酒服之醫方摘要瓊玉膏常服開心益智發白返黑齒落更生辟穀延年治癰疽勞瘵咳嗽吐血等證乃鐵甕城申先生方也生地黃十六斤取汁人參末一斤半白茯苓末三斤白沙蜜十斤濾淨拌勻入瓶內箬封安砂鍋中桑柴火煮三日夜再換蠟紙重封浸井底一夜取起再煮一伏時每以白湯或酒點服一匙丹溪云好色虛人咳嗽唾血者服之甚捷國朝太醫院進御服食議加天門冬麥門冬枸杞子末各一斤賜名益壽永真膏臞仙方加琥珀沉香半兩地髓煎生地黃十斤洗淨搗壓取汁鹿角膠一斤半生薑半斤絞取汁蜜二升酒四升文武火煮地黃汁數沸即以酒研紫蘇子四兩取汁入煎一二十沸下膠化下薑汁蜜再煎候稠瓦器盛之每空心酒化一匕服大補益千金方白朮膏服食滋補止久泄痢上好白朮十斤切片入瓦鍋內水淹過二寸文武火煎至一半傾汁入器內以渣再煎如此三次乃取前後汁同熬成膏入器中一夜傾去上面清水收之每服二三匙蜜湯調下千金良方參朮膏治一切脾胃虛損益元氣白朮一斤人參四兩切片以流水十五碗浸一夜桑柴文武火煎取濃汁熬膏入煉蜜收之每以白湯點服集簡方地黃酒補虛弱壯筋骨通血脈治腹痛變白髮用生肥地黃絞取汁同曲米封密器中五七日啓之中有緑汁真精英也宜先飲之乃濾汁藏貯加牛膝汁效更速亦有加群藥者枸杞酒補虛弱益精氣去冷風壯陽道止目淚健腰腳用甘州枸杞子煮爛搗汁和曲米釀酒或以子同生地黃袋盛浸酒煮飲黃精酒壯筋骨益精髓變白髮治百病用黃精蒼朮各四斤枸杞根柏葉各五斤天門冬三斤煮汁一石同曲十斤糯米一石如常釀酒飲天門冬酒潤五臟和血脈久服除五勞七傷癲癇惡疾常令酒氣相接勿令大醉忌生冷十日當出風疹毒氣三十日乃已五十日不知風吹也冬月用天門冬三十斤去心搗碎以水二石煮汁一石糯米五斗細曲十斤如常炊釀酒熟日飲三杯釀初熟微酸久乃味佳千金方桑椹酒補五臟明耳目治水腫不下則滿下之則虛入腹則十無一活用桑椹搗汁煎過同曲米如常釀酒飲甘菊花酒治頭風明耳目去痿痹消百病用甘菊花煎汁同曲米釀酒或加地黃當歸枸杞諸藥亦佳薏苡仁酒去風濕強筋骨健脾胃用絶好薏苡仁粉同曲米釀酒或袋盛煮酒飲之五加皮酒去一切風濕痿痹壯筋骨填精髓用五加皮洗刮去骨煎汁和曲米釀成飲之或切碎袋盛浸酒煮飲或加當歸牛膝地榆諸藥五加皮地榆煮酒法能去風濕壯筋骨順氣化痰添精補髓久服延年益老功難盡述五加皮地榆刮去粗皮各一斤袋盛入無灰酒二斗大壇封固安大鍋內文武火煮之壇口上安米一合米熟為度取出埋土去火毒以渣曬乾為丸每服五十丸藥酒送下臥時再服試驗方仙靈脾酒益丈夫興陽理腰膝冷用淫羊藿一斤酒一斗浸三日逐日飲之食醫心鏡聖惠方同云治偏風不遂強筋堅骨仙茅酒治精氣虛寒陽痿膝弱腰痛痹緩諸虛之病用仙茅九蒸九曬浸酒飲大麻仁酒治骨髓風毒疼痛不可運動用大麻仁水浸取沉者一大升曝乾於銀器中旋旋慢炒香熟入木臼中搗至萬杵待細入白粉即止平分為十貼每用一貼取家釀無灰酒一大碗同麻粉用柳槌蘸入砂盆中擂之濾去殼煎至減半空腹溫服一貼輕者四五貼見效甚者不出十貼必失所苦效不可言篋中方蠶砂酒治風緩頑痹諸節不隨腹內宿痛用原蠶砂炒黃袋盛浸酒飲長松酒滋補一切風虛乃廬山休休子所傳長松一兩五錢狀似獨活而香乃酒中聖藥也熟地黃八錢生地黃黃耆蜜炙陳皮各七錢當歸厚朴黃柏各五錢白芍藥煨人參枳殼各四錢蒼朮米泔制半夏薑汁白礬制天門冬麥門冬砂仁黃連各三錢木香蜀椒胡椒桃仁各二錢小紅棗肉八個老米一撮燈心五寸長一百二十根一料分十劑絹袋盛之凡米五升造酒一尊煮一袋窨久乃飲韓氏醫通羊羔酒大補元氣健脾胃益腰腎用米一石如常浸蒸嫩肥羊肉七斤曲十四兩杏仁一斤同煮爛連汁拌末入木香一兩同釀勿犯水十日熟極甘滑一法羊肉五斤蒸爛酒浸一宿入消梨七個同搗取汁和曲米釀酒飲之宣和化成殿真方戊戌酒大補元氣用黃犬肉一隻煮一伏時搗如泥和汁拌炊糯米三斗入曲如常釀酒候熟每旦空心飲之養老方雞頭粥益精氣強志意利耳目雞頭實三合煮熟去殼粳米一合煮粥日日空心食經驗方麻子仁粥治風水腹大腰臍重痛不可轉動用冬麻子半斤研碎水濾取汁入粳米二合煮稀粥下蔥椒鹽豉空心食亦治大便不通食醫心鏡法制青皮常服安神調氣消食解酒益胃不拘大人小兒宋神宗每食後咀數片乃邢和璞真人所獻名萬年草劉跂改名延年草用青皮一斤浸去苦味去瓤揀淨白鹽花五兩炙甘草六兩舶茴香四兩甜水一斗煮之不住手攪勿令著底候水盡慢火焙乾勿令焦去甘草茴香只取青皮密收用服王氏易簡方壯陽益腎用白羊肉半斤生切以蒜薤食之三日一度甚妙心鏡方補腎興陽用蝦米一斤蛤蜊二枚茴香蜀椒各四兩以青鹽化酒炙炒以木香粗末一兩和勻乘熱收新瓦瓶中密封每服一匙空心鹽酒嚼下甚妙暖益腰膝王方平通靈玉粉散治腰膝暖水臟益顏色其功不可具載硫黃半斤桑柴灰五斗淋取汁煮三伏時以鐵匙抄於火上試之伏火即止候乾以大火煅之如未伏更煮以伏為度煅了研末穿地坑一尺二寸沒水於中待水清取和硫末坩鍋內煎如膏鐵錢抄出細研飯丸麻子大每空心鹽湯下十丸極有效驗杜光庭玉函方兼治丸散湯酒膏蘇合香丸治傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖丁腫小兒驚癇客忤大人中風中氣狐貍等病用蘇合油一兩安息香末二兩以無灰酒熬成膏入蘇合油內白朮香附子青木香白檀香沉香丁香麝香蓽茇訶黎勒煨去核硃砂烏犀角鎊各二兩龍腦熏陸香各一兩為末以香膏加煉蜜和成劑蠟紙包收每服旋丸梧子大早服取井華水溫冷任意化服四丸老人小兒一丸和劑局方枳朮丸消痞強胃久服令人食自不停也白朮一兩東壁土炒過去土枳實麩炒去麩一兩為末荷葉包飯煨熟搗和丸梧子大每服五十丸白湯下氣滯加橘皮一兩有火加黃連一兩有痰加半夏一兩有寒加乾薑五錢木香三錢有食加神麯麥糵各五錢潔古家論紫金丸治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食又治久有瘀血月水不調黃瘦不食亦療心痛腹痛小腸疝痛功與失笑散同以五靈脂水淘淨炒末一兩以好醋調稀慢火熬膏入真蒲黃末和丸龍眼大每服一丸以水與童子小便各半盞煎至七分溫服少頃再服惡露即下血塊經閉者酒磨服之楊氏産乳威喜丸治丈夫元陽虛憊精氣不固小便白濁餘瀝常流夢寐多驚頻致遺泄婦人白淫白帶並治之白茯苓四兩去皮作匱以豬苓四錢半入內煮二十餘沸取出日乾擇去豬苓為末化黃蠟搜和丸彈子大每嚼一丸空心津下以小便清為度忌米醋黃鶴丹治百病乃朱衣翁在黃鶴樓所授方故名用香附子一斤黃連半斤洗曬為末水糊丸梧子大外感蔥薑湯下內傷米飲下氣病木香湯下血病酒下痰病薑湯下火病白湯下余可類推保安丸治風熱積壅化痰涎治痞悶消食化氣導血用大黃四兩牽牛子半炒半生四兩為末煉蜜丸如梧子大每服十丸白湯下並不損人如要微利加一二十丸衛生寶鑑用皂莢熬膏和丸名墜痰丸又名全真丸金宣丸曾御服有驗賜名保安丸四蒸木瓜圓治肝腎脾三經氣虛為風寒暑濕相搏流注經絡凡遇氣化變更七情不和必至發動或腫滿或頑痹憎寒壯熱