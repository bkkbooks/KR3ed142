body:
  text: 卷六胃脘痛凡男女心口有一點痛者乃胃脘有滯或有蟲也多因怒及受寒而起遂致終身俗言心氣痛者非也用高良薑以酒洗七次焙研香附子以醋洗七次焙研各記收之病因寒得用薑末二錢附末一錢因怒得用附末二錢薑末一錢寒怒兼有各一錢半以米飲加入生薑汁一匙鹽一捻服之立止穢迹佛方氣食相凝中脘作痛荊穆王妃胡氏因食蕎麥麵著怒遂病胃脘當心痛不可忍醫用吐下行氣化滯諸藥皆入口即吐不能奏功大便三日不通因思雷公炮炙論云心痛欲死速覓玄胡乃以玄胡索三錢溫酒調下即納入少頃大便行而痛遂止時珍方胃脘火痛大山梔子七枚或九枚炒焦水一盞煎七分入生薑汁飲之立止復發者必不效用玄明粉一錢服立止丹溪纂要胃脘血氣作痛水紅花一大撮水二鍾煎一鍾服集驗方胃冷口酸流清水心下連臍痛用蓽茇半兩厚朴薑汁浸炙一兩為末入熟鯽魚肉研和丸緑豆大每米飲下二十丸立效選奇方陽毒下血熱氣入胃痛不可忍鬱金五大個牛黃一皂莢子為散每服用醋漿水一盞同煎三沸溫服祕寶方胸痛胸痹急痛如錐刺不得俯仰白汗出或徹背上不治或至死取生韭或根五斤洗搗汁服之食療本草胸中痹痛引背喘息咳唾短氣寸脈沉遲關上緊數用瓜蔞實一枚切薤白半斤以白酒七斤煮二升分再服加半夏四兩更善金匱玉函方脅痛脅骨疼痛因驚傷肝者枳殼一兩麩炒桂枝生半兩為細末每服二錢薑棗湯下本事方肝火為痛左金丸用黃連六兩茱萸一兩同炒為末神麯糊丸梧子大每服三四十丸白湯下丹溪方心煩脅痛連胸欲死者香薷搗汁一二升服肘後方脅下刺痛小茴香一兩炒枳殼五錢麩炒為末每服二錢鹽酒調服神效袖珍方脅下疼痛地膚子為末酒服方寸匕壽域神方腰脅卒痛大豆炒二升酒三升煮二升頓服肘後方腹痛陰毒腹痛露蜂房三錢燒存性蔥白五寸同研為丸男左女右著手中握陰臥之汗出即愈又雞糞烏豆地膚子各一把亂髮一團同炒煙起傾入好酒一碗浸之去滓熱服即止生生編陰症腹痛面青甚者鴿子糞一大抄研末極熱酒一鍾和勻澄清頓服即愈劉氏方陰毒腹痛厥逆唇青卵縮六脈欲絶者用蔥一束去根及青留白二寸烘熱安臍上以尉斗火尉之蔥壞則易良久熱氣透入手足溫即瘥乃服四逆湯若尉而手足不溫不可治活人書脾胃虛冷腹滿刺痛肥狗肉半斤以水同鹽豉煮粥頻食一兩頓心鏡治腎臟虛冷氣攻臍腹疼痛不可忍及兩脅疼痛用乾蠍七錢半焙為末以酒及童便各三升煎如稠膏丸梧子大每酒服二十丸名定痛丸聖惠方腹內熱毒絞結痛下血取干黃土水煮三五沸絞去滓暖服一二升藏器方腹中虛痛白芍藥三錢炙甘草一錢夏月加黃芩五分惡寒加肉桂一錢冬月大寒再加桂一錢水二盞煎一盞半溫服潔古用藥法象乾血氣痛蝙蝠一個燒存性每酒服一錢即愈生生編血氣撮痛不可忍者用黑狗膽一個半乾半濕剜開以篦子排丸緑豆大蛤粉滾過每服四十丸以鐵淬酒送下痛立止經驗方卒患腹痛山豆根水研半盞服入口即定備急方又令人騎其腹尿臍中肘後方急肚疼痛用本人頭髮三十根燒過酒服即以水調芥子末封在臍內人汗如雨即安談野翁方惡注腹痛不可忍者阿魏末熱酒服一二錢立止永類鈐方腹痛暴卒取柱下土水服方寸匕藏器方腸痛如打大豆半升熬焦入酒一升煮沸飲取醉肘後方臍下絞痛木瓜三片桑葉七片大棗三枚水三升煮半升頓服即愈食療本草少腹絞痛不可忍小便如淋其人素多酒欲諸藥不效豫偶用黃芩木通甘草三味煎服遂止時珍方江南有痧證狀如傷寒頭痛壯熱嘔惡手足指末微厥或腹痛悶亂須臾殺人用蠶蛻紙剪碎安於瓷中以碟蓋之滾湯沃之封固良久乘熱服暖臥取汗活人書絞腸痧痛河白沙炒赤冷水淬之澄清服一二合時珍方又馬蘭根葉細嚼咽汁立安壽域神方又童子小便服之即止聖惠方又用母豬生兒時拋下糞日乾為末以白湯調服千金方攪腸痧痛欲死者用馬糞研汁飲之立愈經驗方攪腸痧痛陰陽腹痛手足冷但身上有紅點以燈草蘸油點火淬於點上濟急方腰痛腰脊引痛蒺藜子搗末蜜和丸胡豆大每服二丸日三服外臺祕要腰膝疼痛或頑麻無力菟絲子洗一兩牛膝一兩同入銀器內酒浸一寸五分曝為末將原酒煮糊丸梧子大每空心酒服二三十丸經驗方腰膝痛不可忍醫以腎臟風毒攻刺諸藥莫療得方修服一劑便減五分用海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半錢薏苡仁二兩生地黃十兩並洗淨焙乾銼以綿包裹入無灰酒二斗浸之冬二七夏一七空心飲一鍾每日早午晚各一次長令醺醺方不得添減禁毒食此治濕熱而痛傳信方腰膝痛腳氣羊肉一腳草果五枚粳米二升回回豆即胡豆半升木瓜二斤取汁入砂糖四兩鹽少許煮肉食之正要方腰膝疼痛傷致者鹿茸塗炙紫為末每酒服一錢亦治小便頻數千金方腰腳疼痛天麻半夏細辛各二兩絹袋兩個各盛藥令勻蒸熱交互尉痛處汗出則愈數日再尉易簡方又用威靈仙一斤洗淨朗干酒浸七日為末麵糊丸梧子大以浸藥酒每服二十丸經驗方又新胡麻一升熬香杵末日服一升服至一斗永瘥溫酒蜜湯薑汁皆可下千金方腰痛炙熱黃狗皮裹之頻用取瘥時珍方腰痛如刺用八角茴香炒研每服二錢食前鹽湯下外以糯米一二升炒熱袋盛拴於痛處簡便方直指方治腰重刺脹亦同前方食前酒服二錢活人心統思仙散用八角茴香杜仲各炒研三錢木香一錢水一鍾酒半鍾煎服腰痛不隨攣急冷痛取虎脛骨五六寸刮去肉膜塗酥炙黃搗細絹袋盛之以瓶盛酒一斗浸之煻火微溫七日後任情飲之當微利便效也海上方腎虛腰痛用破故紙一兩炒為末溫酒服三錢神妙或加木香一錢經驗方和劑局方青蛾丸治腎氣虛弱風冷乘之或血氣相摶腰痛如折俯仰不利或因勞役傷腎或卑濕傷腰或墜墮損傷或風寒客摶或氣滯不散皆令腰痛或腰間如物重墜用破故紙酒浸炒一斤杜仲去皮薑汁浸炒一斤胡桃去皮二十個為末以蒜搗膏一兩和丸梧子大每空心溫酒服二十丸婦人淡醋湯下常服壯筋骨活血脈烏髭鬚益顏色又用杜仲去皮炙黃一大斤分作十劑每夜取一劑以水一大升浸至五更煎三分減一取汁以羊腎三四枚切下再煮三五沸如作羹法和以椒鹽空腹頓服集驗方又方入薤白七莖聖惠方又方加五味子半斤篋中方又用豬腰子一枚切片以椒鹽淹去腥水入杜仲末三錢在內荷葉包煨食之酒下本草權度又枸杞根杜仲萆薢各一斤好酒三斗漬之罌中密封鍋中煮一日任意飲之千金方又茴香炒研以豬腰子批開摻末入內濕紙裹煨熟空心食之鹽酒送下戴元禮方又用羊脊骨一具捶碎煮和蒜薤食之飲少酒妙心鏡方一方用羊脊骨一具捶碎肉蓯蓉一兩一兩草果五枚水煮汁下蔥醬作羹食正要方又用羊腎去膜陰乾為末酒服二方寸匕日三千金方又方治卒腰痛羊腎一對回回紅花一錢水一盞浸汁入鹽少許塗抹腎上徐徐炙熟空腹食之正要方腎虛腰痛不能反仄鹿茸炙菟絲子各一兩舶茴香半兩為末以羊腎二對入酒煮爛搗泥和丸梧子大陰乾每服三十五丸溫酒下日三服本事方腎虛腰痛如錐刺不能動搖鹿角屑三兩炒黃研末空心溫酒服方寸匕日三肘後方虛寒腰痛鹿茸去毛酥炙微黃附子泡去皮臍各二兩鹽花三分為末棗肉為丸梧子大每服三十丸空心溫酒下久服步履輕捷精力倍常心胸久漏皆可治聖惠方氣滯腰痛牽牛不拘多少以新瓦燒赤安於上自然一半生一半熟不得撥動取末一兩入硫黃末二錢半同研勻分作三份每份用白麵三匙水和捍開切作棋子五更初以水一盞煮熟連湯溫送下痛即已未住隔日再作豫常有此疾每發一服痛即止本事方又青木香乳香各二錢酒浸飯上蒸勻以酒調服聖惠方冷氣腰痛玄胡索當歸桂心等分為末溫酒服三四錢隨量頻進以止為度時珍方濕氣腰痛蝦蟆草連根七科蔥白連須七科棗七枚煮酒一瓶常服終身不發簡便方卒然腰痛大豆六升水拌濕炒熱布裹尉之冷即易延年祕録卒得腰痛不可俯仰用鱉甲炙研末酒服方寸匕日二肘後方腰痛不止絲瓜根燒存性為末每溫酒服二錢神效甚捷筆峰雜興閃挫腰痛橙子核炒研酒服三錢即愈攝生方又用獖豬腎一枚批片鹽椒淹過入甘遂末三錢荷葉包煨熟食酒下儒門事親又蒔蘿作末酒服二錢匕永類鈐方又用白萵苣子炒三兩白粟米炒一撮乳香沒藥烏梅肉各半兩為末煉蜜丸彈子大每嚼一丸熱酒下玉機微義打墜腰痛瘀血凝滯破故紙炒茴香炒辣桂等分為末每熱酒服二錢故紙主腰痛行血直指方臂痛臂脛疼痛不計深淺用虎脛骨二大兩搗碎炙黃羚羊角屑一大兩新芍藥二大兩切三物以無灰酒浸之養至七日秋冬倍之每日空腹飲一杯若要速服即以銀器物盛於火爐中暖養三二日即可服兵部手集事林廣記只用當歸酒浸常飲風熱臂痛桑枝一小升切炒水三升煎二升一日服盡許叔微云常病臂痛諸藥不效服此數劑尋愈其性不冷不熱可以常服亦治水氣腳氣本事方痰注臂痛天仙藤白朮羌活白芷稍各三錢片子薑黃六錢半夏制五錢每服五錢薑五片水煎服仍間服千金五套丸直指方手臂腫痛用萆麻搗膏貼之一夜而愈時珍方身體痛筋骨疼痛不拘風濕氣楊梅瘡及女人月家病先用此藥止疼然後調理干馬齒莧一斤濕馬齒莧二斤五加皮半斤蒼朮四兩舂碎以水煎湯洗澡急用蔥薑擂爛沖熱湯三碗服之暖處取汗立時痛止海上名方治風寒冷濕搏於筋骨足筋攣痛行步艱難但是諸筋攣縮疼痛並主之茯神心中木一兩乳香一錢石器炒研為末每服二錢木瓜酒下聖濟録歷節風痛虎脛骨酥炙三兩沒藥半兩為末每服二錢溫酒下日三服聖濟總録又獨活羌活松節等分用酒煮過每日空心飲一杯外臺祕要歷節腫痛風熱攻手指赤腫麻木甚則攻肩背兩膝遇暴熱則大便閉牛蒡子三兩新豆豉炒羌活各一兩為末每服二錢白湯下本事方歷節風痛不可忍者用壁虎三枚生研蠐螬三枚紙包煨研地龍五條生研草烏頭三枚生研木香五錢乳香末二錢半麝香一錢龍腦五分合研成膏入酒糊搗丸梧子大每日空心乳香酒服三十丸取效聖濟總録歷節風痛四肢如解脫松節二十斤酒五升浸三七日每服一合日五六服外臺祕要歷節走痛不可忍用虎頭骨一具塗酥炙黃捶碎絹袋盛置二斗清酒中浸五宿隨性飲之妙聖惠方白虎風痛寒熱發歇骨節微腫用水牛肉脯一兩炙黃燕窠土伏龍肝飛羅面各二兩雌黃一錢為末每以少許新汲水和作彈丸大於痛處摩之痛止即取藥拋於熱油鐺中聖惠方白虎風痛日夜走注百節如齧炭灰五升蚯蚓屎一升紅花七捻和熬以醋拌之用故布包二包更互尉痛處取效聖惠方手足痛風冷痛如虎咬者樟木屑一斗急流水一石煎極滾泡之乘熱安足於桶上薰之以草荐圍住勿令湯氣入目其功甚捷醫學正傳筋骨風痛人參四兩酒浸三日曬乾土茯苓一斤山慈菰一兩為末煉蜜丸梧子大每服一百丸食前米湯下經驗方又用烏龜一個分作四腳每用一腳入天花粉枸杞子各一錢二分雄黃麝香各五分槐花三錢水一碗煎服纂要奇方風毒骨痛在髓中芍藥二分虎骨一兩炙為末夾絹袋盛酒三升漬五日每服三合日三服經驗方諸風腳膝骨中疼痛不能踐地用鹿蹄肉同豉汁五味煮食孫思邈方白虎風病用豬肉三串以大麻子一合酒半盞相合口含噀上將肉掰向病處咒曰相州張如意張得興是汝白虎本師急出乃安肉於床下瘥則送於路神驗近效方一切氣痛不拘男女冷氣血氣肥氣息賁氣伏梁氣奔豚氣搶心切痛冷汗喘息欲絶天台烏藥小者酒浸一夜炒茴香炒青橘皮去白炒良薑炒等分為末溫酒童便調下家寶方諸氣痛欲危者飲鹿血立愈汪穎方一切走注氣痛不和廣木香溫水磨濃汁入熱酒調服簡便方走注氣痛氣痛之病忽有一處如打撲之狀不可忍走注不定靜時其處冷如霜雪此皆暴寒傷之也以白酒煮楊柳白皮暖尉之有赤點處鑱去血妙凡諸卒腫急痛尉之皆即止集驗方走氣作痛用釅醋拌麩皮炒熱袋盛尉之生生編風濕走痛用兩頭尖即草烏五靈脂各一兩乳香沒藥當歸三錢為末醋糊丸梧子大每服十丸至三十丸臨臥溫酒下忌油膩濕面孕婦勿服瑞竹堂方又牛皮膠一兩薑汁半杯同化成膏攤紙上熱貼之冷即易甚效一加乳香沒藥一錢鄧筆峰方風濕身疼日晡劇者麻黃三兩杏仁二十枚甘草薏苡仁各一兩以水四升煮取二升分再服金匱要略濕氣身痛蒼朮米泔浸切水煎取濃汁熬膏白湯點服易簡方四肢疼痛山龍膽根細切用生薑自然汁浸一宿去其性焙乾搗末水煎一錢匕溫服之此與龍膽同類別種經霜不調圖經本草皮里作痛不問何處用何首烏末薑汁調成膏塗之以帛裹住火炙鞋底尉之經驗方皮膚中痛名癥疰用醋和燕窠土敷之千金方身上虛癢浮萍末一錢以黃芩一錢同四物湯煎湯下丹溪纂要痹風寒中人成痹口噤不知人以雞矢白一升炒黃入酒三升攪澄清飲葛氏方治周痹邪在血脈中木痹不痛上下周身故名此藥主五臟留滯胃中結聚益氣出毒潤皮毛補腎氣用大豆曲一斤炒香為末每服半錢溫酒調下日三服宣明方又野駝脂煉淨一斤入好酥四兩和勻每服半匙加至一匙日三服陰毒冷痹凡風寒濕痹骨內冷痛及損傷入骨年久發痛或一切陰疽毒腫並宜草烏頭南星等分少加肉桂為末薑汁熱酒調塗未破者能內消久潰者能去黑爛二藥性味辛烈能破惡塊逐寒熱遇冷即消遇熱即潰楊清叟方風痹冷痛麻黃去根五兩桂心二兩為末酒二升慢火熬如餳每服一匙熱酒調下至汗出為度避風聖惠方凡風濕冷痹因水濕所致渾身上下強直不能屈伸痛不可忍者於五積散加穿山甲七片看病在左右手足或臂脅疼痛處即於鯪鯉身上取甲炮熟同全蠍炒十一個蔥薑同水煎入無灰酒一匙熱服取汗避風甚良經驗方氣血凝滯遍體作痛不可忍醫或云中風雲中濕云腳氣藥悉不效用玄胡索當歸桂心等分為末溫酒服三四錢隨量頻進以痛止為度蓋玄胡索能活血化氣第一品藥也趙待制霆因導引失節肢體拘攣亦用此數服而愈時珍方治手足麻痹或癱瘓疼痛腰膝痹痛或打撲傷損閃肭痛不可忍生川烏不去皮五靈脂各四兩威靈仙五兩洗焙為末酒糊丸梧子大每服七丸至十丸鹽湯下忌茶此藥常服其效如神普濟方年久麻痹或歷節走氣疼痛不仁不拘男女用草烏頭半斤去皮為末以袋一個盛豆腐半袋入烏末在內再將豆腐填滿壓干入鍋中煮一夜其藥即堅如石取出曬乾為末每服五分冷風濕氣以生薑湯下麻木不仁以蔥白湯下活人心統手足冷麻風冷氣血閉手足身體疼痛冷麻五靈脂二兩沒藥一兩乳香半兩川烏頭一兩炮去皮為末滴水丸如彈子大每用一丸生薑溫酒磨服本草衍義胸痹痛徹心背喘息咳唾短氣喉中燥癢寸脈沉遲關脈弦數不治殺人用瓜蔞實一枚薤白半升白酒七升煮二升分二服千金治胸痹用薤白四兩半夏一合枳實半兩生薑一兩瓜蔞實半兩㕮咀以白酨漿三升煮一升溫服日三肘後治胸痹痛瘥而復發薤根五升搗汁飲之立瘥酨音在酢漿也腹皮麻痹不仁者多煮蔥白食之即自愈危氏方風淫濕痹手足不舉筋節攣疼先與通關次以全蠍七個瓦炒入麝香一字研勻酒三盞空心調服如覺已透則止未透再服如病未盡除自後專以婆蒿根洗淨酒煎日二服直指方凡手足掣痛不仁不隨者朽木煮湯熱漬痛處甚良時珍方手足麻木不知痛癢霜降後桑葉煎湯頻洗救急方手足風濕痹痛寒濕腳氣以醋蒸麥麩互易尉之至汗出並良時珍方腰腳冷痹疼痛有風川烏頭三個生去皮臍為散醋調塗帛上貼之須臾痛止聖惠方風痹腳弱松葉酒治十二風痹不能行松葉六十斤細銼以水四石煮取四斗九升以米五斗釀如常法別煮松葉汁以浸米並饋飯泥釀封頭七日發澄飲之取醉得此酒力者甚衆千金方風虛冷痹諸陽不足及腎虛耳聾益精保神白石英三兩坩鍋內火煅酒淬三次入瓶中密封勿泄氣每早溫服一鍾以少飯壓之千金方老人風濕久痹筋攣骨痛服此壯腎潤皮毛益氣力牛蒡根一升切生地黃一升切大豆二升炒以絹袋盛浸一斗酒中五六日任性空心溫服二三盞日二服集驗方面上木痹牛皮膠化和桂末厚塗一二分良摘玄方痿脾胃弱乏人痿黃瘦黃雌雞肉五兩白麵七兩切肉作餛飩下五味煮熟空心食之日一作益顏色補臟腑壽親方腰腳痿軟行步不穩者萆薢二十四分杜仲八分搗篩每旦溫酒服三錢匕禁牛肉廣利方下焦虛冷腳膝無力陽事不行用羊腎一枚煮熟和米粉六兩煉成乳粉空腹食之妙心鏡方一少年新娶後得腳軟病且疼甚醫作腳氣治不效用杜仲一味寸斷片折每以一兩用半酒半水一大盞煎服三日能行又三日全愈此乃腎虛非腳氣也杜仲能治腰膝痛以酒行之則為效容易矣談藪方濕氣腳軟章柳根切小豆大煮熟更以緑豆同煮為飯每日食之以瘥為度最效斗門方腳暴軟赤蓼燒灰淋汁浸之以桑葉蒸窨立愈腳弱病用杉木為桶濯足排樟腦於兩股間用帛繃定月餘甚妙續博物志腳氣腳氣衝心悶亂不識人用白檳榔十二個為末分二服空心暖小便五合調下日二服或入薑汁溫酒同服廣利方又黍穰一石煮汁入椒目一升更煎十沸漬腳三四度愈外臺祕要又白礬三兩水一斗五升煎沸浸洗千金方腳氣入腹脅作痞塊大如石悶絶且死困不知人搐搦上視用杉木節一大升橘葉切一大升無葉則以皮代之大腹檳榔七枚連子碎之童子小便三大升共煮一大升半分為兩服若一服得快即停後服此方兼可治霍亂上氣悶絶者柳柳州纂救死方云身驗過腳氣入腹脹悶喘急用威靈仙末每服二錢酒下痛減一分則藥亦減一分簡便方凡患腳氣欲吐每旦飽食午後少食日晚不食若飢可食豉粥覺不消欲致霍亂者以高良薑一兩水三升煮一升頓服盡即消若卒無者以母薑一兩代之清酒煎服雖不及高良薑亦甚效也蘇恭方腳氣攻注痛用生大田螺搗爛敷兩股上便覺冷趨至足而安又可敷丹田利小便仇遠稗史又蘿蔔煎湯洗之仍以蘿蔔曬乾為末鋪襪內聖濟録腳氣發作筋骨引痛金銀花為末每服二錢熱酒調下易簡方腳氣抽掣疼痛初發時即取土烏藥不犯鐵器布揩去土瓷瓦刮屑好酒浸一宿次早空心溫服溏泄即愈入麝香少許尤佳痛入腹者以烏藥同雞子瓦罐中水煮一日取雞子切片蘸食以湯送下甚效永類鈐方又羊角一副燒過為末熱酒調塗以帛裹之取汗永不發也又萆麻子七粒去殼研爛同蘇合香丸貼足心痛即止也外臺祕要男婦腳氣骨節及皮膚腫濕疼痛服此進飲食健氣力不忘事用五加皮四兩酒浸遠志去心四兩酒浸並春秋三日夏二日冬四日日乾為末以浸酒為糊丸梧子大每四五十丸空心溫酒下藥酒壞別用酒為糊丸瑞竹堂方又桃花一升陰乾為末每溫酒細呷之一宿即消外臺祕要又無名異末化牛皮膠調塗之頻換易簡方又赤小豆和鯉魚煮食甚效詵方此方當治濕腫腳氣又木鱉子仁每個作兩邊麩炒過切碎再炒去油盡為度每入厚桂半兩為末熱酒服二錢令醉得汗愈永類鈐方又每夜用鹽擦腿膝至足甲淹少時以熱湯泡洗救急方又白芷芥子等分為末薑汁和塗之效醫方摘要又用樟腦二兩烏頭三兩為末醋糊丸彈子大每置一丸於足心踏之下以微火烘之衣被圍覆汗出如涎為效又皂角赤小豆為末以醋調貼腫處永類方又鏡面草搗爛敷之亦煮湯洗腫處藏器方又虎骨和醋浸洗脛骨尤良又用木瓜切片囊盛踏之自愈曾有人病此偶附舟以足擱瓜袋上漸覺不痛歸制囊試之果效名醫録又杉木節煮水浸持甚效洗諸瘡亦無不瘥蘇恭方腳氣腫痛成瘡水蓼煮汁漬捋之新久腳氣血竭乳香等分同研以木瓜一個剜孔入藥在內以面厚裹沙鍋煮爛連面搗丸梧子大每溫酒服三十丸忌生冷奇效方治腳氣諸病用荊葉於壇中燒煙薰湧泉穴及痛處使汗出則愈永類方又鹽三升蒸熟分裹近壁以腳踏之令腳心熱又和槐白皮蒸之尤良夜夜用之食療本草寒濕腳氣腿膝疼痛行步無力葫蘆巴酒浸一宿焙破故紙炒香各四兩為末以木瓜切頂去瓤安藥在內令滿脹頂合住簽定爛蒸搗丸梧子大每服七十丸空心溫酒下家藏方寒濕腳氣疼痛牛皮膠一塊細切麵炒成珠研末每服一錢酒下其痛立止萬氏方又用團魚二個水二斗煮一斗去魚取汁加蒼耳蒼朮尋風藤各半斤煎至七升去滓以盆盛薰蒸待溫浸洗神效乾坤生意又磚燒紅以陳臭米泔水淬之乘熱布包三快用膝夾住棉被覆之三五次愈扶壽方又川椒二三升疏布袋盛之日以踏之大全良方腳氣上攻結成腫核及一切腫毒用甘遂末水調敷腫處即濃煎甘草汁服其腫即散百一選方風毒腳氣以銅器取烏犢牛尿三升飲之小便利則消肘後方又三白草根搗酒服甚有驗腳氣風腫不仁萆麻葉蒸搗裹之日二三易即消腳氣腿腫久不瘥者黑附子一個去皮臍為散生薑汁調如膏塗之藥干再塗腫消為度濟衆方腳氣脹滿非冷非熱或老弱人病此用檳榔仁為末以殼煎汁或茶飲調服二錢甚利外臺祕要腳氣濕瘡極癢有蟲烏臼根為末敷之少時有涎出良摘玄方酒毒腳氣有人嗜酒日須五七杯後患腳氣甚危或教以巴戟半兩糯米同炒米微轉色去米不用大黃一兩銼炒同為末熟蜜丸溫水服五七十丸仍禁酒遂愈腳氣或漏根有一孔深半寸許其痛異常用人中白煅有水出滴入瘡口證治要訣腳肚轉筋大蒜擦足心令熱即安仍以冷水食一瓣攝生方又以故綿浸醋中甑蒸熟裹之冷即易勿停取差止外臺腳氣膝浮甘松香煎湯淋洗時珍方腳氣脾弱牛乳五升硫黃三兩煎三升每服三合羊乳亦可或以牛乳五合煎調硫黃末一兩服取汗尤良肘後風氣腳弱孔公孽二斤石斛五兩酒二斗浸服肘後方腳心腫痛因久行立致者以水和蚯蚓糞厚敷一夕即愈永類鈐方腎水流注腿膝攣急四肢腫痛甘遂末二錢加木香末四錢每用二錢以獖豬腎一枚切七臠入藥末在內濕紙包煨熟溫酒嚼下當利黃水為驗御藥院方遠行腳腫草烏細辛防風等分為末摻鞋底內如草鞋以水微濕摻之用之可行千里甚妙經驗方癘風一切風疾久服輕身明目黑髮駐顏用南燭樹春夏取枝葉秋冬取根皮細銼五斤水五斗慢火煎取二斗去滓淨鍋慢火煎如稀飴瓷瓶盛之每溫酒服一匙日三服一方入童子小便同煎聖惠方又青藤膏用青藤出太平荻港上者二三月採之不拘多少入釜內微火熬七日夜成膏收入瓷器內用時先備梳三五把量人虛實以酒服一茶匙畢將患人身上拍一掌其後遍身發癢不可當急以梳梳之要癢止即飲冷水一口便解風病避風數日良集簡方又蒼耳嫩葉一石切和麥糵五升作塊於蒿艾中置二十日成曲取米一斗炊作飯看冷暖入曲三升釀之封二七日成熟每空心暖服神驗封此酒可兩重布不得令密密則溢出忌馬肉豬肉食療本草嫩桑葉煎酒服亦良大明方一切頑風用生草烏頭生天麻各洗等分擂爛絞汁傾入盆內砌一小坑其下燒火將盆放坑上每日用竹片攪一次夜則露之曬至成膏做成小錠子每一錠分作三服用蔥薑自然汁和好酒熱服乾坤祕韞一切風毒並殺三蟲腸痔能進食若病胃脹滿心悶發熱即宜服之五月五日午時附地刈取蒼耳葉洗曝搗下篩每服方寸匕或酒或漿水下日二夜三若覺吐逆則以蜜丸服準計方寸匕數也風輕者日二服若身體作粟或麻豆出此為風毒出也可以針刺潰去黃汁乃止七月七九月九亦可採用三十六風有不治者服之悉效菖蒲薄切日乾三斤盛以絹袋玄水一斛即清酒也懸浸之密封一百日視之如菜緑色以一斗熟黍米納中封十四日取出日飲夏禹神仙經數年風病以七葉黃荊根皮五加根皮接骨草等分煎湯熱服遂愈一切風疾十年二十年者牛蒡根一升生地枸杞子牛膝各三升用袋盛藥浸無灰酒三斗內每任意飲之外臺祕要一切諸風不問遠近柳葉半斤切枝亦可荊芥半斤水五升煮二升澄清入白蜜五合竹瀝五合新瓶盛之油紙封入重湯煮一伏時每服一小鐘日三服普濟方大風癘疾五月五日或六月六日五更帶露採蒼耳草搗取汁熬作錠子取半斤鯉魚一尾剖開不去肚腸入藥一錠線縫以酒二碗慢火煮熟令吃不過三五個魚即愈也忌鹽一百日乾坤生意又用冬瓜一個截去五寸長去瓤掘地坑深三尺令淨安瓜於內以烏蛇膽一個消梨一個置於瓜上以土隔蓋之至三七日看一度瓜未甚壞候七七日三物俱化為水在瓜皮內取出每用茶腳以酒和服之三兩次立愈名龍膽膏治風疾神效小可風病每服一匙頭博濟方又摩勒香一斤即乳香內光明者細研入牛乳五升甘草末四兩瓷盒盛之安桌上置中庭安劍一口夜於北極下祝禱去盒蓋露一夜次日入甑中蒸炊三斗米熟即止夜間依前祝露又蒸如此三次乃止每服一茶匙空心及晚食前溫酒調服服後當有惡物出至三日三夜乃愈也聖惠方又用烏蛇三條蒸熟取肉焙研末蒸餅丸米粒大以喂烏雞待盡殺雞烹熟取肉焙研末酒服一錢或蒸餅丸服不過三五雞即愈治例方又浮萍草三月採淘三五次窨三五日焙為末不得見日每服三錢食前溫酒下常持觀音聖號忌豬魚雉蒜又方七月七日取紫背浮萍日乾為末半升入好消風散五兩每服五錢水煎頻飲仍以煎湯洗浴之十便良方又用凌霄花五錢地龍焙殭蠶炒全蠍炒各七個為末每服一錢溫酒下先以藥湯浴過服此出臭汗為效沽古家珍僧普明居五臺山患大風眉發俱墜哀苦不堪忽遇異人教服長松示其形狀明採服之旬余毛髮俱生顏色如故時珍方又何首烏大而有花紋者一斤米泔浸一七九蒸九曬胡麻四兩九蒸九曬為末每酒服二錢日二聖惠方大風惡疾雙目昏盲眉毛自落鼻梁崩倒勢不可救用皂角刺三斤燒灰蒸一時久日乾為末食後濃煎大黃調一匕飲之一旬眉發再生肌潤目明神仙傳大風惡疾眉發脫落以桑柴灰熱湯淋取汁洗頭面以大豆水研漿解澤灰味彌佳次用熱水入緑豆麵濯之三日一洗頭一日一洗面不過十度良聖惠方又側柏葉九蒸九曬為末煉蜜丸梧子大每服五丸至十丸日三夜一服百日即生聖惠方大風癘疾眉發脫落遍身頑痹禹餘糧二斤白礬一斤青鹽一斤為末罐子固濟炭火一稱煅之從辰至戌候冷研粉埋土中三日取出每一兩入九蒸九曝炒熟胡麻末三兩每服二錢荊芥茶下日二服取效聖惠方癘風鼻塌手指攣曲節間痛不可忍漸至斷落用萆麻子一兩去皮黃連一兩銼豆大以小瓶子入水一升同浸春夏二日秋冬五日後取萆麻子一枚掰破而更以浸藥水吞之漸加至四五枚微利不妨瓶中水盡更添兩月後吃大蒜豬肉試之如不發是效也若發動再服直候不發乃止杜壬方療大風痿痹八月斷大槐枝候生嫩蘖煮汁釀酒飲甚效別録大風熱痰用黃老茄子大者不計多少以新瓶盛埋土中經一年盡化為水取出入苦參末同丸梧子大食已及臥時酒下三十丸甚效圖經本草癘風成癩用東行蠍虎一條焙乾大蠶砂五升水淘炒各為末以小麥面四升拌作絡索曝乾研末每服一二合煎柏葉湯下日三服取效衛生寶鑑又取白蜜一斤生薑二斤搗取汁先稱銅鐺斤兩下薑汁於鐺中稱之令知斤兩即下蜜於鐺中和薑汁又稱之看共幾斤兩用微火煎令薑汁盡稱蜜斤兩在即藥已成矣患三十年癩者平旦服棗許大一丸一日三服溫酒下忌生冷醋滑臭物功用甚多不能一一具述食療方又用鱟魚膽生白礬生緑礬膩粉水銀麝香各半兩研不見星每服一錢井華水下取下五色涎為妙聖濟總録又用苦參五兩切以好酒三斗漬三十日每服一合日三服常服不絶若覺痹即瘥蘇頌方一方用苦參末二兩以豬肚盛之縫合煮熟取出去藥先餓一日次早先飲新水一盞將豬肚食之如吐再食待一二時以肉湯調無憂散五七錢服取出大小蟲一二萬為效後以不蛀皂角一斤去皮子煮汁入苦參末調糊下何首烏末二兩防風末一兩半當歸末一兩芍藥末五錢人參末三錢丸梧子大每服三五十丸溫酒或茶下日三服仍用麻黃苦參荊芥煎水洗之張子和方又用黃柏末皂角刺灰各三錢研勻空心酒服取下蟲物並不損人食白粥兩三日服補氣藥數劑名神效散如四肢腫用針刺出水再服忌一切魚肉發風之物取下蟲大小長短其色不一約一二升其病乃愈也仁存方又大風子油一兩苦參末三兩入少酒糊丸梧子大每服五十丸空心溫酒下仍以苦參湯洗之普濟方又楓子木燒存性研輕粉為末麻油調搽極妙經驗良方又火麻仁三升淘曬以酒一斗浸一夜研取白汁濾入瓶中重湯數沸收之每飲一小盞兼服茄根散乳香丸取效聖惠方大風瘡裂大楓子燒存性和麻油輕粉研塗仍以殼煎湯洗之衛生方治癩風及熱毒風瘡疥癬九月末掘取苦參去皮曝乾取粉一斤枳殼麩炒六兩為末蜜丸酒下三十丸日二服夜一服一方去枳殼聖濟總録蚺蛇酒治諸風癱瘓筋攣骨痛痹木搔癢殺蟲闢瘴及癘風疥癬惡瘡用蚺蛇肉一斤羌活一兩絹袋盛之用糯米二斗蒸熟安曲於缸底置蛇於曲上乃下飯密蓋待熟取酒以蛇焙研和藥其酒每隨量溫飲數杯忌風及欲事亦可袋盛浸酒飲集簡方大風癩瘡營氣不清久風入脈因而成癩鼻壞色敗用黃精根去皮水洗淨二斤曝乾納粟米飯中蒸至米熟時時食之聖濟總録風水惡風汗出身重脈浮防己一兩黃耆一兩二錢半白朮七錢半炙甘草半兩銼散每服五錢生薑四片棗一枚水二盞煎八分溫服良久再服腹痛加芍藥亦治風濕相搏關節沉痛微腫惡風仲景方患濕風惡氣大鱔作臛空腹飽食暖臥取汗出如膠從腰腳中出候汗乾暖五枝湯浴之避風三五日一作甚妙孟詵風癢如蟲成煉雄黃松脂等分研末蜜丸梧子大每飲下十丸日三服百日不忌酒肉鹽豉千金方體如蟲行風熱也鹽一斗水一石煎湯浴之三四次亦療一切風氣外臺祕要通身風癢凌霄花為末酒服一錢醫學正傳皮膚風癢蟬蛻薄荷葉等分為末酒服一錢日三集驗方又牛蒡莖葉煮汁作浴湯去皮間習習如蟲行孟詵方頭面諸風香白芷切以蘿蔔汁浸透日乾為末每服二錢白湯下或以嗅鼻直指方
