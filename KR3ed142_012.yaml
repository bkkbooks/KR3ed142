body:
  text: 卷十二女科調經治婦人經脈不調或前或後或多或少產前胎不安產後惡血不下兼治冷熱勞腰脊痛骨節煩疼用丹參洗淨切曬為末每服二錢溫酒調下婦人明理方又阿膠一錢蛤粉炒成珠研末熱酒服即安一方入辰砂半錢月經不調久而無子衝任伏熱也熟地黃半斤當歸二兩黃連一兩並酒浸一夜焙研為末煉蜜丸梧子大每服七十丸米飲溫酒任下禹講師方婦人夜熱痰嗽月經不調形瘦者用瓜蔞仁一兩青黛香附童尿浸曬一兩五錢為末蜜調噙化之丹溪心法婦人血氣作痛及下血無時月水不調用蓽茇鹽炒蒲黃炒等分為末煉蜜丸梧子大每空心溫酒服三十丸兩服即止名二神丸陳氏方婦女腹中血氣刺痛經候不調用玄胡索去皮醋炒當歸酒浸炒各一兩橘紅二兩為末酒煮米糊丸梧子大每服一百丸空心艾醋湯下濟生方婦女臍下氣脹月經不調血氣上攻欲嘔不得睡當歸四錢乾漆燒存性二錢為末煉蜜丸梧子大每服十五丸溫酒下永類方經水不利帶下少腹滿或經一月再見者土瓜芍藥桂枝䗪蟲各三兩為末酒服方寸匕日三服亦治婦人陰㿗仲景金匱方女子忽得少腹中痛月經初來便覺腰中切痛連脊間如刀錐所刺不可忍者眾醫不別謂是鬼疰妄服諸藥終無益其疾轉增審察前狀相當即用此藥其藥用積雪草即地錢草夏五月正放花時即採曝乾搗篩為末每服二方寸匕和醋二小合攪勻平旦空腹頓服之每旦一服以知為度如女子先冷者即取前藥五兩加桃仁二百枚去皮尖熬搗為散以蜜為丸如梧子大每旦空腹以飲及酒下三十丸日再服以愈為度忌麻子蕎麥圖經本草經水過多赤石脂破故紙各一兩為末每服二錢米飲下普濟方月經逆行從口鼻出先以京墨磨汁服止之次用當歸尾紅花各三錢水一鍾半煎八分溫服其經即通經血逆行魚膠切炒新綿燒灰每服二錢米飲調下即愈多能鄙事子宮寒冷取蛇床子仁為末入白粉少許和勻如棗大綿裹納入陰戶自然溫也金匱玉函方經閉治婦人經血不通赤白帶下崩漏不止腸風下血五淋產後積聚癥瘕腹痛男子五勞七傷小兒骨蒸潮熱等證其效甚速宜六癸日合之用錦紋大黃一斤分作四份一份用童尿一碗食鹽二錢浸一日切曬一份用淳酒一碗浸一日切曬再以巴豆仁三十五粒同炒豆黃去豆不用一份用紅花四兩泡水一碗浸一日切曬一份用當歸四兩入淡醋一碗同浸一日去歸切曬為末煉蜜丸梧子大每服五十丸空心溫酒下取下惡物為驗未下再服名無極丸醫林集要治女人月經瘀閉不來繞臍寒疝痛徹及產後血氣不調諸癥瘕等病用乾漆一兩打碎炒煙盡牛膝末一兩以生地黃汁一升入銀石器中慢熬俟可丸丸如梧子大每服一丸加至三五丸酒飲任下以通為度指南方治女人月不通臍下堅如杯時發熱往來下痢羸瘦此為血瘕若生肉症不可治也乾漆一斤燒研生地黃二十斤取汁和煎至可丸丸梧子大每服三丸空心酒下千金方婦人經閉結成瘕塊脹大欲死者馬鞭草根苗五斤銼細水五斗煎至一斗去滓熬成膏每服半匙酒化下日二服聖惠方又牛蒡根二斤銼蒸三遍以生絹袋盛之以酒二斗浸五日每食前溫服一盞普濟方婦人宿有風冷留血積聚月水不通菴䕡子一升桃仁二升酒浸去皮尖研勻入瓶內以酒二斗浸封五日後每飲三合日三服聖惠方婦人天癸不通駒胞衣煅存性為末每服三錢入麝香少許空腹新汲水下不過三服良孫氏集效又薏苡根一兩水煎服之不過數服效海上方又以茜草一兩煎酒服之一日即通甚效女經不行凌霄花為末每服二錢食前溫酒下徐氏胎產方又厚朴三兩炙切水三升煎一升分二服空心飲不過三四劑神驗一方加紅花梅師方又茶清一瓶入砂糖少許露一夜服雖三個月胎亦通不可輕視鮑氏方月經久閉蠶砂四兩砂鍋炒半黃色入無灰酒一壺煮沸澄去砂每溫服一盞即通治女經積年不通龍胎同瓦松景天各少許以水兩盞煎一盞去滓分二服少頃腹中轉動便下許孝宗婦人經閉數年不通面色萎黃唇口青白腹內成塊肚上筋起腿脛或腫用桃樹根牛蒡根馬鞭草根牛膝蓬蘽各一斤銼以水三升煎一升去滓更以慢火煎如餳狀收之每以熱酒調服一匙聖惠方室女經閉當歸尾沒藥各一錢為末紅花浸酒面北飲之一日一服普濟方又牡鼠屎一兩炒研空心溫酒服二錢千金方婦人血塊土牛膝根洗切焙搗為末酒煎溫服極效福州人單用之圖經本草婦人血癖作痛大黃一兩酒二升煮十沸頓服取利千金婦人小腹如鼓狀小便微難而不渴此為水與血俱結在血室大黃二兩甘遂阿膠各一兩水一升半煮半升頓服其血當下張仲景方婦人血氣不行上衝心膈變為乾血氣者用絲瓜一枚燒存性空心溫酒服壽域神方乾血氣痛錦紋大黃酒浸曬乾四兩為末好醋一升熬成膏丸芡子大臥時酒化一丸大便利一二行紅漏自下乃調經仙藥也或加香附集驗方血崩下血血崩或五色漏帶並宜常服滋血調氣乃婦人之仙藥也香附子去毛炒焦為末極熱酒服二錢立愈昏迷甚者三錢米飲下亦可加棕灰本事方崩中漏下桑耳炒黑為末酒服方寸匕日三服取效千金又木耳半斤炒見煙為末每服二錢一分頭髮灰三分共二錢四分以應二十四氣好酒調服出汗孫氏集效方又石葦為末每服三錢溫酒下甚效崩中漏下五色使人無子蜂房末三指撮溫酒服之大神效張文仲方又禹餘糧煅研赤石脂煅研牡蠣煅研烏賊骨伏龍肝炒桂心等分為末溫酒服方寸匕日服忌蔥蒜張文仲備急方婦人漏下赤白不止令人黃瘦兼治吐血地榆三兩米醋一升煮十餘沸去滓食前稍熱服一合聖惠方漏下不斷重鵲巢重巢者連年重產之巢也柴燒研飲服方寸匕一日三服治積年困篤者一月取效洞天錄赤白帶下及血崩不止赤芍藥香附子等分為末每服二錢鹽一捻水一盞煎七分溫服日二服見效名如神散良方赤白崩中豬毛燒灰三錢以黑豆一碗好酒一碗半煮一碗調服又舊葫蘆瓢燒存性蓮房煅存性等分研末每服二錢熱水調服三服有汗為度即止甚者五服止最妙忌房事發物生冷海上方又魚縼膠三尺焙黃研末同雞子煎餅好酒食之婦人血崩以童便不住手灑炒香附五日為度忌鐵研細每一斤與川木耳灰四兩同研每五分米醋湯空腹吞治血崩有奇效自傳秘方又黃絹灰五分棕櫚灰一錢貫眾灰京墨灰荷葉灰各五分水酒調服即止集簡方又草血竭嫩者蒸熟以油鹽姜淹食之飲酒一二杯送下或陰乾為末姜酒調服一二錢一服即止生於磚縫井砌間少在地上也即地錦草危氏得效方又貫眾半兩煎酒服之立止集簡方又用防風去蘆頭炙赤為末每服一錢以麵糊酒投之此藥累經效驗名獨聖散一方加黑蒲黃等分經驗方又搗大薊根絞汁服半升立瘥甄權方又蠶砂為末酒服三五錢儒門事親又舊敗蒲席燒灰酒服二錢勝金方又荸薺一歲一粒燒存性研末酒服之李氏方又百草霜二錢狗膽汁拌勻分作二服當歸酒下經驗方又荷葉燒研末半兩蒲黃黃芩各一兩為末每空心酒服三錢又小薊莖葉洗切研汁一盞入生地黃白朮半兩煎減半溫服千金方崩中腹痛毛蟹殼燒存性米飲服一錢證治要訣崩中下血小腹痛甚者芍藥一兩炒黃色柏葉六兩微炒每服二兩水一升煎六合入酒五合再煎七合空心分為兩服亦可為末酒服二錢聖惠方婦人血崩血氣痛不可忍遠年近日不瘥者木賊一兩香附子一兩朴硝半兩為末每服三錢色黑者酒一盞煎紅赤者水一盞煎和滓服日二服臍下痛者加乳香沒藥當歸各一錢同煎忌生冷硬物豬魚油膩酒面醫壘元戎崩中血凝注者胡麻葉生搗一升熱湯絞汁半升服立愈甄權方崩中垂死肥羊肉三斤水二斗煮一斗三升入生地黃一升當歸乾薑三兩煮三升分四服千金方治婦人崩中及下痢日夜數十起欲死者以此入腹即活懸鉤藤薔薇根柿根菝葜各一斤銼入釜中淹上四五寸煮減三之一去滓取汁煎至可丸丸梧子大每溫酒服十丸日三服千金翼崩中不止蠶故紙一張剪碎炒焦槐子炒黃各等分為末酒服立愈又好綿及婦人頭髮共燒存性百草霜等分為末每服三錢溫酒下或加棕灰一方用舊棉絮去灰土一斤新蠶絲一斤陳蓮房十個舊炊箅一枚各燒存性各取一錢空心熱酒下日三服不過五日愈乾坤秘韞又用五靈脂十兩研末水五碗煎三碗去滓澄清再煎為膏入神麯末二兩和丸梧子大每服二十丸空心溫酒下便止極效蘇頌方又方用五靈脂燒研以鐵秤錘燒紅淬酒調服以效為度集效方又胡桃肉十五枚燈上燒存性研作一服空心溫酒調下神效又白扁豆花焙乾為末每服二錢空心炒米煮飲入鹽少許調下效又老絲瓜燒灰棕櫚灰等分鹽酒或鹽湯下奇效良方又棕櫚皮燒存性空心淡酒服三錢一方加煅白礬等分婦人良方又槐花三兩黃芩二兩為末每服半兩酒一碗銅秤錘一枚桑柴火燒紅浸入酒中調服忌口乾坤秘韞本事方只用黃芩為細末霹靂酒下一錢又漆器燒灰棕灰各一錢柏葉煎湯下集簡方血崩不止不拘冷熱用蓮蓬殼荊芥穗各燒存性等分為末每二錢米飲下聖惠方婦人良方只用荊芥穗於麻油燈上燒焦為末每二錢童便調服血崩不止諸藥不效服此立止用甜杏仁上黃皮燒存性為末每服三錢空心熱酒服保壽堂方婦人血漏伏龍肝半兩阿膠蠶砂炒各一兩為末每空腹酒服二三錢以知為度寇氏衍義又亂髮洗淨燒研空心溫酒服一錢婦人良方經血不止五靈脂炒煙盡研每服二錢當歸兩片酒一盞煎六分熱服三五度取效經效方又拒霜花蓮蓬殼等分為末每用米飲下二錢婦人良方又紅雞冠花一味曬乾為末每服二錢空心酒調下忌魚腥豬肉孫氏集效方又側柏葉炙芍藥等分每用三錢水酒各半煎服室女用側柏葉木賊炒微焦等分為末每服二錢米飲下總錄又木賊炒三錢水一盞煎七分溫服日一服聖惠方又阿膠炒焦為末酒服二錢秘韞又牡蠣煅研米醋搜成團再煅研末以米醋調艾葉末熬膏丸梧子大每醋湯下四五十丸普濟方月經不絕來無時者案紙三十張燒灰清酒半升和服頓定冬月用暖酒服之傳信方月水不斷勞損黃瘦暫止復發小勞輒劇者槐蛾炒黃赤石脂各一兩為末食前熱酒服二錢聖惠方又桑黃焙研每服二錢食前熱酒下日二服普濟方經水不止及血崩用黑驢屎燒存性研末麵糊丸梧子大每空心黃酒下五七十丸神妙醫鑑止月經太過用甜瓜子仁研末去油水調服藏器方治婦人四十九歲以後天癸當住每月卻行或過多不止用條芩心二兩米醋浸七日炙乾又浸如此七次為末醋糊丸梧子大每服七十丸空心酒下日二瑞竹堂方婦人五十後經水不止者作敗血論用茜根一名過山姜一兩阿膠側柏葉炙黃芩各五錢生地黃一兩小兒胎髮一枚燒灰分作六貼每貼水一盞半煎七分入發灰服之經驗方婦人血禁失音用鐵鑰匙以生薑醋小便同煎服婦人血黃黃茄子竹刀切陰乾為末每服二錢溫酒調下摘玄方赤白帶下婦人五色帶下以面作煎餅七個安於燒赤黃磚上以黃瓜蔞敷面上安布兩重令患者坐之令藥氣入腹薰之當有蟲出如蠶子不過三度瘥藏器方赤白帶下槿根皮二兩切以白酒一碗半煎一碗空心服之白帶用紅酒甚妙纂要奇方又水和雲母粉方寸匕服立見神效千金方又夏枯草花開時採陰乾為末每服二錢米飲下食前服徐氏家傳又益母草花開時採搗為末每服二錢食前溫湯下集驗方又韭根搗汁和童尿露一夜空心溫服取效海上仙方又禹餘糧火煅醋淬乾薑等分赤下乾薑減半為末空心服二錢勝金方又白果蓮肉江米各五錢胡椒一錢為末烏骨雞一隻如常治淨裝末滿腹煮熟空心食之亦治遺精白濁赤白帶下不問老稚孕婦悉可服取馬齒莧搗汁絞三大合和雞子白二枚先溫令熱乃下莧汁微溫頓飲之不過再作即愈崔元亮海上方婦人帶下臍腹冷痛面色萎黃日漸虛困用葵花一兩陰乾為末每空心溫酒服二錢赤帶用赤葵白帶用白葵聖惠方赤白帶下不止者狗頭燒灰為末每酒服聖惠方婦人赤白帶下多年者以石燕為末水飛過每日服半錢至一錢米飲服至一月諸疾悉平時珍方赤白帶下年深月久不瘥者取白芍藥三兩並乾薑半兩銼熬令黃搗末空心水飲服二錢七日再服廣濟方只用芍藥炒黑斫末酒服之貞元廣利方赤白帶下日久黃瘁六脈微澀伏龍肝炒令煙盡棕櫚灰屋梁上塵炒煙盡等分為末入龍腦麝香各少許每服三錢溫酒或淡醋湯下一年者半月可安大全方婦人白帶多因七情內傷或下元冷所致沙參為末每服二錢米飲下證治要訣又用酒及艾葉煮雞卵日日食之袖珍方又白雞冠花曬乾為末每旦空心酒服三錢赤帶用紅者集效方又椿根白皮一兩半乾薑炒黑白芍藥炒黑黃柏炒黑各二錢為末粥糊丸白湯下丹溪方白帶不止槐花炒牡蠣煅等分為末每酒服三錢取效摘玄方室女白帶因衝任虛寒者鹿茸酒蒸焙二兩金毛狗脊白蘞各一兩為末用艾煎醋打糯米糊丸梧子大每溫酒下五十丸日二濟生方白帶沙淋白雞冠花苦葫蘆等分燒存性空心火酒服之摘玄方白帶白淫風化石灰一兩白茯苓三兩為末糊丸梧子大每服二三十丸空心米飲下絕妙集玄方女人白淫糙糯米花椒等分炒為末醋糊丸梧子大每服三四十丸食前醋湯下簡便方婦人白濁滑數虛冷者鹿角屑炒黃為末酒服二錢婦人良方婦人白沃經水不利子臟堅澼中有乾血下白物用礬石燒杏仁等分研勻煉蜜丸棗核大納入腸中日一易之金匱方孕婦諸疾治婦人胎前產後諸疾危證用益母紫色花者於端午小暑或六月六日花開時連根收採陰乾用葉及花子忌鐵器研為細末煉蜜丸如彈子大隨證嚼服用湯使其根燒存性為末酒服功與黑神不相上下其藥不限丸數以病愈為度或丸如梧子大每服五七十丸又可搗汁濾淨熬膏服之名濟陰還魂丹胎前臍腹痛或作聲者益母草末米飲下胎衣不下及橫生不順死胎不下經日脹滿悶心痛益母草末並用炒鹽湯下產後血暈眼黑血熱口渴煩悶如見鬼神狂言不省人事以童子小便和酒化下產後惡血不盡結滯刺痛上衝心胸滿悶童子小便酒下產後血崩漏下糯米湯兼阿膠下咎殷產寶胎前產後逆生橫生瘦胎補虛損及理月候不調崩中百草霜白芷等分為末每服二錢童子小便同醋調勻熱酒化服不過二服杜壬方丹溪加滑石以芎歸湯調之安胎順氣香附子炒為末濃煎紫蘇湯服一二錢一方加砂仁中藏經胎前氣盛壅滯者八九月時必用枳殼蘇梗以順氣胎前無滯則產後無虛若氣稟弱者即大非所宜矣以紫蘇加補氣藥服之胎熱橫悶生銀五兩蔥白三寸阿膠炒半兩水一盞煎服亦可入糯米作粥食聖惠方安胎清熱條芩白朮等分炒為末米飲和丸梧子大每服五十丸白湯下或加神麯凡妊娠調理以四物湯去地黃加白朮黃芩為末常服甚良丹溪纂要又用白藥子一兩白芷半兩為末每服二錢紫蘇湯下心煩熱入砂糖少許名鐵罩散聖惠方又白藥子一味為末雞子清調敷臍上即胎不墮矣此熱病護胎要藥也自傳秘方孕婦束胎白朮枳殼麩炒等分為末燒飯丸梧子大八月一日每食前溫水下三十丸胎瘦則易產也保命集妊娠惡阻胎氣不安氣不升降嘔吐酸水起坐不便飲食不進用香附子一兩藿香葉甘草各二錢為末每服二錢沸湯入鹽調下亦治頭風睛痛名二香散聖惠方婦人始覺有孕取弓弩弦一枚縫袋盛帶左臂上則轉女為男房屋經云凡覺有娠取弓弩弦縛婦人腰下滿百日解卻此方乃紫宮玉女秘傳方也千金方妊娠腰痛用破故紙二兩炒香為末先嚼胡桃肉半用空心溫酒調下二錢名通氣散婦人良方又鹿角截五寸長燒赤投一升酒中又燒又浸如此數次細研空心酒服方寸匕產寶方妊娠腰痛如折者銀一兩水三升煎二升服之子母秘錄妊娠胎痛由本婦衝任脈虛惟宜抑陽助陰內補用熟地黃二兩當歸一兩微炒為末梧子大每溫酒下三十丸本事方懷胎腹痛枳殼三兩麩炒黃芩一兩每服五錢水一盞半煎一盞服若脹滿身重加白朮一兩活法機要胎動腹痛桑寄生一兩半阿膠炒五錢艾葉半兩水一盞半煎一盞去滓溫服或去艾葉聖惠方妊娠腹痛月未足如欲產之狀用知母二兩為末蜜丸梧子大每粥飲下二十丸小品方孕婦子煩竹瀝頻頻飲之又方茯苓二兩竹瀝一升水四升煎二升分三服不瘥更作之梅師方妊娠子煩口乾不得臥黃連末每服一錢粥飲下或酒蒸黃連丸亦妙婦人良方妊娠子煩因服藥致胎氣不安煩不得臥者知母一兩洗焙為末棗肉丸彈子大每服一丸人參湯下醫者不識此病作虛煩治反損胎氣產科鄭宗文得此方於陳藏器本草拾遺中用之良驗集驗方孕婦咳嗽貝母去心麩炒黃為末砂糖拌丸芡子大每含咽一丸神效急救方蓐內赤目生地黃薄切溫水浸貼小品方胎赤爛眼昏暗用蠍虎數枚以罐盛黃土按實入蠍虎在內勿令損傷以紙封口穿數孔出氣候有糞數粒去糞上一點黑者只取一頭白者唾津研成膏塗眼睫周迴不得揩拭來早以溫漿水洗三次甚效聖濟總錄妊娠水腫始自兩足漸至喘悶足趾出水謂之子氣乃婦人素有風氣或衝任有血風不可作水妄投湯藥宜天仙藤散主之天仙藤洗微炒香附子炒陳皮甘草烏藥等分為末每服三錢水一大盞生薑三片木瓜三片紫蘇三葉煎至七分空心服一日三服小便利氣脈通腫漸消不須多服婦人良方妊娠水腫身重小便不利灑淅惡寒起即頭眩用葵子赤茯苓各三兩為末飲服方寸匕日三服小便利則愈若轉胞者加發灰神妙金匱要略禹講師用新汲水下妊娠浮腫羌活蘿菔子同炒香只取羌活為末每服二錢溫酒調下一日一服二日二服三日三服亦治風水浮腫本事方婦人胎腫屬濕熱山梔一合炒研每服二三錢米飲下丸服亦可丹溪又烏鱧最能去濕下水與蒜同食又可與白朮茯苓橘皮煮食下子腫大效自記妊娠吐水酸心腹痛不能飲食人參乾薑炮等分為末以生地黃汁和丸梧子大每服五十丸米湯下和劑局方妊娠中惡心腹疼痛桔梗一兩銼水一鍾生薑三片煎六分溫服聖惠方妊娠尿難飲食如故用貝母苦參當歸四兩為末蜜丸小豆大每飲服三丸至十丸金匱要略妊娠子淋小便不利豬苓五兩為末熟水服方寸匕日三服亦治通身腫滿小品方妊娠子淋不得小便滑石末水和泥臍下二寸外臺秘要孕婦熱淋車前子五兩葵根切一升煎取一升半分三服以利為度梅師方妊娠患淋熱痛酸楚手足煩疼地膚子十二兩水四升煎二升半分服子母秘錄妊娠吐衄不止馬勃末濃米飲服半錢聖惠方子癇昏冒縮砂和皮炒黑熱酒調下二錢不飲者米飲下此方安胎止痛其效不可盡述溫隱居方腹中兒哭黃連煎濃汁母常呷之熊氏補遺孕婦腹內鐘鳴鼢鼠壤土研末二錢麝香湯下立愈時珍妊娠風寒卒中不省人事狀如中風用熟艾三兩米醋炒極熱以絹包熨臍下良久即蘇婦人良方妊娠傷寒壯熱赤斑變為黑斑溺血用艾葉如雞子大酒三升煮二升半分為兩服傷寒類要又以蔥一把水三升煮熱服汁食蔥令盡取汗傷寒類要妊娠傷寒用鯉魚一頭燒末酒服方寸匕令汗出秘錄妊娠感寒時行者用大鯽魚一頭燒灰酒服方寸匕無汗腹中暖痛者以醋服取汗產乳方妊娠熱病取井底泥敷心下及丹田可護胎氣時珍方又伏龍肝末一雞子許水調服之仍以水和塗臍方寸干又上傷寒類要又青羊屎研爛塗臍以安胎氣外臺秘要胎前瘧疾夜明砂末三錢空心溫酒服經驗秘方又酒蒸常山石膏煅各一錢烏梅炒五分甘草四分酒水各一盞浸一夜平旦溫服集驗方妊娠瘧疾先因傷寒變成者用高良薑三錢銼以獖豬膽汁浸一夜東壁土炒黑去土以肥棗肉十五枚同焙為末每用三錢水一盞煎熱將發時服神妙永類鈐方胎產下痢用龜甲一枚醋炙為末米飲服一錢日二經驗妊娠下痢㽲痛用烏雞卵一個開孔去白留黃入鉛丹五錢攪勻泥裹煨乾研末每服二錢米飲下一服愈是男二服是女妊娠下痢白色晝夜三五十行黃柏厚者蜜炒令焦為末大蒜煨熟去皮搗爛和丸梧子大每空心米飲下三五十丸日三服神妙不可述婦人良方妊娠血痢阿膠二兩酒一升半煮一升頓服臨產下痢梔子燒研空心熱酒服一匙甚者不過五服勝金方經水三個月不行驗胎法川芎生為末空心煎艾湯服一匙腹內微動者是有胎不動者非也靈苑方鬼胎癥瘕經候不通芫花根三兩銼炒為末每服一錢桃仁煎湯調下當利下惡物而愈聖惠方胎前諸疾胎動不安胎上逼心漏胎墮胎妊娠胎動或腹痛或搶心或下血不止或倒產子死腹中艾葉一雞子大酒四升煮二升分二服肘後方治婦人妊娠傷動或子死腹中血下疼痛口噤欲死服此探之不損則痛止已損便立下當歸二兩芎藭一兩為粗末每服三錢水一盞煎令泣泣欲干投酒一盞再煎一沸溫服或灌之約人行五里再服不過三五服便效名佛手散備急方胎動不安木賊去節川芎等分為末每服三錢水一盞入金銀一錢煎服聖濟總錄又硃砂末一錢和雞子白三枚攪勻頓服胎死即出未死即安普濟方又炒豉煎汁服華佗方胎動上逼弩弦繫帶之立下醫林集要胎動迫心作痛艾葉雞子大以頭醋四升煎二升分溫服子母秘錄胎上衝心葡萄根及藤葉煮濃汁飲之即安孟詵妊娠偶因所觸或跌墜傷損致胎不安痛不可忍者縮砂熨斗內炒熱去皮用仁搗碎每服二錢熱酒調下須臾覺腹中胎動極熱即胎已安矣神效孫尚藥方妊娠因夫所動困絕以竹瀝飲一升立愈產寶妊娠胎動已見黃水者乾荷蒂一枚炙研為末糯米淘汁一鐘調服即安唐氏經驗方胎動不安腹痛下黃水用糯米一合黃耆芎藭各五錢水一升煎八合分服產寶方梅師方無芎藭因驚胎動出血取黃連末酒服方寸匕日三服子母秘錄妊娠胎動忽下黃汁如膠或如小豆汁腹痛不可忍者苧根去黑皮切二升銀一斤水九升煎四升每服以水一升入酒半升煎一升分作二服一方不用銀梅師方婦人良方用銀五兩苧根切二兩酒一鍾水一大鐘煎一鍾服胎動下血㽲痛搶心用蔥白煮濃汁飲之未死即安已死即出未效再服一方加川芎一方用銀器同米煮粥及羹食深師方治胎動不安漏血銀煮水入蔥白粳米作粥食時珍方妊娠胎漏下血欲死黃蠟一兩老酒一碗熔化熱服頃刻即止甄權用白蠟雞子大煎三四沸投美酒中服胎動下血或胎已死百草霜二錢棕灰一錢伏龍肝五錢為末每服一二錢白湯入酒及童便調下筆峰雜興胎動欲產日月未足者蒲黃二錢井華水下集一方又取槐樹東引枝令孕婦手把之即易生子母秘錄又全蛇蛻一條絹袋盛繞腰繫之千金方又梁上塵灶突墨等分酒服方寸匕千金方孕婦漏胎下血五倍子末酒服二錢神效集驗方又雞肝一具切和酒五合服之孟詵漏胎下血血儘子死葵根莖燒灰酒服方寸匕日三千金方又用雞子黃十四枚以好酒二升煮如餳服之未瘥再作以瘥為度普濟方漏胎難產因血乾澀也用清油半兩好蜜一兩同煎數十沸溫服胎滑即下他藥無益以此助血為效胎產須知妊娠下血不止鹿角屑當歸各半兩水三盞煎減半頓服不過二服普濟方又阿膠三兩炙為末酒一升半煎化服即愈又阿膠末二兩生地黃汁半斤搗汁入清酒二升分三服梅師方又用桃梟燒存性研水服取瘥葛洪方婦人有漏下者有半產後下血不絕者有妊娠下血者並宜膠艾湯主之阿膠二兩艾葉三兩芎藭甘草各二兩當歸地黃各三兩芍藥四兩水五升清酒五升煮取三升乃納膠令消盡每溫酒一升日三服仲景金匱要略傷胎血結心腹痛取童子小便日服二升良楊氏產乳頻慣墮胎或三四月即墮者於兩月前以杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾為末以山藥五六兩為末作糊丸梧子大每服五十丸空心米飲下肘後方墮胎下血小薊根葉益母草五兩水三大碗煮汁一碗再煎至一盞分二服一日服盡聖濟總錄又丹參十一兩酒五升煮取三升溫服一升一日三服亦可水煮千金方墮胎下血不止代赭石末一錢生地黃汁半盞調服日三五次以瘥為度聖濟錄又當歸焙一兩蔥白一握每服五錢酒一盞半煎八分溫服聖濟總錄又榆白皮當歸焙各半兩入生薑水煎服之普濟方又墨三兩火燒醋淬三次出火毒沒藥一兩為末每服二錢醋湯下普濟方墮胎腹痛血出不止羚羊角燒灰三錢豆淋酒下普濟方墮胎血瘀不下狂悶寒熱鹿角屑一兩為末豉湯服一錢日三須臾血下聖惠子母秘錄治墮胎血下煩悶方同妊娠尿血豆醬一大盞乾生地黃二兩為末每服一錢米飲下普濟方孕癰孕中有癰洪州烏藥軟白香辣者五錢水一鍾牛皮膠一片同煎至七分溫服婦人良方又薏苡仁煮汁吞頻頻飲之冷即易之婦人良方臟躁悲傷婦人臟躁悲傷欲哭象若神靈數欠者大棗湯主之大棗十枚小麥一升甘草二兩每服一兩水煎服之亦補脾氣下胎病欲去胎雞子一枚入鹽三指撮服張文仲方又虻蟲十枚炙搗為末酒服胎即下又用蟹爪二合桂心瞿麥各一兩牛膝二兩為末空心溫酒服一錢千金方妊娠去胎麥糵一升蜜一升服之即下外臺秘要女人服草藥墮胎腹痛者生白扁豆去皮為末米飲服方寸匕濃煎汁飲亦可凡服藥胎氣已傷未墮者或口噤手強自汗頭低似乎中風九死一生醫多不識作風治必死無疑斷胎婦人斷產蠶子故紙一尺燒為末酒服終身不產千金方又剪文書紙有印處燒灰水服一錢匕效藏器又水銀以麻油煎一日空心服棗大一丸永斷不損人婦人良方又零陵香為末酒服二錢每服至一兩即一年絕孕蓋血聞香即散也醫林集要催生臨產順胎九月十月服此永無驚恐用香附子四兩縮砂仁炒三兩甘草炙一兩為末每服二錢米飲下名福胎飲朱氏集驗方婦人臨產月服之令胎滑易生極有效驗通明乳香半兩枳殼一兩為末煉蜜丸梧子大每空心酒服三十丸名神寢丸胎滑易產弓弩弦燒末酒服二錢續十全方又榆皮焙為末臨月日三服方寸匕令產極易陳承本草別說催生丹臘月取兔腦髓一個塗紙上吹乾入通明乳香末二兩同研令勻於臘日前夜安棹上露星月下設茶果齋戒焚香望北拜告曰大道弟子某修合救世上難生婦人藥願降威靈佑助此藥速令生產禱畢以紙包藥露一夜天未明時以豬心血搗和丸芡子大硃砂為衣紙袋盛懸透風處每服一丸溫醋湯下良久未下更用冷酒下一丸即產經驗方臨產催生蒲黃地龍洗焙陳橘皮等分為末另收臨時各抄一錢新汲水調服立產唐慎微方又路旁破草鞋一隻洗淨燒灰酒服二錢如得左足生男右足生女覆者兒死側者有驚自然之理也胎產方又蜀葵子二錢滑石三錢為末順流水服五錢即下催生方又以黃葵子四十九粒研爛溫水服之良久即產經驗方用子焙研三錢井華水服無子用根煎汁服治人弱難產麝香一錢鹽豉一兩以舊青布裹之燒紅為末以秤錘淬酒服二錢即下郭稽中方催生去胎芫花根剝皮以綿裹點麝香套入陰穴三寸即下攝生妙用催生下胞取蓖麻子十四枚兩手各把七枚須臾立下肘後方又弓弩弦催生取其速也折弓弦止血取其斷絕也
