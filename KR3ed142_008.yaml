body:
  text: 卷八黃疸三十六黃用雞子一顆連殼燒灰研酢一合和之溫服鼻中蟲出為效外臺祕要五種黃病黃疸谷疸酒疸女疸勞疸也黃汗者乃大汗出入水所致身體微腫汗出如黃柏汁用生茅根一把細切以豬肉一斤合作羹食肘後方凡黃有數種傷酒發黃誤食鼠糞亦作黃因勞發黃多痰涕目有赤脈益憔悴或面赤噁心者是也用秦艽一大兩銼作兩帖每帖用酒半升浸絞取汁空腹服或利便止就中飲酒人易治屢用得效崔元亮方又治黃病內外皆黃小便赤心煩口乾者以秦艽三兩牛乳一大升煮取七合分溫再服此方出於許仁則又孫真人方加芒硝六錢廣利方五般急黃山豆根末水服二錢若帶蠱氣以酒下備急方谷疸勞疸谷疸因食而得勞疸因勞而得用龍膽一兩苦參三兩為末牛膽汁和丸梧子大食前以麥飲或生大麥苗汁服五丸日三服不知稍增勞疸加龍膽一兩梔子仁三七枚以豬膽和丸刪繁方治諸黃疸樺皮濃煮汁飲之良開寶方又苦菜連花子研細二錢水煎服日二次良汪穎方又柞木皮燒灰末水服方寸匕日三藏器方又用梔子茵陳甘草香豉四物作湯飲黃疸陰黃並取瓜蒂丁香赤小豆各七枚為末吹豆許入鼻少時黃水流出隔日一用瘥乃止孟詵食療黃疸如金晴明時清晨勿令雞犬婦人見取東引桃根細如箸若叉股者一握切細以水一大升煎一小升空腹頓服後三五日其黃離離上如薄雲散開百日方平復也黃散後可時時飲清酒一杯則眼中易散否則散遲忌食熱面豬魚等物必效方又薏苡根煎湯頓服黃疸睛黃小便赤用生蔓菁子末熟水服方寸匕日三服孫真人又亂髮灰水服一錢日三次肘後方治諸黃利小便大麥苗杵汁日日服又消酒毒暴熱酒疸目黃黃疸初起柳枝煮濃汁半升頓服外臺祕要黃疸百藥不效以驢頭肉同姜齏煮汁日服張文仲方急黃欲死者雄雀屎湯化服之立蘇藏器方食積黃疸絲瓜連子燒存性為末每服二錢因面得病麵湯下因酒得病溫酒下連數服愈易簡方食勞黃病身目俱黃及發腫積痛青礬半斤醋一大盞和勻瓦盆內煅干為度平胃散烏藥順氣散各半兩為末醋煮糊丸梧子大每酒或薑湯下二三十丸不忌口加鍋灰濟急方脾病黃腫青礬四兩煅成赤珠子當歸四兩酒酻浸七日焙百草霜三兩為末以浸藥酒打糊丸梧子大每服五丸至七丸溫水下一月後黃去立效又方緑礬四兩百草霜五倍子各一兩木香一錢為末酒煮飛面丸梧子大每空心酒下五丸又方平胃散青礬各二兩為末醋糊丸米飲下或加烏沉湯四兩酒糊丸亦可活法機要脾勞黃病針砂四兩醋炒七次乾漆燒存性二錢香附三錢半平胃散五錢為末蒸餅丸梧子大任湯使下摘玄方男子酒疸用茵陳蒿四根梔子七個大田螺一個連殼搗爛以百沸白酒一大盞沖汁飲之又用田螺將水養數日去泥取出生搗爛入好酒內用布帛濾過將汁飲之日三服效壽域方永類鈐方用小螺螄養去泥土日日煮食飲汁有效治黃疸吐血田螺十個水漂去泥搗爛露一夜五更取清服二三次血止即愈怪症方治酒積面黃腹脹以豬項肉一兩切如泥合甘遂末一錢作丸紙裹煨香食之酒下當利出酒布袋也普濟方酒疸黃疾心下懊痛足脛滿小便黃飲酒發赤黑黃斑由大醉當風入水所致黃耆二兩木蘭一兩為末酒服方寸匕日三服肘後方女勞黃疸因大熱大勞交接後入水所致身目俱黃發熱惡寒小腹滿急小便難用豬膏半斤亂髮雞子大三枚和煎發消藥即成矣肘後方女勞黃疸氣短聲沉用女人月經和血衣燒灰酒服方寸匕一日再服三日瘥必效方房勞黃病體重不眠眼赤如朱心下塊起若瘕十死一生宜烙舌下灸心俞關元二七壯以婦人內衣燒灰酒服二錢三十六黃方女勞黃疸日晡發熱惡寒小腹急大便溏黑額黑滑石石膏等分研末大麥汁服方寸匕日三小便大利愈腹滿者難治千金方女勞黑疸仲景曰黃家日晡所發熱而反惡寒此為女勞得之膀胱急小腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病水也腹滿者難治硝石礬石燒等分為末以大麥粥汁和服方寸匕日三病隨大小便去小便黃大便黑是也金匱方黑疸危疾瓜蔞根一斤搗汁六合頓服隨有黃水從小便出如不出再服簡便方濕熱黃疸蟹燒存性研末酒糊丸梧子大每服五十丸白湯下日服一次又黃牛糞日乾為末麵糊丸梧子大每食前白湯下七十丸簡便方熱結黃病燈籠草搗汁服多效又扁竹搗汁頓服一升多年者日再服之藥性論火黃身熱午後卻涼身有赤點或黑點者不可治宜烙手足心背心百會下廉內服紫草湯紫草吳藍一兩木香黃連一兩水煎服三十六黃方時行發黃竹葉五升切小麥七升石膏三兩水一斗半煮取七升細服盡劑愈肘後方又用金黃腳雌雞治如食法煮熟食之並飲汁令盡不過再作亦可少下鹽豉肘後方又醋酒浸雞子一宿吞其白數枚肘後方婦人黃疸經水不調房事觸犯所致白礬黃蠟各半兩陳橘皮三錢為末化蠟丸梧子大每服五十丸以滋血湯或調經湯下濟陰方癇黃如金好眠吐涎茵陳蒿白蘚皮等分水二鍾煎服日二服三十六黃方走精黃病面目俱黃多睡舌紫甚面裂若爪甲黑者死用豉半兩牛脂一兩煎過綿裹烙舌去黑皮一重濃煎豉湯飲之三十六黃方好食茶葉面黃者每日食棐子七枚以愈為度簡便方又川椒紅炒研末為丸梧子大湯下簡便方張景聲十五歲患腹脹面黃衆藥不能治以問嗣伯嗣伯曰此石蛔爾極難療當取死人枕煮服之得大蛔蟲頭堅如石者五六升病即瘥嘈雜嘈雜吐水真橘皮去白為末五更安五分於掌心舔之即睡三日必效皮不真則不驗怪症奇方婦人嘈雜皆血液淚汗變而為痰或言是血嘈多以豬血炒食而愈蓋以血導血歸原之意耳此固一說然亦有蛔蟲作嘈雜者蟲得血腥則飽而伏也時珍方醋心吐水檳榔四兩橘皮一兩為末每服方寸匕空心生蜜湯下梅師方醋心上攻用茱萸一合水一杯煎七分頓服近有人心如蜇破服此二十年不發也纍用有效兵部手集又食已吞酸胃氣虛冷者吳茱萸湯泡七次焙乾姜泡等分為末湯服一錢聖惠方食物醋心胡桃爛嚼以生薑湯下立止適用方又蘿蔔生嚼數片絶妙乾者熟者鹽淹者及人胃冷者皆不效時珍方嘔逆酸水羊屎十枚酒二合煎一合頓服未定再服之兵部手集楂子去噁心咽酸止酒痰黃水藏器泄瀉老少滑瀉白朮半斤黃土炒過山藥四兩炒為末飯丸量人大小米湯服或加人參三錢集簡方暴下洞泄歐陽公常得此病國醫不能治夫人買市人藥一帖進之而愈力叩其方用車前子一味為末米飲服二錢匕云此藥利道而不動氣水道利則清濁分而谷藏自止矣暴泄身冷自汗甚則欲嘔小便清脈微弱宜已寒丸治之蓽茇肉桂各二錢半高良薑乾薑各三錢半為末糊丸梧子大每服三十丸薑湯下和劑局方氣虛暴瀉日夜三二十行腹痛不止夏月路行備急最妙用硫黃二兩枯礬半兩研細水浸蒸餅丸梧子大硃砂為衣每服十五丸至二十丸溫水鹽湯任下祕寶方驟然水瀉日夜不止欲死不拘男婦用五月五日採苧麻葉陰乾為末每服二錢冷水調下勿吃熱物令人悶倒只吃冷物小兒半錢護命方腹脹忽瀉日夜不止諸藥不效此氣脫也用益智子仁二兩濃煎飲之立愈得效方暴泄不止神麯炒二兩茱萸湯泡炒半兩為末醋糊丸梧子大每服五十丸米飲下百一選方又陳艾一把生薑一塊水煎熱服生生編水瀉腹鳴如雷有火者石膏火煅倉米飯和丸梧子大黃丹為衣米飲下二十丸不二服效李樓方肚腹微微作痛痛即瀉瀉亦不多日夜數行者用蕎麥麵一味作飯連食三四次即愈豫壯年患此兩月瘦怯尤甚用消食化氣藥俱不效一僧授此而愈轉用皆效此可徵其煉積滯之功夫簡便方濕熱虛泄山藥蒼朮等分飯丸米飲服大人小兒皆宜經驗方脾濕水瀉注下困弱無力水穀不化腹痛甚者蒼朮二兩白芍藥一兩黃芩半兩淡桂二錢每服一兩水一盞半煎一盞溫服脈弦頭微痛去芍藥加防風二兩保命集渴利不止羊肺一具入少肉和鹽豉作羹食不過三具愈亦治下焦虛冷小便頻數普濟方治脾胃虛寒泄瀉二神丸用破故紙補腎肉豆蔻補脾二藥雖兼補但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩倉廩虛則受物矣屢用見效不可不知脾胃虛冷大腸滑泄米穀不化乏力用大附子十兩連皮同大棗二升於石器內以水煮一日常令水進取出每個切作三片再同煮半日削去皮焙為以棗肉和丸梧子大每空心米飲服三四十丸臟寒泄瀉體倦食減用豬大臟一條去脂洗淨以吳茱萸末填滿縛定蒸熟搗丸梧子大每服五十丸米飲下奇效良方大腸冷滑不止鍾乳粉一兩肉豆蔻煨半兩為末煮棗肉丸梧子大每服七十丸空心米飲下濟生方大腸寒滑小便精出赤石脂乾薑各一兩胡椒半兩為末醋糊丸梧子大每空心米飲下五七十丸有人病此多服熱藥不效或教服此終四劑而愈寇氏衍義脾虛泄瀉白朮五錢白芍藥一兩冬月用白豆蔻煨為末米飯丸梧子大每米飲下五十丸日二服簡便方風客胃泄夏英公病此太醫以虛治不效霍翁曰風客於胃也飲以藁本湯而止蓋藁本能去風濕故耳暑月水泄五倍子末飯丸黃豆大每服二十丸荷葉煎水下即時見效選奇方飲酒成泄骨立不能食但飲酒即泄用嫩鹿茸酥炙肉蓯蓉煨一兩麝香五分為末陳白米飯丸梧子大每米飲下五十丸名香茸丸普濟方老人虛泄不禁熟附子一兩赤石脂一兩為末醋糊丸梧子大米飲下五十丸家藏方水瀉久痢破故紙炒一兩粟殼炙四兩為末煉蜜丸彈子大每服一丸薑棗同水煎服百一選方久瀉腸滑白朮炒茯苓各一兩糯米炒二兩為末棗肉拌食或丸服之簡便方久瀉不止肉豆蔻煨一兩木香二錢半為末棗肉和丸米飲服四五十丸又方肉豆蔻煨一兩熟附子七錢為末糊丸米飲服四五十丸又方肉豆蔻煨粟殼炙等分為末醋糊丸米飲服四五十丸並百一選方又豬腎一個批開摻骨碎補末煨熟食之神效集簡方又用獖豬肚一枚入蒜煮爛搗膏丸梧子大每米飲服三十丸丁必卿雲豫次日五更必水瀉一次百藥不效用此方入平胃散末三兩丸服遂安普濟方又白龍骨白石脂等分為末水丸梧子大紫蘇木瓜湯下量大人小兒用心鑑久瀉食減糯米一升水浸一宿瀝乾慢炒熟磨篩入懷慶山藥一兩每日清晨用半盞入砂糖二匙胡椒末少許以極滾湯調食其味極佳大有滋補久服令人精暖有子經驗方多年脾泄老人常患此謂之水土同化吳茱萸三錢炮過入水煎汁入鹽少許通口服蓋茱萸能暖膀胱水道既清大腸自固他藥雖熱不能分解清濁也仁存方治脾泄瀉一婦人年七十餘病瀉五年百藥不效豫以感應丸五十丸投之大便二日不行再以平胃散加椒紅茴香棗肉為丸與服遂瘳每因怒食舉發服之即止此除濕消食溫脾補腎之驗也五更腎泄凡人每至五更即溏泄一二次經年不止者名曰腎泄蓋陰盛而然脾惡濕濕則濡而困困則不能治水水性下流則腎水不足用五味子以強腎水養五臟吳茱萸以除脾濕則泄自止矣五味子去梗二兩茱萸湯泡七次五錢同炒香為末每旦陳米飲服二錢本事方滯下一切下痢不拘丈夫婦人小兒木香一塊方圓一寸黃連半兩二味用水同煎乾去黃連薄切木香焙乾為末分作三服第一服橘皮湯下二服陳米飲下三服甘草湯下此乃夢中觀音所授方服之屢驗祕寶方老少下痢食入即吐用白蠟方寸匕雞子黃一個石蜜苦酒發灰黃連末各半雞子殼先煎蜜蠟苦酒雞子四味令勻乃納連發熬至可丸乃止二日服盡神效無比也華他方五色諸痢用零陵香草去根以鹽酒浸半月炒乾每兩入廣木香一錢半為末裡急腹痛者用冷水服一錢半通三四次後用熟米湯服一錢半止名返魂丹只忌生梨一味集簡方又用吳茱萸炒黃連加木香等分滑石研細水飛倍之水丸服又蝟皮燒灰酒服二錢壽域方赤白痢小腹痛不可忍下重或面青手足俱變者用黃蠟三錢阿膠三錢同熔化入黃連末五錢攪勻分三次小便不利局方加茯苓末三錢熱服神妙金匱要略治赤白痢噤口痢及泄瀉用黑牛兒即蜣螂一名鐵甲將軍燒研每服半錢或一錢燒酒調服小兒以黃酒服立效延壽方赤白下痢龍牙草即馬鞭草五錢陳茶一撮水煎服神效醫方摘要又午日午時取完好荸薺洗淨拭乾勿令損破放瓶內入好燒酒浸之黃泥密封收貯遇有患者取二枚細嚼空心用原酒送下經驗方又薺菜根葉燒灰服極效甄權方又臘豬骨燒存性研末溫酒調服三錢又十二月豬膽百枚俱滿盛黑豆入內著麝香少許陰乾每用五七粒為末赤以甘草湯白以生薑湯調服奇效方又方用狗膽赤白下痢因脾胃受濕腹痛米穀不化用吳茱萸黃連白芍藥各一兩同炒為末蒸餅丸彈子大每服二三十丸米飲下名戊己丸和劑局方赤白重下痢發令人下部疼痛故名重下日夜數十行臍腹絞痛肘後方用黃連一升酒五升煮取一升半分再服當止也葛氏用豆豉熬小焦搗服一合日三或炒焦以水浸汁服亦驗外臺用豉心炒為末一升分四服酒下入口即斷也藥性論治血痢如刺以豉一升水漬相淹煎二沸頓服取瘥不瘥再作赤白雜痢困重者益母草日乾陳鹽梅燒存性等分為末每服三錢白痢乾薑湯赤痢甘草湯下名二靈散家寶方諸痢初起大黃煨熟當歸各二三錢壯人各五錢水煎服取利或加檳榔集簡方赤白暴痢如鵝鴨肝痛不可忍者用黃芩黃連各一兩水二升煎一升分三次熱服經驗方赤白久痢並無寒熱隻日久不止用黃連四十九個鹽梅七個入新瓶內燒煙盡熱研每服二錢鹽米湯下護命方赤白下痢日夜無度及腸風下血用川黃連去毛吳茱萸湯泡過各二兩同炒香揀出各為末以粟米飯和丸梧子大各收每服三十丸赤痢甘草湯下黃連丸白痢薑湯下茱萸丸赤白痢各用十五丸米湯下百一選方赤白久痢積年不愈米飲調雲母粉方寸匕服二服立見神效千金方裡急後重不蛀皂角子米糠炒過枳殼炒等分為末飯丸梧子大每米飲下三十丸普濟方久痢裡急不止當歸二兩吳茱萸一兩同炒香去茱萸不用為末蜜丸梧子大每服三十丸米飲下名勝金丸普濟方下痢腹痛華老年五十餘病下痢腹痛垂死已備棺木豫用玄胡末三錢米飲服之痛即減十之五調理而安時珍方洞注下痢羊骨灰水服方寸匕千金方一切瀉痢脈浮洪者多日難已脈微小者服之立止巴豆皮楮葉同燒存性研化蠟丸緑豆大每甘草湯下五丸名勝金膏宣明方順氣止痢椿根白皮東南行者長流水內漂三日去黃皮焙為末每一兩加木香二錢粳米飯為丸每服一錢二分空心米飲下經驗方患痢人肛門急痛及産婦陰痛訶子和蠟燒煙燻之及煎湯薰洗大明方諸痢脾泄臟毒下血雅州黃連半斤去毛切裝肥豬大腸內扎定入砂鍋中以水酒煮爛取連焙研末搗腸和丸梧子大每服百丸米湯下極效直指方熱毒赤痢黃連二兩切片瓦焙令焦當歸一兩焙為末入麝香少許每服二錢陳米飲下佛智和尚在閩以此濟人本事千金方只用宣連一兩水煮露一宿空腹熱服又三七三錢研末米泔水調服即愈集簡方下痢鮮血犀角地榆生地黃各一兩為末煉蜜為丸彈子大每服一丸水一升煎五合去滓溫服聖惠方又以楮樹皮荊芥等分為末冷醋調服一錢血崩以醋煎服神效不可具述得效方又臘月日未出時取背陰地北引樗根皮東流水洗淨持風處陰乾為末每二兩入寒食麵一兩新汲水丸梧子大陰乾每服三十丸水煮滾傾出溫水送下忌見日則無效名如神丸普濟方時行血痢宋張叔潛祕書知劍州時其閣下病血痢一醫用平胃散一兩入川續斷末二錢半每服二錢半水煎服即愈紹興壬子會稽時行痢疾叔潛之子以方傳人往往有驗小兒痢服之皆效血痢不止用麻子仁汁煮緑豆空心食極效外臺祕要又乾薑燒黑存性放冷為末每服一錢米飲下神妙集驗方又方用苦參炒焦為末水丸梧子大每服十五丸米飲下存仁方又方用炒黑蒲黃甚妙又地榆曬研為末每服二錢摻在羊血上炙熟食之以捻頭煎湯送下或以地榆煮汁熬如飴狀一服三合捻頭湯化下捻頭即油撒子又木賊五錢水煎溫服一日一服亦治瀉血不止日二服廣利方集簡方用貫衆五錢煎酒服又胡黃連烏梅肉灶下土等分為末臘茶清下普濟方又地錦草曬研每服二錢空心米飲下乾坤生意毒痢膿血六脈微小並無寒熱宜以桑寄生二兩防風大芎二錢半炙甘草三銖為末每服二錢水一盞煎八分和滓服護命方便痢膿血久而不止烏梅一兩去核燒過為末每服二錢米飲下立止聖濟總録血痢腹痛日夜不止以蕓薹葉搗汁一合入蜜一合溫服聖惠方赤痢久下纍治不瘥黃連一兩雞子白和為餅炙紫為末以漿三升慢火煎成膏每服半合溫米飲下一方只以雞子白和丸服勝金方赤痢熱躁粳米半升水研取汁入瓷瓶中蠟紙封口沉井底一夜平旦服之普濟方治熱痢及婦人産後下痢用蠟二棋子大阿膠二錢當歸二錢半黃連三錢黃柏一錢陳廩米半升水三鍾煮米至一升去米入藥煎至一鍾溫服神效千金方治熱痢下重用白頭翁二兩黃連黃柏秦皮各三兩水七升煮二升每服一升不愈更服婦人産後痢虛極者加甘草阿膠各二兩金匱玉函濕熱泄痢用六一散加炒紅曲五錢為末蒸餅和丸梧子大每服五七十丸白湯下日三服丹溪心法熱病下痢困篤者用大青四兩甘草赤石脂三兩阿膠二兩豉八合水一斗煮三升分三服不過二劑瘥肘後方老小白痢用陳北艾四兩乾薑炮三兩為末醋煮倉米糊丸梧子大每服七十丸空心米飲下甚有奇效永類方冷痢腹痛下白凍如魚腦赤石脂煅乾薑炮等分為末蒸餅和丸量大小服日三服名桃花丸和劑局方寒痢白色炒麵每以方寸匕入粥食之能療日瀉百行師不救者外臺方虛寒下痢腸滑不禁針砂七錢半官桂枯礬各一錢為末以涼水調攤臍上下縛之當覺大熱以水潤之可用三四次名玉胞肚仁存方冷滑下痢不禁虛羸用縮砂仁熬為末以羊子肝薄切摻之瓦上焙乾為末入乾薑末等分飯丸梧子大每服四十丸白湯下日二服又方縮砂仁炮附子乾薑厚朴陳橘皮等分為末飯丸梧子大每服四十丸米飲下日二服並藥性論冷痢腹痛不能食者肉豆蔻一兩去皮醋和麵裹煨搗末每服一錢粥飲調下聖惠方冷痢厥逆六脈沉細人參大附子各一兩半每服半兩生薑十片丁香十五粒粳米一撮水二盞煎七分空心溫服經驗方脾泄氣痢豆蔻一顆米醋調麵裹煨令焦黃和麵研末更以檔子炒研末一兩相和又以陳廩米炒焦為末每以二錢煎作飲調前二味三錢旦暮各一服便瘥傳信方氣痢衆藥不效用牛乳半斤蓽茇三錢同煎減半空腹頓服即愈此金吾張寶藏進方愈唐太宗疾授三品官虛痢危困因血氣衰弱者鹿茸一兩酥炙為末入麝香五分以燈心煮棗肉和丸梧子大每空心米飲下三十丸濟生方老人虛痢不止不能飲食上黨參一兩鹿角去皮炒研五錢為末每服方寸匕米湯調下日三服十便良方酒痢便血腹痛或如魚腦五色者乾絲瓜一枚連皮燒研空心酒服二錢經驗良方酒痢下血百藥煎陳槐花等分焙研末酒糊丸梧子大每服五十丸米飲送下本事方痢下腸蠱凡痢下應先白後赤若先赤後白為腸蠱牛膝二兩搗碎以酒一升漬經一宿每飲一兩杯日三服肘後方下痢咽腫春夏病此宜用白頭翁黃連各一兩木香二兩水五升煎一升半分三服聖惠方暴痢後氣滿不能食煮赤小豆食一頓即愈孟詵方下痢噤口人參蓮肉各三錢以井華水二盞煎一盞細細呷之或加薑汁炒黃連三錢經驗良方又肥皂莢一枚以鹽實其內燒存性為末以少許入白米粥內食之即效乾坤生意又糯谷一升炒出白花去殼用薑汁拌濕再炒為末每服一匙湯下三服即止經驗良方又臘肉脯煨熟食之妙李樓方下痢噤口雖是脾虛亦熱氣閉隔心胸所致俗用木香失之溫用山藥失之閉惟參苓白朮散加石菖蒲粳米飲調下或用參苓石蓮肉少入菖蒲服胸次一開自然思食士嬴方又木鱉仁六個研泥分作二份用面燒餅一個切作兩半只用半餅作一竅納藥在內乘熱覆在病人臍上一時再換半個熱餅其痢即止遂思飲食經驗方又用大田螺二枚搗爛入麝香三分作餅烘熱貼臍間半日熱氣下行即思食矣甚效丹溪纂要久痢噤口石蓮肉炒為末每服二錢陳倉米飲調下便覺思食甚妙加入香連丸尤妙亦治脾泄腸滑丹溪心法久痢噤口病勢欲絶用金絲鯉魚一尾重一二斤者如常治淨用鹽醬蔥必入胡椒末三四錢煮熟置病人前嗅之欲吃隨意連湯食一飽病即除根屢治有效醫方摘要又龍骨四兩打碎水五升煮取二升半分五服冷飲仍以米飲和丸每服十丸肘後方休息久痢白豆腐醋煎食之即愈普濟方休息痢疾日夜無度腥臭不可近臍腹撮痛椿根白皮訶黎勒各半兩母丁香三十枚為末醋糊丸梧子大每服五十丸米飲下東垣方休息痢疾經年不愈取大蟲骨炙黃焦搗末飲服方寸匕日三取效張文仲方休息痢及霍亂梅葉煮濃汁飲之大明方止休息痢烏梅肉和建茶乾薑為丸服大驗大明方久泄久痢白石脂乾薑等分研百沸湯和麵為稀糊搜之並手丸梧子大每米飲下三十丸斗門方又用骨碎補末入豬腎中煨熟與食頓住蓋腎主大小便久泄屬腎虛不可專從脾胃也雷公炮炙論用此方治耳鳴耳亦腎之竅也時珍方久瀉虛痢腹痛者食茱萸肉豆蔻各一兩陳米一兩半以米一份同二味炒黃為末一份生研為末煮糊丸梧子大每陳米飲下五十丸日三服普濟方餐瀉不化及久痢小椒一兩炒蒼朮二兩土炒研末醋糊丸梧子大每服五十丸普濟方治久痢勞痢狗頭骨灰和乾薑莨菪炒見煙為丸空心白飲服十丸極效甄權方久痢五色大熟瓜蔞一個煅存性出火毒為末作一服溫酒服之本事方久痢不止罌粟花未開時外有兩片青葉包之花開即落收取為末每米飲服一錢神效赤用紅花白用白花又用罌粟殼蜜炙厚朴薑製各四兩為細末每服一錢水一盞姜三片煎八分溫服忌生冷集效方腸滑久痢黑神散酸石榴一個煅煙盡出火毒一夜研末仍以酸榴一塊煎湯服神效亦治久瀉不止普濟方聖濟録治血痢五色用酸石榴生搗汁每服五合神效久痢諸藥不效服此三服宿垢去盡即變黃色皂角子瓦焙為末米糊丸梧子大每服四五十丸陳茶下醫方摘要二便不通二便不通脹急者生冬葵根二斤搗汁三合生姜四兩取汁一合和勻分二服連用即通也聖惠方又白礬末填滿臍中以新汲水滴之覺冷透腹內即自然通臍平者以紙圍環之經驗方又酸草一大把車前草一握搗汁入沙糖一錢調服一盞不通再服摘玄方又蜂房燒末酒服二三錢日二服不拘大人小兒子母祕録又白花胡葵子為末煮濃汁服之千金方又甘遂末以生面糊調敷臍中及丹田內仍艾灸三壯飲甘草湯以通為度又大山赤皮甘遂末一兩煉蜜和勻分作四服日一服取愈聖惠方大小便祕鼓脹氣促八角茄香七個大麻仁半兩為末生蔥白三七根同研煎湯調五苓散末服之日一服普濟方治大小便卒關格不通取吳茱萸南行枝如手第二指中節含之立下蘇頌方大小便閉及大腸虛閉用連須蔥一根姜一塊鹽一捻淡豉三七粒搗作餅烘掩臍中扎定良久氣通即通不通再作直指方大小便祕亂髮灰三指撮投半升水服姚氏方又用雄鼠屎末縛臍中立效普濟方又明月砂一匙安臍中冷水滴之令透自通也聖惠方二便關格不通悶脹二三日則殺人以貝齒二枚甘遂二銖為末漿水和服須臾即通也肘後方又蜀葵花一兩搗爛麝香半錢水一大盞煎服根亦可用二便關格脹悶愈絶蔓菁子油一合空腹服之即通通後汗出勿怪聖惠方又用葵子二升水四升煮取一升納豬脂一雞子頓服肘後大小便祕經月欲死者用推車客七個男用頭女用身土狗七個男用身女用頭新瓦焙研末樗樹南向皮煎汁調服只一服即通楊氏經驗方六七月尋牛糞中大蜣螂十餘枚線穿陰乾收之臨時取一個全者放淨磚上四面以灰火烘乾當腰切斷如大便不通用上截小便不通用下截各為細末取井華水服之二便不通全用即解二便不通諸藥不效紫花扁竹根生水邊者佳研汁一盞服即通普濟方癃閉不通小腹急痛無問久新荊芥大黃為末等分每溫水服三錢小便不通大黃減半大便不通荊芥減半名倒換散普濟方風祕氣祕蘿蔔子炒一合擂水和皂莢末二錢服立通壽域神方消風順氣治老人大腸祕澀防風枳殼麩炒一兩甘草半兩為末每食前白湯服二錢簡便方順氣利腸紫蘇子麻子仁等分研爛水濾取汁同米煮粥食之濟生方大便不通用葵子末人乳汁等分和服立通聖惠方又烏桕木根長一寸劈破水煎半盞服之立通不用多吃其功神聖兼能取水治腫滿肘後方又枳實皂莢等分為末飯丸米飲下得效方又用牽牛子半生半熟為末每服二錢薑湯下未通再以茶服一方加大黃等分一方加生檳榔等分簡要方又當歸白芷等分為末每服二錢米湯下聖濟録又張仲景傷寒論云陽明病自汗小便反利大便硬者津液內竭也蜜煎導之用蜜二合銅器中微久煎之候凝如飴狀至可丸乘熱捻作挺令頭鋭大如指長寸半許候冷即硬納便道中少頃即通也一法加皂角細辛為末少許尤速又生薑削長二寸塗鹽納下部立通外臺祕要大腸祕塞蜣螂炒去翅足為末熱酒服一錢聖惠方又羊膽汁灌入即通千金方熱黃便結用蕪菁子搗末水和絞汁服少頃當瀉一切惡物沙石草發並出食療本草燥渴腸祕九月十月熟瓜蔞實取瓤拌乾葛粉銀石器中慢火炒熟為末食後夜臥各以沸湯點服二錢寇氏衍義汗多便閉津液耗涸老人虛人皆可用肉蓯蓉酒浸焙二兩研沉香末一兩為末麻子仁汁打糊丸梧子大每服七十丸白湯下濟生方大便虛祕松子仁柏子仁麻子仁等分研泥熔白蠟和丸梧子大每服五十丸黃耆湯下寇氏衍義老人悶塞綿黃耆陳皮去白各半兩為末每服三錢用大麻子一合研爛以水濾漿煎至乳起入白蜜一匙再煎沸調藥空心服甚者不過二服此藥不冷不熱常服無祕塞之患其效如神和劑局方老人虛祕阿膠炒二錢蔥白三根水煎化入蜜二匙溫服大便風祕蒺藜子炒一兩豬牙皂莢去皮酥炙五錢為末每服一錢鹽茶湯下普濟方大便祕塞服藥不通者滄鹽三錢屋檐爛草節七個為末每用一錢竹筒吹入肛內一寸即通名提金散聖濟録小便不通磨刀交股水一盞服之效集簡方又棕皮毛燒存性以水酒服二錢即通利屢試甚驗攝生方又豬脂一斤水二斤煎三沸飲之立通千金方又葛洪方用大螻蛄二枚取小體以水一升漬飲須臾即通壽域方用土狗下截焙研調服半錢生研亦可談野翁方加車前草同搗汁服唐氏經驗方用土狗後截和麝搗入臍中縛定即通醫方摘要用土狗一個炙研入冰片麝香少許翎管吹入莖內又蚯蚓搗爛浸水濾汁取濃汁半碗服立通斗門方又胡荽二兩葵根一握水二升煎一升入滑石末一兩分三四服聖濟總録又以水四升洗甑帶取汁煮葵子二升半分三服聖惠方又用白魚滑石亂髮等分為散飲服半錢匕日三金匱要略又白海蚆一對即貝子生一個燒一個為末溫酒服田氏方又萱草根煎水頻服杏林摘要又梁上塵二指撮水服之外臺祕要又濕紙包白鹽燒過吹少許入尿孔中立通普濟方又萵苣子搗餅貼臍中即通海上仙方易簡方用莖葉搗敷又滑石末一升以車前汁和塗臍之四畔方四寸干即易之冬月水和湯氏産乳又土瓜根搗汁入少水解之筒吹入陰竅大便不通吹入肛內二便不通前後吹之取通肘後方又梔子仁十四個獨頭蒜一個滄鹽少許搗貼臍及囊良久即通普濟方小便不通臍腹脹痛不可忍諸藥不效者不過再服用續隨子去皮一兩鉛丹半兩同少蜜搗作團瓶盛埋陰處臘月至春末取出煉蜜丸梧子大每服二三十丸木通湯下化破尤妙病急亦可旋合聖濟録小便不通脹急者象牙生煎服之救急方又用苦瓠子三十枚炒螻蛄三個焙為末每冷水服一錢聖濟録小便不通臍下滿悶海金砂一兩臘南茶半兩搗碎每服三錢生薑甘草煎湯下日二服亦可末服圖經本草小便不通腹脹如鼓用田螺一枚鹽半匕生搗敷臍下一寸三分即通類編簡易方用蝸牛加麝香少許搗貼臍下以手摩之更妙小便不通腹脹用瓜蔞焙研每服二錢熱酒下頻服以通為度聖惠方長安王善夫病小便不通漸成中滿腹堅如石腳腿裂破出水雙睛凸出飲食不下痛苦不可名狀治滿利小便滲泄之藥服遍矣豫診之曰此乃奉養太過膏粱積熱損傷腎水至膀胱久而乾涸小便不化火又逆上而為嘔噦難經所謂關則不得小便格則吐逆者潔古老人言熱在下焦但治下焦其病必愈遂處以北方寒水所化大苦寒之藥黃柏知母各一兩酒洗焙研入桂一錢為引熟水丸如芡子大每服二百丸沸湯下少時如刀刺前陰火燒之狀溺如瀑泉湧出床下成流顧盼之間腫脹消散內經云熱者寒之腎惡燥急食辛以潤之以黃柏之苦寒瀉熱補水潤燥為君知母之苦寒瀉腎火為佐肉桂辛熱為使寒因熱用也小便虛閉兩尺脈沉微用利小水藥不效者乃虛寒也附子一個炮去皮臍鹽水浸良久澤瀉一兩每服四錢水一盞半燈心七莖煎服即愈普濟方老人尿閉白頸蚯蚓茴香等分杵汁飲之即愈集驗方小便澀滯不通干箬葉一兩燒灰滑石半兩為末每米飲服三錢普濟方小便澀痛不通用蠶蛻紙燒存性入麝香少許米飲每服二錢普濟方小便閉脹不治殺人蔥白三斤銼炒帕盛二個更互尉小腹氣透即通也本事方小便艱難或轉胞腹滿悶不急療殺人用秦艽一兩水一盞煎六分分作二服又方加冬葵子等分為末酒服一匕聖惠方氣壅關格不通小便淋結臍下妨閟徐長卿炙半兩茅根三分木通冬葵子一兩滑石二兩檳榔一分瞿麥穗半兩每服五錢水煎入朴硝一錢溫服日二服聖惠方男女轉胞不得小便寒水石二兩滑石一兩葵子一合為末水一斗煮五升時服一盞即利永類方小便轉胞不出自取爪甲燒灰服又甘遂末一錢豬苓湯調下立通筆峰雜興又納衣魚一枚於莖中千金方小便不通臍腹急痛牛蒡葉汁生地黃汁二合和勻入蜜二合每服一合入水半盞煎三五沸調滑石末一錢服聖濟總録脬轉小便不通腹脹如鼓數月垂死一醫用豬脬吹脹翎管插入溺孔捻脬氣吹入即大尿而愈時珍方胞轉不通非小腸膀胱厥陰受病乃強忍房事或過忍小便所致當治其氣則愈非利藥可通也沉香木香各二錢為末白湯空腹服之以通為度醫壘元戎治心經留熱小便赤澀用去皮梔子火煨大黃連炙甘草等分末之水煎三錢服無不利也大便燥結皂角核燒存性服其性得濕則滑滑則燥之自通也又厚朴生研豬臟煮搗和丸梧子大每姜水下三十丸千金良方大便艱難桃花為末水服方寸匕即通千金方遺尿男婦遺尿枯白礬牡蠣粉等分為末每服方寸匕溫酒下日三服選奇方老小尿床白紙一張鋪席下待遺於上取紙曬乾燒灰酒服集簡方夜臥遺尿本人薦草燒灰水服立瘥千金方又雄雞肝桂心等分搗丸小豆大每服一丸米飲下日三服遺精加白龍骨又麻鞋尖頭二七枚燒灰歲朝井花水服之選奇方又用豬脬洗炙食之千金方又燕蓐草燒黑研末水進方寸匕亦止噦啘即燕窠中草藏器方小便頻遺用雄雞腸一具作臛和酒服心鏡方又方用雄雞腸水煮汁服日三次普濟方小便遺失用雞肶胵一具並腸燒存性酒服男用雌女用雄集驗方下虛尿床羊肚盛水煮熟空腹食四五頓瘥千金方遺尿淋瀝白龍骨桑螵蛸等分為末每鹽湯服二錢梅師方
