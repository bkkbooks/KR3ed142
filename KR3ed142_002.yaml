body:
  text: 卷二瘧疾五種瘧疾家寶通神丸用桃奴十四枚巴豆七粒黑豆一兩研勻以冷水和丸梧子大硃砂為衣發日五更念藥王菩薩七遍井華水下一丸立瘥不過二次妙不可言養生主論五瘧不止用夜明砂末每冷茶服一錢立效聖惠方久瘧不止或一日二發或一日二三發或二三日一發用五靈脂頭垢各一錢古城石灰二錢研末飯丸皂子大每服一丸五更無根水下即止神效方也海上方截瘧酒治久瘧不止常山一錢半檳榔一錢丁香五分烏梅一個酒一盞浸一宿五更飲之一服便止永不再發如神醫學正傳截瘧丸恆山搗末三兩真丹一兩研白蜜和杵百下丸梧子大先發時三丸少頃再服三丸臨臥時服三丸酒下無不斷者名丹砂丸肘後方又勝金丸治一切瘧胸膈停痰發不愈者常山八兩酒浸蒸焙檳榔二兩生研末糊丸梧子大每服三五十丸涼酒下隔夜一服平旦一服午後方食肘後方又端午日取獨蒜煨熟入礬紅等分搗丸芡子大每白湯嚼下一丸普濟方此方可治食瘧三十年瘧用恆山一兩半龍骨五錢附子炮二錢五分大黃一兩為末雞子黃和丸梧子大未發時五丸將發時五丸白湯下神驗無不斷者張文仲備急方截瘧湯常山酒煮曬乾知母貝母草果各一錢半水一鍾半煎半熟五更熱服渣以酒浸發前服王隱君用此驅瘧四十年其效不能盡述切勿加減萬無一吐者養生主論諸瘧久不愈用三姓人家寒食麵各一合五月五日午時採青蒿擂自然汁和丸緑豆大臨發日早無根水吞一丸一方加炒黃丹少許德生堂又火麻葉不問榮枯鍋內文武火慢炒香撩起以紙蓋之令出汗盡為末臨發前用茶或酒下移病人原睡處其狀如醉醒則愈普濟方又龜殼燒存性研末酒服方寸匕海上名方老瘧不斷牛膝莖葉一把切以酒三升漬服令微有酒氣不即斷更作不過三劑止肘後方又龍骨末方寸匕先發一時酒一升半煮三沸及熱服盡蓋覆取汗即效肘後方斷截熱瘧五月五日午時取蚯蚓糞以面和丸梧子大硃砂為衣每服三丸無根水下忌生冷即止或加菖蒲末獨頭蒜同丸青囊方截瘧兼治痢真阿魏好丹砂各一兩研勻米糊和丸皂子大每空心人參湯化下一丸即愈草窗周密云此方治瘧以無根水下治痢以黃連木香湯下瘧痢亦多起於積滯故爾截寒瘧兼治冷痢端午日以獨頭蒜十個黃丹二錢搗丸梧子大每服九丸長流水下甚妙普濟方止虛瘧發熱人參二錢二分雄黃五錢為末端午日用粽尖搗丸桐子大發日侵辰井華水吞下七丸發前再服忌諸般熱物立效一方加神麯等分丹溪纂要老瘧勞瘧用鱉甲醋炙研末酒服方寸匕隔夜一服清早一服臨時一服無不斷者入雄黃少許更佳肘後方截瘴瘧寒熱常山一寸草果一枚熱酒一碗浸一夜五更望東服之蓋臥酒醒即愈經驗方又相思子十四枚水研服取吐立瘥千金方治瘧疾寒熱用鼠婦四枚糖裹為丸水下便斷又用鼠婦豆豉各十四枚搗丸芡子大未發前一日湯服二丸將發時再服二丸便止也肘後方又天靈蓋煅研末水服一字取效聖惠方又用端午日採青蒿葉陰乾四兩桂心一兩為末每服二錢先寒用熱酒先熱用冷酒發日五更服之切忌發物經驗方又赤腳馬蘭搗汁入水少許發日早服或入少糖亦可聖濟總録寒熱瘧疾體虛汗多者黃丹百草霜等分為末發日空心米飲服三錢不過二服愈或糊丸或蒜丸皆效又方飛炒黃丹一兩恆山末三兩蜜丸梧子大每服五十丸溫酒下平旦及未發將發時各一服無不效肘後方勞瘧發熱張知閣久病瘧熱時如火年餘骨立醫用茸附諸藥熱益甚召醫官孫琳診之琳投小柴胡湯一帖減熱之九三服脫然琳曰此名勞瘧熱從髓出加以剛劑氣血愈虧安得不瘦蓋熱有在皮膚在臟腑在骨髓非柴胡不可若得銀柴胡只須一服南方者力減故三服乃效也勞瘧變熱一人作勞發瘧服瘧藥變為熱病舌短痰嗽六脈洪數而滑此痰蓄胸中非吐不愈以參蘆湯加竹瀝二眼湧出膠痰三塊次與人參黃耆當歸煎服半月乃安吳綬方勞瘧劣弱烏梅十四枚豆豉二合桃柳枝各一虎口甘草三寸生薑一塊以童子小便二升煎一半溫服即止圖經本草勞瘧積久不止者長牛膝一握生切以水六升煮二升分三服清早一服未發前一服臨發時一服外臺祕要肺瘧寒熱痰聚胸中病至令人心寒寒甚乃熱善驚如有所見恆山二錢甘草半錢秫米三十五粒水煎未發時分作三服千金方痰瘧及食宿毒惡物臚脹欲作霍亂者即以鹽投生熟湯中進一二升令吐盡痰食便愈藏器方溫瘧痰甚但熱不寒用青蒿二兩童子小便浸焙黃丹半兩為末每服二錢白湯調下存仁方脾寒厥瘧先寒後熱名寒瘧但寒不熱面色黑者名厥瘧寒多熱少面黃腹痛名脾瘧三者並宜服此賈耘老用之二十年纍試有效不蛀草烏頭削去皮沸湯泡二七度以盞蓋良久切焙研稀糊丸梧子大每服三十丸姜十片棗三枚蔥三根煎湯清早服以棗壓之如人行十里許再一服絶不飲湯便不發也蘇東坡良方肘後方臨發時以醋和附子塗背上王璆云寒痰宜附子風痰宜烏頭用烏頭寒多者火炮七次熱多者湯泡七次脾寒瘧疾寒多熱少或單寒不熱或大便泄小便多不能食用草果仁熟附子各二錢半生薑七片棗肉二枚水三盞煎一盞溫服醫方大成脾虛寒瘧寒多熱少飲食不思用高良薑麻油炒乾薑各一兩為末每服五錢同豬膽汁調成膏子臨發時熱酒調服以膽汁和丸每服四十丸酒下亦佳吳內翰曾用此治歲瘧大作救人以百計大抵寒發於膽用豬膽引二姜入膽去寒而燥脾胃一寒一熱陰陽相制所以作效也集驗方外臺只用二姜水煎服脾寒諸瘧不拘老少孕婦只兩服便止真橘皮去白切生薑自然汁浸過一指銀器內重湯煮乾焙研末每服三錢用隔年青州棗十個水一盞煎半盞發前服以棗下之適用方虛寒瘧疾黃狗肉煮臛入五味食之又狗頭骨燒灰壯陽止瘧日華方瘧發無時胡椒吳茱萸高良薑各二錢為末以豬脾一條作膾炒熟一半滾藥一半不滾以墨記定並作餛飩煮熟有藥者吞之無藥者嚼下一服效衛生家寶方此可治脾寒瘧治瘧疾發歇往來不定臘豬膏二兩獨角仙一枚獨頭蒜一個樓蔥一握五月五日三家粽尖於五月五日五更時淨處露頭赤腳舌柱上顎回面向北搗一千丸皂子大每以新綿裹一丸係臂上男左女右聖惠方久瘧結癖在腹脅堅痛者芫花炒二兩硃砂五錢為末蜜丸梧子大每服十丸棗湯下直指方外治瘧疾寒熱用桃仁半片放內關穴上將獨蒜搗爛罨之縛住男左女右即止治人屢效簡便方又齊頭蒿根滴滴金根各一把擂生酒一鍾未發前服以渣縛寸口男左女右二日便止海上名方係臂截瘧旱蓮草捶爛男左女右置寸口上以古文錢壓定帛繫住良久起小泡謂之天灸其瘧即止神效資生經綰項截瘧蜘蛛一枚著蘆管中密塞縮項上勿令患人知之楊氏家藏方佩禳瘧疾五月五日收大蝦蟆曬乾紙封絳囊貯之男左女右係臂上勿令知之楊氏家藏方祛邪瘧取燒尸場上帶黑土同蔥搗作丸塞耳或系膊上即止男左女右時珍方卻瘧疾百病立秋日五更井華水長幼各飲一杯時珍方郁心氣鬱結羊心一枚同回回紅花浸水一盞入鹽少許徐徐塗心上炙熟食之令人心安多喜正要方憂鬱不伸胸膈不寬貝母去心薑汁炒研薑汁麵糊丸每服七十丸徵士鎖甲煎湯下集驗方水腫十種水氣浮腫喘滿用大冬瓜一枚切蓋去瓤以赤小豆填滿蓋合簽定以紙筋泥固濟日乾用糯糠兩大羅入瓜在內煨至火盡取出切片同豆焙乾為末水糊丸梧子大每服七十丸煎冬瓜子湯下日三服小便利為度家藏方李絳兵部手集方只一味冬瓜任意煮食云神效無比十種水病腹滿喘促不得臥聖惠方以螻蛄五枚焙乾為末食前白湯服一錢小便利為效楊氏加甘遂末一錢商陸汁一匙取下水為效忌鹽一百日小便祕者用螻蛄下截焙研水服半錢立通乾坤祕韞用端午日取螻蛄陰乾分頭尾焙收治上身用頭末七個治中用腹末七個治下用尾末七個食前酒服諸水腫病張子和云病水之人如長川泛濫非杯勺可取必以神禹決水法治之故名禹功散用黑牽牛頭末四兩茴香一兩炒為末每服一二錢以生薑自然汁調下當轉下氣也儒門事親方通身水腫苦瓠膜炒二兩苦葶藶五分搗合丸小豆大每服五丸日三水下止又用苦瓠五分大棗七枚搗丸一服三丸如人行十里許又服三丸水出更服一丸即止俱千金方又用苦瓠膜炒一兩杏仁泡去皮尖炒半兩為末糊丸每飲下十丸日三水下止聖濟總録又簡便方治腹脹黃腫用亞腰葫蘆連子燒存性每服一個食前溫酒下不飲酒者白湯下十餘日見效水氣浮腫用黃顙魚三尾緑豆一合大蒜三瓣水煮爛去魚食豆以汁調商陸末一錢服其水化為清氣而消詩云一頭黃顙八須魚緑豆同煎一合余白煮作羹成頓服管教水腫盡消除此方神效無比集要方水氣腫脹用赤小豆五合大蒜一顆生薑五錢商陸根一條三件並搗碎同水煮爛去藥空心食豆旋旋啜汁令盡腫立消也蘇頌方韋宙獨行方治水腫從腳起入腹則殺人赤小豆一斗煮極爛取汁五升溫漬足膝若已入腹但食小豆勿雜食亦愈梅師治水腫以東行花桑枝燒灰一升淋汁煮赤小豆一升以代飯良又方用黑大豆桑灰汁煮食又續隨子一兩去殼研壓去油重研分作七服每治一人用一服丈夫生餅子酒下婦人荊芥湯五更服之當下利至曉自止後以厚朴湯補之頻吃益善忌鹽一百日乃不復作斗門方又赤尾鯉魚一斤破開不見水及鹽以生礬五錢研末入腹內大紙包裹外以黃土泥包放灶內煨熟取出去紙泥送粥食頭者上消食身尾者下消一日用盡屢試屢驗醫方摘要水濕腫脹白朮澤瀉各一兩為末或為丸每服三錢茯苓湯下保命集梅師治心下有水亦此方治濕水腫以指畫肉上隨散不成紋者用白商陸香附子炒乾出火毒以酒浸一夜日乾為末每服二錢米飲下或以大蒜同商陸煮汁服亦可其莖葉作蔬食亦治腫疾又用大鯉一尾赤小豆一升水二斗煮食飲汁一頓服盡當下利即瘥亦治妊娠水腫外臺方又老絲瓜去皮一枚剪碎巴豆十四粒同炒豆黃去豆以瓜同陳倉米再炒熟去瓜研米為末糊丸梧子大每服百丸白湯下蓋米收胃氣巴豆逐水絲瓜象人脈絡借其氣以引之也鉤玄方又馬鞭草鼠尾草各十斤水一石煮取五斗去滓再煎令稠蛤粉和丸大豆大每服二三丸加至四五丸神效肘後方又白牽牛黑牽牛各取頭末二錢大麥面四兩和作餅臥時烙熟食之以茶下降氣為驗宣明方又用豪豬肚及屎同燒存性空心溫酒服二錢匕用一具即消孟詵方水腫脈沉屬少陰其脈浮者為氣虛脹者為氣皆非水也麻黃附子湯汗之麻黃三兩水七升煮去沫入甘草二兩附子炮一枚煮取二升半每服八分日三服取汗金匱要略水腫脹滿水不下則滿溢水下則虛竭還脹十無一活宜用桑椹酒治之桑白皮切以水二斗煮汁一斗入桑椹再煮取五升以糯米飯五升釀酒飲普濟方水腫渾身或單腹脹用活青蛙三個每個口內安銅錢一個上著胡黃連末少許以雄豬肚一個茶油洗淨包蛙扎定煮一宿取出去皮腸食肉並豬肚以酒送下忌酸鹹魚面雞鵝羊肉宜食豬鴨壽域神方證治要決只用青蛙一二枚去皮炙食腫自消水癖水腫以黃雌雞一隻如常治淨和赤小豆一升同煮汁飲日二夜一孟詵方肘後方用白雄雞治服法相同水蠱腹大動搖有聲皮膚黑者用赤小豆三升白茅根一握水煮食豆以消為度肘後方又用干青蛙二枚以酥炒干螻蛄七枚苦葫蘆半兩炒上為末每空心溫酒服二錢不過三服聖惠方石水肢瘦其腹獨大者海蛤煅粉防己各七錢半葶藶赤茯苓桑白皮各一兩陳橘皮郁李仁各半兩為末蜜丸如梧子大每米飲下五十丸日二次聖濟總録水腫腹大如鼓或遍身浮腫用棗一斗入鍋內以水浸過用大戟根苗蓋之瓦盆合定煮熟取棗無時食之棗盡決愈水鼓石水腹脹身腫者以肥鼠一枚取肉煮粥空心食之兩三頓即愈心鏡方通身水腫薷術丸治暴水風水氣水通身皆腫服至小便利為效用薷葉一斤水一斗熬極爛去滓再熬成膏加白朮末七兩和丸梧子大每服十丸米飲下日五夜二服外臺祕要又苦葶藶炒四兩為末棗肉和丸梧子大每服十五丸桑白皮湯下日三服又楮枝葉煎汁如餳空腹服一匕日三服聖惠方又葡萄嫩心十四個螻蛄七個去頭尾同研露七日曬乾為末每服半錢淡酒調下暑月尤佳潔古保命集遍身黃腫掘新鮮百條根洗搗罨臍上以糯米飯半升拌水酒半合揉軟蓋在上以帛包住待一二日後口內作酒氣則水從小便中出腫自消也百條根一名野天門冬一名百奶狀如蔥頭其苗葉柔細一根下有百餘個數楊氏經驗方又用明礬二兩青礬一兩白麵半斤同炒令赤以醋煮米粉糊和丸棗湯下三十丸名推車丸濟急方皮水腑腫按之沒指不惡風水氣在皮膚中四肢聶聶動者用防己黃耆桂枝各三兩茯苓六兩甘草二兩每服一兩水一升煎半升服日三服張仲景方風水浮腫一身盡浮用楮白皮豬苓木通各二錢桑白皮三錢陳橘皮一錢生薑三片水二鍾煎服日一劑聖濟總録又用大田螺大蒜車前子等分搗膏攤貼臍上水從便旋而下仇遠稗史水氣腫滿汞粉一錢烏雞子去黃盛粉蒸餅包蒸熟取出苦葶藶炒一錢同蒸餅杵丸緑豆大每車前湯下三五丸日三服神效身腫攻心脹滿不食用生豬脊肉以漿水洗壓干切膾蒜薤啖之一日三次下氣去風張文仲方浮腫脹滿不下食豬肝一具洗切著蔥豉薑椒炙食之或單煮羹亦可心鏡又方用生豬肝一具細切醋洗入蒜醋食之勿用鹽亦治腫自足起鼓脹煩渴身乾黑瘦馬鞭草細銼曝乾勿見火以酒或水同煮至味出去滓溫服以六月中旬雷鳴時採者有效易簡方脾濕腫滿腹脹如鼓喘不得臥用海金砂三錢白朮四兩甘草半兩黑牽牛頭末一兩半為末每服一錢煎倒流水調下得利為妙蘭室祕藏方水氣浮腫氣促坐臥不得用牽牛子二兩微炒搗末以烏牛尿浸一宿平旦入蔥白一握煎十餘沸空心分二服水從小便出聖惠方腫滿氣急不得臥郁李仁一大合搗末和麵作餅吃入口即大便通泄氣便愈水腫久不瘥垂死者豬獾作羹食之下水大效聖惠方用粳米蔥豉和豬獾作粥食有婦病腹大如鼓四肢骨立不能貼席惟衣被懸臥穀食不下者數日矣忽思鶉食如法進之遂運劇少頃雨汗莫能言但有更衣狀扶而圊小便突出白液凝如鵝脂如此數次下盡遂起此蓋中焦濕熱積久所致也集驗方水腫尿澀茯苓皮椒目等分煎湯日飲取效普濟方又馬蘭葉一虎口黑豆小麥各一撮酒水各一鍾煎一鍾食前溫服以利小水四五日愈簡便方鴨頭丸治陽水暴腫面赤煩躁喘急小便澀其效如神用甜葶藶炒二兩熬膏漢防己末二兩以緑頭鴨血同頭全搗三千杵丸梧子大每木通湯下十丸輕者五丸日三四服一加豬苓一兩外臺祕要水氣喘促小便澀用沙牛尿一斗訶梨皮末半斤先以銅器熬尿至三升入末熬至可丸丸梧子大每服茶下三十丸日三服當下水及惡物為效普濟方腫滿小便不利者以商陸赤根搗爛入麝香三分貼於臍心以帛束之得小便利即腫消水腫尿少針砂醋煮炒乾豬苓生地龍各三錢為末蔥涎研和敷臍中約一寸厚縛之待小便多為度日二易之入甘遂更妙亦治泄瀉無度諸藥不效不用甘遂德生堂方水腫發熱小便不通者海蛤木通豬苓澤瀉滑石黃葵子桑白皮各一錢燈心三分水煎服日二聖惠方遍身腫滿陰亦腫者用縮砂土狗一個等分研和老酒服之直指方水病囊腫牡蠣煅粉二兩乾薑炮一兩研末冷水調糊掃上須臾囊熱如火干則再上小便利即愈一方用蔥汁白麵同調小兒不用幹姜經驗方水病腫滿不問年月淺深大戟當歸橘皮各一兩切以水二升煮取七合頓服利下水二三升勿怪至重者不過再服便瘥禁毒食一年永不復作兵部手集此方虛人禁用膀胱石水四肢瘦削小腹脹滿構根白皮桑根白皮各二升白朮四兩黑大豆五升流水一斗煮四升入清酒二升再煮至三升日二夜一服之集驗方水腫服藥未全消者以甘遂末塗腹繞臍令滿內服甘草水其腫便去保命集腫疾喘滿大人小兒男女腫因積得既取積而腫再作小便不利若再用利藥性寒而小便愈不通矣醫者到此多束手蓋中焦下焦氣不升降為寒痞隔故水凝而不通惟服沉附湯則小便自通喘滿自愈用生附子一個去皮臍切片生薑十片入沉香一錢磨水同煎食前冷飲附子雖三五十枚亦無害小兒每服三錢水煎服經驗方氣虛水腫以大蒜十個搗如泥入蛤粉丸梧子大每食前白湯下二十丸服盡小便下數桶而愈普濟方酒腫虛腫香附去皮米醋煮乾焙研為末米醋糊丸服久之敗水從小便出神效經驗方里水黃腫張仲景云一身面目黃腫其脈沉小便不利甘草麻黃湯主之麻黃四兩水五升煮去沫入甘草二兩煮取三升每服一升重覆汗出不汗出再服慎風寒千金云有患氣急久不瘥變成水病從腰以上腫者宜此發其汗身面洪腫甘遂二錢生研為末以獖豬腎一枚分為七臠入末在內濕紙包煨令熟食之日一服至四五服當覺腹鳴小便利是其效也肘後方陽水浮腫敗荷葉燒存性研末每服二錢米飲調下日三服腹大如鼓體寒者以鸕鷀燒存性為末米飲服之立愈李時珍方小腹堅大如盤胸滿食不能消化用曲末湯服方寸匕日三千金方人卒腫滿身面洪大取杏葉煮濃汁熱漬亦少服之肘後方卒病水腫用鯽魚三尾去腸留鱗以商陸赤小豆等分填滿扎定水三升煮糜去魚及商陸食豆飲汁二日一作不過三次小便利愈肘後方又烏蠡魚同赤小豆煮食亦利水消腫時珍方身體卒腫醋和蚯蚓屎敷之千金方手足腫浮桐葉煮汁漬之並飲少許或加小豆尤妙聖惠方水腫自足起削楠木桐木煮汁漬足並飲少許日日為之肘後方㗜鼻消水面浮甚者用土狗一個輕粉二分半為末每㗜少許入鼻內黃水出盡為妙家藏方腫脹忌鹽只以秋石拌飲食待腫脹消以鹽入罐煅過少少用之摘玄方脹滿下一切氣用大鱧一頭開肚入胡椒末半兩大蒜片二顆縫合同小豆一升煮熟下蘿蔔三五顆蔥一握俱切碎煮熟空腹食之至飽並飲汁至夜泄惡氣無限也五日更一作孟詵方氣脹氣蠱萊蔔子研以水濾汁浸宿砂一兩一夜炒乾又浸又炒凡七次為末每米飲服一錢如神集驗方心腹脹滿短氣用草豆蔻一兩去皮為末以木瓜生薑湯調服半錢千金方老幼腹脹血氣凝滯用商州枳殼厚而緑背者去穰四兩分作四份一兩用蒼朮一兩同炒一兩用蘿蔔子一兩同炒一兩用乾漆一兩同炒一兩用茴香一兩同炒黃去四味只取枳殼為末以四味煎汁煮麵糊和丸梧子大每食後米飲下五十丸名四妙丸最寬腸下氣不拘男婦老小但有氣積並皆治之乃仙傳方也簡易方心脹腹痛未得吐下楠木削三四兩水三升煮三沸飲之肘後方心腹脹痛氣短欲絶桂二兩水一升二合煮八合頓服之肘後方有火及血熱曾病唾衄人不宜服心腹脹堅痛悶欲死鹽五合水一升煎服吐下即定不吐更服梅師方胸脅通滿羚羊角燒末水服方寸匕子母祕録胸滿不痛桔梗枳殼等分水二鍾煎一鍾溫服活人書胃寒氣滿不能傳化易飢不能食人參末二錢生附子末半錢生薑二錢水七合煎二合雞子清一枚打轉空心服之聖濟總録天行病後脹滿兩脅刺脹臍下如水腫以楮樹枝汁隨意服之小便利即消外臺祕要少腹脹車轂中脂和輪下土如彈丸吞之立愈千金方壯脾進食療痞滿暑泄用神麯炒蒼朮泔制炒等分為末糊丸梧子大每米飲下五十丸冷者加乾薑吳茱萸百一選方治鼓脹日食不能暮食由脾虛不能制水水反勝土水穀不運氣不宣流故令中滿其脈沉實而滑宜雞矢醴主之何大英云諸腹脹大皆屬於熱精氣不得滲入膀胱別走於腑溢於皮裡膜外故成脹滿小便短澀雞矢性寒利小便誠萬金不傳之寶也用臘月乾雞矢白半斤袋盛以酒醅一斗漬七日溫服三杯日三或為末服二錢亦可普濟方又積善堂經驗方與此相同名牽牛酒因治人得效牽牛而謝故也愈後用白粥調理忌食鹽又方用雞矢炒研沸湯淋汁調木香檳榔末二錢服醫學正傳中滿鼓脹用三五年陳葫蘆瓢一個以糯米一斗作酒待熟以瓢於炭火上炙熱入酒浸之如此三五次將瓢燒存性研末每服三錢酒下神效選奇方中滿黃腫仙傳伐木丸方治脾胃衰弱肝木氣盛木來剋土病心腹中滿或黃腫如土色服此能助土益元用蒼朮二斤米泔水浸二宿同黃酒面曲四兩炒赤色皂礬一斤醋拌曬乾入瓶火煅為末醋糊丸梧子大每服三四十丸好酒米湯任下日二三服有人嘗以此方加平胃散治一賤役中滿腹脹果驗脹滿腹大四肢枯瘦尿澀用葶藶炒薺菜根等分為末煉蜜丸彈子大每服一丸陳皮湯下只二三丸小便清十餘丸腹如故三因方關格脹滿大小便不通獨頭蒜燒熟去皮綿裹納下部氣自通也外臺祕要陰冷疼悶冷氣入腹腫滿殺人醋和熱灰頓尉之千金方痞痞塊有積阿魏五錢五靈脂炒煙盡五錢為末以黃雄狗膽汁和丸黍米大空心唾津送下三十丸忌羊肉醋面亦治五噎膈氣扶壽精方脾積痞塊豬脾七個每個用新針刺爛以皮硝一錢擦之七個並同以瓷器盛七日鐵器焙乾又用水紅花子七錢同搗為末以無灰酒空心調下一年以下者一服可愈五年以下者二服十年以下者三服保壽堂方腹中痞積威靈仙楮桃兒各一兩為末每溫酒服三錢名化鐵丸普濟方又牛肉四兩切片以風化石灰一錢擦上蒸熟食常食痞自下經驗祕方又牛脾及朴硝作脯食痞自消千金醫通又觀音柳煎湯露一夜五更空心飲數次痞亦消易簡方夏秋之交露坐夜久腹中痞塊如群石用大豆半升生薑八分水三升煎一升頓服瘥經驗方痞氣胸滿口乾肌瘦食減或時壯熱石三稜京三稜雞瓜三稜並炮蓬莪荗各三枚檳榔一枚青橘皮五十片醋浸去白陳倉米一合醋浸淘過巴豆五十個去皮同青皮倉米炒乾去豆為末糊丸緑豆大每米飲下三丸日一服聖濟總録心下痞堅嘔噦生薑八兩水三升煮一升半夏五合洗水五升煮一升取汁同煮一升半分再服千金方男婦氣塊痛不拘久遠威靈仙五兩生韭根二錢半烏藥五分好酒一盞雞子一個灰火煨一宿五更視雞殼軟為度去滓溫服以乾物壓之側臥向塊邊滓再煎次日服覺塊刺痛是其驗也摘玄方膜外氣痛及氣塊延胡索不限多少為末豬胰一具切作塊子炙熟蘸末頻食之勝金方宿食不消心下痞滿者須用黃連枳實東垣方食物過飽不消遂成痞膈馬牙硝一兩吳茱萸半斤煎汁投硝乘熱服之良久未轉更進一服立效經驗方腹中痞塊皮硝一兩獨蒜一個大黃末八分搗作餅貼於患處以消為度經驗方又蓍葉獨蒜穿山甲末食鹽同以好醋搗成餅量痞大小貼之兩柱香為度其痞化為膿血從大便出保壽堂方又水紅花或子一碗以水三碗用桑柴文武火煎成膏量痞大小攤貼仍以酒調膏服忌葷腥油膩之物保壽堂方癖痞腹脹及堅如杯碗者用水紅花子一升另研獨頭蒜三十個去皮新狗腦一個皮硝四兩石臼搗爛攤在患處上用油紙以長帛束之酉時貼之次日辰時取未效再貼二三次倘有膿潰勿怪仍看虛實日逐間服錢氏白餅子紫霜丸塌氣丸消積丸利之磨之服至半月甚者一月無不瘥矣以喘滿者為實不喘滿者為虛藺氏經驗方腹脅痞塊雄黃一兩白礬一兩為末麵糊調膏攤貼即見功效未效再貼待大便數百斤之狀乃愈集玄方積聚太倉丸治脾胃飢飽不時生病及諸般積聚百物所傷陳倉米四兩以巴豆二十一粒去皮同炒至米香豆黑勿令米焦擇去豆不用入去白橘皮四兩為末糊丸梧子大每薑湯服五丸日二服百一選方心腹積聚五月五日午時急砍一竹竹節中必有神水瀝和獺肝為丸治心腹積聚病甚效也時珍方諸積鼓脹食積氣積血積之類石菖蒲八兩銼斑蝥四兩去翅足同炒黃去斑蝥不用以布袋盛泄去蝥末為末醋糊丸梧子大每服三五十丸溫白湯下治腫脹尤妙或入香附末二錢奇效方一切積氣宿食不消黑牽牛頭末四兩用蘿蔔剜空安末蓋定紙封蒸熟取出入白豆蔻末一錢搗丸梧子大每服一二十丸白湯下名順氣丸普濟方脾積痰氣冷塊每食後輒胸滿不下用橘皮去穰一斤甘草鹽花各四兩水五碗慢火煮乾焙研為末白湯點服名二賢散治一切痰氣特驗惟氣實人服之相宜氣不足者不宜久用之也丹溪方積聚痰涎結於胸膈之間心腹疼痛日夜不止或乾嘔噦食者炒粉丸主之用蚌粉一兩巴豆七粒同炒赤去豆不用醋和粉丸梧子大每服二十丸姜酒下丈夫臍腹痛尚香湯下女人血氣痛童便和酒下孫氏仁存方消積破氣石鹼三錢山楂三兩阿魏五錢半夏皂莢末制過一兩為末以阿魏化醋煮糊丸服摘玄方氣積成塊用牛腦子一個去筋雄雞肫一個連黃並以好酒浸一宿搗爛入木香沉香砂仁各三兩皮硝一碗杵千下入生銅鍋內文武火焙乾為末每服二錢空心酒下日三服聖濟總録腹脅積塊風化石灰半斤瓦器炒極熱入大黃末一兩炒紅取起入桂末半兩略燒入米醋和成膏攤絹上貼之內服消塊藥甚效丹溪心法血積成塊用壁虎一枚白麵和一鴨子大包裹研爛作餅烙熟食之當下血塊不過三五次即愈甚驗青囊方積聚敗血通仙散治男子敗精女人敗血不動真氣用蕎麥麵三錢大黃二錢半為末臥時酒調服之多能鄙事追蟲取積兼治氣築奔沖不可忍用黑牽牛半兩炒檳榔二錢半為末每服一錢紫蘇湯下用酒下亦消水腫普濟方腹中食積緑礬二兩研米醋一碗瓷器煎柳條攪成膏入赤腳烏一兩研丸緑豆大每空心溫酒下五丸聖惠方傷米食積白麵一兩白酒藥二丸炒為末每服二匙白湯調下如傷肉食山楂湯下簡便方諸果成積傷脾作脹氣急用麝香一錢生桂末一兩飯和丸緑豆大大人十五丸小兒七丸白湯下蓋果得麝香則落木得桂即枯故也濟生方伏梁結氣在心下不散桃奴二兩為末空心溫酒每服二錢聖惠方奔豚氣痛上充心腹鱉甲醋炙三兩京三稜煨二兩各為末桃仁去皮尖四兩湯浸研汁三升煎二升入末煎良久下醋一升煎如餳以瓶收之每空心酒服半匙聖濟録一方薤白搗汁飲之肘後方消導酒積雞膍胵乾葛為末等分麵糊丸梧子大每服五十丸酒下袖珍方消化肉積凡腹中堅肉積諸藥不化者以礬紅同健脾消食藥為丸投之輒消然能作瀉胃弱人不宜多用服此者終身忌蕎麥積聚癥瘕去三尸益氣延年卻老雄黃二兩為末水飛九度入新竹筒內以蒸餅一塊塞口蒸七度用好粉脂一兩和丸緑豆大每服七丸酒送下日三服千金方
