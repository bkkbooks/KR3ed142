清旦溫服至晚令盡當下諸寒癖訖以白粥食之久疝不過三服肘後方寒疝腹痛攣急難忍汗出厥逆大附子炒去皮臍一枚山梔子炒焦四兩每用三錢水一盞酒半盞煎七分入鹽一捻溫服宣明方一方加蒺藜子等分虛者加桂枝等分姜糊為丸酒服五十丸寒疝心痛四肢逆冷全不飲食桂心研末一錢熱酒調下取效聖惠方陰冷入腹有人陰冷漸漸冷氣入腹陰囊腫滿日夜疼悶欲死以布裹椒包囊下熱氣大通日再易之以消為度千金方寒疝腹痛繞臍手足厥冷白汗出脈弦而緊用大烏頭煎主之大烏頭五枚去臍水三升煮取一升去滓納蜜二升煎令水氣盡強人服七合弱人服五合不瘥明日更服金匱玉函方寒疝滑泄腹痛腸鳴自汗厥逆熟附子去皮臍玄胡索炒各一兩生木香半兩每服四錢水二盞姜七片煎七分溫服濟生方冷氣內外腎釣痛鹽研吳茱萸葉罨之神驗干即易大明方陰下冷痛入腹則腫滿殺人莧根搗爛敷之時珍方狐疝陰㿗超越舉重卒得此及小兒狐疝傷損生㿗並用地膚子五錢白朮二錢半桂心五分為末或飲或酒服三錢忌生蔥桃李必效方腎臟氣發攻心面黑欲死及諸氣奔豚喘急鉛二兩石亭脂二兩木香一兩麝香一錢先化鉛炒乾入亭脂急炒焰起以醋噴之傾入地坑內覆住待冷取研粟飯丸芡子大每用二丸熱酒化服取汗或下或通氣即愈如大便不通再用一丸入玄明粉五分服聖濟録脫肛大腸脫肛蝸牛殼去土研末羊脂熔化調塗送入即愈李延壽方桑上蝸牛燒灰和脂塗尤妙範汪方又蜣螂燒存性為末入冰片研勻摻肛上托之即入醫學集成又狗涎抹之自上也扶壽精方又不蛀皂角五挺捶碎水挼取汁二升浸之自收上收後以湯蕩其腰肚上下令皂角氣行則不再作仍以皂角去皮酥炙為末棗肉和丸米飲下三十丸聖惠方又苦參五倍子陳壁土等分煎湯洗之以木賊末敷之醫方摘要又方木賊燒存性為末摻之按入即上一加龍骨末三因方又炙麻鞋底頻按入仍以故麻鞋底鱉頭各一枚燒研敷之按入即不出也千金方又蟾蜍皮一片瓶內燒煙薰之並敷效孫真人方脫肛氣熱孩兒茶二分熊膽五分片腦一分為末人乳搽肛上熱汗自下而肛收也亦治痔瘡董炳方大腸脫肛下三五寸者用大田螺二三枚將井水養三四日去泥用雞爪黃連研細末入厴內待化成水以濃茶洗淨肛門將雞翎蘸掃之以軟帛托上自然不再發也經驗方脫肛不收用五倍子末三錢入白礬一塊水一碗煎湯洗之立效三因方又方用五倍子半升水煮極爛盛坐桶上薰之待溫以手輕托上內服參耆升麻藥簡便方又貼水荷葉焙研酒服二錢仍以荷葉盛末坐之經驗良方大腸脫肛久積虛冷以鱉頭炙研米飲服方寸匕日二服仍以末塗腸頭上千金方脫肛歷年不入者生鐵二斤水一斤煮汁五升洗之日再集驗方久痢脫肛白龍骨粉撲之姚和衆方一用虎骨燒末水服方寸匕日三外臺又赤石脂伏龍肝為末敷之一方加白礬錢氏小兒方泄痢脫肛已久者黑聖散主之大蜘蛛一個瓠葉兩重包扎定燒存性入黃丹少許為末先以白礬蔥椒煎湯洗拭乾以前藥末置軟帛上托入甚有效也乘閒方下血脫肛白雞冠花防風等分為末糊丸梧子大空心米飲每服七十丸一方白雞冠花炒棕櫚灰羌活一兩為末每服二錢米飲下永類鈐方痔漏脫肛胡荽子一升粟糠一升乳香少許以小口瓶燒煙薰之儒門事親又酢漿草煎湯洗甚效亦搗塗湯火傷時珍方穀道癢痛肛門腫痛馬齒莧葉三葉酸草等分煎湯薰洗一日二次有效時珍方又菟絲子熬黃黑為末雞子白和塗之亦治痔如蟲咬肘後肛門腫痛欲作痔瘡急取屠刀磨水服甚效集簡方風入臟中發腫不問新久以大豆一斗水五斗煮取一斗二升去滓入美酒半鬥煎取九升旦服取汗神驗千金穀道䘌痛腫癢杏仁杵膏頻敷之肘後方下部䘌蟲痛癢膿血旁生孔竅蜣螂七枚五月五日收者新牛糞半兩肥羊肉一兩炒黃同搗成膏丸蓮子大炙熱綿裹納肛中半日即大便中蟲出三四度永瘥集驗方蟲蝕腎府肛盡腸穿用青蛙一枚雞骨一分燒灰吹入數用大效外臺祕要穀道生瘡久不愈用雞膍胵燒存性為末干貼之如神聖濟總録痔大腸痔疾蟾蜍一個以磚砌四方安於內泥住火煅存性為末以豬廣腸一截扎定兩頭煮熟切碎蘸蟾末食之如此三四次其痔自落也痔瘡有核白鵝膽二三枚取汁入熊膽二分片腦半分研勻甕器密封勿令泄氣用則手指塗之立效保壽堂方又鴨膽塗痔核良時珍方又用馬蘭根搗敷片時看肉平即去之稍遲恐肉反出也醫學集成內痔不出草烏為末津調點肛門內痔即反出乃用枯痔藥點之集驗方肛門酒痔絲瓜燒存性研末酒服二錢嚴月軒方雞冠痔疾黃連末敷之加赤小豆末尤良斗門方反花痔瘡木瓜為末以蟺魚身上涎調貼之以紙護住醫林集要五痔肛腫久不愈變成瘻瘡用雞冠花鳳眼草各一兩水二碗煎湯頻洗衛生寶鑑年久痔漏田龜二三個煮取肉入茴香蔥醬常常食纍驗此疾大忌糟醋等熱物便民食療十年痔瘡熊膽塗之神效一切方不及也外臺方久近痔病三十年者三服除根用蓮花蕊黑牽牛頭末各一兩半當歸五錢為末每空心酒服二錢忌熱物五日見效孫氏集效方患痔諸藥不效用木耳煮食之而愈又槐耳為末每飲服方寸匕日三亦良痔大作狀如胡瓜熱氣如火僵仆不能行先以槐枝濃煎湯洗便以艾灸至四五壯忽覺熱氣一道入腸中因大轉先瀉血後去垢穢其痛甚楚瀉後失痔所在劉禹錫方腸痔氣痔出膿用川山甲燒存性研末一兩肉豆蔻三枚為末每米飲服二錢甚者加蝟皮灰一兩中病即止寇氏衍義風痔腫痛發歇不定者是也白殭蠶二兩洗銼炒黃為末烏梅肉和丸桐子大每姜蜜湯空心下五丸妙勝金方五痔作痛胡荽子炒為末每服二錢空心溫酒下數服見效海上仙方外痔腫痛白頭翁草一名野丈人以根搗塗之逐血止痛易簡方痔瘡腫痛鉛白霜白片腦半字酒調塗之隨手見效嬰童百問又蚺蛇膽研香油調塗立效醫方摘要又鬱金末水調搽之即消醫方摘要又隔年風乾橙子桶內燒煙薰之神效醫方摘要又鴨跖草挼軟納患處即效危亦林世醫得效方又用田螺一個入片腦一分在內取水搽之仍先以冬瓜湯洗淨乾坤生意一用田螺二枚用針刺破入白礬末同埋一夜取螺內水掃瘡上又善能止痛也甚妙孫氏方一用馬齒莧湯洗淨搗活螺螄敷上其病即愈袖珍方又蠶繭內入男子指甲令滿外用童子頂發纏裹燒存性蜜調敷之仍日日吞牛膽制過槐子甚效積善堂方又用赤足蜈蚣焙為末入片腦少許唾調敷之直指方一用蜈蚣三四條香油煮一二沸浸之再入五倍子末二三錢瓶收密封如遇痛不可忍點上油即時痛止大效集效方又用枳殼煨熟尉之七枚立定必效方又方用枳殼末入瓶中水煎百沸先熏後洗本事方又用盆盛沸湯以器蓋之留一孔用洗淨韭菜一把泡湯中乘熱坐孔上先熏後洗數日自然脫體也袖珍方又先以皂角煙燻之後以鵝膽汁調白芷末塗之即消醫方摘要又水化雞膽搽亦效時珍方又魚腥草一握煎湯熏洗仍以草挹痔即愈一方洗後以枯礬入片腦少許敷之救急方又用蝸牛浸油塗之或燒研敷之丹溪方一用蝸牛一枚入麝香少許在內碗盛次日取水塗之濟生方又用金絲荷葉陰乾燒煙桶中熏之時珍方又冬瓜煎湯洗之袖珍方又用大蛄蝓一個研如泥入龍腦一字胭脂坯子半錢同敷之先以石薜煮水熏洗尤妙大全良方又孩兒茶麝香為末唾津調敷集效方又芥葉搗餅頻坐之經效方痔瘡風腫作痛胡麻子煎湯洗之即消痔瘡疼腫不可忍者胡黃連末鵝膽汁調搽之集效方內痔腫痛朝陽黃土黃連末皮硝各一兩用豬膽汁同研如泥每日旋丸棗大納入肛內過一夜隨大便去之內服烏梅黃連二味丸藥集效方下部痔漏大露蜂房燒存性研末摻之干則以真菜子油調唐氏經驗方肛門痔漏腫痛用木鱉仁帶潤者雌雄各五個研細作七丸碗覆濕處勿令乾每以一丸唾化開貼痔上其痛即止一夜一丸自消也江夏鐵佛寺蔡和尚病此痛不可忍有人傳此而愈用治數人皆有效集簡方痔漏瘡發旱蓮草一把連根鬚洗淨用石臼擂如泥以極熱酒一杯衝入取汁飲之滓敷患處重者不過三服即安纍治有驗保壽堂方又椒目一撮研細空心水服三錢如神海上方又鯉魚鱗二三片綿裹如棗形納入坐之其痛即止儒門事親又蔥涎白蜜和塗之先以木鱉子煎湯熏洗其冷如冰即效一人苦此早間用之午刻即安也唐仲舉方又無名異炭火煅紅米醋淬七次為細末以溫水洗瘡綿裹箸頭蘸末填入瘡口數次愈簡便方痔瘻及牙齒疳䘌蟲牙啄木鳥燒存性研末納孔中不過三次嘉祐諸痔發癢用全蠍不拘多少燒煙燻之即效袖珍方痔漏有蟲黑白牽牛各一兩炒為末以豬肉四兩切碎炒熟蘸末食盡以白米飯三匙壓之取下白蟲為效儒門事親又用狗肉煮汁空腹服能引蟲也永類鈐方又蝟皮燒末生油調塗肘後方治蟲蝕痔癢蜣螂搗丸塞下部引蟲出盡永瘥別録又烏鱧腸以五味炙香貼痔漏及蛀骭瘡引蟲盡為度日華一用腸切斷炙熟帛裹坐之引蟲出時珍方又水銀棗膏各二兩同研綿裹納下部明日蟲出梅師方又桃根水煎汁浸洗之當有蟲出痔瘡有蟲作癢或下膿血多取槐白皮濃煎湯先熏後洗良久欲大便當有蟲出不過三度即愈仍以皮為末綿裹納下部中梅師方蟲痔裡急檳榔為末每日空心以白湯調服二錢痔病祕結用此寬腸黃連枳殼等分為末糊丸梧子大每服五十丸空心米飲下醫方大成五痔下血五月五日採蒼耳莖葉為末水服方寸匕神效千金翼又桑耳作羹空心飽食三日一作待孔如鳥啄狀取大小豆各一升合搗作兩袋蒸之及熟更互坐之即瘥聖惠方又用蝟皮合穿山甲等分燒存性入肉豆蔻一半空腹熱米飲服一錢衍義方又雀林草即酢漿草一大握水二升煮一升服日三次見效外臺祕要又羊蹄禿菜連根爛蒸一碗食甚效時珍方又橡子粉糯米粉各一升炒黃水調作糰子飯上蒸熟食之不過四五次效李樓奇方又鱧魚作膾以蒜齏食之忌冷毒物外臺又蒲黃末水服方寸匕日三服肘後方下血成痔稻藁燒灰淋汁熱浸三五度瘥崔氏纂要腸痔下血多年不止用木賊枳殼各二兩乾薑一兩大黃二錢半並於銚內炒黑存性為末每粟米飲服二錢甚效也圖經本草痔漏下血蠶紙半張碗內燒灰酒服自除備急方痔漏反花瀉血者用狐手足一副陰乾川山甲蝟皮各三兩黃明膠白附子五靈脂蜀烏頭川芎乳香各二兩銼細入砂鍋內固濟候乾炭火煅紅為末入木香末一兩以芫荽煎酒調下二錢日三服屢效永類鈐方腸風痔漏用萆薢貫衆去土等分為末每服二錢溫酒空心服之孫尚藥方又熊膽半兩入片腦少許研和豬膽汁塗之壽域方酒痔下血黃連酒浸煮熟為末酒糊丸梧子大每服三四十丸白湯下又青蒿用葉不用莖用莖不用葉為末糞前冷水糞後水酒調服永類鈐方痔漏出水用蜣螂一枚陰乾入冰片少許為細末紙捻蘸末入孔內漸漸生肉藥自退出愈唐氏方一用蜣螂焙乾研末先以礬湯洗過貼之袖珍方又用牛膽蝟膽各一枚膩粉五十文麝香二十文以三味和勻入牛膽中懸四十九日取出為丸如大麥大以紙捻送入瘡內有惡物流出為驗也經驗方螻蛄漏疾槲葉燒存性研以米泔別浸槲葉取汁洗瘡後乃納灰少許於瘡中聖惠方
