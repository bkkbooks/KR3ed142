body:
  text: 卷九淋男婦諸般淋疾用苦杖根洗淨銼一合以水五合煎一盞去滓入乳香麝香少許服之鄞縣尉耿夢得內人患沙石淋已十三年每漩痛楚不可忍溺器中小便下沙石剝剝有聲百方不效偶得此方服之一夕而愈乃豫目擊者本事方五種淋疾苧麻根兩莖打碎以水一碗半煎半碗頓服即通大妙斗門方又用石決明去粗皮研為末飛過熱水服二錢每日二服如淋中有軟硬物即加朽木末五分勝金方又燈心生煮服之敗席煮服更良開寶方一男子病血淋脹痛祈死以藕汁和發灰每服二錢三日而血止痛除諸淋症虞摶兄年七十秋間患淋二十餘日百方不效後得一方取地膚草搗自然汁服之遂通至賤之物有回生之功如此醫學正傳諸淋赤痛三葉酸漿草洗研取自然汁一合酒一合和勻空心溫服立通靈苑方小便淋痛或尿血或沙石脹痛用川牛膝一兩水二盞煎一盞溫服一婦人患此十年服之得效杜牛膝亦可或入麝香乳香尤良直指方小便卒淋紫草一兩為散每食前用井華水服二錢亦治産後淋瀝千金翼方治淋及小便卒不通龍鬚席彌敗有垢者方尺煮汁服之藏器方小便淋痛石韋滑石等分為末每飲服刀圭最快聖惠方又葵花根洗銼水煎五七沸服之如神寶鑑方又多年木梳燒存性空心冷水服男用女女用男救急方小便淋瀝痛不可忍雞肫內黃皮五錢陰乾燒存性作一服白湯下立愈醫林集要小便淋瀝菟絲子煮汁服範汪方久淋不愈一婦人患淋久臥諸藥不效用剪金花十餘葉煎湯服之明早病減八分再服而愈王不留行是也資生經又琥珀為末二錢麝香少許白湯服之或萱草煎湯服老人虛人以人參湯下亦可蜜丸以赤茯苓湯下普濟方又生續斷搗絞汁服即馬薊根也古今録驗小便淋閟服血藥不效者用牡蠣粉黃柏炒等分為末每服一錢小茴香湯下取效醫學集成小便淋濁及不禁由心腎氣虛神不守或夢遺白濁赤白茯苓等分為末新汲水飛去沫控干以地黃汁同移酒熬膏搗和丸彈子大空心鹽湯嚼下一丸三因方小便熱淋白茅根四升水一斗五升煮取五升適冷暖飲之日三服肘後方熱淋脹痛麻皮一兩炙甘草三分水二盞煎一盞服日二取效聖惠方熱淋澀痛扁竹煎湯頻飲生生編又乾柿燈心等分水煎日飲朱氏方熱淋如血蠶種燒灰入麝香少許水服二錢家寶方下焦結熱小便淋閟或有血出或大小便出血瞿麥穗一兩甘草炙七錢五分山梔子仁炒半兩為末每服七錢連須蔥根七個燈心五十根生薑五片水二碗煎至七分時時溫服名立效散千金方熱淋下血取大麻根三九枚洗淨水五升煮三升分服血止神驗亦止帶下崩中藥性賦熱淋血淋不拘男女用赤小豆三合慢炒為末煨蔥一莖擂酒熱調服一錢修真祕旨小便血淋作痛車前子曬乾為末每服二錢車前葉煎湯下普濟方血淋痛澀但利水道則清濁自分海金沙末新汲水或沙糖水服一錢普濟方一方海金沙草陰乾為末煎生甘草調服二錢一加滑石飛過末夷堅志男婦血淋亦治五淋多年煮酒瓶頭箬葉三五年至十年者尤佳每用七個燒存性入麝少許陳米飲下日三服有人患此二服愈福建煮過夏月酒多有之百一選方血淋苦痛亂髮燒存性二錢入麝香少許米飲服聖惠方血淋澀痛生山梔子末滑石等分蔥湯下經驗方又薜荔藤葉一握甘草炙一分日煎服之時珍方又茄葉薰干為末每服二錢溫酒或鹽湯下隔年者尤佳經驗良方尿血沙淋痛不可忍黃耆人參等分為末以大蘿蔔一個切一指厚四五片蜜二兩淹炙令盡不令焦蘸末食無時以鹽湯下永類鈐方小便熱淋馬薊根搗汁服聖惠方血淋熱痛黃芩一兩水煎熱服千金方小便血淋痛不可忍香附子陳皮赤茯苓等分水煎服十便良方小便血淋血風草即地錦草井水擂服三度即愈經驗方又葵花根二錢車前子一錢水煮日服之簡便方又生地黃汁車前葉汁各三合和煎服聖惠方又海螵蛸末一錢生地黃汁調服又方海螵蛸生地黃赤茯苓等分為末每服一錢柏葉車前湯下經驗方又蜣螂研水服鮑氏方男婦血淋用真百藥煎車前子炒黃連各三錢半木香二錢滑石一錢為末空心燈草湯服二錢日二服普濟方腎與膀胱虛冷血淋色瘀者椒樹根煎湯細飲色鮮者勿服證治要訣治久淋取葛上亭長折斷腹中有白子如小米三二分安白板上陰乾二三日收之若有人患十年淋服三枚八九年以還服二枚服時以水如棗許著小杯中爪甲研之當扁扁見於水中仰面吞之勿令近牙齒間藥雖微小下喉自覺至下焦淋所有傾藥作大煩急不可堪者飲干麥飯汁則藥勢止也若無干麥飯但水亦可耳老小服三分之一當下淋疾如膿血連連而去者或如指頭或青或黃不拘男女皆愈若藥不快淋不下以意節度更增服之此方有毒不宜輕用血淋不止棕櫚皮半燒半炒為末每服二錢甚效家寶方小便氣淋結澀不通白芷醋浸焙乾二兩為末煎木通甘草酒調下一錢連進二服普濟方又用好綿四兩燒灰麝香半分每服二錢溫蔥酒連進三服聖惠方沙石諸淋石首魚頭石十四個當歸等分為末水二升煮一升頓服立愈外臺祕要沙石淋痛用九肋鱉甲醋炙研末酒服方寸匕日三服石出瘥肘後方又黃蜀葵花一兩炒為末每米飲服一錢名獨聖散普濟方又馬藺花七枚燒故筆頭七枚燒粟米一合炒為末每服三錢酒下日二服名通神散沙石熱淋痛不可忍用薏苡仁子葉根皆可水煎熱飲夏月冷飲以通為度經驗方小便沙淋瓦松即屋上無根草煎濃湯乘熱薰洗小腹約兩時即通經驗良方石淋作痛車前子二升以絹袋盛水八升煮取三升服之須臾石下肘後方石淋痛楚小便中有石子者胡桃肉一升細米煮漿粥一升相和頓服即瘥海上方又五月五日收葵子炒研食前溫酒下一錢當下石出聖惠小便石淋宜破血瞿麥子搗為末酒服方寸匕日三服三日當下石外臺祕要治石淋消結熱可取雄鵲肉燒作灰淋汁飲之以石投中解散者是雄也別録石淋導水用螻蛄七個鹽二兩新瓦上鋪蓋焙乾研末每溫酒服一錢匕即愈也蘇頌方小便膏淋羊骨燒研榆白皮煎湯服二錢聖惠方膏淋如油海金沙滑石各一兩甘草梢二錢半為末每服二錢麥門冬煎湯服日二次仁存方腎消膏淋病在下焦苦楝子茴香等分為末每溫酒服一錢聖惠方老人五淋身熱腹滿小麥一升通草二兩水二升煮一升飲之即愈奉親書五淋白濁螺螄一碗連殼炒熱入白酒三碗煮至一碗挑肉食之酒下數次即效扶壽精方小便不禁小便頻數小便不禁重鵲巢中草一個燒灰每服二錢匕以薔薇根皮二錢煎湯服之日二聖惠方又方只用薔薇根煮汁飲野生白花者良小便不禁上熱下寒者鹿角霜為末酒糊和丸梧桐子大每服三四十丸空心溫酒下普濟方小便無度腎氣虛寒破故紙十兩酒蒸茴香十兩鹽炒為末酒糊丸梧子大每服百丸鹽酒下或以米摻豬腎煨食之普濟方小便無度並莖內痛楊子建萬全護命方云凡人小便頻數不計度數便時莖內痛不可忍者此疾必先大腑祕熱不通水液只就小腸大腑愈加干竭甚則渾身熱心躁思涼水如此即重症也此疾本因貪酒色積有熱毒腐物瘀血之類隨虛水入於小腸故便時作痛也不飲酒者必平生過食辛熱葷膩之物又因色傷而然此乃小便頻而痛與淋證澀而痛者不同也宜用萆薢一兩水浸少時以鹽半兩同炒去鹽為末每服二錢水一盞煎八分和滓服之使水道轉入大腸仍以蔥湯頻洗穀道令氣得通則便數及痛自減也小便數多牡蠣五兩炒入小便三升煎二升分三服神效乾坤生意小便頻數脬氣不足也雷州益智子鹽炒去鹽天台烏藥等分為末酒煮山藥粉為糊丸如梧子大每服七十丸空心鹽湯下名縮泉丸集驗方藏器方只取益智子仁二十四枚打碎入鹽同煎服有奇驗又白果十四枚七生七煨食之取效止又小豆葉一斤入豉汁中煮和作羹食之心鏡方心虛尿滑及赤白二濁益智子仁白茯苓白朮等分為末每服三錢白湯調下遺精腎虛遺精北五味子一斤洗淨水浸挼去核再以水洗核取盡餘味通置砂鍋中布濾過入好蜂蜜二斤炭火慢熬成膏瓶收五日出火性每空心服一二茶匙百沸湯下保壽堂方腎虛遺精多汗夜夢鬼交用豬腎一枚切開去膜入附子末一錢濕紙裹煨熟空心食之飲酒一杯不過三五服效經驗方虛滑遺精白茯苓二兩縮砂一兩為末入鹽二錢羊肉批片摻藥炙食以酒送下普濟方又韭子五合白龍骨一兩為末空心酒服方寸匕千金方虛勞溺精用新韭子二升十月霜後採之好酒八合浸一宿以晴明日童子向南搗一萬杵平旦溫酒服方寸匕日再服之亦治女人白淫外臺祕要漏精白濁雪白鹽一兩入瓶築緊固濟煅一日出火毒白茯苓山藥各一兩為末棗肉和密丸梧子大每棗湯下三十丸蓋甘以濟咸脾腎兩得也直指方元氣虛寒精滑不禁大腑溏泄手足厥冷陽起石煅研鍾乳粉各等分酒煮附子末同麵糊丸梧子大每空心米飲服五十丸以愈為度濟生方盜汗遺精鹿角霜二兩生龍骨炒牡蠣煅各一兩為末酒糊丸梧子大每鹽下四十丸普濟方玉莖強硬不痿精流不住時事如針刺捏之則痛其病名強中乃腎滯漏疾也用韭子破故紙各一兩為末每服三錢水一盞煎服日三即住經驗方勞心夢泄龍骨遠志等分為末煉蜜丸梧子大硃砂為衣每服三十丸蓮子湯下去硃砂亦能暖精益陽活人心統夢寐遺精乳香一塊拇指大臥時細嚼含至三更咽下三五即效醫林集要積熱夢遺心忪恍惚膈中有熱黃柏末一兩片腦一錢煉蜜丸梧子大每服十五丸麥門冬湯下本事方夢遺食減白色苦參三兩白朮五兩牡蠣粉四兩為末用雄豬肚一具洗淨砂罐內煮爛石臼搗和藥干則入汁丸小豆大每服四十丸米湯下日三服久服身肥進食而夢遺立止保壽堂方治夢遺小便數用韭子二兩桑螵蛸一兩微炒研末每旦酒服二錢三因方腎虛精竭羊腎一對切於豉汁中以五味米糅作羹粥食心鏡方脫陽危證凡人大吐大泄之後四肢厥冷不省人事或與女子交後小腹腎痛外腎搐縮冷汗出厥須臾不救先以蔥白炒熱尉臍後以蔥白三七莖擂爛用酒煮灌之陽氣即回華他方祕精益髓太乙金鎖丹用五色龍骨五兩覆盆子五兩蓮花蕊四兩未開者陰乾鼓子花即旋覆花三兩五月五日採之雞頭子仁一百顆併為末以金櫻子二百枚去毛木臼搗爛水七升煎濃汁一升去渣和藥杵二千下丸梧子大每空心溫鹽酒下三十丸服至百日永不泄如要泄以冷水調車前末半合服之忌葵菜瑞竹堂方赤白濁便濁精滑男子小便日數十次如稠米泔心神恍惚瘦瘁食減得之女勞令服桑螵蛸散藥未終一劑而愈其藥安神魂定心志治健忘補心氣止小便數用桑螵蛸遠志龍骨菖蒲人參茯神當歸龜甲醋炙各一兩為末臥時人參湯調下二錢如無桑上者即用他樹者以炙桑白皮佐之桑白皮行水以接螵蛸就腎經也治思慮太過心腎虛損真陽不固漸有遺瀝小便白濁夢寐頻泄菟絲子五兩白茯苓三兩石蓮肉二兩為末酒糊丸梧子大每服三五十丸空心鹽湯下和劑局方小便白濁緣心腎不濟或由酒色遂至已甚謂之土淫蓋有虛熱而腎不足故土邪乾水史載之言夏則土燥水濁冬則土堅水清即此理也醫者往往用補其痰反甚惟服博金散則水火既濟源潔而流清矣用絡石人參茯苓各二錢龍骨煅一兩為末每服一錢空心米飲下日二服仁存堂方治腎經虛損心氣不足思慮太過真陽不固漩有餘瀝小便白濁如膏夢中頻遺骨節拘痛面黧肌瘦盜汗虛煩食減乏力此方性溫不熱極有神效用五倍子一斤白茯苓四兩龍骨二兩為末水糊丸梧子大每服七十丸食前鹽湯送下日三服和劑方赤白濁淫及夢泄精滑黃柏炒真蛤粉一斤為末每服一百丸空心溫酒下黃柏苦而降火蛤粉咸而補腎也又方加知母炒牡蠣粉煅山藥炒等分為末糊丸梧子大每服八十丸鹽湯下本事方白濁遺精石蓮肉龍骨益智仁等分為末每服二錢空心米飲下普濟用蓮肉白茯苓等分為末白湯調服遺精白濁盜汗虛勞桑螵蛸炙白龍骨等分為細末每服二錢空心用鹽湯送下外臺祕要小便白濁糯稻草煎濃汁露一夜服之摘玄妙方又清明柳葉煎湯代茶以愈為度集簡方又陳冬瓜仁炒為末每空心米飲服五錢救急易方腎虛白濁肉蓯蓉鹿茸山藥白茯苓等分為末米糊丸梧子大每棗湯下三十丸聖濟總録腎虛白濁及兩脅並背脊穿痛五味子一兩炒赤為末醋糊丸梧子大每醋湯下三十丸經驗良方氣虛白濁黃耆鹽炒半兩茯苓一兩為末每服一錢白湯下經驗良方濕痰白濁牡荊子炒為末每酒服二錢集簡方白濁頻數漩面如油澄下如膏乃真元不足下焦虛寒用萆薢石菖蒲益智仁烏藥等分每服四錢水一盞入鹽一捻煎七分食前溫服日一服效乃止名萆薢分清飲白濁腹滿不拘男婦用益智仁鹽水浸炒厚朴薑汁炒等分姜三片棗一枚水煎服永類鈐方小便白淫因心腎氣不足思想無窮所致黃連白茯苓等分為末酒糊丸梧子大每空心棗湯下五十丸普濟方治人夜小便腳停白濁老人虛人多此證令人卒死大能耗人精液主頭昏重用糯米五升炒赤黑白芷一兩為末糯粉糊丸梧子大每服五十丸木饅頭煎湯下無此用局方補腎湯下若後生稟賦怯弱房室太過小便太多水管蹇澀小便如膏脂入石菖蒲牡蠣粉甚效經驗赤白濁淋好大黃為末每服六分以雞子一個破頂入藥攪勻蒸熟空心食之不過三服愈簡便方小便赤濁遠志甘草水煮半斤茯神益智仁各二兩為末酒湖丸梧子大每空心棗湯下五十丸普濟方小便赤濁心腎不足精少血燥口乾煩熱頭運怔忡菟絲子麥門冬等分為末蜜丸梧子大每鹽湯下七十丸心熱尿赤面赤唇乾咬牙口渴用木通生地黃炙甘草等分入水竹葉七片水煎服錢氏方前陰諸疾陰痿不起用雄雞肝三具菟絲子一升為末雀卵和丸小豆大每服一百丸酒下日二又方用鯉魚膽雄雞肝各一枚為末雀卵和丸小豆大每吞一丸或於前方加附子一個千金方又蛇床子五味子菟絲子等分為末蜜丸梧子大每服三十丸溫酒下日三服千金方又新五味子一斤為末酒服方寸匕日三服忌豬魚蒜醋盡一劑即得力百日以上可御十女四時勿絶更效千金方又蜂窠燒研新汲水服二錢可御十女岣嶁神書又覆盆子酒浸焙研為末每旦酒服三錢集簡方又未連蠶蛾二升去頭翅足炒為末蜜丸梧子大每夜服一丸可御十室以菖蒲酒止之千金方又泥鰍煮食之集簡方陰寒痿弱蜂房灰夜敷陰上即熱起千金方又紫霄花生龍骨各二錢麝香少許為末蜜丸梧子大每服二十丸燒酒下欲解飲生薑甘草湯集簡方陰痿陰汗陽起石煅為末每服二錢鹽酒下普濟方陰汗濕癢綿黃耆酒炒為末以熟豬心點吃妙濟急方又密陀僧加蛇床子為末敷之又蒲黃末服三四度瘥千金方腎風囊癢用豬尿脬火炙以鹽酒吃之救急方又枯礬撲之又泡湯沃洗御藥苑方又石菖蒲蛇床子等分為末日搽二三次濟急仙方又吳茱萸煎湯頻洗取效外臺祕要又麩炭紫蘇葉末撲之經驗方又松毛煎湯頻洗簡便方又龍骨牡蠣粉撲之醫宗三法腎風囊癢用椒杏仁研膏塗掌心合陰囊而臥甚效直指陰囊濕瘡出水不瘥用五倍子臘茶各五錢膩粉少許研末先以蔥椒湯洗過香油調搽以瘥為度聖惠方陰癢生瘡紫梢花一兩胡椒半兩煎湯溫洗數次即愈總微論外腎生瘡蚯蚓糞二分緑豆粉一分水塗之干又上之腎風下注生瘡用驢蹄二十片燒灰密陀僧輕粉各一錢麝香半錢為末敷之奇效方陰瘡濕癢槐樹北面不見日枝煎湯洗三五遍冷再暖之必效方男子陰瘡有二種一者陰蝕作臼膿出一者只生熱瘡熱瘡用黃柏黃芩等分煎湯洗之仍以黃柏黃連作末敷之又方黃柏煎湯洗之塗以白蜜肘後方男子陰瘡因不忌月事行房陰物潰爛用室女血衲瓦上燒存性研末麻油調敷之囊瘡痛癢紅椒七粒蔥頭七個煮水洗之愈名驅風散經驗方丈夫陰瘡莖及頭潰爛痛不可忍久不瘥者以五月五日繁縷燒焦五分入新出蚯蚓糞二分入少水和研作餅貼之干即易禁酒面五辛及熱食等物甚效扁鵲方妒精陰瘡鉛粉二錢銀杏仁七個銅銚內炒至杏黃去杏取粉出火毒研搽效集簡方又黃礬青礬麝香等分為末敷之不過三度千金方又用青紙舊作簿簽者以唾黏貼數日即愈且護痛也彌久者良上有青黛殺蟲解毒時珍方男子陰腫作癢用桃仁炒香為末酒服方寸匕日三仍搗敷之亦治小兒卵㿗外臺祕要又大田螺二個和殼燒存性入輕粉同研敷之效醫林集要玉莖生瘡牛蹄甲燒灰油調敷之奚囊方玉莖瘡潰絲瓜連子搗汁和五倍子末頻搽之丹溪方玉莖生瘡臭腐用豬脬一個連尿去一半留一半以煅紅新磚焙乾為末入黃丹一錢摻之三五次瘥須以蔥椒湯洗奇效方陰莖生瘡痛爛者以豉一分蚯蚓濕泥二分水研和塗上干即易之禁熱食酒蒜芥菜藥性論陰上粟瘡取停水濕處干卷苔皮為末敷之神效外臺祕要陰頭生瘡蜜煎甘草末頻頻塗之神效千金方又用溪港年久螺螄燒灰敷之奇效方陰頭生瘡人不能治者鱉甲一枚燒研雞子白和敷千金翼男女陰蝕肥豬肉煮汁洗不過三十斤瘥千金方陰蝕欲盡蝦蟆灰兔屎等分為末敷之肘後方股陰𤷍癧無名異二錢麝香一字酒半碗午後空腹服立效多能鄙事陰囊腫痛蔥白乳香搗塗即時痛止腫消亦治玉莖腫陰㿗腫痛荊芥穗瓦焙為