front:
  text: 序海虞繆仲淳先生以布衣遊宇內聲稱籍甚公卿間蓋聞其急患難修然諾七尺可捐千里必赴視金璧如塵土為古田光魯仲連之流猶退而寄託於醫頗精治療微獨明穎根乎性成亦由涉歷所到虛心採訪往往得秘授悟真訣故能見極洞垣技參遊刃余恨生也晚時正埋頭鉛槧終歲罕一窺足城市遂不獲覿先生眉採聆其玄屑然大略風概嘗得之吾友祁西岩鄧晉伯兩兄不啻神交夢接近復入郭居晨夕與父初斂之兄輩塵談益晰其生平底蘊取諸懷抱無非以濟人利物為務凡所著述詮次如本草經疏之梓於琴水筆記廣記之鐫於長城吾邑並足開蒙後學饒益群生而所遺猶有手摘本草後單方間綴以自藏奇秘居恆不輕示人於執侯兄偶見而珍之欲廣其傳屬友人編類刊行余不諳岐黃未敢妄論方藥微旨緣素景慕其人知所由選錄是必龍藏之餘寶鳳林之逸毳也敬為之序附垂不朽焉崇禎六年夏五曲阿吳履中題序一繆仲淳既歿數年其著書多盛行於世而所摘錄本草單方朱黃甲乙狼籍篋笥中康文初莊斂之搜討詮次窮歲月之力而後成書於執侯梓而傳之於是繆氏之遺書粲然矣仲淳以醫名世幾四十年醫經經方兩家浩如煙海靡不討論貫穿而尤精於本草之學以謂古三墳之書未經秦火者獨此耳神農本經朱字譬之六經也名醫增補別錄朱墨錯互譬之註疏也本經以經之別錄以緯之沉研鑽極割剝理解神而明之以觀會通本草經疏之作抉摘軒岐未發之秘東垣以來未之前聞也出其餘力集錄單方剟其舛駁搴其蕪穢其染涉生民者甚至此書成而經疏之能事始畢仲淳可以無憾於地下矣三君之功豈曰小補之哉仲淳電目戟髯如世所圖羽人劍客者談古今國事成敗兵家勝負風發泉湧大聲殷然欲壞牆屋酒間每慷慨謂余曰傳稱上醫醫國三代而下葛亮之醫蜀王猛之醫秦由此其選也以宋事言之熙寧之法成方以致病者也元佑之政執古方以治病者也紹述之小人不診視病狀何如而強投以烏頭狼毒之劑則見其立斃而已矣子有醫國之責者今將謂何余沉吟不能對仲淳酒後耳熱仰天叫呼痛飲沾醉乃罷嗚呼仲淳既老病以死而余亦連蹇放棄效忠州之錄方書以終殘年因是書之刻念亡友之墜言為廢書嘆息者久之仲淳諱希雍吾里之右族也僑居長興後徙於金壇老焉葬在陽羨山中餘地日光為文以志之崇禎六年十二月虞山老民錢謙益敘序二本草單方者虞山繆仲淳之所著也仲淳先著本草經疏取林億蘇頌張洞補註及大觀證類廣義較定等數種經緯增刪可謂大備此單方者就其經疏中集錄成方以便按病對治者也仲淳歿後家從祖刻其書歸我先府君先府君不敢秘遺命予序而行之蓋病不得方將何以療則集方者其心至仁也有方而無刻或刻而不行何以方為則刻與行者其利均溥也予不知醫竊嘗聞先府君之緒論謂醫經經方兩家經以明理方以致用譬之雙翼缺一不可其所以傳神農氏之精義而躋斯民於壽域者方尤要於經緣經須窮討於平時而方則取備於危亟但脈不可不明證不可不辨苟流覽是書而參考其經疏並長沙之正傷寒河間之冬溫春溫暍暑痎瘧東垣之內傷以及丹溪之滋陰降火四家之理愈明則單方之用愈廣民其有夭札乎哉此我府君及從祖之志也亦仲淳之志也即書以棄諸卷首順治戊戍菊月華陽棘人於沚芷園謹識
