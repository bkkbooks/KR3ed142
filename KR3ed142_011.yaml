body:
  text: 卷十一鼻鼻中諸疾鼻淵鼻鼽鼻窒鼻瘡及痘後鼻瘡並用辛夷研末入麝香少許蔥白蘸入數次甚良時珍方鼻淵腦瀉藕節芎藭焙研為末每服二錢米飲下普濟方又生附子末蔥涎和如泥罨湧泉穴普濟方又大蒜切片貼足心取效止摘玄方鼻淵膿血貝子燒研每生酒服二錢日三服腦崩流汁鼻中時時流臭黃水腦痛名控腦痧有蟲食腦中也用絲瓜藤近根三五尺燒存性每服一錢溫酒下以愈為度醫學正傳鼻淵流涕蒼耳子炒研為末每白湯點服一二錢證治要訣又蓽茇末吹之有效衛生易簡方鼻淵出水孩兒茶末吹之良本草權度鼻塞出水多年不聞香臭蒺藜二握當道車研過以水一大盞煮取半盞仰臥先滿口含飯以汁一合灌鼻中不過再灌嚏出一兩個息肉似赤蛹蟲即愈聖惠方鼻中息肉狗頭灰方寸匕苦丁香半錢研末吹之即成水或同硇砂少許尤妙朱氏集驗方又蜣螂十枚納青竹筒中油紙密封置廁坑內四十九日取出曬乾入麝香少許為末塗之當化為水也聖惠方又地龍炒一分牙皂一挺為末調蜜塗之清水滴盡則除聖惠方又用礬燒末豬脂和綿裹塞之數日息肉隨藥出一方用明礬一兩萆麻仁七個鹽梅肉一個麝香一字杵丸綿裹塞之化水自下也千金方又丁香綿裹納之聖惠方白飛霞方用硇砂點之即落普濟方梁塵吹之又青蒿石灰等分淋汁熬膏點之聖濟總録又用細辛白芷等分為末以生地膽汁和成膏每用少許點之取消為度聖惠方又苦葫蘆子苦丁香等分入麝香少許為末紙捻點之聖惠方又藜蘆三分雄黃一分為末蜜和點之每日三上自消勿點兩畔聖濟方齆鼻作臭用雞腎一對與脖前肉等分入豉七粒新瓦焙研以雞子清和作餅安鼻前引蟲出忌陰人雞犬見十便良方齆鼻不聞香臭以鐵鎖磨石取末和豬脂綿裹塞之經日肉出瘥普濟方鼻氣壅塞及鼻中息肉水服釜墨一錢千金方鼻窒氣塞苦葫蘆子為末醇酒浸之夏一日冬七日日少許點之聖惠方鼻塞不通麻鞋燒灰吹之立通經驗方鼻塞不通肺氣上攻而致者蓽澄茄丸用茄半兩薄荷三錢荊芥穗一錢半為末蜜丸芡子大含咽御藥院方鼻瘡膿臭有蟲也苦參苦礬一兩生地黃汁三合水二盞煎三合少少滴之普濟方鼻瘡咽塞及乾嘔頭痛食不下用雞子一枚開一竅去黃留白著米酢糖火燉沸取下更燉如此三次乘熱飲之不過一二度即愈普濟方鼻內生瘡密陀僧香白芷等分為末蠟燭油調塗之簡便又牛骨狗骨燒灰臘豬脂和敷亦治疳瘡蝕入口鼻千金方又玄參末塗之或以水浸軟塞之衛生易簡方鼻上生瘡私竊孝子巾拭之勿令人知時珍方口鼻疳瘡銅青枯礬等分研敷之又方人中白一錢銅緑研敷之疳蝕口鼻數日欲盡文蛤燒灰以臘豬脂和塗之千金翼方疳蝕口鼻穿唇透頰銀屑一兩水三升銅器煎一升日洗三四次聖濟録鼻疳赤爛蘭香葉本草名羅勒燒灰二錢銅青五分輕粉二字為末日敷三次錢乙小兒方面鼻酒齄白丁香十二粒蜜半兩早夜點久久自去聖惠又鸕鷀屎一合研末以臘月豬脂和屎每夜塗旦洗千金方鼻上酒齄以浙米泔食後冷飲外以硫黃入大菜頭內煨碾塗之證治要訣又枇杷葉梔子仁等分每服二錢溫酒調下日三本事方鼻齄赤皰密陀僧二兩細研人乳調夜塗旦洗亦治痘瘡癍黶聖惠方又桑黃能除肺熱故治赤鼻及肺火成癰自記鼻擦破傷貓兒頭上毛剪碎唾黏敷之易簡方口一切口瘡雞內金燒灰敷之立效活幼新書滿口爛瘡蘿蔔自然汁頻漱去涎妙李時珍方口舌生瘡用五倍子密陀僧等分為末漿水漱過干貼之名赴筵散院方加晚蠶蛾又細辛黃連等分為末摻之漱涎甚效名兼金散一方用細辛黃柏三因方又蠶繭五個包縫砂瓦上焙焦為末抹之聖惠方又尿桶垽七分枯礬三分研勻有涎拭去數次即愈集簡方又升麻一兩黃連三分為末綿裹含咽本事方又刮甑垢敷之時珍方口舌唇內生瘡西瓜皮燒研噙之震亨口舌生瘡胸膈疼痛者用焦豉末含一宿即瘥聖惠方口舌生瘡衆療不瘥膽礬半兩入銀鍋內火煅赤出火毒一夜細研每以少許敷之吐去酸涎水三四次瘥勝金口舌糜爛薔薇根避風打去土煮濃汁溫含冷吐冬用根皮夏用枝葉口瘡日久延及胸中生瘡三年以上不瘥者皆效千金方又地龍吳茱萸研末醋調生面和塗足心立效摘玄方集簡方只用茱萸醋調塗足心一夕愈治心脾有熱舌頰生瘡蜜炙黃柏青黛各一分為末入生龍腦一字摻之吐涎寇氏衍義一方用黃柏細辛等分為末摻或用黃柏乾薑等分亦良名赴筵散一用黃連不用柏乃肘後方也老幼口瘡烏頭尖一個天南星一個研末薑汁和塗足心男左女右不過二三次愈聖惠方大人口瘡用密陀僧煅研摻之又沒石子炮三分甘草一分研末摻之月內小兒生者少許置乳上吮之入口即啼不過三次聖惠方又蛇蛻皮水浸軟拭口內一二遍即愈仍以藥貼足心嬰孩寶鑑又黃柏蜜炒研末如神口吻生瘡縮砂殼煅研擦之即愈黎居士簡易方又楸白皮貼之頻易取效時珍方口內熱瘡青錢念文燒赤投酒中服之立瘥陳藏器本草膀胱移熱於小腸上為口糜生瘡潰爛心胃壅熱水穀不下用柴胡地骨皮各三錢水煎服之東垣蘭室祕藏飲酒口糜螺蚌煮汁飲聖惠方天行口瘡五倍子末摻之吐涎即愈龐氏傷寒論久患口瘡生附子為末醋面調貼足心男左女右日再易之經驗方口瘡連年不愈者天門冬麥門冬並去心玄參等分為末煉蜜丸彈子大每噙一丸外科精義口中疳瘡款冬花黃連等分為細末用唾津調成餅子先以蛇床子煎湯漱口乃以餅子敷之少頃其瘡立消也經驗方口疳臭爛用黃柏五錢銅緑二錢為末摻之去涎名緑雲散三因方口疳齦爛氣臭血出不拘大人小兒鉛白霜銅緑各二錢白礬豆許為末掃之宣明方吻上燕口瘡取箸頭燒灰敷之又胡粉一分黃連半兩為末敷之普濟方口角爛瘡燕窠泥敷之良救急方太陰口瘡甘草二寸白礬一粟米大同嚼咽汁保命集鵝口白瘡地雞即鼠婦又名濕生蟲研水塗之即愈壽域方白口惡瘡狀似木耳不拘大人小兒並用五倍子青黛為末等分以筒吹之端效方口齒氣臭用白芷川芎等分為末蜜丸芡實大日咽之濟生方又香薷一把煎汁含之千金方肘後方正旦用井華水含之吐棄廁下數度即瘥又用甜瓜子杵末蜜和為丸每旦漱口後含一丸亦可貼齒千金方又以綿裹象膽少許貼齒根平旦漱去數度即瘥海藥香口闢臭豆蔻細辛為末含之肘後方齒一切牙痛三奈子一錢麵包煨熟麝香二字為末隨左右㗜一字入鼻內口含溫水漱去神效名海上一字散普濟方牙齒疼痛舶上蒔蘿蕓薹子白芥子等分研末口中含水隨左右㗜鼻內效聖惠方又土狗一個舊糟裹定濕紙包煨焦去糟研末敷之立止本事方又秋茄花干之旋燒研塗痛處立止海上名方又梅花片硃砂末各少許揩之立止集簡方又雞屎白燒末綿裹咬痛處立瘥經驗方又燕子屎丸桐子大於痛處咬之丸化即止袖珍方又老鼠一個去皮以硇砂擦上三日肉爛化盡取骨瓦焙為末入蟾酥二分樟腦一錢每用少許點牙根上立止孫氏集效方牙齒腫痛胡麻仁五升水一斗煮汁五升含漱吐之不過二劑神效肘後方又酸漿草一把洗淨川椒四十九粒去目同搗爛絹片裹定如箸大切成豆豉大每以一塊塞痛處即止節齊醫論又蒼耳子五升水一斗煮取五升熱含之冷即吐去後復含不過一劑瘥莖葉亦可或入鹽少許千金翼方又隔年糟茄燒灰頻頻乾擦立效海上名方又用鏡面草半握入麻油二點鹽半捻挼碎左疼塞右耳右疼塞左耳以薄泥餅貼耳門閉其氣仍側臥泥耳一二時去泥取草放水中看有蟲浮出久者黑次者褐新者白須於午前用之口瘡䘌齒腫痛細辛煮濃汁熱含冷吐取瘥聖惠方牙齒裂痛死曲蟺為末敷之即止千金翼方牙齒動搖疼痛及打動者土蒺藜去角生研五錢淡漿水半碗煎入鹽溫漱甚妙或以貼牙根即牢也御藥院方腎虛齒痛松香硫黃等分為末泡湯漱之甚效經效濟世方牙齒虛痛仙靈脾為粗末煎湯頻漱大效奇效方虛氣攻牙齒痛血出或癢痛骨碎補二兩細銼瓦鍋慢火炒黑為末如常揩齒良久吐之咽下亦可劉松石云此法出靈苑方不獨治牙痛極能堅骨固牙益精髓去骨中毒氣疼痛牙動將落者數擦立住再不復動經用有神胃火牙疼好軟石膏一兩淡酒淬過為末入防風荊芥細辛白芷五分為末日用揩牙甚效保壽堂熱毒牙痛熱毒風攻頭面齒根腫痛不可忍牛蒡根一斤搗汁入鹽花一錢銀器中熬成膏每用塗齒根下重者不過三度瘥聖惠方牙痛惡熱黃連末摻之立止李樓奇方風牙疼痛文銀一兩燒紅淬燒酒一盞漱飲之立止集簡風熱牙痛紫金散治風熱積壅一切牙痛去口氣大有奇效好大黃瓶內燒存性為末早晚揩牙漱去都下一家專貨此藥兩宮常以數千贖之其門如市也千金家藏方又青鹽一斤槐枝半斤水四碗煎汁二碗煮鹽至干炒研日用揩牙洗目經驗方又用油松節如棗大一塊碎切胡椒七顆入燒酒燉二三盞乘熱入飛過白礬少許噙漱三五口立瘥聖惠方風氣牙痛百藥不效者用經霜絲瓜一個擦鹽火燒存性研末頻擦涎盡即愈腮腫以水調貼之一試即便可睡也直指方風牙腫痛高良薑二寸全蠍焙一枚為末摻之吐涎以鹽湯漱口此乃樂清丐者所傳鮑季明病此用之果效王璆百一選方又五倍子一錢黃丹花椒各五分為末摻之即止也又五倍末冷水調塗頰外甚效又用荔枝連殼燒存性研末擦牙即止普濟方又濕生蟲巴豆仁胡椒各一枚研勻飯丸緑豆大綿裹一丸咬之良久涎出吐去效不可言濟世方又松葉一握鹽一合酒二升煎漱聖惠方風蟲牙痛百年陳石灰為末四兩蜂蜜三兩和勻鹽泥固濟火煅一日研末擦牙神效名神仙失笑散張三丰方又剪草細辛藁本等分煎水熱漱少頃自止中藏經又用胡椒蓽茇等分為末蠟丸麻子大每用一丸塞蛀孔中易簡方又方花鹼填孔內立止又方刮松脂滾水泡化一漱止試驗集簡方又楊柳白皮卷如指大含咀以汁浸齒根數過即愈又方柳枝一握銼入少鹽花漿水煎含甚驗又方柳枝銼一升大豆一升合炒豆熟瓷器盛之清酒三升浸三日頻含漱涎三日愈古今録鑑又骨碎補乳香等分為末糊丸塞孔中名金針丸聖濟總録又杏仁針刺於燈上燒煙乘熱搭病牙上又復燒搭七次絶不疼痛病牙逐時斷落也普濟方又方針刺桃仁燈上燒煙出吹滅安痛齒上咬之不過五六次愈衛生家寶方又露蜂房煎醋熱漱之一用草蜂房一枚鹽實孔內燒末研過擦之鹽湯漱去或取一塊咬之祕方也袖珍一用露蜂房一個乳香三塊煎水漱之普濟又同細辛煎水漱之又同蜂房蒂綿包咬之效聖惠又用天仙子一合入小口瓶內燒煙竹筒引入蟲孔內熏之即死永不發瑞竹堂方一用莨菪子入瓶內以熱湯淋下口含瓶口令氣熏之冷更作盡三合乃止有涎津吐去甚效普濟方又橡斗五個入鹽在內皂莢一條入鹽在內同煅過研末日搽三五次荊芥湯漱之良經驗良方又方葫蘆子半升水五升煎三升含漱之莖葉亦可不過三度聖惠方又用蛇床子煎湯乘熱漱數次立止集簡方又方燒酒浸花椒頻頻漱之又雄雀屎綿裹塞孔中日二易之效外臺祕要又化蠟少許攤紙上鋪艾以箸捲成筒燒煙隨左右鼻熏令煙滿口中呵氣出即疼止腫消普濟方風蟲牙痛不可忍者用熏陸香嚼咽其汁立瘥梅師方又方用乳香豆許安孔中燒煙箸烙化立止朱氏集驗方又方乳香川椒末各一錢為末化蠟和作丸塞孔中又用蟾酥一片水浸軟入麝香少許研勻以粟米大綿裹咬定吐涎愈聖惠方齲齒風痛灸左手陽明脈以苦參湯日漱三升出入其風五六日愈此亦取其去風氣濕熱殺蟲之義淳于意方牙齒蟲痛藜蘆末納入孔中勿吞汁甚效千金翼方又以壁上白蟢窠四五個剝去黑者以鐵刀燒出汗將窠燒汗丸之納入牙中甚效又以乳香入窠內燒存性納之亦效一方用牆上白蛛窠包胡椒末塞耳左痛塞右右痛塞左手掩住側臥待額上有微汗即愈又雄黃末和棗肉丸塞孔中類要方又馬牙一枚煅熱投醋中七次待冷含之即止經驗方又方用香油抹箸頭蘸麝香末綿裹炙熱咬之換二三次其蟲即死斷根甚妙醫方摘要又方以蕪荑仁安蛀孔中及縫中甚效危氏得效方又用馬夜眼如米大綿裹納孔中有涎吐去永斷根源或加生附子少許又方用馬夜眼燒存性敷之立愈玉機微義又阿魏臭黃各等分為末糊丸緑豆大每綿裹一丸隨左右插入耳中立效聖惠方牙齒蟲䘌韭菜連根洗搗同人家地板上泥和敷痛處腮上以紙蓋住一時取下有細蟲在泥上可除根又方韭根十個用椒二十粒香油少許以木桶上泥同搗敷病牙頰上良久有蟲出數次即愈也又方杏仁燒存性研膏綿裹納蟲孔中取蟲去風其痛便止重者不過再上食療蟲牙有孔蜘蛛殼一枚綿裹塞之備急方治蟲牙啄木舌一枚巴豆一枚研勻每以豬鬃一莖點少許於牙根上立瘥名啄木散聖惠方煙燻蟲牙用瓦片煅紅安韭子數粒清油數點待煙起以筒吸引至痛處良久以溫水漱吐有小蟲出為效未盡作熏救急良方齒䘌並蟲積年不瘥從少至老者用雀麥一名杜姥草俗名牛星草用苦瓠葉三十枚洗淨取草剪長二寸以瓠葉作五包包之廣一寸厚五分以三年酢浸之至日中以兩包火炮令熱納口中尉齒外邊冷更易之取包置水中解視有蟲長三分老者黃色少者白色即二三十枚少即一二十枚此方甚妙外臺祕要牙齦腫痛瓦花白礬半分水煎漱之立效摘玄方牙齦腫爛出臭水者芥菜稈燒存性研敷之愈牙疳口瘡孩兒茶硼砂等分為末搽之牙疳陰疳取鍋蓋黑垢同雞膍胵黃皮灰蠶繭灰枯礬等分為末敷之兼治湯火傷時珍方牙齦疳蝕百藥煎五倍子青鹽煅各一錢半銅緑一錢為末日摻二三次神效普濟方牙齦疳臭五倍子炒焦一兩枯礬銅青各一錢為末先以米泔漱淨摻之神效方也集簡方齒縫出血苦參一兩枯礬一錢為末日三揩之立驗普濟齒根出血含用芎多瘥牙縫出血不止者五倍子燒存性研末敷之即止易簡方牙齒出血不止動搖白蒺藜末旦旦擦之道藏經牙宣露痛用絲瓜藤陰乾臨時火煅存性研搽即止最妙海上方一用絲瓜藤一握川椒一撮燈心一把水煎濃汁漱吐其痛立住如神德生堂方治齒黃燒糯糠取白灰旦旦擦之時珍方齒敗口臭水煮芎藭含之廣濟方牙齒挺長出一分常咋生地黃甚妙備急方牙齒日長漸至難食名髓益病白朮煎湯漱服取效即愈也備急良方齒落不生牛屎中大豆十四枚小開豆頭以拄齒根數度即瘥千金方齒折多年不生雄鼠脊骨煅研末日日揩之甚效藏器方利骨取牙白馬尿浸茄科三日炒為末點牙即落或煎巴豆點牙亦落勿近好牙鮑氏方刮霜取牙用鯽魚一個去腸入砒在內露於陰地待有霜刮下瓶收以針搜開牙根點少許咳嗽自落牢牙明目青鹽二兩白鹽四兩川椒四兩煎汁拌鹽炒乾日用揩牙洗目永無齒疾目疾通變要法擦牙固齒用羊脛骨燒過香附子燒黑各一兩青鹽煅過生地黃燒黑各五錢研用瀕湖方唇唇腫黑痛癢不可忍四文大錢於石上磨豬脂塗之不過數遍愈全幼新書唇緊瘡裂屠幾垢燒存性敷之千金方沈唇緊裂用鱉甲及頭燒研敷之證治類要緊唇裂痛螻蛄燒灰敷之千金方治口唇緊小不能開合飲食不治殺人作大炷安刀釜上燒令汗出白布拭塗之日日五度仍以青布燒灰酒服時珍方舌舌腫滿口不能出聲以蒲黃頻摻愈又方用蒲黃末乾薑末等分干搽蓋蒲黃涼血活血又舌乃心之外候手厥陰相火乃心之臣使得乾薑是陰陽相濟也時珍方又萆麻仁四十粒去殼研細塗紙上作捻燒煙燻之未退再熏以愈為度有人舌腫出口外一村人用此法而愈亦治舌上出血用熏鼻舌卒腫大如豬脬狀滿口不治殺人釜底墨和醋塗舌上下脫則更敷須臾即消千金方又甘草煎濃湯熱漱頻吐聖濟總録舌腫咽痛咽生息肉稱錘燒赤淬醋一盞飲之聖惠方木舌腫滿不治殺人蚯蚓一條以鹽花水塗之良久漸消聖惠方又紅芍藥甘草煎水熱漱聖惠方又䗪炙蟲五枚食鹽半兩為末水二盞煎十沸時時熱含吐涎瘥乃止聖惠方木舌腫強硼砂末生薑片蘸揩少時即消普濟方又白礬桂心等分為末安舌下聖惠方重舌木舌皂礬二錢鐵上燒紅研摻之積德堂方重舌腫滿伏龍肝末牛蒡汁調塗之聖惠方又五靈脂一兩淘淨為末煎米醋漱經驗良方又方鐵鎖燒紅打下鏽研末水調一錢噙咽生生編重舌涎出水漿不入太陰玄精石二兩牛黃硃砂龍腦一分為末以鈹針舌上出血鹽湯漱口摻末咽津神效聖惠方重舌生瘡蒲黃末敷之不過三上瘥千金方舌上生苔諸病舌苔以布染井水抹後用薑片時時擦之自去陶華方面少年面皰用浮萍日挼罨之並飲汁少許外臺又方紫背浮萍四兩防己一兩煎濃汁洗之仍以萍於斑䵟上熟擦日三五次物雖微末其功甚大不可小看普濟方面多䵟𪒟雀卵色苦酒浸術日日拭之極效時珍方面上䵟點取白蜜和茯苓末塗之七日便瘥也孫真人食忌面上雀斑萆麻子仁密陀僧硫黃各一錢為末用羊髓和勻夜夜敷之摘玄方又三奈子鷹糞密陀僧萆麻子等分研勻以乳汁調之夜塗旦洗面黑令白瓜蔞瓤三兩杏仁一兩豬腰一具同研如膏每夜塗之令人光潤冬月不皴聖濟録面上紫塊如錢大或滿面俱有野大黃四兩取汁穿山甲十片燒存性川椒末五錢生薑四兩取汁和研生絹包擦如干入醋潤濕數次如初纍效抓破面皮生薑自然汁調輕粉末搽之更無痕跡救急方又香油調鉛粉搽之一夕愈集簡方滅痕用鷹屎二兩殭蠶一兩半為末蜜和敷之聖惠方又方用鷹屎白白附子各一兩為末醋和敷日三五次痕滅止聖濟總録頰腮痄腮腫痛醋調石灰敷之簡便方婦人頰瘡每年頻發水銀一兩半以豬脂揉擦令消盡入黃礬石末二兩胡粉一兩再加豬脂和令如泥洗瘡淨塗之別以胡粉塗膏上此甘家祕方也肘後方咽喉九種喉痹纏喉風喉爛喉重舌木舌飛絲入口用大皂莢四十挺切水三斗浸一夜煎至一斗半入人參末半兩甘草末一兩煎至五升去滓入無灰酒一升釜墨二匕煎如餳入瓶封埋地中一夜每溫酒化下一匕或掃入喉內取惡涎盡為度後含甘草片喉風急症一男子病纏喉風表裡皆腫藥不能下以涼藥灌入鼻中下十餘行外以陽起石燒赤伏龍肝等分細末日以新汲水調掃百遍三日熱始退腫始消此亦從治之道也急喉痹風不拘大人小兒玄參鼠黏子半生半炒各一兩為末新汲水服一盞立瘥聖惠方風熱喉痹及纏喉風病用焰硝一兩半白殭蠶一錢硼砂半兩腦子一字為末吹之名玉鑰匙三因方急喉痹塞牙關緊急不通用此即破以萆麻子仁研爛紙卷作筒燒煙燻吸即通或只取油作捻尤妙名聖煙筒纏喉風痹不通欲死者用返魂草根一莖洗淨納入喉中待取惡涎出即瘥神效更以馬牙硝津咽之絶根返魂草一名紫菀南人呼為夜牽牛喉痹口噤用地白根即馬蘭根或葉搗汁入米醋少許滴鼻孔中或灌喉中取痰自開無鮮者取刷帚煎汁服孫一鬆試效方喉痹塞口用韭地紅小蚯蚓數條醋擂取食之即吐去痰血兩三碗神效普濟用地龍一條研爛以雞子白攪和灌入即通聖惠方又蜒蚰炙二七枚白梅肉炒二七枚白礬半生半燒二錢研為末每水調半錢服得吐立通聖惠方急喉痹塞逡巡不救皂莢生研末每以少許點患處外以醋調厚封項下須臾便破出血即愈或挼水灌之亦良又方用皂角肉半截水二盞煎七分破出膿血即愈直指方牙皂一挺去皮弦醋浸炙七次勿令太焦為末每吹少許入咽吐涎即腫消痛止聖濟方咽中結塊不通水食危困欲死百草霜蜜和丸芡子大每新汲水化一丸灌下甚者不過二丸名百靈丸普濟方咽喉腫塞傷寒蘊要治痰涎壅滯喉腫水不可下者地松一名鶴風草連根葉搗汁鵝翎掃入去痰最妙又杜牛膝鼓槌草同搗汁灌之不得下者灌鼻得吐為妙聖濟又方土牛膝春夏用莖秋冬用根一把青礬半兩同研點患處令吐膿血痰沫即愈喉痹腫塞喘息不通須臾欲絶用絡石草二兩水二升煎一碗細細呷之少頃即通外臺祕要喉痹垂死用鴨嘴膽礬末醋調灌之大吐膠痰數升即瘥纍用無不立驗神方也又以鱧魚膽點入少許即瘥病深者水調灌之靈苑方喉痹乳蛾已死者復活用牆上壁錢七個內要活蜘蛛二個捻作一處以白礬七分一塊化開以壁錢惹礬燒存性出火毒為末竹管吹入立時就好忌熱肉硬物喉風喉痹開關散用白殭蠶炒白礬半生半燒等分為末每以一錢用自然薑汁調灌得吐頑痰立效小兒加薄荷少許同調一用白殭蠶炒半兩生甘草一錢為末薑汁調服涎出立愈集驗一用殭蠶三七枚乳香一分為末每以一錢燒煙熏入喉中涎出即愈聖惠一用鴨嘴膽礬二錢半白殭蠶炒五錢研每一少許吹之吐涎名二聖散濟生方又方用白梅肉綿裹含之咽汁又巴豆二粒切斷兩頭紙卷作筒以針穿孔內入喉中氣透即通勝金方又天南星一個剜心入白殭蠶七枚紙包煨熟研末薑汁調服一錢甚者灌之吐涎愈名如聖散博濟方無南星只用殭蠶為末薑汁調灌百一選方走馬喉痹馬屁勃即灰菰焰硝一兩為末每吹一字吐涎血即愈經驗方又詩云急喉腫痹最堪憂急取盛燈盞內油甚者不過三五呷此方原是聖人留亦治急病中風痰厥時珍方喉風閉塞臘月初一日取豬膽不拘大小五六枚用黃連青黛薄荷殭蠶白礬朴硝各五錢裝入膽內青紙包了將地掘一孔方圓各一尺以竹橫懸此膽在內以物蓋定候至立春日取出待風吹去膽皮青紙研末密收每吹少許神驗經驗方又用燈心一握陰陽瓦燒存性又炒鹽一匙每吹一捻數次立愈瑞竹堂方一方用燈心灰二錢蓬砂末一錢吹之一用燈心草紅花燒灰酒服一錢即消惠濟方又用紅藍花搗絞汁一小升服之瘥如無鮮者以乾紅花浸濕絞汁煎服亦效喉痹腫塞蝸牛七枚白梅肉三枚研爛綿裹含咽之立效喉痹不通漿水不入用射干一片含咽汁良或醋研汁噙引涎出亦妙外臺祕要射干山豆根為末吹之如神腫痛即消袖珍方又用紫蝴蝶根一錢黃芩生甘草桔梗各五分為末水調頓服立愈名奪命散便民方冬月喉痹腫痛不可用藥者蛇床子燒煙於瓶中口含瓶嘴吸烟其痰自出聖惠方治喉痹欲絶不可針藥者乾漆燒煙以筒吸之聖濟方治喉痹用皂莢末明礬好米醋同研含之咽汁立瘥傳信纏喉風牛草拳燒灰吹甚效時珍方帝鍾喉風垂長數寸煅食鹽頻點之即消聖惠方喉閉乳蛾雞肫黃皮勿洗陰乾燒末用竹管吹之即破愈青囊方又蝦蟆衣鳳尾草擂爛入霜梅肉煮酒各少許再研絞汁以鵝翎刷患處隨手吐痰即消也趙溍養病漫筆又雄雀屎二十個以砂糖和作三丸每以一丸綿裹含咽即時遂愈甚者不過一丸極有奇效普濟方又冰梅丸用青梅二十枚鹽十二兩淹五日取梅汁入明礬三兩桔梗白芷防風各二兩豬牙皂角三十條俱為細末拌汁和梅入瓶收之每用一枚噙咽津液凡中風痰厥牙關不開用此擦之尤佳喉癰乳蛾用礬三錢銅銚內熔化入劈開巴豆三粒煎乾去豆研礬吹之入喉立愈甚者以醋調灌之亦名通關散法制烏龍膽用白礬末盛入豬膽中風乾研末每吹一錢入喉取涎出妙濟生方又用蟾酥和草烏尖末豬牙皂角末等分丸小豆大每研一丸點患處神效活人心鏡又烏龍尾枯礬豬牙皂莢以鹽炒黃等分為末或吹或點皆妙孫氏集效方風毒咽腫咽水不下及瘰癧咽腫水服莨菪子末兩錢匕神良外臺祕要喉痹腫痛稻草燒取墨煙醋調吹鼻中或灌入喉中滾出痰立愈普濟方又益母草搗爛新汲水一碗絞濃汁頓飲隨吐愈冬月用根衛生易簡方又老黃瓜一枚去子入硝填滿陰乾為末每以少許吹之醫林集要又露蜂房灰白殭蠶等分為末每乳香湯服半錢食醫心鏡用蜂房灰每以一錢吹入喉內不拘大人小兒又用朴硝一兩細細含咽立效或加丹砂一錢氣塞不通加生甘草末二錢半吹之外臺又芥子末水和敷喉下干即易之又用辣芥子研末醋調取汁點入喉內待喉內鳴卻用陳麻骨燒煙吸入立愈並聖惠方又用蓬砂白梅等分搗丸芡子大每噙化一丸名破棺丹經驗方又五爪龍草車前草馬蘭菊各一握搗汁徐咽之醫學正傳又石蟹磨水飲並塗喉外聖濟録咽喉痹痛五月五日收桑上木耳白如魚鱗者臨時搗碎綿包彈子大蜜湯浸含之立效便民方咽喉腫痛咽物不得馬勃一分蛇殼一條燒末綿裹一錢含咽立瘥聖惠方熱壅咽痛縮砂殼為末水服一錢戴原禮方喉卒攻痛商陸切根炙熱隔布尉之冷即易立愈圖經本草咽喉痛症凡先曾多服甘桔湯慎勿以玉樞丹紫金錠相繼犯者必死中有大戟故也自記咽喉腫痛語聲不出用瓜蔞皮白殭蠶炒甘草炒各二錢半為末每服三錢半薑湯下或以綿裹半錢含咽一日二服名發聲散御藥院方風熱喉痛白礬半斤研末化水新磚一片浸透取曬又浸又曬至水乾入糞廁中浸一月取洗安陰處待霜出掃收每服半錢水下普濟方肺熱喉痛有痰熱者甘草炒二兩桔梗米泔浸一夜一兩鼠黏根二兩每服二錢水一鍾半入阿膠半片煎服錢乙直訣熱病咽痛童便三合含之即止聖濟總録治咽喉痛不下飲食漿飲服筆頭灰二錢時珍方咽喉熱痛龍膽汁擂水服之集簡方喉痹痰嗽杏仁去皮熬黃三分和桂末一分研泥裹含之咽汁亦治卒失音聲陳藏器本草喉中發癰山豆根磨醋噙之追涎即愈勢重不能言者頻以雞翎掃入喉中引涎出就能言語永類懸癰喉痛風熱上搏也惡實炒甘草生等分水煎含咽名啓開散普濟方咽中懸癰舌腫塞痛五倍子末白殭蠶末甘草末等分白梅肉搗和丸彈子大噙咽其癰自破也朱氏經驗方懸癰垂長咽中煩悶白礬燒灰鹽花等分為末箸頭頻點在上去涎祕寶方喉中生肉綿裹箸頭拄鹽揩之日五六度孫真人方喉中似物吞吐不出腹脹羸瘦取白蘘荷根搗汁服蟲立出也梅師方咽喉口舌生瘡者以吳茱萸末醋調貼兩足心移夜便愈其性雖熱而能引熱下行蓋亦從治之義也集驗方咽喉生瘡脾肺虛熱上攻也麥門冬一兩黃連半兩為末煉蜜丸梧子大每服二十丸麥門冬湯下普濟方喉痹已破瘡口痛者豬腦髓蒸熟入姜醋吃之即愈普濟咽膈不利風壅涎唾牛蒡子微炒荊芥穗一兩炙甘草半兩為末食後湯服二錢當緩緩取效寇氏本草衍義鎖喉蛇瘴嶺南朴蛇瘴一名鎖喉瘴項大腫痛連喉用赤足蜈蚣一二節研細水下即愈聖濟總録療咽喉病及噎病用染布藍水溫服一鍾良時珍方谷賊尸咽喉中痛癢此因誤吞谷芒檜刺癢痛也谷賊屬咽尸咽屬喉不可不分用脂麻炒研白湯調下三因方咽喉谷賊小兒誤吞稻芒著咽喉中不能出者名曰谷賊惟以鵝涎灌之即愈蓋鵝涎化谷相制耳夷堅志直指方用蓬砂牙硝等分蜜和半錢含咽尸咽痛癢語言不出棐實半兩蕪荑一兩杏仁桂心各半兩為末蜜丸彈子大含之聖濟總録天絲入咽凡露地飲食有飛絲入上食之令咽喉生瘡急以白礬巴豆燒灰吹入即愈瑣碎一方嚼胡麻葉即愈咽喉怪症生瘡層層如疊不痛日久有竅出臭氣廢飲食用臭橘葉煎湯連服必愈夏子益奇方筋筋骨急痛虎骨和通草煮汁空肚服半升復臥少時汗出為效切忌熱食損齒小兒不可與食恐齒不生食療本草人身上結筋木勺打之三下自散髭發南燭煎益髭發及容顏兼補暖三月三日採葉並蕊子入大瓶中干盛以童便浸滿瓶固濟其口置閒處經一周年取開每用一匙溫酒調服一日二次極有效驗千金黑髮方用自己亂髮洗淨每一兩入川椒五十粒泥固入瓶煅黑研末每空心酒服一錢令髮長黑烏髭變白小雌雞二隻只與烏油麻一件同水飼之放卵時收取先放者打竅以硃砂末填入糊定同衆卵抱出雞取出其藥自然結實研粉蒸餅和丸緑豆大每酒下五七丸不惟變白亦且愈疾張璐方小神丹方真丹末三斤白蜜六斤攪和日曝至可丸丸麻子大每旦服十丸一年白髮返黑齒落更生身體潤澤老翁成少抱朴子內編揩牙烏須麻油八兩鹽花三兩生地黃十斤取汁同入鐺中熬干鐵蓋覆之鹽泥泥之煅赤取研末日用三次揩畢飲薑茶先從眉起一月皆黑也烏須兼明目黑鉛半斤鍋內熔汁旋入桑條灰柳木攪成沙篩末每早揩牙以水漱口洗目能固牙明目黑頭髮勝金方染烏鬚髮用五倍子一斤研末銅鍋炒之勿令成塊如有煙起即提下攪之從容上火慢炒直待色黑為度以濕青布包扎足踏成餅收貯聽用每用時以皂角水洗淨鬚髮用五倍子一兩紅銅末酒炒一錢六分生白礬六分訶子肉四分沒石子四分硇砂一分為末烏梅酸榴皮煎湯調勻碗盛重湯煮四五十沸待如飴狀以眉掠刷於鬚髮上一時洗去再上包住次日洗去以核桃油潤之半月一染甚妙杏林摘要又取青胡桃子上皮和蝌蚪搗為泥染之一染不變也一方用蝌蚪黑桑椹各半斤瓶密封懸屋東百日化泥取塗鬚髮黑如漆也又岣嶁神書云三月三日取蝌蚪一合陰乾候椹熟時取汁一升浸埋東壁下百日取出其色如漆以塗髭發永不白也又談野翁方用水蛭為極細末以龜尿調捻鬚稍自行入根也一用白烏骨雞一隻殺血入瓶中納活水蛭數十於內待化成水以豬膽皮包脂蘸捻鬚稍自黑入根也又醋煮黑大豆取豆煎稠染之千金方烏須鉛梳鉛十兩錫三兩婆羅得三個針砂熟地黃半兩茜根胡桃皮一兩沒石子訶黎勒皮硫黃石榴皮磁石皂礬烏麻油各二錢半為末先化鉛錫入末一字柳木攪勻傾入梳模子印成修齒余末同水煮梳三日三夜水耗加之取出故帛重包五日每以熟皮襯手梳一百下須先以皂莢水洗淨拭乾普濟方拔白換黑刮老生薑皮一大升於久用油膩鍋內不須洗刷固濟勿令通氣令精細人守之文武火煎之不得火急自旦至夕即成矣研為末拔白後先以小物點麻子大入孔中或先點須下然後拔之以指捻入三日後當生黑者神效蘇頌治人無發以甜瓜葉搗汁塗之即生嘉祐治發禿不生羊屎燒灰淋汁沐頭不過十度即生髮長黑和雁肪塗頭亦良藏器或用羊屎納鯽魚腹中瓦缶固濟燒灰塗發易生而黑甚效蘇頌癤瘡上不生髭發先以竹刀刮損以萵苣子猢猻薑末頻頻擦之摘玄方眉發火瘢不生者蒲灰以正月狗腦和敷日二則生聖惠令發易長取東行棗根三尺橫安甑上蒸之兩頭汗出收取敷發即易長聖惠方令發不落棐子三個胡桃二個側柏葉一兩搗浸雪水梳髮永不落且潤也聖惠方又桑白皮銼二升以水淹浸煮五六沸去滓頻頻洗沐自不落也聖惠方赤禿髮落牛角羊角燒灰等分豬脂調塗聖惠方病後發落猢猻姜野薔薇嫩枝煎汁刷之仁存方令髮長黑生麻油桑葉煎過去滓沐發令長數尺普濟方鬚髮黃赤生地黃一斤生薑半斤各洗研自然汁留滓用不蛀皂角十條去皮弦蘸汁炙至汁盡為度同滓入罐內泥固煅存性為末用鐵器盛末三錢湯調停二日臥時刷染鬚髮上即黑本事方發毛黃赤羊屎燒灰和臘豬脂塗之日三夜一取黑乃止聖惠方發毛黃色以熊脂塗發梳散入床底伏地一食頃即出便盡黑不過用脂一升效千金方發槁不澤桑根白皮柏葉各一升煎汁沐之即潤頭髮垢膩雞子白塗之少頃洗去光澤不燥李瀕湖又雁肪日日塗之千金方眉毛不生芥菜子半夏等分為末生薑自然汁調搽數次即生孫氏集效方腋腋氣胡臭大田螺一個入麝香三分在內埋露地七七日取出看患洗拭以墨塗上再洗看有墨處是患竅以螺汁點之三五次即瘥又牛脂和胡粉塗之三度永瘥姚氏方又雞子兩枚煮熟去殼熱夾待冷棄之三叉路口勿回顧如此三次效肘後方又大蜘蛛一枚以黃泥入少赤石脂末及鹽少許和勻裹蛛煅之為末入輕粉一字醋調成膏臨臥敷腋下明早登廁必泄下黑汁也三因方又自己小便乘熱洗兩腋下日洗數次久則自愈集簡方又用自己唾擦腋下數過以指甲去其垢用熱水洗手數遍如此十餘日愈蠱毒蠱毒百毒及諸熱毒時氣熱病口鼻血出用人屎尖七枚燒灰水調頓服溫覆取汗即愈勿輕此方外臺祕要盅毒藥毒甘草節以真麻油浸之年久愈妙每用嚼咽或水煎服神妙直指方凡中蠱毒或下血如鵝肝或吐血或心腹切痛如有物咬不即治之食人五臟即死欲知是蠱但令病人吐水沉者是浮者非也用敗鼓皮燒灰酒服方寸匕須臾自呼蠱主姓名梅師方一方治蠱取敗鼓皮廣五寸長一尺薔薇根五寸如拇指大水一升酒三升煮二升服之當下蠱蟲即愈外臺祕要中蠱下血如雞肝晝夜出血石余四臟皆損惟心未毀或鼻破將死者苦桔梗為末以酒服方寸匕日三服不能下藥以物勾口灌之心中當煩須臾自定七日止當食豬肝肺以補之神良一方加犀角等分古今録驗方解中盅毒其症腹內堅痛面黃青色淋露骨立病變不常桑木心銼一斛著釜中以水淹三斗煮取二斗澄清微火煎得五升空心服五合則吐蠱毒出也肘後方又用斑蝥蟲四枚去翅足炙熟桃皮五月五日採取去黑皮陰乾大戟去骨各為末加斑蝥一分二味各用二分和合棗核大以米清服之必吐出蟲一服不瘥十日更服此蠱洪州最多有老嫗解療之一人獲縑二十匹祕方不傳後有子孫犯法黃華公為都督因而得之也席辨刺史傳又地栗曬乾為末白湯每服二錢集驗方吐解蠱毒以清油多飲取吐嶺南方殺蟲療蠱治諸毒預知子去皮研服有效蠱痢下血男子婦人小兒大腹下黑血茶腳色或膿血如澱色柏葉焙乾為末與黃連同煎為汁服之本草圖經蟲寸白蛔蟲胡粉炒燥方寸匕入肉臛中空心服大效備急又蜂窠燒存性酒服一匙蟲即死出生生編又酢石榴東引根一握洗銼用水三升煎取半碗五更溫服盡至明取下蟲一大團永絶根本食粥補之崔元亮海上方腹中白蟲馬齒莧水煮一碗和鹽醋空腹食之少頃白蟲盡出也孟詵食療治寸白蟲日食棐子七顆滿七日蟲皆化為水也外臺祕要用棐子一百枚去皮火燃啖之經宿蟲消下也胃弱者啖五十枚又檳榔二七枚為末先以水一升煮檳榔皮取一升空心調末方寸匕服之經日蟲盡出未盡再服以盡為度千金又雷丸水浸去皮切焙為末五更初食炙肉少許以稀粥飲服一錢匕須上半月服蟲乃下經驗方又櫻桃東行根煮汁服立下又金櫻子東行根銼二兩入糯米三十粒水二升煎五合空心服須臾瀉下神驗時珍方又先食豬肉一片乃以砂糖水調黑鉛灰四錢五更服之蟲盡下食白粥一日許學士病嘈雜服此下二蟲一寸斷一長二尺五寸節節有斑紋也本事方蛔蟲攻心刺痛吐清水龍膽一兩去頭銼水二盞煮一盞隔宿勿食平旦頓服之聖惠方又用蔥莖白二寸鉛粉二錢搗丸服之即止蔥能通氣粉能殺蟲也楊氏經驗方又干蚓熬作屑去蛔蟲甚有效弘景蛔蟲上行出於口鼻烏梅煎湯頻飲並含之即安食鑑本草脾胃有蟲食積作痛面黃無色以石州蕪荑仁二兩和麵炒黃色為末非時米飲服二錢匕千金方男子婦人因食生熟物留滯腸胃遂至生蟲久則好食生米否則終日不樂至憔悴萎黃不思飲食以害其生用蒼朮米泔水浸一夜銼焙為末蒸餅丸梧子大每服五十丸食前米飲下日三服經驗方消渴有蟲苦楝根白皮一握切焙入麝香少許水二碗煎至一碗空心飲之雖困頓不妨下蟲如蛔而紅色其渴自止消渴有蟲人所不知夷堅志蟲食肛爛見五臟則死以豬脂和馬蹄灰綿裹導入下部日數度瘥肘後方活蝨入腹為病成癥瘕者舊梳萆煮汁服之藏器方頭上生蝨水銀和蠟燭油揩之一夜皆死摘玄方薰衣去蝨百部秦艽為末入竹籠燒煙熏之自落亦可煮湯洗衣經驗方闢除蚤蝨天茄葉鋪於席下次日盡死即龍葵葉熏壁蝨蟹殼燒煙熏之摘玄方闢除壁蝨以木瓜切片鋪席下臞仙神隱燒煙去蚊五月取浮萍陰乾用之
