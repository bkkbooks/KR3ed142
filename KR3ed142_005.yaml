body:
  text: 卷五溲血小便尿血益母草搗汁服一升立瘥此蘇澄方也外臺秘要又槐花炒鬱金煨各一兩為末每服二錢淡豉湯下立效篋中秘方又茅根煎湯頻飲為佳談埜翁方又金陵草即旱蓮草車前草各等分杵取自然汁每空心服三杯愈乃止醫學正傳又發灰一錢醋湯服永類方又玄胡索一兩朴硝七錢半為末每服四錢水煎服活人書又鬱金末一兩蔥白一握水一盞煎至三合溫服日三服經驗方又香附子新地榆等分各煎湯先服香附湯三五呷後服地榆湯至盡未效再服指迷方又白芷當歸等分為末米飲每服二錢經驗方又面麩炒香以肥豬肉蘸食之集玄方男婦溺血龍骨末水服方寸匕日三千金方男子溺血黑豆一升炒焦研末熱酒淋之去豆飲酒神效活人心統陰虛尿血人參焙黃耆鹽水炙等分為末用紅皮大蘿蔔一枚切作四片以蜜二兩將蘿蔔逐片蘸炙令乾再炙勿令焦以蜜盡為度每用一片蘸藥食之仍以鹽湯送下以瘥為度三因方又白膠三兩炙水二升煮一升四合分服外臺方勞傷溺血茅根乾薑炒黑等分入蜜一匙水二鍾煎一鍾日一服卒然尿血不止龍膽一虎口水五升煮取二升半分為五服集驗方下血大小便血劉寄奴為末茶調空心服二錢即止集簡方又好墨細末二錢阿膠化調服熱多者尤相宜衍義方諸般下血腸風酒痢血痔鼠痔黑狗脊黃者不用須內肉赤色者即本草貫眾也去皮毛銼焙為末每服二錢空心米飲下或醋糊丸梧子大每米飲下三四十丸或燒存性出火毒為末入麝香少許米飲服二錢諸般下血香附童子小便浸一日搗碎醋拌焙為末每服二錢米飲下直指方結陰下血腹痛不已地榆四兩炙甘草三兩每服五錢水一盞入縮砂四七枚煎一盞半分二服宣明方結陰便血雄黃不拘多少入棗內線系定煎湯用鉛一兩化汁傾入湯內同煮自早至晚不住添沸湯取出為末共棗杵為丸梧子大每服三十丸煎黑鉛湯空心下只三服止普濟方脾濕下血蒼朮二兩地榆一兩分作二服水二盞煎一盞食前溫服保命集臟毒下血用淡豉十枚大蒜二枚煨同搗丸梧子大煎香菜湯服二十丸日二服安乃止永絕根本無所忌此藥甚妙但大蒜九蒸乃佳仍以冷齏水送下究原方大便瀉血血餘半兩燒灰雞冠花柏葉各一兩為末臥時酒服二錢來早以溫酒一盞投之一服見效普濟方又羊血煮熟拌醋食最效食療方又黃牛角腮一具煅末煮豉汁服二錢日三神效近效方又勃薺搗汁大半鍾好酒半鍾空心溫服日三見效神秘方又三七研末同淡白酒調一二錢服三服可愈加五分入四物湯亦可兼治婦人血崩集簡方又用槐花荊芥穗等分為末酒服一錢匕經驗方又用荊芥穗炒為末米飲服二錢經驗方又方柏葉三錢槐花六錢煎湯日服集簡方又槐花枳殼等分炒存性為末新汲水服二錢袖珍方又隨四時方向採側柏葉燒研每米飲服二錢百一選方又血見愁少許薑汁和搗米飲服之證治要訣又大蘿蔔皮燒存性荷葉燒存性蒲黃生用等分為末每服一錢米飲下普濟方又百藥煎荊芥穗燒存性等分為末糊丸梧子大每服五十丸米飲下聖惠方大便瀉血三代相傳者縮砂仁為末米飲熱服二錢以愈為度十便良方瀉血不止巴豆一個去皮以雞子開一孔納入紙封煨熟去巴豆食之其病即止虛人分作二服決效普濟方又用獺肝一副煮熟入五味食之妙飲膳正要治五種腸風瀉血糞前有血名外痔糞後有血名內痔大腸不收名脫肛穀道四面如奶名舉痔頭上有孔名瘻瘡內有蟲名蟲痔並皆治之槐角去梗炒一兩地榆當歸酒焙防風黃芩枳殼麩炒各半兩為末酒糊丸梧子大名槐角丸每服五十丸米飲下和劑局方腸風大小便血淋瀝疼痛用繭黃蠶蛻紙並燒存性晚蠶砂白殭蠶並炒等分為末入麝香少許每服二錢用米飲送下日三服甚效聖惠方不拘大人小兒臟毒腸風及內痔下血日久多食易飢先用海螵蛸炙黃去皮研末每服一錢木賊湯下三日後服豬臟黃連丸直指方腸風痔瘻下血年深日近者用臘月野貍一枚蟠在罐內炒大棗半升枳殼半斤甘草四兩豬牙皂莢二兩同入罐內蓋定瓦上穿一孔鹽泥固濟煅令乾作一地坑以十字支住罐子用炭五秤煅至黑煙盡青煙出取起濕土罨一宿為末每服二錢鹽湯下一方以貍作羹其骨燒灰酒服楊氏家藏方久病腸風痛癢不止地榆五錢蒼朮一兩水二鍾煎一鍾空心服日服活法機要久近腸風下血用緊炭三錢枳殼燒存性五錢為末每服三錢五更米湯飲下一服天明再服當日見效忌油膩毒物普濟方腸風臟毒下血不止旱蓮草瓦上焙研末每服二錢米飲下經驗方久患下血大茄種三枚每用一枚濕紙包煨熟安瓶內以無灰酒一升半沃之蠟紙封閉三日去茄暖飲普濟方腸風痔漏脫肛瀉血面色萎黃積年不瘥者白朮一斤黃土炒過研末乾地黃半斤飯上蒸熟搗和干則入少酒丸梧子大每服十五丸米飲下日三服普濟方下血不止二十年者取地榆鼠尾草各二兩水二升煮一升頓服若不斷以水漬屋塵飲一小杯投之肘後方臟毒下血以乾柿燒灰飲服二錢遂愈有人患此半月自分必死得此方服之即愈時珍方腸風下血不拘遠年近日用枳殼燒黑存性五錢羊脛灰為末三錢五更空心米飲服如人行五里再壹服當日見效博濟方腸風下血霜後乾絲瓜燒存性為末空心酒服二錢又方絲瓜一個燒存性槐花減半為末空心米飲服二錢本事方又皂莢子槐實一兩用占穀糠炒香去糠為末陳粟米飲下一錢名神效散聖惠方又香白芷為末每服二錢米飲下神效選奇方又柏子十四個捶碎囊貯浸好酒三盞煎八分服立止普濟方又活鯽魚一大尾去腸留鱗入五倍子末填滿泥固煅存性為末酒服一錢或飯丸日三服又用硫黃壹兩如上法煅服亦效百一方又用榼藤子二個不蛀皂莢子四十九個燒存性為末每服二錢溫酒下少頃再飲酒一盞趁口服極效華佗方又用大腸一條入芫荽在內煮食救急方又方用豬臟入黃連末在內煮爛搗丸梧子大每米飲服三十丸奇效方又方豬臟入槐花末令滿縛定以醋煮爛搗為丸如梧子大每服二十丸溫酒下又白刺蝟皮一枚銚內燖焦去皮留刺木賊半兩炒黑為末每服二錢熱酒調服楊氏方又銀杏四十九枚去殼生研入百藥煎末和丸彈子大每服二三丸空心細嚼米飲送下證治要訣又生地黃熟地黃並酒浸五味子等分為末以煉蜜丸梧子大每酒下七十丸百一選方又黃耆黃連等分為末麵糊丸綠豆大每服三十丸米飲湯下秘寶方又百藥煎燒存性烏梅連核燒過白芷不見火為末水糊丸梧子大每服七十丸米飲下濟生方又槐耳燒二兩乾漆燒一兩為末每服一錢溫酒下聖濟錄又百草霜五錢以米湯調露一夜次早空心服經驗方又黃連為末獨頭蒜煨研和丸梧子大每空心陳米飲下四十丸濟生方又苦楝子炒黃為末蜜丸梧子大米飲每吞十丸至二十丸經驗方又秭木皮曬焙研末米飲服二錢兩服可止蘇頌方瘀血內漏蒲黃末二兩每服方寸匕水調下服盡止肘後方腸風下血脫肛蛇黃二顆火煅醋淬七次為末每服三錢陳米飲下普濟方下血虛寒日久腸冷者熟附子去皮枯白礬一兩為末每服三錢米飲下又方熟附子一枚去皮生薑三錢半水煎服或加黑豆一百粒並聖惠方腸風下血用寒藥熱藥及脾弱藥俱不效者獨用山楂乾者為末艾湯調下應手即愈百一選方下血止後但覺丹田元氣虛乏腰膝沉重少力桑寄生為末每服一錢非時白湯點服護命方卒瀉鮮血小薊葉搗汁溫服一升梅師方暴下血病用大蒜五七枚去皮研膏入豆豉搗丸梧子大每米飲下五六十丸無不愈者本草衍義治腸胃積熱或因酒毒下血腹痛作渴脈弦數黃連四兩分作四份一份生用一份切炒一份炮切一份浸曬條黃芩一兩防風一兩為末麵糊丸如梧子大每服五十丸米泔浸枳殼水食前送下冬月加酒蒸大黃一兩楊氏家藏方大便下血及酒痢久痢不止用烏梅三兩燒存性為末醋煮米糊和丸梧子大每空心米飲下二十丸日三濟生方大腸風虛飲酒過度挾熱下痢膿血痛甚多日不瘥用樗根白皮一兩人參一兩為末每服二錢空心溫酒調服米飲亦可忌油膩濕面青菜果子甜物雞豬魚羊蒜薤等宗奭方臟毒下痢赤白用香椿洗刮取皮日乾為末飲下一錢立效經驗方又地錦草洗曝乾為末米飲服一錢立止經驗方治風入臟或食毒積熱大便鮮血疼痛肛出或久患酒痢木饅頭燒存性棕櫚皮燒存性烏梅去核粉草炙等分為末每服二錢水一盞煎服和劑局方酒毒下血或下痢嫩柏葉九蒸九曬二兩陳槐花炒焦一兩為末蜜丸梧子大每空心溫酒下四十丸普濟方酒毒便血曲一塊濕紙包煨為末空心米飲服二錢神效又槐花半生半炒一兩山梔子焙五錢為末新汲水服二錢經驗良方糞前有血令人面黃酢石榴皮炙研末每服二錢用茄子枝煎湯服孫真人糞後下血王不留行末水服一錢聖濟總錄又白雞冠花並子炒煎服聖惠方糞後下血不拘大人小兒五倍子末艾湯服一錢全幼心鑑蓄血腹中血塊血竭沒藥各一兩滑石牡丹皮同煮過一兩為末醋糊丸梧子大服之摘玄方治內傷血痛用降真香自番舶來者色較紅香氣甜而不辣用之入藥勝色深紫者上部傷瘀血停積胸膈骨節按之痛或並脅肋痛此吐血候也急用此藥刮入藥服之良內傷或怒氣傷肝吐血用以代鬱金效頭痛止頭痛八月朔日收露水取磨墨點太陽穴時珍方風熱頭痛荊芥穗石膏等分為末每服二錢茶調下永類鈐方又菊花石膏川芎各三錢為末每服一錢半茶調下簡便方又龍腦末半兩南蓬砂末一兩頻搐兩鼻御藥院方風寒頭痛治風寒客於頭中清涕項筋急硬胸中寒痰嘔吐清水用大附子或大川烏頭二枚去皮蒸過川芎藭生薑各一兩焙研以茶湯調服一錢或銼片每用五錢水煎服隔三四日再服或加防風一兩三因方治風寒流注偏正頭痛年久不愈最有神效用大附子一個生切四片以薑汁一盞浸炙再浸再炙汁盡乃止高良薑等分為末每服一錢臘茶清調下忌食熱物少時治大寒犯腦頭痛以酒拌吳茱萸葉袋盛蒸熟更互枕熨之痛止為度時珍方風虛頭痛欲破者杏仁去皮尖研末水九升研濾汁煎如麻腐狀取和羹粥食七日後大汗出諸風漸減慎風冷忌豬雞魚蒜醋千金方腦風頭痛不可忍遠志末㗜鼻宣明方風痰頭痛不可忍天南星一兩荊芥葉一兩為末薑汁糊丸梧子大每食後薑湯下二十丸濟生方又梔子末和蜜濃傅舌上吐即止李絳手集又苦瓠膜取汁以葦管灌入鼻中其氣上衝腦門須臾惡涎流下其病立愈除根勿以昏暈為疑乾者浸汁亦效其子為末吹入亦效年久頭風皆愈普濟方痰厥頭痛牛蒡子炒旋覆花等分為末臘茶清服一錢日二服聖惠方又白附子天南星半夏等分生研為末生薑自然汁浸蒸餅丸綠豆大每服四十丸食後薑湯下濟生方痰厥頭痛如破厥氣上衝痰塞胸膈炮附子三分釜墨四錢冷水調服方寸匕當吐即愈忌豬肉冷水氣厥頭痛不拘多少及產後頭痛天台烏藥川芎藭等分為末每服二錢臘茶清調下產後鐵錘燒紅淬酒調下濟生方氣鬱頭痛用香附子炒四兩川芎藭二兩為末每服二錢臘茶清調下常服除根明目又用蓖麻子同乳香食鹽搗貼太陽穴一夜痛止時珍方濕熱頭痛黑牽牛七粒砂仁一粒研末井華水調汁仰灌鼻中待涎出即愈聖濟錄又瓜蒂末一字㗜鼻中口含冷水取出黃水愈活人書氣虛頭痛大附子一枚剜心入全蠍去毒三枚在內以余附末同鍾乳粉二錢半白麵少許水和作劑包附煨熟去皮研末蔥涎和丸梧子大每椒鹽湯下五十丸此方最合造化之妙附子助陽扶虛鍾乳補陽鎮墜全蠍取其鑽透蔥涎取其通氣湯使用椒以達下鹽以引用使虛氣下歸對證用之無不作效又真川芎藭為末臘茶調服二錢甚捷曾有婦人產後頭痛一服即愈集簡方腎虛頭痛用硫黃一兩胡粉為末飯丸梧子大痛時冷水服五丸即止聖惠方治元陽虛頭痛如破眼睛如錐刺大川烏頭去皮微炮全蠍以糯米炒過去米等分為末韭根汁丸綠豆大每薄荷茶下十五丸一日一服經驗方飲酒頭痛竹茹二兩水五升煮三升納雞子三枚煮三沸食之千金方頭痛欲死硝石末吹鼻內即愈炮炙論頭痛不止楊梅為末以少許㗜鼻取嚏妙頭痛欲裂當歸二兩酒一升煮取六合飲之日再服外臺秘要頭痛至極童便一盞豉心半合同煎至五分溫服年久頭痛以烏頭天南星等分為末蔥汁調塗太陽穴經驗方卒然頭痛白殭蠶為末每用熟水下二錢立瘥斗門方頭痛連睛鼠黏子石膏等分為末茶清調服醫方摘要眉眶作痛風熱有痰黃芩酒浸炒白芷等分為末每服二錢茶下潔古家珍頭風八種頭風蓖麻子剛子各四十九粒去殼雀腦芎一大塊搗如泥糊丸彈子大線穿掛風處陰乾用時先將好末茶調成膏子塗盞內後將炭火燒前藥煙起以盞覆之待煙盡以百沸蔥湯點盞內連茶藥服之後以綿被裹頭臥汗出避風袖珍方又魚鰾燒存性為末臨臥以蔥酒服二錢又半夏末入百草霜少許作紙捻燒煙就鼻內㗜之口中含水有涎吐去再含三次見效衛生寶鑑又和州藜蘆一莖日乾研末入麝香少許吹鼻又方通頂散藜蘆半兩黃連三分㗜鼻聖惠方頭風疼痛五月五日取蚯蚓和腦麝杵丸梧子大每以一丸納鼻中隨左右先塗薑汁在鼻立愈總錄又用香白芷一味洗曬為末煉蜜丸彈子大每嚼一丸以茶清或荊芥湯化下此都梁名醫楊介治王定國病有驗名都梁丸其藥治頭風眩暈女人胎前產後傷風頭痛血風頭痛皆效又用大蒜七個去皮先燒紅地以蒜逐個於地上磨成膏子卻以殭蠶一兩去頭足安蒜上碗覆一夜勿令透氣只取蠶研末㗜入鼻內口中含水甚效聖濟錄又光明硫黃硝石各一兩細研水丸芡子大空心嚼一丸茶下普濟方又荊瀝日日服之集驗方此治痰頭風又蔓荊子一升為末絹袋浸一斗酒中七日溫飲日三次千金方風氣頭痛不可忍者乳香蓖麻仁等分搗餅隨左右貼太陽穴解發出氣甚驗又方蓖麻仁半兩棗肉十五枚搗塗紙上捲筒插入鼻中下清涕即止頭風熱痛山豆根末油調塗兩太陽備急方頭風涕淚疼痛不已石膏煅二兩川芎二兩甘草炙半兩為末每服一錢蔥白茶湯調下日二服宣明方頭風畏冷以蕎麥粉二升水調作二餅更互合頭上微汗即愈怪證奇方頭風腦痛玄精石末入羊膽中陰乾水調一字吹鼻中立止千金方頭風斧劈難忍川烏頭末燒煙熏碗內溫茶泡服集簡方頭風眩暈香白芷一味洗曬為末煉蜜丸彈子大每嚼一丸以茶清或荊芥湯化下時珍方又蟬殼一兩微炒為末非時酒下一錢白湯亦可聖惠方頭風旋暈痰逆噁心懶食真零陵香藿香葉莎草根炒等分為末每服二錢茶下日三服本事方頭項風強八月後取荊芥穗作枕及鋪床下立春日去之千金方年久頭風萊菔子生薑等分搗取汁入麝香少許搐入鼻中立止普濟方雷頭風病羊屎焙研酒服二錢普濟方雷頭風腫不省人事落帚子同生姜研爛沖熱酒服取汗即愈聖濟總錄雷頭風證頭面疙瘩腫痛憎寒發熱狀如傷寒病在三陽不可過用寒藥重劑誅伐無過一人病此諸藥不效余處清震湯治之而愈用薄荷葉一枚升麻五錢蒼朮五錢水煎溫服蓋震為雷而薄荷之形象震體其色又青乃涉類象形之義也時珍方偏正頭風草烏頭四兩川芎藭四兩蒼朮半斤生薑四兩連須生蔥一把搗爛同入瓷瓶封固埋土中春五夏三秋五冬七日取出曬乾揀去蔥姜為末醋麵糊和丸梧子大每服九丸臨臥溫酒下立效經驗方又防風白芷等分為末煉蜜丸彈子大每嚼三丸茶清下普濟方又香白芷炒二兩五錢川芎炒甘草炒川烏頭半生半熟各一兩為末每服一錢細茶薄荷湯調下試效方又生蘿蔔汁一蜆殼仰臥隨左右注鼻中神效如宜方又人中白地龍炒等分為末羊膽汁丸芥子大每新汲水化一丸注鼻中搐之名一滴金普濟方又用穀精草一兩為末以白麵糊調攤紙花上貼痛處干換集驗方又用穀精草末銅綠各一錢硝石半分隨左右㗜鼻聖濟方又醴腸草即旱蓮草汁滴鼻中聖濟總錄偏正頭風並夾頭風連兩太陽穴痛白殭蠶為末蔥茶調服方寸匕聖惠方偏正頭風氣上攻不可忍用全蠍二十一個地龍六條土狗二個五倍子五錢為末酒調攤貼太陽穴上經驗方偏正頭風痛不可忍龍香散用地龍去土焙乳香等分為末每以一字作紙捻燈上燒煙以鼻㗜之聖濟總錄澹寮方加人指甲等分每取一捻香爐上慢火燒之以紙筒引煙入鼻熏之口噙冷水有涎吐去仍以好茶一盞點呷即愈又玄胡索七枚青黛二錢牙皂二個去皮子為末水和丸如杏仁大每以水化一丸灌入病人鼻內隨左右口咬銅錢一個當有涎出成盆而愈永類方偏正頭風不拘遠近諸藥不效者如神用白芷芎藭各三錢為末以黃牛腦子搽抹在上瓷器內加酒燉熟乘熱食之儘量一醉醒則其病如失甚驗保壽堂方偏頭風痛京芎細銼浸酒日飲之斗門方又用雄黃細辛等分為末每以一字吹鼻左痛吹右右痛吹左名玉靈散博濟方又蓽茇為末令患者口含溫水隨左右痛以左右鼻吸一字有效經驗良方又硇砂末一分水潤豉心一分搗丸皂子大綿包露出一頭隨左右納鼻中立效聖惠方又用鵝不食草一兩火硝四錢雄黃三錢黃丹二錢各為細末秤准和作散如患在右吹右鼻在左吹左鼻吹時口內噙水將指掩不吹鼻藥吹入時以意吸引入腦如腦漏加石首魚內石火煅存性二錢忌鵝肉豬頭肉秘方頭風風眼蕎麥作錢大餅貼眼四角以米大艾柱灸之即效如神頭風白屑零陵香白芷等分水煎汁入雞子白攪勻傅數十次終身不生聖惠方又羊蹄草根杵同羊膽汁塗之永除聖惠方又新下烏雞子三枚沸湯五升攪作三度沐之甚良集驗方又王不留行香白芷等分為末乾摻一夜篦去聖惠方又藁本白芷等分為末夜擦旦梳垢自去也便民圖纂治腦冷漏下者白雞冠子酒煎服效自記頭腦鳴響狀如蟲蛀名天白蟻以茶子為末吹入鼻中取效醫方摘要附補頭風白屑頭風白屑作癢狗頭骨燒灰淋汁沐之聖惠方頭風白屑桑灰淋汁沐之神良聖惠方頸項強痛風襲項強不得顧視穿地作坑煅赤以水灑之令溫鋪生桃葉於內臥席上以項著坑上蒸至汗出良久即瘥千金方又大豆一升蒸變色囊裹枕之千金方腎氣上攻頭項不能轉移椒附丸用大熟附子一枚為末每用二錢以椒二十粒用白麵填滿椒口水一盞半姜七片煎七分去椒入鹽空心點服椒氣下達以引逆氣歸經也本事方心脾痛治心腹諸疾卒暴百病用大黃巴豆乾薑各一兩搗篩蜜和搗一千杵丸小豆大每服三丸凡中客卒忤心痛脹滿痛如錐刀氣急口噤停屍卒死者以暖水或酒服之或灌之未知更服三丸腹中鳴轉當吐下便愈若口已噤者折齒灌之入喉即瘥名三物備急丸此乃仲景方司空裴秀改為散用不及丸也圖經本草心腹諸痛艾附丸治男女心氣痛腹痛少腹痛血氣痛不可忍者香附子二兩蘄艾葉半兩以醋湯同煮熟去艾炒為末米醋糊丸梧子大每白湯服五十丸集簡方止心腹痛古錢和薏苡根煎服心腹疼痛五倍子生研末每服一錢鐵勺內炒起煙黑色者為度以好酒一鍾傾入勺內服之立止經驗方又赤曲香附乳香等分為末酒服摘玄方又焰硝雄黃各一錢研細末每點少許入眥內名火龍丹集玄方又用黃鼠心肝肺一具陰乾瓦焙為末入乳香沒藥血竭孩兒茶末各三分每服一錢燒酒調下立止海上仙方心腹氣痛烏藥水磨濃汁一盞入橘皮一片紫蘇一葉煎服集簡方又香附子擦去毛焙二十兩烏藥十兩甘草炒一兩為末每服二錢鹽湯隨時點服名小烏沉湯此藥能調中快氣和劑局方心腹卒氣痛青魚頭中枕水磨服開寶卒心腹煩滿及胸脅痛者銼薏苡仁根煮濃汁服三升乃定肘後方一切冷氣搶心切痛發即欲死久患心腹痛時發者此可絕根蓬莪荗二兩醋煮木香一兩煨為末每服半錢淡醋湯下衛生家寶方寒厥心痛及小腸膀胱痛不可止者用熟附子去皮鬱金橘紅各一兩為末醋麵糊丸如酸棗大硃砂為衣名神砂一粒丹每服一丸男子酒下女人醋湯下宣明方心脾氣痛氣實有痰者牡蠣煅粉酒服二錢丹溪心法心脾氣痛不止者用田螺殼以松柴片層層疊上燒過火吹去松灰取殼研末以烏沉湯寬中散之類調服二錢效醫林集要心脾作痛雞心檳榔高良薑各一錢半陳米百粒同以水煎服之直指方心脾刺痛屬冷用蔥花一升同吳茱萸一升水八合煎七合去滓分三服立效崔元亮方又暖胃消痰二姜丸用乾薑高良薑等分炮研末糊丸梧子大每食後豬苓湯下三十丸和劑局方千金方只用良薑細銼微炒為末米飲服一錢立止又高良薑四兩切片作四份一兩用陳倉米半合炒黃去米一兩用陳壁土炒黃去土一兩用巴豆三十四個炒黃去豆一兩用斑蝥三十四個炒黃去蝥吳茱萸一兩酒浸一夜同姜再炒為末以浸茱酒打糊丸梧子大每空心薑湯下五十丸永類鈐方用高良薑三錢五靈脂六錢為末每服三錢醋湯調下心脾蟲痛不拘男女用五靈脂檳榔等分為末水煎石菖蒲調服三錢先嚼豬肉一二片海上仙方九種心痛當太歲上取新生槐枝一握去兩頭用水三升煎取一升頓服千金方又用桂心二錢半為末酒一盞半煎半盞飲立效聖惠方諸心氣痛用生礬一皂子大醋一盞煎七分服立止儒門事親又雞子一枚打破醋二合調服肘後方又真蛤粉炒過色白佐以香附末等分白湯淬服聖惠方又高粱根煎湯溫服神效又綠豆廿一粒胡椒十四粒同研白湯調服即止又方二味各用四十九粒研爛白湯調服心氣刺痛自然銅火煅醋淬九次研末醋調一字服即止易簡方又青木香一兩皂角炙一兩為末糊丸梧子大每湯服五十丸甚效攝生方又當歸為末酒服方寸匕必效方心氣㽲痛水紅花為末熱酒服二錢又法男用酒水各半煎服女用醋水各半煎服一婦年三十病此一服立效水紅花即大蓼莖粗如拇指有毛摘玄方治血刺心痛烏賊腹中墨醋磨服之炒研醋服亦可藏器血上逆心煩悶刺痛水牛角燒末酒服方寸匕子母秘錄男婦心痛不可忍者晚蠶砂一兩滾水泡過濾淨取清水服即止瑞竹堂方又薑黃一兩桂三兩為末醋湯服一錢亦治產後血痛經驗方冷熱心痛伏龍肝末方寸匕熱以水溫服冷以酒服外臺秘要心氣疼痛不可忍屬熱用乳香三兩真茶四兩為末以臘月鹿血和丸彈子大每服溫醋化一丸經驗方心口熱痛薑汁調青黛一錢服之醫學正傳心痛有食熱物及怒郁致死血留於胃口痛者宜用韭汁桔梗加入藥中開提氣血又腎氣上攻以致心痛者宜用韭汁和五靈脂散丸空心茴香湯下蓋韭性急能散胃口血滯也震亨方心下大痛屬冷者用胡椒四十九粒乳香一錢研勻男用生薑女用當歸酒下又方用胡椒五分沒藥三錢研細分二服溫酒下壽域方冷氣心痛鴿屎燒存性酒服一錢即止又乳香一粒胡椒四十九粒研入薑汁熱酒調服經驗方氣厥心痛不可忍鬱金附子乾薑等分為末醋糊丸梧子大硃砂為衣每服三十丸男酒女醋下奇效方濕痰心痛白螺螄殼洗淨燒存性研末酒服方寸匕立止正傳方中惡心痛鐺墨五錢鹽一錢研勻熱水一盞調下千金方鬼疰心痛東引桃枝一握去粗皮水二升煎半升頻服崔氏治肝氣心痛顏色蒼蒼如死灰喉如喘息者以雄狐屎二升燒灰和薑黃三兩搗末空腹酒下方寸匕日再甚效海上方心痛吐水不下飲食發止不定雌黃二兩醋二斤慢火煎成膏用干蒸餅和丸梧子大每服七丸薑湯下聖惠方一切心痛不拘大小男女大馬兜鈴一個燈上燒存性為末溫酒服立效摘玄方心氣疼痛不問遠近以山羊糞七枚油頭髮一團燒灰酒服永斷根集要方又蛤蜊粉同香附末薑汁調服震亨又以地黃一味隨人所食多少搗絞取汁搜面作餺飥或冷淘食良久當利出蟲長一尺許頭似壁宮後不復患矣蘇頌方心痛不止敗筆頭三個燒灰無根水服立效經驗方積年心痛不可忍不拘十年五年者隨手見效濃醋煮小蒜食飽勿著鹽曾用之有效再不發也李絳手集心痛不瘥四十年者黍米淘汁溫服隨意經驗方心痛欲死狗屎炒研酒服神效熱厥心痛或發或止久不愈身熱足寒者用玄胡索去皮金鈴子肉等分為末每溫酒或白湯下二錢聖惠方治卒心痛椰子皮燒存性研末以新汲水服一錢極驗龔氏方又麋角粉一服立瘥孟詵方又畫地作王字撮中央土水和一升服良陳藏器本草又三年頭𢄼沸湯淋汁飲之以碗覆𢄼於閒地周時即愈聖惠方又東引桃枝一把切以酒一升煎半升頓服大效肘後方又雞舌香末酒服一錢肘後方又鐺墨二錢熱小便調下千金方又郁李仁三七枚嚼爛以新汲水或溫湯下須臾痛止卻呷薄荷鹽湯至寶方又五靈脂炒一錢半乾薑泡三分為末熱酒服立愈事林廣記心氣卒痛屬冷乾薑末米飲服一錢外臺秘要卒然心痛或經年頻發安息香研末沸湯服半錢得效方卒心痛疰忤惡氣取鑄鐘黃土溫酒服一錢藏器方卒心急痛牙關緊閉欲絕以老蔥白五莖去皮須搗膏以匙送入咽中灌以麻油四兩但得下咽即醒少頃蟲積皆化為黃水而下永不再發瑞竹堂方急心氣痛古文錢一個打碎大核桃三個同炒熱入醋一碗沖服經驗方又核桃一個棗子一枚去核夾桃紙裹煨熟以生薑湯一鍾細嚼送下永久不發名落盞湯經驗方又豬心一枚每歲入胡椒一粒同鹽酒煮食又五十年陳壁土枯礬二錢為末蜜丸艾湯服集玄方又用黃蠟燈上燒化丸芡子大百草霜為衣井水下三丸又桑耳燒存性熱酒服二錢集簡方婦人心痛急者好官粉為末蔥汁和丸小豆大每服七丸黃酒送下即止粉能殺蟲蔥能透氣故也邵真人方蛔蟲心痛如刺口吐清水白熟艾一升水三升煮一升服吐蟲出或取生艾搗汁五更食香脯一片乃飲一升當下蟲出肘後方又槐木耳燒存性為末水服棗許若不止飲熱水一升蛔蟲立出備急方又薏苡根一斤切水七升煮三斤服之蟲死盡出也梅師方諸蟲心痛多吐清水鰻鱺淡煮飽食三五度即瘥外臺秘要
