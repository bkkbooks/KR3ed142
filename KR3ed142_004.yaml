body:
  text: 卷四膈氣膈氣吐食用大鯽魚去腸留鱗切大蒜片填滿紙包十重泥封曬半乾炭火煨熟取肉和平胃散末一兩杵丸梧子大密收每服二十丸米飲下經驗方又用硫黃水銀各一錢同炒成金色入狗寶三錢為末以雞卵一枚去白留黃和藥攪勻泥固煻火煨半日取出研細每服五分燒酒調服不過三服見效頤真堂方又用地牛兒二個推屎蟲一公一母同入罐中待蟲食盡牛兒以泥裹煨存性用去白陳皮二錢以巴豆同炒過去豆將陳皮及蟲為末每用一二分吹入咽中吐痰三四次即愈集效方膈氣不下食食即吐者用倉米或白米日西時以水微拌濕自想日氣如在米中次日曬乾袋盛挂風處每以一撮水煎和汁飲之即時便下食又方陳倉米炊飯焙研每五兩入沉香末半兩和勻每米飲服二三錢普濟方膈氣疼痛用壁上陳白螺螄燒研每服一錢酒下甚效名白玉散孫氏方膈氣噎塞飲食不下用碓嘴上細粳蜜丸彈子大時時含咽津液聖惠方又牛涎水服二匙終身不噎孫真人方又絳州一僧病噎不下食數年臨終命其徒曰吾死後可開吾胸喉視有何物苦我如此及死其徒依命開視胸中得一物形似魚而有兩頭遍體悉似肉鱗安鉢中跳躍不已戲投諸味雖不見食悉化為水又投諸毒物亦皆銷化一僧方作藍靛投之即怖懼奔走須臾化成水世傳靛水能治噎疾蓋本於此老人膈痞不下飲食用羊肉四兩切白麵六兩橘皮末一分薑汁搜如常法入五味作臛食每日一次大效多能鄙事梅核膈氣取半青半黃梅子每個用鹽一兩淹一日夜曬乾又淹又曬至鹽水盡乃止用青錢三個夾二梅麻線縛定通裝瓷灌內封埋地下百日取出每用一枚含之咽汁入喉即消收一年者治一人二年者治二人其妙絶倫經驗方反胃反胃吐食取虎肚生者勿洗存滓穢新瓦固煅存性入平胃散末一兩和勻每白湯服三錢神效保壽堂方又貓胞衣燒灰入硃砂末少許壓舌下甚效時珍方又用驢小便服三四合極驗此物稍有毒服時不可過多須熱飲之病深者七日當效張文仲備急方又用干餳糟六兩生薑四兩二味同搗作餅或焙或曬入炙甘草末二錢鹽少許點湯服之此利胸膈養脾胃進飲食名甘露湯摘玄方又用烏雄雞一隻治如食法入胡荽子半斤在腹內烹食二隻愈又蠶繭十個煮汁烹雞子三枚食之以無灰酒下日二服神效或以繅絲湯煮粟米粥食之惠濟方又用韭汁二杯入薑汁牛乳各一杯細細溫服蓋韭汁消血薑汁下氣消痰和胃牛乳能解熱潤燥補虛也丹溪方又千葉白槿花陰乾為末陳糯米湯調送三五口不轉再服袖珍方又茅根蘆根二兩水四升煮二升頓服得下良聖濟總録又田螺洗淨水養待吐出泥澄取曬乾丸梧子大每服三十丸藿香湯下爛殼研服亦可經驗方又地龍糞一兩木香三錢大黃七錢為末每服五錢無根水調服忌煎煿酒醋椒薑熱物一二服其效如神經驗方反胃吐食真橘皮以日照西壁土炒香為末每服二錢生薑三片棗肉一枚水二鍾煎一鍾溫服直指方又用母丁香一兩為末以鹽梅入搗和丸芡子大每噙一丸袖珍方又母丁香神麯炒等分為末米飲服一錢聖惠方又枇杷葉去毛炙丁香各一兩人參二兩每服三錢水一碗薑三片煎服聖惠方又灶中土年久者為末米飲服三錢經驗百一選方又用黃蜆殼並田螺殼並取久在泥中者各等分炒成白灰每二兩入白梅肉四個搗和為丸再入砂盒子內蓋定泥固煅存性研細末每服二錢用人參縮砂湯調下不然用陳米飲調服亦可凡覺心腹脹痛將發反胃即以此藥治之百一選方又秈稈燒灰淋汁溫服冷吐蓋胃中有蟲能殺之也普濟方反胃轉食藥物不下用大雪梨一個以丁香十五粒刺入梨內濕紙包四五重煨熟食之聖濟總録反胃嘔吐困弱無力垂死者上黨人參三大兩拍破水一大升煮取四合熱服日再兼以人參汁入粟米雞子白薤白煮粥與啖當時便定後十餘日遂瘥李絳手集反胃結腸藥物不下結腸三五日至七八日大便不通如此者必死用白水牛喉一條去兩頭節並筋膜脂肉炙如阿膠黑片收之臨時旋炙用米醋一盞浸之微火炙乾淬之再淬醋盡為度研末厚紙包收或遇陰濕時微火烘之再收遇此疾每服一錢食前陳米飲調下輕者一服立效普濟方有人三世死於反胃病至孫得一方用乾柿餅同乾飯日日食之絶不用水飲如法食之其病遂愈經驗方又方乾柿三枚連蒂搗爛酒服甚效切勿以他物雜之反胃吐痰柳樹簞五七個煎湯服即愈活人心統脾虛反胃白豆蔻縮砂仁各二兩丁香一兩陳廩米一升黃土炒焦去土研細薑汁和丸梧子大每服百丸薑湯下名太倉丸濟生方脾氣虛冷反胃吐食羊肉半斤去脂作生以蒜薤醬豉五味和拌空腹食之心鏡方久冷反胃用大附子一個生薑一斤銼細同煮研如麵糊每米飲化服一錢經驗方衛生家寶方用薑汁打糊和附子末為丸大黃為衣每溫水服十丸斗門方用長大附子一個坐於磚上四面著火漸逼以生薑自然汁淬之依前再逼再淬約薑汁盡半碗乃止研末每服一錢粟米飲下不過三服瘥或以豬腰子切片炙熟蘸食方便集用大附子一個切下頭子剜一竅安丁香四十九粒在內仍合定線扎入砂銚內以薑汁浸過文火熬干為末每挑少許置掌心舔吃日十數次忌毒物生冷治大人乾嘔及反胃小兒噦啘及舌腫並時時溫羊乳飲之時珍方噎噎膈反胃諸藥不效真阿魏一錢野外幹人屎三錢為末五更以薑片蘸食能起死為生也永類鈐方又用牛轉草杵頭粳各半斤糯米一升為末取黃母牛涎和丸龍眼大煮熟食之入砂糖二兩尤妙名大力奪命丸醫學正傳又用糯米末以牛涎拌作小丸煮熟食集成方又用牛涎一盞入麝香少許銀盞燉熱先以帛緊束胃脘令氣喘解開乘熱飲之仍以丁香汁入粥與食得效方又蘿蔔蜜煎浸細細嚼咽良普濟方五噎吐逆心膈氣滯煩悶不下食蘆根五兩銼以水三大盞煮取二盞去滓溫服玉函方噎食不下赤稻細梢燒灰滾湯一碗隔絹淋汁三次取汁入丁香一枚白豆蔻半枚米一盞煮粥食神效摘玄妙方又人屎入蘿蔔內火煉三柱香取研每服三分黃酒下三服效海上名方又古冢內糧罌中水但得飲之即愈壽域方又以黃豆雀窠一枚燒灰酒服或一服三錢神驗易簡方又取頭垢酸漿煎膏用之立愈弘景方又用狗寶為末每服一分以威靈仙二兩鹽二錢搗如泥將水一鍾攪勻去滓調服日二不過三日愈後服補劑杏林摘要又鸕鷀頭頸燒研酒服兼治骨鯁別録又雞嗉兩枚連食以濕紙包黃泥固煅存性為末入木香沉香丁香末各一錢棗肉和丸梧子大每汁下三丸又黃犬干餓數日用生粟或米干飼之俟其下糞淘洗米粟令淨煮粥入薤白一握泡熟去薤入沉香末二錢食之永類鈐方又用蛇含蝦蟆泥包燒存性研末米飲服又寡婦木梳一枚燒灰煎鑰匙湯調下二錢生生編又狼喉靨日乾為末每以半錢入飯內食之妙聖惠方噎食不納蓽澄茄白豆蔻等分為末干舔之壽域神方又華他見一人病噎食不得下令取餅店家蒜齏米醋二升飲之立吐一蛇病者懸蛇於車造他家見壁北懸蛇數十乃知其奇老人噎食不通用黃雌雞肉四兩切茯苓二兩白麵六兩作餛飩入豉汁煮食三五服效養老書治卒噎取祀灶飯一粒食之即下燒研搽鼻中瘡亦良時珍方咽喉妨礙如有物吞吐不利杵頭粳人參各一錢石蓮肉炒一錢水煎服日三服聖濟總録吐利吐利卒死及大人小兒卒腹皮青黑赤不能喘息用女青末納口中以酒送下子母祕録霍亂霍亂吐瀉垂死不拘男女但有一點胃氣存者服之再生廣陳皮去白五錢真藿香五錢水二盞煎一盞時時溫服聖惠用陳橘皮末二錢湯點服不省者灌之仍燒磚沃醋布裹磚安心下便活霍亂困篤童女月經衣和血燒灰酒服方寸匕百方不瘥者用之千金方霍亂吐下鍋底墨煤半錢灶額上墨半錢百沸湯一盞急攪數千下以碗覆之通口服一二口立止經驗方又屋下倒挂塵滾湯泡澄清服即止易簡方又路旁破草鞋去兩頭洗三四次水煎湯一碗滾服之即愈事海文山又勿食熱物但飲冷鹽水一碗仍以水一盆浸兩足立止救急良方又鹽調生熟湯飲數口治嘔吐不能納食危甚者即定時珍方又扁豆香薷各一升水六升煮二升分服千金方又香薷煮飲無不瘥者作煎除水腫尤良弘景方又枯白礬末一錢百沸湯調下華他方又山豆根末橘皮湯下三錢備急方又生藕搗汁服聖惠方霍亂吐瀉煩躁不止人參二兩橘皮三兩生薑一兩水六升煮三升分三服聖濟録霍亂吐利尿桶舊板煎水服山村宜之時珍方霍亂煩躁氣急每嚼木瓜核七粒溫水咽之聖惠方霍亂煩渴腹脹蘆葉一握水煎服又方蘆葉五錢糯米二錢半竹茹一錢水煎入薑汁蜜各半合煎兩沸時時呷之聖惠方霍亂腹脹痛木瓜五錢桑葉三片棗肉一枚水煎服聖惠方又蘆根一升生薑一升橘皮五兩水八升煎三升分服聖惠方又厚朴炙四兩桂心二兩枳實五枚生薑二兩水六升煎取二升分三服陶隱居方又用厚朴薑汁炙研末新汲水服二錢如神聖惠方霍亂煩悶蘆根三錢麥門冬一錢水煎服千金方又人參五錢桂心半錢水二盞煎服聖惠方又向陽壁土煮汁服聖濟録冒暑霍亂小便不利頭運引飲用澤瀉白朮白茯苓各三錢水一盞薑五片燈心十莖煎八分溫服霍亂大渴不止多飲則殺人黃粱米五升水一斗煮清三升稍稍冷飲之肘後方霍亂嘔甚不止用高良薑生銼二錢大棗一枚水煎冷服立定名冰壺湯普濟方霍亂脹滿未得吐下用生蘇搗汁飲之佳干蘇煮汁亦可肘後方霍亂及乾霍亂須吐者以樟木屑煎濃汁吐之甚良時珍方舊麻鞋底洗淨煮汁服治霍亂吐下不止及食牛馬肉毒腹脹吐利不止時珍方霍亂吐下不止楠木煮汁服別録又煎湯洗轉筋及足腫枝葉同功大明方霍亂吐瀉不止轉筋腹痛取棠梨枝一握同木瓜二兩煎汁細呷之時珍方霍亂轉筋入腹煩悶桑葉一握煎飲一二服立定聖惠方又生扁豆葉一把入少醋絞汁服立瘥蘇恭方又方用扁豆為末醋和服普濟方又白梅肉一枚同絲瓜葉一葉將梅核中仁取出同肉研爛用新汲水調灌下即蘇自傳祕方又茱萸炒二兩酒二盞煎一盞分二服得下即安聖濟録又木香末一錢木瓜汁一盞入熱酒調服聖濟録又木瓜枝葉皮根並可煮汁飲之別録又用敗木梳一枚燒灰酒服永瘥千金方又皂角末吹豆許入鼻取嚏即安梅師方又緑豆粉新汲水調服又木瓜一兩酒一升煎服不飲酒者煎湯服仍煎湯浸青布裹其足聖惠方霍亂轉筋垂死者敗蒲席一握切漿水一盞煮汁溫服聖惠方轉筋入腹無可奈何者以酢煮青布擦之冷即易千金方又以小蒜鹽各一兩搗敷臍中灸七壯立止聖濟録乾溼霍亂轉筋用大蒜搗塗足心立愈永類鈐方霍亂轉筋欲死氣絶腹有暖氣以鹽填臍中灸鹽上七壯即蘇救急方轉筋入腹其人臂腳直其脈上下微弦用雞矢為末水六合和方寸匕溫服仲景方乾霍亂病心腹脹痛不吐不利煩悶欲死用檳榔末五錢童子小便半盞水一杯煎服聖濟録又小蒜一升水三升煮一升頓服肘後方霍亂不通脹悶欲死因傷飽取涼者用雄雀糞二十一粒研末溫酒服未效再服聖濟録乾霍亂不吐不利煩脹欲死或轉筋入腹取屠兒幾垢一雞子大溫酒調服得吐利即愈時珍方又梔子二七枚燒研熱酒服之立愈肘後方又用蜘蛛生斷腳吞之則愈此鬼夢授方出幽明録又地漿三五盞服即愈大忌米湯千金方又亂髮一團燒灰鹽湯二升和服取吐十便良方又丁香十四枚研末以沸湯一升和之頓服不瘥更作千金方霍亂上不得吐下不得利出冷汗氣將絶用鹽一大匙熬令黃童子小便一升合和溫服少頃吐下即愈也蘇頌方治攪腸痧痛蕎麥麵炒焦熱水沖服時珍方關格關格不通大小便閉脹欲死兩三日則殺人芒硝三兩泡湯一升服取吐即通百一選方又用皂莢燒研粥飲下三錢立通千金方又用皂莢燒煙於桶內坐上薰之亦通聖惠方三焦壅塞胃膈不決頭昏目眩涕唾痰涎精神不爽用牽牛子四兩半生半炒不蛀皂莢酥炙二兩為末生薑自然汁煮糊丸梧子大每吸二十丸荊芥湯下名利膈丸博濟方氣壅小便淋結臍下妨悶兼痛滑石粉一兩水調服廣濟方厄逆治男女傷寒並一切雜病嘔噦手足逆冷者用橘皮四兩生薑一兩水二升煎一升徐徐呷之即止仲景方治咳逆胸滿用柿蒂丁香各二錢生薑五片水煎服或為末白湯點服治傷寒厄逆柿蒂丁香各一兩每服一錢人參湯下濟衆方潔古加人參一錢治虛人咳逆三因加良薑甘草等分衛生寶鑑加青皮陳皮王氏易簡加半夏生薑有人病後厄逆不止聲聞鄰家取刀豆子燒存性白湯調服二錢即止此亦取其下氣歸元而逆自止也時珍方厄逆不止荔枝七個連皮核燒存性為末白湯調下立止醫方摘要又石蓮肉六枚炒赤黃色研末冷熟水半杯和服便止蘇頌方又川椒四兩炒研麵糊丸梧子大每服十丸醋湯下甚效經驗方又鴝鵒炙食一枚通靈日華子又黃蠟燒煙薰二三次即止醫方摘要又用硫黃燒煙嗅之立止醫方摘要上氣咳逆砂仁洗淨炒研生薑連皮等分搗爛熱酒食遠泡服簡便方胃熱厄逆用鐵鏃七十二個煎湯啜之時珍方胃冷久厄沉香紫蘇白豆蔻仁各一錢為末每柿蒂湯服五七分活人心統溫病發噦因飲水多者枇杷葉去毛淨炙香茅根各半斤水四升煎二升稍稍飲之安常方溫病熱噦乃伏熱在胃令人胸滿則氣逆逆則噦或大下胃中虛冷亦致噦也茅根切葛根切各半斤水三升煎一升半每溫飲一盞噦止即停安常傷寒卒病論腎氣上噦腎氣自腹中趕上築於咽喉逆氣連屬而不能出或至數十聲上下不得喘息此由寒傷胃脘腎虛氣逆上乘於胃與氣相併難經謂之噦素問云病深者其聲噦宜服此方如不止灸期門關元腎俞穴用吳茱萸醋炒熱橘皮附子去皮各一兩為末麵糊丸梧子大每薑湯下七十丸仁存方咳逆短氣紫蘇莖葉二錢人參一錢水一鍾煎服普濟方諸見血證九竅出血荊芥煎酒通口服之直指方千金方用荊葉搗汁酒和服又頭髮敗棕陳蓮蓬並燒灰等分每服三錢木香湯下聖惠方又生地黃汁半升生薑汁半合蜜一合和服聖惠方九竅出血服藥不住者南天竺草即瞿麥拇指大一大把山梔子仁三十個生薑一塊甘草炙半兩燈草一小把大棗五枚水煎服聖濟録治九竅四肢歧間血出乃暴怒所為燒黃犢臍屎末水服方寸匕日四五服良姚僧垣方人大驚九竅四肢指歧出血以井華水噀面嘉祐方又靈砂三十粒人參湯下三服愈此證不可錯認作血得熱則流妄用涼藥誤事直指方皮膚血濺出者以煮酒罈上紙扯碎如楊花攤在出血處按之即止百一選方諸般血病水蘆花紅花槐花白雞冠花茅花等分水二鍾煎一鍾服積善堂方鼻衄鼻中衄血鞋襦燒灰吹之立效廣利方又山梔子燒灰吹之屢用有效易簡方又青蒿搗汁服之並塞鼻中極驗易簡方又乾地黃地龍薄荷等分為末冷水調下祕寶方又油塗萆麻葉炙熱尉囟上大驗肺熱衄血蒲黃青黛各一錢新汲水服之或青黛發灰等分生地黃汁調下簡便方少小鼻衄小勞輒出桑耳熬焦搗末每發時以杏仁大塞鼻中數度即可斷肘後方病後常衄小勞即作牡蠣十分石膏五分為末酒服方寸匕亦可蜜丸日三服肘後方鼻出衄血刀刮指甲細末吹之即止試驗簡便方又硼砂一錢水服立止集簡方又以蘿蔔自然汁和無灰酒飲之即止蓋血隨氣運氣滯故血妄行蘿蔔下氣而酒導之故也又百草霜末吹之立止又津調白芨末塗山根上仍以水服一錢立止經驗方又剪金花連莖葉陰乾濃煎汁溫服立效指南方又屏風上故紙燒灰酒服一錢即止普濟方又柏葉榴花研末吹之普濟方又棕櫚灰隨左右吹之亦效又用新汲水隨左右洗足即止纍用有效一方冷水浸紙貼囟上以尉斗尉之立止又血餘燒灰吹之立止永不發男用母發女用父發一方用亂髮灰一錢人中白五分麝香少許為末嗅鼻名三奇散聖惠方又取蔥汁入酒少許滴鼻中云即覺血從腦散下也勝金方又茅根為末米泔水服二錢聖惠方又藕節搗汁飲並滴鼻中又定州白瓷細末吹少許立止經驗方又白土末五錢井華水調服二服除根瑞竹堂方又紙條蘸真麻油入鼻取嚏即愈有人一夕衄血盈盆用此而愈普濟方鼻衄不止五七日不住者人中白新瓦焙乾入麝香少許溫酒調服立效經驗方衄血一月不止刺羊血熱飲即瘥聖惠方鼻衄不止纍醫不效粟殼燒存性研末粥飲服二錢聖惠方鼻血不止服藥不應用蒜一枚去皮研如泥作錢大餅子厚一豆許左鼻血出貼左足心右鼻血出貼右足心兩鼻俱出俱貼之立瘥濟衆方又用糯米微炒黃為末每服二錢新汲水調下仍吹少許入鼻中濟衆方鼻衄不止眩冒欲死者龍骨末吹之梅師方又濃墨汁滴入鼻中梅師方大衄久衄人中白一團雞子大綿五兩燒研每服二錢溫水服亦治諸竅出血聖惠方口鼻出血如湧泉因酒色太過者荊芥燒研陳皮湯下二錢不過二服也鼻中息肉藜蘆三分雄黃一分為末蜜和點之每日三上自消勿點兩畔聖濟方又用細辛白芷等分為末以生地膽汁和成膏每用少許點之取消為度聖惠方舌衄舌衄出血槐花末敷之即止集驗方舌硬出血木賊煎水漱之即止聖惠方又刺薊搗汁和酒服乾者為末冷水服亦治九竅出血普濟方舌腫出血如泉烏賊骨蒲黃各等分炒為細末每用塗之簡便方舌上出血竅如針孔用紫金沙即露蜂房頂上實處一兩貝母四錢蘆薈三錢為末蜜和丸雷丸大每用一丸水一小鐘煎至五分溫服吐血溫酒調服舌上出血如鑽孔者香薷煎汁服一升日三服肘後方齒衄齒縫出血百草霜末摻之立止集簡方吐衄治吐衄及傷酒食醉飽低頭掬損肺臟吐血汗血口鼻妄行但聲未失用百草霜五錢槐花末二兩每服二錢茅根湯下吐血衄血九竅出血並用龍骨末吹入鼻中昔有人衄血一斛衆方不止用此即斷三因方吐血衄血腸風下血並用紅山茶為末入童溺薑汁及酒調服可代鬱金丹溪方吐血衄血陽乘於陰血熱妄行宜服四生丸屢用得效用生荷葉生艾葉生柏葉生地黃等分搗爛丸雞子大每服一丸水三盞煎一盞去滓服濟生方衄血吐血川鬱金為末井水服二錢甚者再服易簡方口耳大衄蒲黃阿膠炙各半兩每用二錢水一盞生地黃汁一合煎至六分溫眼急以帛系兩乳止乃已聖惠方又藕節搗汁飲甄權消瘀血解熱毒産後血悶藕節和地黃研汁入熱酒小便飲大明心熱吐衄脈洪數者生苄汁半升熬至一合入大黃末一兩待成膏丸梧子大每服熟水下五丸至十丸聖惠方吐血衄血諸方不效者麥門冬去心一斤搗取自然汁入白蜜二合分作二服即止活人心統治嘔血諸血及便血婦人崩中神效用積雪草五錢當歸酒洗梔子仁酒炒蒲黃炒黃連炒條黃芩酒炒生地黃酒洗陳槐花炒各一錢上部加藕節一錢五分下部加地榆一錢五分水二鍾煎一鍾服神效集驗方吐血便血地黃汁六合銅器煎沸入牛皮膠一兩待化入薑汁半杯分三服便止或微轉一行不妨聖惠方勞瘵吐血上部血須用剪草牡丹皮天門冬麥門冬許學士云剪草治勞瘵吐血損肺及血妄行名曰神傳膏其法每用一斤洗淨曬為末入生蜜二斤和為膏以器盛之不得犯鐵器一日一蒸九蒸九曝乃止病人五更起面東坐不得語言以匙抄藥四匙食之良久以稀粟米飲壓之藥只冷服米飲亦勿太熱或吐或否不妨如久病損肺咯血只一服愈尋常嗽血妄行每服一匙可也本事方勞心吐血糯米半兩蓮子心七枚為末酒服多效或以墨汁作丸服之淡寮方肺損吐血或舌上有孔出血生地黃八兩取汁童便五合同煎熟入鹿角膠炒研一兩分三服聖惠方治肺損嘔血並開胃用阿膠炒三錢木香一錢糯米一合半為末每服一錢百沸湯點服日一普濟方肺痿吐血黃明膠炙乾花桑葉陰乾各二兩研末每服三錢生地黃汁調下普濟方內損吐血飛羅面略炒以京墨汁或藕節汁調服二錢醫學集成陽虛吐血生地黃一斤搗汁入酒少許以熟附子一兩半去皮臍切片入汁內石器煮成膏取附片焙乾入山藥三兩研末以膏和搗丸梧子大每空心米飲下三十丸選奇方憂恚嘔血煩滿少氣胸中疼痛柏葉為散米飲調服二方寸匕聖惠方氣鬱吐血用童子小便調香附末二錢服丹溪心熱吐血不止生葛搗汁半升頓服立瘥廣利方老幼吐血蒲黃末每服半錢生地黃汁調下量人加減或入發灰等分亦治小便出血聖濟總録吐血唾血蒲黃末二兩每日溫酒或冷水服三錢妙濟衆方又桃奴煅存性同棕皮灰蒲黃硃砂京墨為末臨臥以童便調三錢色漸淡為度治吐血神效自傳祕方嘔血吐痰心煩骨蒸者人中黃為末每服三錢茜根汁竹瀝薑汁和勻服之丹溪心法卒暴吐血用藕節荷蒂各七個以蜜少許擂爛用水二鍾煎八分去滓溫服或為末丸服亦可聖惠方又用大蜘蛛網搓成小團米飲吞之一服立止孫紹先忽然吐一二口或心衄或內崩熟艾三團水五升煮二升服一方燒灰水服二錢亦治鼻血不止艾灰吹之聖惠方又用白芨為末米飲日服其效如神有一囚得此屢經訊拷肺傷嘔血不死其後凌遲劊子剖其胸見肺間竅穴數十處皆白芨填補色猶不變也夷堅志又蘆荻外皮燒灰勿令白為末入蚌粉少許研勻麥門冬湯服一錢三服可救一人聖惠方又白薄紙五張燒灰水服妙不可言普濟方又嫩荷葉七個擂水服之甚佳又方乾荷葉生蒲黃等分為末每服三錢桑白皮煎湯調下又京墨磨汁同萊蔔汁飲或生地黃亦可集簡方又就用吐出血塊炒黑為末每服三分以麥門冬湯調服蓋血不歸元則積而上逆以血導血歸元則止矣諸證辨疑又用阿膠炒二兩蒲黃六合生地黃三升水五升煮三升分服千金翼又茜根一兩搗末每服二錢水煎冷服亦可水和二錢服濟衆方又用白茅根一握水煎服之千金翼方又用荊芥連根洗搗汁半盞服經驗方又用荊芥穗為末生地黃汁調服二錢聖惠方又以鵝鴨肝用生犀角生桔梗一兩為末同搗每酒服二錢總録墜馬瘀血積在胸腹吐血無數者干藕節為末酒服方寸匕日二次千金方又試血法吐在水碗內浮者肺血也沉者肝血也半浮半沉者心血也各隨所見以羊肺羊肝羊心煮熟蘸白芨末日日食之摘玄方咳嗽血咳嗽有血小兒胎髮灰入麝香少許酒下每個作一服男用女女用男集驗方又紫菀五味子炒為末蜜丸芡子大每含化一丸指南方咳嗽吐血甚者鮮桑根白皮一斤米泔浸三宿刮去黃皮銼細入糯米四兩焙乾為末每服一錢米飲下經驗方肺破出血或嗽血不止用海犀膏即水膠一大片炙黃塗酥再炙研末用白湯化三錢服之斗門方咯血咯血唾血槐花炒研每服三錢糯米飲下仰臥一時取效朱氏方又用黃藥子蒲黃等分為末掌中舔之百一選方或單用藥子一兩水煎服聖惠方又新綿一兩燒灰白膠切片炙黃一兩每服一錢米飲下普濟方肺熱咯血青餅子用青黛一兩杏仁以牡蠣粉炒過一兩研勻黃蠟化和作三十餅子每服一餅以乾柿半個夾定濕紙裹煨香嚼食粥飲送下日三中藏經治肺損咯血以熟豬肺切蘸薏苡仁末空心食之薏苡補肺豬肺引經也濟生方
