宋孫琳嘗以此治寧宗在藩有驗獲賞或問其説琳曰小兒何緣有淋只是水道不利三物皆能通利故爾愛竹淡藪小兒血淋雞屎尖白如粉者炒研糊丸緑豆大每服三五丸酒下四五服效小兒石淋牯牛陰毛燒灰漿水服一刀圭日再張文仲小兒祕澀枳殼煨去穰甘草各一錢以水煎服聖惠方小兒祕結豬苓一兩以水少許煮雞屎白一錢調服立通外臺祕要小兒不尿乃胎熱也用大蔥白切四片用乳汁半盞同煎片時分作四服即通不飲乳者服之即飲乳若臍四旁有青黑色及口撮者不可救也全幼心鑑小兒尿閉乃熱結也用大地龍數條去泥入蜜少許研敷莖卵仍燒蠶蛻紙硃砂龍腦麝香同研少許以麥門冬燈心煎湯調服全幼心鑑錢氏捻頭散治小兒小便不通用延胡索苦楝子等分為末每服半錢或一錢以捻頭湯食前調下如無捻頭滴油數點代之錢氏小兒方小兒虛閉蔥白三根煎湯調生蜜阿膠末服仍以蔥頭染蜜插入肛門少頃即通全幼心鑑小兒遺尿膀胱冷也夜屬陰故小便不禁破故紙炒為末每夜熱湯服五分嬰童百問又小豆葉搗汁服之千金方小兒尿血甘草一兩二錢水六合煎二合一歲兒一日服盡姚和衆至寶方小兒大便下血藕節曬乾研末人參白蜜煎湯調服日二服全幼心鑑又甑帶灰塗乳上飲之外臺祕要小兒脫肛五倍子為末多以艾絨卷倍子末成筒放便桶內以瓦盛之令病者坐於桶上以火點著使藥煙燻入肛門其肛自起隨後將白礬為末復搽肛門其肛自緊再不復脫又螺螄二三升鋪在桶內坐之少頃即愈簡便又荊芥皂角等分煎湯洗之以鐵漿塗上亦治子宮脫出經驗方聞雷即昏一小兒七歲聞雷即昏倒不知人事此氣怯也以人參當歸麥門冬各二兩五味子五錢水一斗煎汁五升再以水五升煎滓取汁二升合煎成膏每服三匙白湯化下服盡一斤自後聞雷自若矣虛者可用簡便方小兒蟲病凡大人小兒有蟲病但每月上旬侵晨空腹食使君子仁數枚或以殼煎湯咽下次日蟲皆死而出也或云七生七煨食亦良忌熱飲茶犯之即瀉此物味甘氣溫既能殺蟲又益脾胃所以能斂虛熱而止瀉利為小兒諸病要藥時珍方小兒蛔蟲用苦楝根皮同雞卵煮熟空心食之次日蟲下集簡方又方抵聖散用苦楝皮二兩白蕪荑半兩為末每以一二錢水煎服之經驗方小兒蛔蟲齧心腹痛單用鶴風研末以肥豬肉汁下之五歲一服二分蟲出即止也李絳兵部手書集方小兒蛔咬心痛面青口中沫出臨死者取扁竹十斤銼以水一石煎至一斗去滓煎如飴隔宿勿食空心服一升蟲即下也仍常煮汁作飯食海上歌云心頭急痛不能當我有仙人海上方萹蓄醋煎通口咽管教時刻即安康食療方小兒蛔痛五靈脂末二錢靈礬火飛半錢每服一錢水一盞煎五分溫服當吐出蟲愈閻孝忠集效方小兒蛔痛口流涎沫使君子仁為末米飲五更調服一錢全幼心鑑小兒流涕是風寒也白芷末蔥白搗丸小豆大每茶下二十丸仍以白芷末薑汁調塗太陽穴乃食熱蔥粥取汗聖惠方小兒鼻乾無涕腦熱也用黃米粉生礬末各一兩每以一錢水調點囟上日二次普濟方小兒鼻塞頭熱用燻草一兩羊髓三兩銚內慢火熬成膏去滓日摩背上三四次聖惠方小兒頭熱鼻塞不通濕地龍糞捻餅貼囟上日數易之聖惠方小兒疣目用雞肫黃皮擦之自落集要方小兒陰腫多因坐地風襲及蟲蟻所吹用蟬蛻半兩煎水洗仍服五苓散即腫消痛止危氏方小兒陰腫陽明經風熱濕氣相搏莖陰無故腫或痛縮宜寬此一經自愈廣木香枳殼麩炒二錢半炙甘草二錢水煎服魯氏小兒方蚯蚓吹小兒陰腫取雄鴨涎抹之即消海上方小兒陰腫赤痛日夜啼叫數日退皮愈而復作用老杉木燒灰入膩粉清油調敷效危氏得效方小兒囊腫天花粉一兩炙甘草一錢半水煎入酒服全幼心鑑小兒陰㿉腫大不消硼砂一分水研塗之大有效集玄方小兒卵腫地龍糞以薄荷汁和塗之危氏得效方丹毒諸惡瘡腫小兒遊瘤丹毒慈菰葉搗爛塗之即消蘇頌治小兒火瘡丹腫瘡毒鯉魚血塗之立瘥蘇恭熱丹白上一分寒水石半兩為末新汲水調塗錢乙小兒方小兒丹腫緑豆五錢大黃二錢為末用生薄荷汁入蜜調塗全幼心鑑小兒火丹熱如火繞臍即損人馬莧搗塗廣利方小兒丹毒從兩股走及陰頭用李根燒為末以田中流水和塗之千金方小兒赤丹從腳趺起棗根煎湯頻浴之時珍小兒丹毒從髀起流下陰頭赤腫出血用鯽魚肉切五合赤小豆末二合搗勻入水和敷之千金方赤遊風丹漸漸腫大五味子焙研熱酒服一錢自消神效保幼大全赤遊風丹行於上下至心即死菘菜搗敷之即止子母祕録丹瘤木鱉子仁研如泥醋調敷之一日三五上效外科精義又萆麻子仁五個去皮研入面一匙水調塗之甚效修丹祕旨小兒丹瘤遊入腹內必死初發急以截風散截之白芷寒水石為末生蔥汁調塗全幼心鑑小兒丹毒作瘡出水豉炒煙盡為末油調敷之姚和衆方諸瘡小兒諸瘡惡瘡禿瘡蠼螋瘡浸淫瘡並宜楝樹皮或枝燒灰敷之乾者豬脂調千金方小兒頭身惡瘡慈竹籜燒散和油塗之或入輕粉少許時珍嬰兒胎瘡滿頭用水邊烏桕樹根曬研入雄黃末少許生油調搽經驗良方小兒頭上生瘡海螵蛸白膠香各二錢輕粉五分為末先以油潤洗淨乃搽末二三次即愈衛生易簡方又鏡面草日乾為末和輕粉麻油敷之立效楊氏家藏方又豬腰子一個批開去心膜入五倍子輕粉末等分在內以砂糖和麵固濟炭火炙焦為末清油調塗經驗良方小兒頭瘡黏肥及白禿用皂角燒黑為末去痂敷之不過三次即愈筆峰雜興小兒頭瘡白禿蔗滓燒存性研末烏桕油調塗頻頻取瘥燒煙勿令入人目能使暗明時珍又大蜈蚣一條鹽一分入油內浸七日取油搽之極效海上又韶腦一錢花椒二錢脂麻二兩為末以退豬湯洗後搽之簡便方又醋和榆白皮末塗之蟲當出産乳方又生羊骨髓調輕粉搽之先以泔水洗淨一日二次數日愈經驗方又豬蹄甲七個每個入白礬一塊棗兒一個燒存性研末入輕粉麻油調搽不過五上愈又瓠藤同裹鹽荷葉煎湯濃汁洗三五次愈總録白禿臘梨灰窯內燒過紅土墼四兩百草霜一兩雄黃一兩膽礬六錢榆皮三錢輕粉一錢為末豬膽汁調剃頭後搽之百發百中神方也陸氏積德堂方小兒頭瘡浸淫成片梁上塵和油瓶下滓以皂莢湯洗後塗之子母祕録小兒頭瘡晝開出膿夜即復合用鯽魚長四寸一枚去腸大附子一枚去皮研末填入炙焦研敷搗蒜封之效聖惠方小兒頭瘡久不愈胡桃和皮燈上燒存性碗蓋出火毒入輕粉少許生油調塗一二次愈保幼大全小兒頭瘡因傷濕入水成毒膿汁不止用紅曲嚼罨之甚妙小兒奶疽生面上用楓香為膏攤貼之活幼全書小兒眉瘡黑驢屎燒研油調塗之立效聖惠方又豬頸骨髓六七枚白膠香二錢同入銅器熬稠待冷為末麻油調塗小兒鼻下生瘡牛草拳燒研敷別録小兒鵝口桑皮汁和胡粉塗之子母祕録小兒口瘡羊脂煎薏苡根塗之活幼新書又五月五日蝦蟆炙研末敷之即瘥子母祕録小兒口瘡不能吮乳密陀僧末醋調塗足心瘡愈洗去簡易方又剛子一枚連油研入黃丹少許剃去囟上發貼之四邊起粟泡便用溫水洗去乃以菖蒲湯再洗即不成瘡神效瑞竹堂方小兒口瘡糜爛黃丹一錢生蜜一兩相和蒸黑每以雞毛蘸搽效普濟方又生硫黃水調塗手足心效即洗去危氏得效方小兒口瘡通白者白殭蠶炒黃拭去黃肉毛研末蜜和敷之立效小兒宮氣方小兒口瘡白漫拭淨桑白皮中白汁塗之便愈又塗金刃所傷燥痛須臾血止仍以白皮裹之甚良蘇頌小兒口瘡白屑如鵝口不須服藥以生天南星去皮臍研末醋調塗足心男左女右閻孝忠集效方嬰兒鵝口白厚如紙用坯子胭脂以乳汁調塗之一宿效男用女乳女用男乳集簡方又嚼黍米濃汁塗有效時珍方小兒鵝口滿口白爛枯礬一錢硃砂二分為末每以少許敷之日三次神驗普濟方鵝口瘡自內生出可治自外生入不可治用食草白鵝下清糞濾汁入砂糖少許搽之或用雄鵝糞眠倒者燒灰入麝香少許搽之並效永類鈐方小兒唇腫桑木汁塗之即愈聖惠方鵝口重舌竹瀝同焰硝點之普濟方小兒舌瘡飲乳不得白礬和雞子置醋中塗兒足底二七日愈千金方又白及末乳汁調塗足心聖惠方重舌木舌殭蠶為末吹之吐痰甚妙一方殭蠶一錢黃連蜜炒二錢為末摻之涎出為妙陸氏積德方小兒口瘡風疳用柳木蛀蟲矢燒存性為末入麝香少許搽之雜木亦可幼幼新書重舌木舌脹大塞口半夏煎醋含漱之小兒重舌皂角刺灰入朴硝或腦子少許漱口摻入舌下涎出自消聖惠方又甑帶燒灰敷舌下亦治小兒鵝口聖惠方又釜下土和苦酒塗之千金方小兒重舌重齶並用蛇蛻灰醋調敷之聖惠方小兒燕口兩角生瘡發灰三錢飲汁服子母祕録聖惠以豬脂和發灰塗瘡上小兒吻瘡經年欲腐葵根燒研敷之聖惠方小兒耳瘡屠几上垢敷之千金方小兒月蝕薔薇根四兩地榆二錢為末先以鹽湯洗過敷之全幼心鑑小兒耳瘡月蝕胡粉和土塗之子母祕録又黃連末敷之子母祕録小兒瘰癧脂麻連翹等分為末頻頻食之簡便方又榆白皮生搗如泥封之頻易必效方小兒咽瘑生瘡豬牙車骨年久者槌碎炙令髓出熱取塗之小品方又韭地曲蟺屎米泔水和煅過入百草霜等分研末香油調塗之摘玄方又鼠屎研末香油調搽小兒骨瘡海上方詩云小兒骨痛不堪言出血流膿甚可憐尋取水蛇皮一個燒灰油抹敷疼邊小兒臍瘡出血及膿海螵蛸胭脂為末油調搽之聖惠方小兒臍瘡下合者黃柏末塗之子母祕録又伏龍肝末敷之亦用龍骨煅研敷聖惠方又甑帶燒灰敷之子母祕録小兒臍瘡出汁久不瘥蝦蟆燒末敷之日三甚驗一加牡蠣等分外臺祕要又馬齒莧燒研敷之千金方小兒臍爛成風杏仁去皮研敷子母祕録小兒蓐瘡五月五日取蟾蜍炙研末敷之即瘥子母祕録又嚼澤蘭心封之良子母祕録小兒天疱濕瘡曝乾百合花研末菜子油塗良或用生百合搗塗亦佳孩子熱瘡亂髮一團如梨子大雞子黃十個煮熟同於銚子內熬至甚干始有液出旋置盞中液盡為度用敷瘡上即以苦參粉粉之神效傳信方小兒膿瘡遍身不幹用黃柏末入枯礬少許摻之即愈簡便方小兒浸淫瘡痛不可忍發寒熱者刺薊葉搗爛新水調敷瘡上干即易之簡要濟衆方小兒蟲瘡榆皮末和豬脂塗綿上覆之蟲出立瘥千金方小兒甜瘡大棗去核填入緑礬燒存性研貼之拔萃方
