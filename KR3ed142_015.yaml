body:
  text: 卷十五幼科疳小兒諸疳積及無辜疳一服退熱二服煩渴止三服瀉痢住用端午午時取蝦蟆金眼大腹不足不鳴者捶死置尿桶中候生蛆食盡取蛆入新布袋懸長流水中三日新瓦焙乾入麝香少許為末每空心以砂糖湯調服一錢或粳米糊為丸每米飲服二三十丸直指方一切疳疾尿如米泔大便不調聖濟總録六月取糞坑中蛆淘浸入竹筒中封之待乾研末每服一二錢入麝香米飲服之又方用蛆蛻米泔逐日換浸五日再以清水換浸三日曬焙為末入黃連末等分每半兩入麝香五分以豬膽汁和丸黍米大每服三四十丸米飲下神效小兒五疳以黃土薑汁酒蜜四炒黃連為君以使君子為臣白芍藥酒煮為佐廣木香為使小兒疳疾土裹蜣螂煨熟與食之韓氏醫通一切疳毒夜明砂五錢入瓦瓶內以精豬肉三兩薄切入瓶內水煮熟午前以肉與兒食飲其汁取下腹中胎毒次用生薑四兩和皮切炒同黃連末糊丸黍米大米飲服日三次全幼心鑑脾熱疳疾用胡黃連黃連各半兩硃砂二錢半為末入豬膽內扎定以杖子釣懸於砂鍋內漿水煮一炊久取出研爛入蘆薈麝香各一分飯和丸麻子大每服五七丸至一二十丸米飲下錢乙小兒直訣小兒脾疳蘆薈使君子等分為末每米飲服一二錢衛生小兒疳疾腹大貪食者黃泥裹牡鼠燒熟去骨取肉和五味豉汁作羹食之勿食骨甚瘦人孟詵方小兒疳積腹大黃瘦骨立頭生瘡結如麥穗用立秋後大蝦蟆去首足腸以清油塗之陰陽瓦炙熟食之積穢自下連服五六枚一月之後形容改變妙不可言小兒疳熱肚脹潮熱發焦不可用大黃黃芩傷胃之藥恐生別證以胡黃連五錢五靈脂一兩為末雄豬膽汁和丸緑豆大米飲下每服一二十丸全幼心鑑小兒疳熱流注遍身瘡蝕或潮熱肚脹作渴豬肚黃連丸用豬肚一個洗淨宣黃連五兩切碎水和納入肚中縫定放在五升粳米上蒸爛石臼搗千杵或入少飯同杵丸緑豆大每服二十丸米飲下仍服調血清心之藥佐之蓋小兒之病不出於疳則出於熱常須識此直指方疳熱有蟲瘦悴久服充肥榆仁一兩黃連一兩為末豬膽汁七枚和入碗內飯上蒸熟一日蒸一次九蒸乃入麝香半錢湯浸蒸餅和丸緑豆大每服五七丸至一二十丸米飲下錢氏小兒直訣小兒疳瘦端午日取蟾眉脂以硃砂麝香為丸麻子大空心服一丸如腦疳以奶汁調滴鼻中甚妙小兒疳瘦久服消食和氣長肌肉陳皮一兩黃連以米泔浸一日一兩半研末入麝香三分用豬膽盛藥以漿水煮熟取出用粟米飯和丸緑豆大每服一二十丸米飲下錢氏小兒方小兒疳瘦長肌退熱除蛔蟲蠶蛹為末飲服時珍疳氣浮腫常服自消黑牽牛白牽牛各半生半炒取末陳皮青皮等分為末糊丸緑豆大每三歲兒服二十丸米湯下鄭氏小兒方小兒疳氣不可療者緑礬煅赤醋淬三次為末入麝香少許棗肉和丸緑豆大每服十丸溫水下日三集驗方小兒久疳體虛不食諸病後天柱骨倒醫者不識謂之五軟用白殭蠶直者炒研每服半錢薄荷酒下名金靈散鄭氏方小兒疳勞潮熱往來五心煩躁盜汗咳嗽以黃連胡黃連各二兩以鱉血一盞吳茱萸一兩同入內浸過一夜炒乾去茱血研末入柴胡川芎蕪荑各一兩人參半兩使君子仁二十個為末煮粟米粉糊和為丸如黍米大每用熱水量大小日服一二三錢全幼心鑑小兒疳水珠子甘遂炒青橘皮等分為末三歲用一錢以麥芽湯下以利為度忌酸三五日名水寶散總微論小兒冷疳面黃腹大食即吐者母丁香七枚為末乳汁和蒸三次薑湯服之衛生方痞塊疳積五靈脂炒煙盡真阿魏去砂研等分用黃雄狗膽汁和丸黍米大空心津咽三十丸忌羊肉醋面簡便小兒疳瀉赤石脂末米飲調服半錢立瘥加京芎等分更妙斗門方小兒疳瀉冷熱不調胡黃連半兩綿薑一兩炮為末每服半錢甘草節湯下衛生總微論小兒疳瀉下痢用蝦蟆燒存性研飲服方寸匕子母祕録小兒疳痢薤白生搗如泥以粳米粉和蜜作餅炙熟與食不過三兩服楊氏産乳又地榆煮汁熬如飴糖與服便已肘後方又雞子同光粉炒乾服日華小兒疳痢羸瘦多睡坐則閉目食不下用蚺蛇膽豆許二枚煮通草汁研化隨意飲之並塗五心下部楊氏産乳小兒疳痢垂死者益母草嫩葉同米煮粥食之取足以瘥為度甚佳飲汁亦可廣利方又新羊屎一升水一升漬一夜絞汁頓服日午乃食極重者不過三服總録方一方新牛屎一升水一升攪澄汁服不過三服必效方五疳八痢面黃肌瘦好食泥土不思飲食用大幹大蟾蜍一枚燒存性皂角去皮弦一錢燒存性蛤粉水飛三錢麝香一錢為末糊丸粟米大每空心米飲下三四十丸日二服名五疳保童丸金嬰方治小兒無辜閃癖瘰癧或頭干黃聳或乍痢乍瘥諸狀多者大黃九兩錦紋新實者若微朽即不中用削去皮搗篩為散以好米醋三升和置瓦碗中於大鐺內浮湯上炭火慢煮候至成膏可丸乃貯器中三歲兒一服七丸梧子大日再服以下出青赤膿為度若不下或下少稍稍加丸若下多又須減之病重者七八劑方盡根大人亦可用之此藥惟下宿膿不令兒利也須禁食毒物乳母亦禁之一加木香一兩半崔知悌方治無辜疳病夜明砂搗熬為末拌飯與三歲小兒食之甚驗慎微小兒疳蛔鸕鷀屎干研為末炙豬肉蘸食有奇效蘇頌方小兒諸疳遍身或面上生瘡爛成孔臼如大人楊梅瘡用蒸糯米時甑蓬四邊滴下氣水以盤承取掃瘡上不數日即效百藥不效者用之如神集簡方小兒疳瘡腎疳鼻疳頭瘡耳瘡久不瘥者石緑白芷等分為末先以甘草水洗瘡拭淨敷之集玄方小兒口疳黃連蘆薈等分為末每蜜湯服五分走馬疳入蟾灰等分青黛減半麝香少許簡便方又蔗皮燒研摻之簡便方又經霜茄蒂燒灰抹奇效丹溪方又人中白煅黃柏蜜炙焦為末等分入冰片少許以青布拭淨摻之纍效經驗方齒鼻疳瘡糞蛆有尾者燒灰一錢褐衣灰五分和勻頻吹神效無比又氁褐不拘紅黑燒存性白礬燒枯各一錢尿桶白鹼一錢半燒過同研搽神效簡便方疳蝕口鼻五倍子燒存性研末摻之普濟方小兒鼻𧈟鼻下兩道赤色有疳以米泔水洗淨用黃連末敷之日三四次子母祕録小兒鼻疳蝕爛膽礬燒煙盡研末摻之一二日愈集簡方又烏賊魚骨白及各一錢輕粉二字為末搽之錢乙小兒方小兒食肥甘腎受虛熱口作臭息次第齒黑名曰崩砂漸至齦爛名曰潰槽又或血出名曰宣露重則齒落名曰腐根用蘭香子末輕粉各一錢密陀僧煅醋淬研末半兩和勻每以少許敷齒及根立效內服甘露飲活幼口議小兒齒疳鴨嘴膽礬一錢匙上煅紅麝香少許研勻敷齦上立效活幼口議走馬牙疳用雞肫黃皮不落水者五枚枯礬五錢研搽立愈經驗方一方用雞肫黃皮燈上燒存性入枯礬黃柏末等分麝香少許先以米泔洗漱後貼之心鑑方又銅青滑石杏仁等分為末擦之立效邵真人方又蠶蛻紙灰入麝香少許貼之直指方加白殭蠶等分或加乳香少許又用婦人尿桶中白垢火煅一錢銅緑三分麝香一分和勻貼之神效又五倍子青黛枯礬黃柏等分為末先以鹽湯漱淨摻之立效便覽走馬牙疳侵蝕口鼻干蚵蚾黃泥裹同煅過黃連各二錢半青黛一錢為末入麝香少許和研敷之鄭氏小兒方走馬疳蝕透骨穿腮生南星一個當心剜空入雄黃一塊麵裹燒候雄黃作汁以盞子合定出火毒去面為末入麝香少許拂瘡數日甚驗經驗方又以抱退雞子軟白皮包活土狗一個放入大蝦蟆口內草縛泥固煅過取出研末貼之以愈為度名金鞭散普濟小兒耳疳生於耳後腎疳也地骨皮一味煎湯洗之仍以香油調末搽之高文虎蓼州間録水瀉奶疳椒一分去目研末酥調少少塗腦上日三度延齡方滯頤小兒流涎脾熱也或兼胸膈有痰新桑根白皮搗自然汁塗之甚效乾者煎水聖惠方又用牛噍草絞汁少少與服普濟方又取東行牛口中涎沫塗口中及頤上自愈亦治小兒口噤身熱吐沫不能乳外臺祕要又白羊屎燒灰頻納口中千金方解頤脫臼不能收上用南星末生薑汁調塗兩頰一夜即上醫説龜背小兒龜背以龜尿摩其胸背久久即瘥孫真人方解顱小兒解顱不合以蟹螯同白及末搗塗以合為度宗奭囟開不合鼻塞不通天南星泡去皮為末淡醋調緋帛上貼囟門炙手頻尉之立效錢氏小兒直訣囟陷小兒囟陷乃冷也水調半夏末塗足心又烏頭附子並生去皮臍二錢雄黃八分為末蔥根搗和作餅貼陷處全幼心鑑囟填小兒生下囟門即腫者黃柏末水調貼足心普濟方行遲小兒行遲至三歲不能行者用此便走五加皮五錢牛膝木瓜二錢半為末每服五分米飲入酒二三點調服全幼心鑑語遲小兒語遲社壇胙酒納口中佳藏器方諸疾小兒無故卒死取蔥白納入下部及兩鼻孔中氣通或嚏即活陳氏經驗方小兒夜啼乳香一錢燈花七枚為末每服半字乳汁下聖惠方又伏龍肝末二錢硃砂一錢麝香少許為末蜜丸緑豆大每服五丸桃符湯下普濟方又燈心燒灰塗乳上飼兒丹溪方又黑牽牛末一錢水調敷臍上即止又甑帶懸戶上即止子母祕録又燒尸場土置枕邊集簡方又雞窠草安席下勿令母知日華本草又以雞翮翎安席下勿令母知時珍又用本兒初穿毛衫兒放瓶內自不哭也生生編治小兒一百二十日內夜啼用蟬蛻四十九個去前截用後截為末分四服鉤藤湯調灌之心鑑普濟蟬花散治小兒夜啼不止狀若鬼祟用蟬蛻下半截為末一字薄荷湯入酒少許調下或者不信將上截為末煎湯調下即復啼也古人立方莫知其妙小兒邪熱在心夜啼不止以燈花二三顆燈心湯調抹乳吮之時珍方小兒腹痛夜啼樹孔中草暗著戶上即止聖惠方又蟅蟲炙芍藥芎藭各二錢為末每用一字乳汁調下聖惠夜啼腹痛面青冷證也用大蒜一枚煨研日乾乳香五分搗丸芥子大每服七丸乳汁下危氏得效方小兒肚痛曲腳而啼安息香丸安息香酒蒸成膏沉香木香丁香藿香八角茴香各三錢香附子縮砂仁炙甘草各五錢為末以膏和煉蜜丸芡子大每服一丸紫蘇湯化下全幼心鑑胎寒腹痛啼哭吐乳大便瀉青狀若驚搐出冷汗薑黃一錢沒藥乳香各二錢為末蜜丸芡子大每服一丸鉤藤煎湯化下和劑方小兒拗哭不止令三姓婦人抱兒臥驢槽中移時即止勿令人知藏器小兒暑風暑毒入心痰塞心孔昏迷搐搦此乃危急之證非此丸生料眩瞑之劑不能代之三生丸用白附子天南星半夏並去皮等分生研豬膽汁和丸黍米大量兒大小薄荷湯下令兒側臥嘔出痰水即蘇全幼心鑑小兒中暑吐瀉煩渴穀精草燒存性用器覆之放冷為末每冷米飲服半錢保幼大全小兒霍亂吐瀉土蜂窠炙研乳汁服一錢聖惠方又尿滓末即人中白乳上服之良千金方又訶黎一枚為末沸湯服一半止未止再服子母祕録又廁屋戶簾燒灰飲服一錢時珍小兒吐瀉芹菜切細煮汁飲之不拘多少子母祕録小兒吐瀉注下小便少白龍丸用熟附子五錢白石脂煅龍骨煅各二錢半為末醋麵糊丸黍米大每米飲量兒大小服全幼心鑑小兒吐瀉黃色者傷熱也用石膏寒水石各五錢生甘草二錢半為末滾湯調服一錢名玉露散錢氏小兒方小兒吐瀉胃虛及有驚痰梓朴散用厚朴一兩半夏湯泡七次薑汁浸半日曬乾一錢以米泔三升同浸一百刻水盡為度如未盡少加火熬干去厚朴只研半夏每服半錢或一字薄荷湯調下錢乙小兒直訣小兒嘔逆取壁蟢窠二七枚煮汁飲之藏器小兒嘔吐壯熱發癇葛粉二錢水二合調勻傾入錫鑼中重湯蕩熱以糜飲和食咱殷食醫心鏡治噦氣嘔逆小兒吐乳大人吐食反胃闢痁並水煮仙人杖服之藏器小兒吐逆頻並不進乳食手足心熱用紅曲年久者三錢半白