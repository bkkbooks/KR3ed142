body:
  text: 卷七破傷風破傷中風凡閃脫折骨諸瘡慎不可當風用扇中風則發痓口噤項急殺人急飲竹瀝二三升忌冷飲食及酒竹瀝卒難得可合十許束並燒取之外臺秘要又雄黃白芷等分為末酒煎灌之即蘇經驗方又蘇方木為散三錢酒服立效名獨聖散普濟方又用生蟾二兩半切剁如泥入花椒一兩同酒炒熟再入酒二盞半溫熱服之少頃通身汗出神效又威靈仙半兩獨頭蒜一個香油一錢同搗爛熱酒沖服汗出即愈易簡方又蟾酥二錢湯化為糊乾蠍酒炒天麻各半兩為末合搗丸綠豆大每服一丸至二丸豆淋酒下聖惠方又亂髮如雞子大無油器中熬焦黑研以好酒一盞沃之入何首烏末二錢灌之少頃再灌本草衍義又臘月收取狐目陰乾臨時用二目一副炭火微燒存性研末無灰酒服之神效無比時珍方又用火命婦人取無根水一盞入百草霜調捏作餅放患處三五換如神試驗方又用病人耳中膜並刮爪甲上末唾調塗瘡口立效儒門事親又用蠐螬將駝脊背捏住待口中吐水就取抹瘡上覺身麻汗出無有不活者一小兒額上跌破七日成風依此治之時間就愈嬰童百問治打撲金刃傷及破傷風傷濕發病強直如癇狀者天南星防風等分為末水調敷瘡上出水為妙仍以溫酒調服一錢已死心尚溫者熱童便調灌三錢名奪命散亦名玉真散鬥毆內傷墜壓者酒和童便連灌三服即蘇亦可煎服三因方破傷風病發熱醫學正傳用蟬蛻炒研酒服一錢神效普濟方用蟬蛻為末蔥涎調塗破處即時取去惡水立效名追風散治破傷風有表證未解者用江鰾半兩炒焦蜈蚣一對炙研為末以防風羌活獨活川芎等分煎湯調服一錢破傷風濕如瘧者以黃蠟一塊熱酒化開服立效與玉真散對用尤妙瑞竹堂方破傷風腫新殺豬肉乘熱割片貼患處連換三片其腫立消簡便方破傷風水腫痛不可忍麝香末一字納瘡中出盡膿水便效普濟方破傷中風病傳入里用左蟠龍即野鴿糞江鰾白殭蠶各炒半錢雄黃一錢為末蒸餅丸梧子大每服十五丸溫酒下取效保命集破傷風病無問表裡角弓反張秋蟬一個地膚子炒八分麝香少許為末酒服二錢聖惠方破傷中風身如角弓反張筋急口噤者用守宮丸治之守宮炙乾去足七枚天南星酒浸三日曬乾一兩膩粉半錢為末以薄麵糊丸綠豆大每以七丸酒灌下少頃汗出得解更與一服再汗即瘥或加白附子一兩以蜜丸聖惠方破傷風搐口噤強直者用魚膠燒存性一兩麝香少許為末每服二錢蘇木煎湯調下名香膠散仍煮一錢封瘡口保命集破傷濕氣口噤強直用牡蠣粉酒服二錢仍外敷之取效三因方破傷風口噤用大豆一升熬去腥氣勿使太熟杵末蒸令氣遍取下甑以酒一升淋之溫服一升取汗敷膏瘡上即愈千金方破傷風痢口噤身強肉蓯蓉切片曬乾用一小盞底上穿一孔燒煙於瘡上薰之累效衛生總微破傷中風牙關緊急天南星防風等分為末每服二三匙童子小便五升煎至四升分二服即止也經驗方破傷風瘡作白痂無血者殺人最速以黃雀糞直者研末熱酒服半錢普濟方攣轉筋攣急松節一兩銼如米大乳香一錢銀石器慢火炒焦存一二分性出火毒研末每服一二錢熱木瓜酒調下一應筋病皆治之秘寶方腳筋攣痛用木瓜數枚以酒水各一半煮爛搗膏乘熱貼於痛處以帛裹之冷即換日三五度食療本草腰腳風血積冷筋急拘攣疼痛者取茄子五十斤切洗以水五斗煮取濃汁濾去滓更入小鐺中煎至一升以來即入生粟粉同煎令稀稠得所取出搜和更入麝香硃砂末同丸如梧子大每旦用秫米酒送下三十丸近暮再服一月乃瘥男子女人通用皆驗圖經本草眩暈諸風頭暈蒼耳葉曬乾為末每服一錢酒調下日三服若吐則以蜜丸梧子大每服二十丸十日全好矣經驗方又天麻丸消風化痰清利頭目寬胸利膈治心忪煩悶頭運欲倒項急肩背拘倦神昏多睡肢節煩痛皮膚搔癢偏正頭痛鼻齆面目虛浮並宜服之天麻半兩芎藭二兩為末煉蜜丸如芡子大每食後嚼一丸茶酒任下普濟方頭目眩運甚則屋轉眼黑或如物飛或見一為二用鹿茸半兩無灰酒三盞煎一盞入麝香少許溫服頭目虛運車風一個即鷹頭也去毛焙川芎一兩為末酒服三錢選奇方又澩鳩煮炙食之頓盡一枚至驗嘉祐方旋風眩冒用鴟頭一枚炒黃真䕡茹白朮各一兩川椒半兩炒去汗為末蜜和丸梧子大每酒下二十丸聖惠方老人風眩用白羊頭一具如常治食之風熱上衝頭目運眩或胸中不利川芎槐子各一兩為末每服三錢用茶清調下胸中不利以水煎服潔古保命集失血眩運凡傷胎去血產後去血崩中去血金瘡去血拔牙去血一切去血過多眩運悶絕不省人事當歸二兩芎藭一兩每用五錢水七分酒三分煎七分熱服日再婦人良方癲狂一切驚憂思慮多忘及心氣不足癲癇狂亂獖豬心二個切入大硃砂二兩燈芯三兩在內麻扎石器煮一伏時取出砂為末以茯神末二兩酒打薄糊丸梧子大每服九丸至十五丸二十五丸麥門冬湯下甚者乳香入人參湯下百一選方風癲百病麻子四升水六升猛火煮令芽生去滓煎取二升空心服之或發或不發或多言語勿怪之但令人摩手足頓定進三劑愈千金方又鵲巢多年者燒灰水服療癲狂鬼魅及蠱毒仍呼祟物名號亦敷瘻瘡良日華治失心癲狂用真鬱金七兩明礬三兩為末薄糊丸梧子大每服五十丸白湯下有婦人癲狂十年至人授此初服心胸間有物脫去神氣灑然再服而蘇此驚憂痰血絡聚心竅所致鬱金入心去惡血明礬化頑痰故也時珍方又用狗肝一具批開以黃丹硝石各一錢半研勻擦在內用麻縛定水一升煮熟細嚼以本汁送下名黃石散楊氏家藏卒發癲狂葶藶一升搗三千杵取白犬血和丸麻子大酒服一丸三服取瘥肘後方又自經死繩燒末水服三指撮陳蒲煮汁服亦佳治狂癲不能語不識人驢生脂和酒服三升孟詵方狂癲謬亂不識人伏龍肝末水服方寸匕日三升千金方火驚失心霹靂木煮汁服之又掛門戶大厭火災藏器熱病狂邪不避水火欲殺人苦參末蜜丸梧子大每服十丸薄荷湯下亦可為末二錢水煎服千金方病笑不休滄鹽煅赤研入河水煎沸啜之探吐熱痰數升即愈儒門事親癇風痰癇疾大皂角半斤去皮子以蜜四兩塗上慢火炙透捶碎以熱水浸一時挼取汁慢火熬成膏入麝香少許攤在夾綿紙上曬乾剪作紙花每用三四片入淡漿水一小盞中洗淋下以筒吹汁入鼻內待痰涎流盡吃脂麻餅一個涎盡即愈立效名五癇膏治諸風取痰如神普濟方又金燈花根似蒜者一個以茶清研如泥日中時以茶調下即臥日中良久吐雞子大物永不發如不吐以熱茶投之奇效良方又天南星煨香一兩硃砂一錢為末豬心血丸梧子大每防風湯化一丸普濟方又九節菖蒲不聞雞犬聲者去毛木臼搗末以獖豬心一個批開砂罐煮湯調服三錢日一服醫學正傳又生川烏頭去皮二錢半五靈脂半兩為末豬心血丸梧子大每薑湯化服一丸又生白礬一兩細茶五錢為末煉蜜丸如梧子大一歲十丸茶湯下大人五十丸久服痰自大便中出斷除病根名化痰丸筆峰雜興風痰迷心癲癇及婦人心風血邪用甘遂二錢為末以豬心取三管血和藥入豬心內縛定紙裹煅熟取末入辰砂末一錢分作四丸每服一丸將豬心煎湯調下大便惡物為效不下再服濟生方又熟艾於陰囊下穀道正門當中間隨年歲灸之斗門方久近風癇凌霄花或根葉為末每服三錢溫酒下服畢解發不住手梳口噙冷水溫則吐去再噙再梳至二十日乃止如此四十九日絕根百無所忌奇效方多年癇病取臘月啄木鳥一個無灰酒三升先以瓦罐鋪荊芥穗一寸厚安鳥於上再以穗蓋一寸傾酒入內鹽泥固濟炭火煅之酒干為度放冷取出為末入石膏二兩鐵粉一兩炮附子一兩硃砂麝香各一分龍腦一錢共研勻每服一錢先服溫水三兩口以溫酒一盞調服即臥發時又一服間日再服不過十服即愈保幼大全三十年癇一切氣塊宿冷惡病苦參一斤童子小便一斗二升煎至六升和糯米及曲如常法作酒服但腹中諸病皆治酒放二三年不壞多作救人神效聖惠方癇疾發作涎潮搐搦時作譫語虎睛一對微炒犀角屑大黃遠志去心各一兩梔子仁半兩為末煉蜜丸綠豆大每溫服二十丸諸風膈痰諸癇涎湧用瓜蒂炒為末量人以酸齏水一杯調下取吐風癇加蠍稍半錢濕氣腫滿加小豆末一錢有蟲加狗油五七點雄黃一錢甚則加芫花半錢立吐蟲出活法機要風癇喉風咳嗽及遍身風疹急中涎潮等證不拘大人小兒此藥不大吐逆只出涎水瓜蒂為末壯年服一字老少半字早晨井華水下一食頃含砂糖一塊良久涎如水出年深者出墨涎有塊布水上也涎盡食粥一兩口如吐多人困甚即以麝香泡湯一盞飲之即止暗風癇疾用臘月烏鴉一個鹽泥固濟於瓶中煅過放冷取出為末入硃砂末半兩每服一錢酒下日三服不過十日愈又方用渾烏鴉一個瓶固煅研胡桃七枚蒼耳心子七枚為末每服一錢空心熱酒下並保幼大全暗風癇疾忽然仆地不知人事良久方醒蛇黃火煅醋淬七次為末每調酒服二錢數服愈年深者亦效危氏方驚悸驚悸因虛勞而得補虛止驚令人能食紫石英五兩打如豆大水淘一遍以水一斗煮取三升細細服或煮粥食水盡可再煎之張文仲方治思慮過度勞傷心脾健忘怔忡虛煩不眠自汗驚悸用龍眼肉酸棗仁炒黃耆炙白朮焙茯神各一兩木香半兩炙甘草二兩半㕮咀每服五錢姜三片棗一枚水二鍾煎一鍾溫服名歸脾湯濟生方治心神不定恍惚健忘不樂火不下降水不上升時復振跳常服滋陰養火全心氣茯神二兩去皮沉香半兩為末煉蜜丸小豆大每服三十丸食後人參湯下名朱雀丸百一選方驚悸善忘心臟不安上膈風熱化痰安神白石英一兩硃砂一兩為散每服半錢食後煎金銀湯下濟眾方又預知散治驚悸健忘用虎骨酥炙白龍骨遠志肉等分為末生薑湯服日三服久則令人聰慧永類鈐方驚氣入心絡喑不能言語者用密陀僧末一匕茶調服即愈振悸不眠用酸棗仁二升茯苓白朮人參甘草各二兩生薑六兩水八升煮三升分服圖經本草悸病後目不瞑郁李酒飲之使醉即愈所以然者目系內連肝膽恐則氣急膽橫不下郁李能去結隨酒入膽結去膽下則目能瞑矣此蓋得肯綮之妙者也惡夢驚擾通宵不寐用辰砂如箭簇者以絳囊盛置髻中即夜寢無夢神魂安靜涉旬無不驗者道書謂丹砂辟惡安魂此可徵也好魘多夢燒人灰置枕中履中自止本草拾遺健忘心孔憫塞多忘善誤丁酉日密自至市買遠志著巾角中還為末服之勿令人知肘後方又取商陸花陰乾百日搗末日暮水服方寸匕乃臥思念所欲事即於眠中醒悟也蘇頌方心虛風邪精神恍惚健忘以鐵鏵久使者四斤燒赤投醋中七次打成塊水二斗浸七日每食後服一小盞時珍方治健忘益聰智七月七日取菖蒲為末酒服方寸匕並令飲酒不醉忌鐵器千金方又用戊子日取東引桃枝二寸枕之又五月五日日未出時取東引桃枝刻作三寸木人著衣領帶中佩之千金方治健忘七月七日收麻勃一升人參二兩為末蒸令氣遍每臨臥服一刀圭能盡知四方之事此乃治健忘服之能記四方事也陶云逆知未來事言過矣範汪方又七月七日取蛛網置衣領中勿令人知別錄又五月五日收鱉爪藏衣領中令人不忘肘後方汗附汗斑自汗盜汗常出為自汗睡中出為盜汗用五倍子研末津調填臍中縛定一夜即止也集靈方又每夜臥時帶飢吃黃餅一枚不過數日即止醫林集要又死人席緣燒灰煮汁浴身自愈時珍方諸虛自汗夜臥即甚久則枯瘦黃耆麻黃根各一兩牡蠣米泔浸洗煅過為散每服五錢水二盞小麥百粒煎服和劑局方怔忡自汗心不足也人參半兩當歸半兩豶豬腰子二個以水二盞煮至一盞半取腰子細切人參當歸同煎至八分空心吃腰子以汁送下其滓焙乾為末以山藥末作糊丸綠豆大每服五十丸食遠棗湯下不過兩服即愈一方加乳香二錢百一選方心虛自汗不睡者用豶豬心一個帶血破開入人參當歸各二兩煮熟去藥食之不過數服即愈證治要訣心悶汗出不識人新汲水和蜜飲之甚效千金方血虛心汗別處無汗獨心孔有汗思慮多則汗亦多宜養心血以艾湯調茯神末日服一錢證治要訣病後虛汗口乾心燥地黃五兩水三盞煎一盞半分叄服一日盡聖惠方病後虛汗及目中流汗杜仲牡蠣等分為末臥時水服五匕不止更服肘後方虛汗無度麻黃根黃耆等分為末飛麵糊丸梧子大每用浮麥湯下百丸以知為度試驗方濕溫多汗妄言煩渴石膏炙甘草等分為末每服二錢匕漿水調下龐安常方食即汗出乃脾胃虛也豬肝一斤薄切片瓦上焙乾為末白粥布絞汁眾手丸梧子大空心飲下五十丸日五心鏡方風熱汗出水和雲母粉服三錢不過再服立愈千金翼方盜汗不止太平白芷一兩辰砂半兩為末每服二錢溫酒下屢驗集驗方又酸棗仁人參茯苓等分為末每服一錢米飲下簡便方又以豉三升微炒香清酒三升漬三日取汁冷暖任服不瘥更作三兩劑即止孟詵方又麻黃根椒目等分為末每服一錢無灰酒下外以麻黃根故蒲扇為末撲之奇效良方又經霜桑葉研末米飲服脾虛盜汗白朮四兩切片以一兩同土炒以一兩同牡蠣炒一兩同石斛炒一兩同麥麩炒撿術為末每服三錢食遠粟米湯下日三服丹溪方盜汗陰汗麻黃根牡蠣粉撲之卒汗不止牛羊脂溫酒頻化服之外臺方腳底多汗燒人場上土鋪於鞋底內蹉之灰亦可集玄方赤白汗斑白附子硫黃等分為末薑汁調稀茄蒂蘸擦日數次簡便方夏月汗斑如疹用密陀僧八錢雄黃四錢先以薑片擦熱仍以薑片蘸末搽之次日即焦活人心鏡不得臥附嗜臥膽虛不眠心多驚悸用酸棗仁一兩炒香搗為散每服二錢竹葉湯調下又用馬頭骨灰乳香各一兩酸棗仁炒二兩為末每服二錢溫酒服聖惠方治膽熱虛勞不眠榆葉同酸棗仁等分蜜丸日服時珍方膽風毒氣虛實不調昏沉多睡用酸棗仁一兩生用全挺臘茶二兩以生薑塗炙微焦為散每服二錢水七分煎六分溫服濟眾方日不得瞑乃陽氣盛不得入於陰陰氣虛故目不得瞑治法飲以半夏湯用流水千里外者八升揚之萬遍取其清五升煮之炊葦薪火置秫米一升半夏五合徐炊令竭為一升去滓飲汁一小杯日三飲以知為度靈樞經夜不合眼難睡燈草煎湯代茶飲即得睡集簡方男婦面無血色食少嗜臥蒼朮一斤熟地黃半斤乾薑炮冬一兩春秋七錢夏五錢為末糊丸梧子大每溫水下五十丸拔萃方飽食便臥得谷勞病令人四肢煩重嘿嘿欲臥食畢輒甚用大麥糵一升椒一兩並炒乾薑三兩搗末每服方寸匕白湯下日三肘後方不能食脾胃虛弱不思飲食生薑半斤取汁白蜜十兩人參四兩銀鍋煎成膏每米飲調服一匙普濟方又平胃散一斤入干糖糟炒二斤半生薑一斤半紅棗三百個煮取肉焙乾通為末逐日點湯服脾弱不食大豆黃二斤大麻子三升熬香為末每服一合飲下日四五服任意千金方脾胃虛弱飲食減少易傷難化無力肌瘦用乾薑頻研四兩以白餳切塊水浴過入鐵銚熔化和丸梧子大每空心米飲下三十丸十便方脾胃俱虛不能消化水穀胸膈痞悶腹脅膨脹連年累月食減嗜臥口無味神麯六兩麥糵炒三兩乾薑炮四兩烏梅肉焙四兩為末蜜丸梧子大每米飲服五十丸日三服和劑局方腹中虛冷不能飲食食輒不消羸弱生病蒼朮二斤曲一斤炒為末蜜丸梧子大每服三十丸米湯下日三服大冷加乾薑三兩腹痛加當歸三兩羸弱加甘草二兩肘後方脾胃虛冷不下食積久羸弱成瘵者用溫州白乾薑漿水煮透取出焙乾搗末陳廩米煮粥飲丸梧子大每服三五十丸白湯下其效如神圖經本草脾胃虛弱胸膈不快不進飲食用蓽澄茄為末薑汁打神麯糊丸梧子大每薑湯下七十丸日二服濟生方理脾快氣青橘皮一斤日乾焙研末甘草一兩檀香末半兩和勻收之每用一二錢入鹽少許白湯點服快膈進食麥糵四兩神麯二兩白朮橘皮各一兩為末蒸餅丸梧子大每人參湯下三五十丸效啟脾進食用谷糵四兩為末入薑汁鹽少許和作餅焙乾入炙甘草砂仁白朮麩炒各一兩為末白湯點服之或丸服澹寮方止喑肺壅失音杉木燒炭入碗中以小碗覆之用湯淋下去碗飲水不愈再作音出乃止集簡方聲失不出馬屁勃馬牙硝等分研末砂糖和丸芡子大噙之摘玄方失音不語東家雞棲木燒灰水服盡一升效藏器又人乳竹瀝各二合溫服摘玄方卒然失音用生大豆一升青竹算子四十九枚長四寸闊一分水煮熟日夜二服瘥孟詵方治啞病蟬蛻研末一錢井花水服藏器消癉消渴引飲用人參一兩葛粉二兩為末發時以燖豬湯一升入藥三錢蜜二兩慢火熬至三合狀如黑餳以瓶收之每夜以一匙含咽不過三服取效也聖濟總錄三消渴疾以鯰魚涎和黃連末為丸烏梅湯每服五七丸日三服取效蘇頌方又用麥門冬鮮肥者二大兩宣州黃連九節者二大兩去兩頭尖三五節小刀子理去皮毛吹去塵更以生布摩拭稱之搗末以肥大苦瓤汁浸麥門冬經宿然後去心即於臼中搗爛納黃連末和丸並手丸如梧子大食後飲下五十丸日再但服兩日其渴必定若重者即初服一百五十丸二日服一百二十丸三日一百丸四日八十丸五日五十丸合藥要天氣晴明之夜方浸藥須靜處禁婦人雞犬見之如覺可時只服二十五丸服訖覺虛即取白羊頭一枚治淨以水三大斗煮爛取汁約一斗細細飲之勿食肉勿入鹽不過三劑平復也集驗方又用豬脊骨一尺二寸大棗四十九枚新蓮肉四十九粒炙甘草二兩西木香一錢水五碗同煎取汁渴則飲之三因方又白芍藥甘草等分為末每用一錢水煎服日三服有患此九年服藥止而復作得是方服之七日頓愈古人處方殆不可曉不可以平易而忽之經驗方又梅花湯用糯殼炒出白花桑根白皮等分每用一兩水二碗煎汁飲之三因方又臘月或端午日用泥固濟牡蠣煅赤研末每服一錢用活鯽魚煎湯調下只二三服愈經驗方又用鯽魚一枚去腸留鱗以茶葉填滿紙包煨熟食之不過數枚即愈呂氏心統又用瓜蔞根黃連三兩為末蜜丸梧子大每服三十丸日二又玉壺丸用瓜蔞根人參等分為末蜜丸梧子大每服三十丸麥門冬湯下忌酒面炙煿聖惠方又用香水梨或鴨梨或江南雪梨皆可取汁以蜜湯熬成瓶收無時以熱水或冷水調服愈乃止普濟方又韭苗日用三五兩或炒或作羹勿入鹽入漿無妨吃至十斤即住極效過清明勿吃秦憲副方又用五靈脂黑豆去皮等分為末每服三錢冬瓜皮湯下無皮用葉亦可日二服不可更服熱藥宜八味丸去附子加五味子若小渴者二三服即止保命集又獨聖散用出了子蘿蔔三枚淨洗切片日乾為末每服二錢煎豬肉湯澄清調下日三服漸增至三錢生者搗汁亦可或以汁煮粥食之圖經本草又晚蠶砂焙乾為末每用冷水下二錢不過數服斗門方又烏豆置牛膽中陰乾百日吞盡即瘥肘後方又白浮石蛤粉蟬殼等分為末鯽魚膽汁七個調服三錢神效又用雄豬肚一枚入黃連末五兩瓜蔞根白糧米各四兩知母三兩麥門冬二兩縫定蒸熟搗丸如梧子大每服三十丸米飲下仲景方又用泥鰍魚十頭陰乾去頭尾燒灰乾荷葉等分為末每服二錢新汲水調下日三名沃焦散普濟方消渴飲水日夜不止小便數者用田螺五升水一斗浸一夜渴即飲之每日一換水及螺或煮食飲汁亦妙心鏡方一用糯米二升煮稀粥一斗冷定入田中活田螺三升在內待食粥盡吐沫出乃收飲之立效聖惠方又以黃雌雞煮汁冷飲並作羹食肉心鏡方消渴飲水無度用燖雄雞水澄濾服之不過二雞之水愈神效楊氏經驗方又用蝸牛十四枚形圓而大者以水三合密器浸一宿取水飲之不過一劑愈海上方消渴引飲小便不利葵根五兩水三大盞煮汁平旦服日一服聖惠方消渴飲水日至數斗小便赤澀用秋麻子仁一升水三升煮三四沸飲不過五升瘥肘後方腎消飲水小便如膏油用茴香炒苦楝子炒等分為末每食前酒服二錢保命集消渴飲水日至一石者浮萍搗汁服之又方用干浮萍瓜蔞根等分為末人乳汁和丸梧子大空腹飲服二十丸三年者數日愈千金方又菠菱根雞內金等分為末米飲服一錢日三經驗方消渴不止用生瓜蔞根切片以水三斗煮至一斗濾淨入煉淨黃牛脂一合慢火熬成膏瓶收每酒服一杯日三聖濟總錄又菟絲子煎湯任意飲之以止為度事林廣記又糯米泔任意飲之即定研汁亦可外臺秘要消渴無度干豬胞十個剪破去蒂燒存性為末每溫酒服一錢聖濟總錄消渴飲水骨節煩熱用生芭蕉根搗汁時飲一二合聖惠方消渴不止小便多用干冬瓜子麥門冬黃連各二兩水煎飲之冬瓜苗葉俱治消渴不拘新幹摘玄方消中尿多日夜尿七八升冬葵根五斤水五斗煮三斗每日平旦服二升外臺秘要消渴不止下元虛損牛膝五兩為末生地黃汁五升浸之日曝夜浸汁盡為度蜜丸梧子大每空心溫酒下三十丸久服壯筋骨駐顏色黑髮津液自生經驗方下虛消渴心脾中熱下焦虛冷小便多者牛羊乳每飲三四合廣利方腎虛消渴難治者黑大豆炒天花粉等分為末糊丸梧子大每黑豆湯下七十丸名救活散普濟妙方胃虛消渴羊肚煮爛空腹服之千金方消渴煩亂蠶蛹二兩以無灰酒一中盞水一大盞同煮一中盞溫服聖惠方又冬瓜瓤乾者一兩水煎飲聖惠方又取七家井索近瓶口結處燒灰新汲水服二錢不過三五服效聖惠方消渴羸瘦用兔一隻去皮爪五臟以水一斗半煎稠去滓澄冷渴即飲之極重者不過二兔海上方消渴羸瘦小便不禁兔骨和大麥苗煮汁服極效海上方多年消渴驢頭肉煮汁服二三升無不瘥者孟詵方又牝驢骨煮汁服極效時珍方消渴重者眾人尿坑中水取一盞服之勿令病人知三度瘥聖惠方止消渴以湯瓶內鹼一兩為末粟米燒飯丸梧子大每人參湯下二十丸時珍方又牛鼻木二個洗銼男用牝牛女用牡牛人參甘草半兩大白梅一個水四碗煎三碗熱服甚效普濟方又繅絲湯煮粟米粥食之惠濟方強中消渴豬腎薺苨湯治強中之病莖長興盛不交精液自出消渴之後即發癰疽皆由恣意色欲或餌金石所致宜此以制腎中熱也用豬腎一具薺苨石膏各三兩人參茯苓磁石知母葛根黃芩瓜蔞根甘草各二兩黑大豆一升水一斗半先煮豬腎大豆取汁一斗去滓下藥再煮三升分三服後人名為石子薺苨湯千金方消中易飢肉蓯蓉山茱萸五味子為末蜜丸梧子大每鹽酒下二十丸醫學指南又綠豆黃麥糯米各一升炒熟磨粉每以白湯服一杯三五日見效老人煩渴不食大麥一升水七升煎五升入赤餳二合即飲之奉親書三消骨蒸黃連末以冬瓜自然汁浸一夜曬乾又浸如此七次為末以冬瓜汁和丸梧子大每三四十丸大麥湯下尋常渴只一服見效易簡方
